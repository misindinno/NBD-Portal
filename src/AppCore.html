<script>
// ─── Global App (thin wrapper over Store) ────────────────────────────────────
const App = {
  get user()        { return Store.getState().user; },
  get config()      { return Store.getState().config; },
  get currentPage() { return Store.getState().currentPage; }
};

// ─── AppLookup — centralised ID → label resolver ─────────────────────────────
const AppLookup = (() => {
  let _u = {};
  let _s = {};

  return {
    rebuild() {
      const cfg = App.config || {};
      _u = cfg.userNameMap || {};
      _s = (cfg.allStages || cfg.stages || []).reduce((m, s) => {
        const id = s['Stage ID'];
        if (id) m[id] = {
          name:  s['Stage Name']  || id,
          color: s['Color']       || '#9E9E9E',
          order: Number(s['Stage Order']) || 0
        };
        return m;
      }, {});
    },
    userName(id) {
      if (!id) return '—';
      const raw = String(id);
      const hit = _u[raw] || _u[raw.trim().toLowerCase()];
      if (hit) return hit;
      return raw.includes('@') ? raw : '—';
    },
    stageName(id)  { if (!id) return '—'; return _s[id]?.name  || String(id); },
    stageColor(id) { if (!id) return '#9E9E9E'; return safeColor(_s[id]?.color, '#9E9E9E'); },
    stageObj(id)   { return id ? (_s[id] || null) : null; }
  };
})();

// ─── Auth ─────────────────────────────────────────────────────────────────────
async function fetchCurrentUser() {
  return new Promise((resolve, reject) => {
    google.script.run
      .withSuccessHandler(res => {
        if (!res) return reject(new Error('Server returned null. Push the latest code, redeploy the web app, and check Apps Script executions for the server error.'));
        if (res.success) resolve(res.data);
        else reject(new Error(res.error || 'ACCESS_DENIED'));
      })
      .withFailureHandler(err => reject(new Error(err.message || String(err))))
      .apiGetCurrentUser();
  });
}

// ─── API ──────────────────────────────────────────────────────────────────────
const api = {
  _read(fn, ...args) {
    return new Promise((resolve, reject) => {
      google.script.run
        .withSuccessHandler(res => {
          if (!res) return reject(new Error(`${fn} returned null. Push the latest code, redeploy the web app, and check Apps Script executions for the server error.`));
          if (res.success) resolve(res.data);
          else reject(new Error(`${fn}: ${res.error}`));
        })
        .withFailureHandler(err => reject(new Error(`${fn} failed: ${err.message || err}`)))
        [fn](...args);
    });
  },
  _token()              { return localStorage.getItem('nbd_token') || ''; },
  _authedRead(fn, ...args) { return api._read(fn, api._token(), ...args); },

  // ── Session auth ──────────────────────────────────────────────────────────
  login:               (e, p)  => api._read('apiLogin', e, p),
  loginWithGoogle:     (t)     => api._read('apiLoginWithGoogle', t),
  bootstrapWithToken:  (t)     => api._read('apiBootstrapWithToken', t),
  logout:              (t)     => api._read('apiLogout', t),

  // ── Reads ─────────────────────────────────────────────────────────────────
  bootstrap:           ()      => api._read('apiBootstrap'),
  getDataStamps:       ()      => api._authedRead('apiGetDataStamps'),
  getAppConfig:        ()      => api._authedRead('apiGetAppConfig'),
  getAllStages:         ()      => api._authedRead('apiGetAllStages'),
  getAllConfigs:        ()      => api._authedRead('apiGetAllConfigs'),
  getFieldConfig:      (s)     => api._authedRead('apiGetFieldConfig', s),
  getAllFieldConfigs:   (s)     => api._authedRead('apiGetAllFieldConfigs', s),
  getLeads:            ()      => api._authedRead('apiGetLeads'),
  getLead:             (id)    => api._authedRead('apiGetLead', id),
  findDuplicateLeads:  ()      => api._authedRead('apiFindDuplicateLeads'),
  getFollowups:        (f)     => api._authedRead('apiGetFollowups', f),
  getFollowupHistory:  (f)     => api._authedRead('apiGetFollowupHistory', f),
  getFollowupPageSnapshot: (o)  => api._authedRead('apiGetFollowupPageSnapshot', o || {}),
  saveFollowupDirect:  (p)     => api._authedRead('apiSaveFollowupDirect', p || {}),
  markFollowupDoneDirect: (id, p) => api._authedRead('apiMarkFollowupDoneDirect', id, p || {}),
  getLeadActivityLogs: (f)     => api._authedRead('apiGetLeadActivityLogs', f),
  getTodayActivitySnapshot: ()  => api._authedRead('apiGetTodayActivitySnapshot'),
  runSheetsApiSampleWrite: (p) => api._authedRead('apiRunSheetsApiSampleWrite', p || {}),
  getFollowupLeads:    ()      => api._authedRead('apiGetFollowupLeads'),
  getFollowupFormData: ()      => api._authedRead('apiGetFollowupFormData'),
  getUsers:            ()      => api._authedRead('apiGetUsers'),
  getNbdAssignableUsers: ()    => api._authedRead('apiGetNbdAssignableUsers'),
  checkNbdDuplicate:   (id)   => api._authedRead('apiCheckNbdDuplicate', id),
  getBulkConfig:       ()      => api._authedRead('apiGetBulkConfig'),
  validateBulkRows:    (rows, mode)  => api._authedRead('apiValidateBulkRows', rows, mode || 'create'),
  saveBulkRows:        (rows, mode)  => api._authedRead('apiSaveBulkRows', rows, mode || 'create'),
  saveBulkRow:         (row, rowNumber, mode) => api._authedRead('apiSaveBulkRow', row, rowNumber, mode || 'create'),
  createBulkFollowupOnlyRow: (row, rowNumber) => api._authedRead('apiCreateBulkFollowupOnlyRow', row, rowNumber),
  getBulkProgress:     (id)    => api._authedRead('apiGetBulkProgress', id),
  createErrorCsv:      (rows)  => api._authedRead('apiCreateErrorCsv', rows),

  // Admin
  updatePermissions: ()                      => api._authedRead('apiUpdatePermissions'),

  // Direct mutations + DB-style paged reads
  mutate:          (mod, act, payload, rid) => api._authedRead('apiMutate', mod, act, payload, rid),
  queryLeadsPage:  (q)                      => api._authedRead('apiQueryLeadsPage', q || {}),
  queryFollowupsPage: (q)                   => api._authedRead('apiQueryFollowupsPage', q || {}),
};

async function runAsyncMutation(opts = {}) {
  const requestId = opts.requestId || ('mt-' + Date.now() + '-' + Math.random().toString(36).slice(2, 8));
  try {
    const result = await api.mutate(opts.module, opts.actionType, opts.payload || {}, requestId);
    if (typeof _refreshAfterMutation === 'function') _refreshAfterMutation(opts);
    if (typeof opts.onDone === 'function') {
      opts.onDone({ requestId, status: 'DONE', result, finalRecordId: _mutationResultId(result, opts.payload || {}) });
    }
    return result;
  } catch (err) {
    const failed = { requestId, status: 'FAILED', error: err && err.message ? err.message : String(err || 'Save failed') };
    if (typeof opts.onFail === 'function') opts.onFail(failed);
    else toast('Save failed: ' + failed.error, 'error');
    return null;
  }
}

function _mutationResultId(result, payload = {}) {
  if (typeof result === 'string') return result;
  if (result && typeof result === 'object') return result.leadId || result.followupId || result.id || result.recordId || '';
  return payload.id || payload.leadId || payload.followupId || payload['Lead ID'] || payload['Follow-up ID'] || '';
}
</script>

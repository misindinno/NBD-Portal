<script>
// ─── Follow-ups Page ─────────────────────────────────────────────────────────

let _fuFilterState = { search: '', type: '', assignedTo: '', dateFrom: '', dateTo: '' };

async function loadFollowups(tab = 'all') {
  window.currentFollowupTab = tab;
  el('page-title').textContent = 'Follow-ups';
  _fuFilterState = { search: '', type: '', assignedTo: '', dateFrom: '', dateTo: '' };

  const grp = el('nav-group-fu');
  if (grp) grp.classList.add('open');

  const showFilters = tab !== 'custom';
  el('content').innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <div class="tabs" style="margin-bottom:0;border:none">
        <button class="tab-btn ${tab==='all'?'active':''}"     onclick="loadFollowups('all')">All</button>
        <button class="tab-btn ${tab==='today'?'active':''}"   onclick="loadFollowups('today')">Today</button>
        <button class="tab-btn ${tab==='overdue'?'active':''}" onclick="loadFollowups('overdue')">Overdue</button>
        <button class="tab-btn ${tab==='future'?'active':''}"  onclick="loadFollowups('future')">Future</button>
        <button class="tab-btn ${tab==='closed'?'active':''}"  onclick="loadFollowups('closed')">Closed</button>
        <button class="tab-btn ${tab==='custom'?'active':''}"  onclick="loadFollowups('custom')">Custom Query</button>
      </div>
      <button class="btn btn-primary btn-sm" onclick="openFollowupForm()">
        ${icon('plus', 16)} Add Follow-up
      </button>
    </div>
    ${showFilters ? _fuFilterBarHTML() : ''}
    <div id="fu-body">${skeletonPage('table')}</div>`;
  renderIcons();

  if      (tab === 'today')   await _renderFUTab('today');
  else if (tab === 'overdue') await _renderFUTab('overdue');
  else if (tab === 'future')  await _renderFUTab('future');
  else if (tab === 'closed')  await _renderFUTab('closed');
  else if (tab === 'custom')  _renderCustomQuery();
  else                        await _renderFUTab('all');
}

function _fuFilterBarHTML() {
  const cfg = App.config || {};
  const types = cfg.followupTypes || [];
  const users = cfg.users || [];
  const f = _fuFilterState;
  return `
  <div class="card" style="padding:10px 14px;margin-bottom:12px">
    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
      <span style="font-size:12px;font-weight:600;color:var(--md-primary,#4F46E5);display:flex;align-items:center;gap:5px;white-space:nowrap">
        ${icon('sliders-horizontal', 14)} Filters
      </span>
      <input type="search" id="fu-f-search" class="form-control" placeholder="Search company, contact, phone…"
        style="width:200px;padding:4px 8px;font-size:12px"
        value="${escapeHtml(f.search)}"
        oninput="_fuOnFilterChange('search',this.value)">
      <select id="fu-f-type" class="form-control" style="width:140px;padding:4px 7px;font-size:12px"
        onchange="_fuOnFilterChange('type',this.value)">
        <option value="">All Types</option>
        ${types.map(t=>`<option value="${escapeHtml(t)}"${f.type===t?' selected':''}>${escapeHtml(t)}</option>`).join('')}
      </select>
      <select id="fu-f-user" class="form-control" style="width:150px;padding:4px 7px;font-size:12px"
        onchange="_fuOnFilterChange('assignedTo',this.value)">
        <option value="">All Users</option>
        ${users.map(u=>`<option value="${escapeHtml(u.id)}"${f.assignedTo===u.id?' selected':''}>${escapeHtml(u.name)}</option>`).join('')}
      </select>
      <div style="display:flex;align-items:center;gap:4px">
        <span style="font-size:11px;color:#888;white-space:nowrap">From</span>
        <input type="date" id="fu-f-from" class="form-control" style="width:136px;padding:4px 7px;font-size:12px"
          value="${escapeHtml(f.dateFrom)}"
          onchange="_fuOnFilterChange('dateFrom',this.value)">
      </div>
      <div style="display:flex;align-items:center;gap:4px">
        <span style="font-size:11px;color:#888;white-space:nowrap">To</span>
        <input type="date" id="fu-f-to" class="form-control" style="width:136px;padding:4px 7px;font-size:12px"
          value="${escapeHtml(f.dateTo)}"
          onchange="_fuOnFilterChange('dateTo',this.value)">
      </div>
      <button class="btn btn-outlined" onclick="_fuClearFilters()" style="padding:4px 10px;font-size:12px;white-space:nowrap">
        ${icon('x', 12)} Clear
      </button>
    </div>
  </div>`;
}

function _fuOnFilterChange(key, value) {
  _fuFilterState[key] = value;
  _renderFUTab(window.currentFollowupTab || 'all');
}

function _fuClearFilters() {
  _fuFilterState = { search: '', type: '', assignedTo: '', dateFrom: '', dateTo: '' };
  // Reset the filter inputs without full page reload
  const s = el('fu-f-search'); if (s) s.value = '';
  const t = el('fu-f-type');   if (t) t.value = '';
  const u = el('fu-f-user');   if (u) u.value = '';
  const f = el('fu-f-from');   if (f) f.value = '';
  const to = el('fu-f-to');    if (to) to.value = '';
  _renderFUTab(window.currentFollowupTab || 'all');
}

function _fuApplyFilters(rows, ctx) {
  const f = _fuFilterState;
  if (!f.search && !f.type && !f.assignedTo && !f.dateFrom && !f.dateTo) return rows;
  const searchQ = f.search.toLowerCase().trim();
  return rows.filter(row => {
    const lead = ctx?.leadMap?.[row['Lead ID']];
    if (searchQ) {
      const company  = String(lead?.['Company Name']   || '').toLowerCase();
      const contact  = String(lead?.['Contact Person'] || '').toLowerCase();
      const phone    = String(lead?.['Phone']          || '').toLowerCase();
      const remark   = String(row['Discussion'] || row['Remark'] || '').toLowerCase();
      if (!company.includes(searchQ) && !contact.includes(searchQ) && !phone.includes(searchQ) && !remark.includes(searchQ)) return false;
    }
    if (f.type && String(row['Follow-up Type'] || '') !== f.type) return false;
    if (f.assignedTo && lead?.['Assigned To'] !== f.assignedTo) return false;
    // Closed tab rows use Done Date; open tabs use Planned Date
    const dateField = row['Done Date'] ? _fmtDate(row['Done Date']) : _fmtDate(_fuPlannedDate(row));
    if (f.dateFrom && dateField && dateField < f.dateFrom) return false;
    if (f.dateTo   && dateField && dateField > f.dateTo)   return false;
    return true;
  });
}

async function _renderFUTab(tab) {
  const body = el('fu-body');
  if (!body) return;

  // Closed tab uses followupHistory; all others use followups
  if (tab === 'closed') {
    if (!AppCache.isLoaded('followupHistory') || !AppCache.isLoaded('leads')) {
      body.innerHTML = skeletonPage('table');
      await Promise.all([
        _ensureCached('followupHistory', () => api.getFollowupHistory({})),
        _ensureCached('leads',           () => api.getFollowupLeads())
      ]);
    }
  } else {
    if (!AppCache.isLoaded('followups') || !AppCache.isLoaded('leads')) {
      body.innerHTML = skeletonPage('table');
      await Promise.all([
        _ensureCached('followups', () => api.getFollowups({})),
        _ensureCached('leads',     () => api.getFollowupLeads())
      ]);
    }
  }

  try {
    const todayStr = localDateInputValue();
    let rows;
    if (tab === 'closed') {
      rows = AppCache.getRows('followupHistory')
        .filter(r => String(r['Follow-up Type'] || '').toLowerCase() !== 'stage change');
    } else {
      rows = AppCache.getRows('followups')
        .filter(r => String(r['Follow-up Type'] || '').toLowerCase() !== 'stage change')
        .filter(_isOpenFollowupRow);
      if (tab === 'today') {
        rows = rows.filter(r => _fmtDate(_fuPlannedDate(r)) === todayStr);
      } else if (tab === 'overdue') {
        rows = rows.filter(r => { const d = _fmtDate(_fuPlannedDate(r)); return d && d < todayStr; });
      } else if (tab === 'future') {
        rows = rows.filter(r => { const d = _fmtDate(_fuPlannedDate(r)); return d && d > todayStr; });
      }
    }
    const ctx = _buildFollowupContext(AppCache.getRows('leads'));
    rows = _fuApplyFilters(rows, ctx);
    const hasFilter = Object.values(_fuFilterState).some(Boolean);
    const emptyMsg = hasFilter
      ? `No follow-ups match the current filters. <a href="#" onclick="_fuClearFilters();return false" style="color:#4F46E5">Clear filters</a>`
      : `No ${tab} follow-ups found.`;
    body.innerHTML = _fuTable(rows, emptyMsg, ctx);
    renderIcons(body);
  } catch(e) { body.innerHTML = `<p style="color:red">${e}</p>`; }
}

async function _loadFollowupContext() {
  const data = await _getFollowupFormData();
  return _buildFollowupContext(data.leads || []);
}

async function _getFollowupFormData(force = false) {
  // Serve open leads from cache if available; only hit the API when forced
  // (e.g. lead picker refresh) or when cache is not yet loaded.
  if (!force && AppCache.isLoaded('leads')) {
    return { leads: AppCache.getRows('leads').filter(l => l['Lead Status'] === 'Open') };
  }
  return api.getFollowupFormData();
}

function _buildFollowupContext(leads = []) {
  const allFuRows = [
    ...(AppCache.getRows('followups') || []),
    ...(AppCache.getRows('followupHistory') || [])
  ];
  const lastDiscussionMap = {};
  allFuRows
    .filter(f => !_isActivityLog(f) && f['Lead ID'] && (f['Discussion'] || f['Remark']))
    .sort((a, b) => new Date(b['Created At'] || 0) - new Date(a['Created At'] || 0))
    .forEach(f => {
      if (!lastDiscussionMap[f['Lead ID']]) lastDiscussionMap[f['Lead ID']] = f['Discussion'] || f['Remark'];
    });
  return {
    leadMap: _mapRowsBy(leads, 'Lead ID'),
    userMap: App.config.userNameMap || (App.config.users || []).reduce((m, u) => { m[u.id] = u.name; return m; }, {}),
    stageMap: (App.config.allStages || App.config.stages || []).reduce((m, s) => { m[s['Stage ID']] = s; return m; }, {}),
    lastDiscussionMap
  };
}

function _mapRowsBy(rows, key) {
  return (rows || []).reduce((m, row) => {
    if (row && row[key]) m[row[key]] = row;
    return m;
  }, {});
}

function _isActivityLog(row) {
  return String(row?.['Follow-up Type'] || '').toLowerCase() === 'stage change';
}

function _isOpenFollowupRow(row) {
  return String(row?.['Status'] || (row?.['Outcome'] ? 'Closed' : 'Open')).toLowerCase() !== 'closed';
}

function _fuIsFinalStage(stage) {
  return !!stage && (stage['Is Final Stage'] === true || stage['Is Final Stage'] === 'TRUE');
}

function _fuPlannedDate(row) {
  return row?.['Planned Date'] || row?.['Next Follow-up Date'] || row?.['Follow-up Date'] || '';
}

function _decorateFollowup(row, ctx) {
  const lead = ctx?.leadMap?.[row['Lead ID']];
  const stage = ctx?.stageMap?.[row['Updated Stage ID']];
  const leadCurrentStage = lead ? ctx?.stageMap?.[lead['Stage ID']] : null;
  return {
    ...row,
    _leadLabel: lead ? _fuLeadLabel(lead) : (row['Lead ID'] ? 'Linked lead unavailable' : ''),
    _clientLabel: lead ? _fuClientLabel(lead) : '',
    _remarkLabel: ctx?.lastDiscussionMap?.[row['Lead ID']] || (lead ? (lead['Client Description'] || '') : ''),
    _createdByLabel: ctx?.userMap?.[row['Created By']] || '',
    _assignedToLabel: lead ? (ctx?.userMap?.[lead['Assigned To']] || '') : '',
    _updatedStageLabel: stage ? stage['Stage Name'] : '',
    _leadPhone: lead ? (lead['Phone'] || '') : '',
    _leadStageLabel: leadCurrentStage ? leadCurrentStage['Stage Name'] : '',
    _companyName: lead ? (lead['Company Name'] || '') : '',
    _contactPerson: lead ? (lead['Contact Person'] || '') : ''
  };
}

function _fuCards(rows, emptyMsg, ctx) {
  if (!rows.length) return `<p style="color:#999;padding:20px">${emptyMsg}</p>`;
  return rows.map(row => {
    const r = ctx ? _decorateFollowup(row, ctx) : row;
    const typeColor = { Call:'#1565C0', WhatsApp:'#2E7D32', Visit:'#6A1B9A', Email:'#E65100', Payment:'#B71C1C' };
    const color = typeColor[r['Follow-up Type']] || '#555555';
    return `<div class="fu-card" style="border-left-color:${color};padding:14px 16px">
      <div class="fu-card-header" style="margin-bottom:8px">
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
          <span class="badge" style="background:${color}20;color:${color}">${escapeHtml(r['Follow-up Type']||'')}</span>
          <span style="font-size:12px;color:#999">${icon('calendar', 12)} ${formatDate(r['Follow-up Date'])}</span>
          ${r['Outcome'] ? `<span class="badge" style="background:#E8F5E9;color:#2E7D32">${escapeHtml(r['Outcome'])}</span>` : ''}
        </div>
        ${r._createdByLabel ? `<span style="font-size:12px;color:#999;white-space:nowrap">${icon('user', 12)} ${escapeHtml(r._createdByLabel)}</span>` : ''}
      </div>
      <div style="font-weight:600;font-size:13px;margin-bottom:${r._remarkLabel ? '4px' : '8px'};line-height:1.4">${escapeHtml(r['Discussion']||'')}</div>
      ${r._remarkLabel ? `<div style="font-size:12px;color:#555;background:#F5F5F5;border-radius:4px;padding:5px 8px;margin-bottom:8px">${icon('message-square', 12)} <em>${escapeHtml(r._remarkLabel)}</em></div>` : ''}
      <div class="fu-card-meta" style="margin-bottom:${r['Next Follow-up Date'] ? '8px' : '0'}">
        ${r._clientLabel ? `<span>${icon('building-2', 12)} ${escapeHtml(r._clientLabel)}</span>` : (r._leadLabel ? `<span style="color:#aaa">${icon('target', 12)} ${escapeHtml(r._leadLabel)}</span>` : '<span style="color:#aaa">Standalone</span>')}
        ${_followupCustomFieldMeta(r)}
      </div>
      ${r['Next Follow-up Date'] ? `<div style="display:flex;align-items:center;gap:12px;background:#EEF2FF;border-radius:4px;padding:6px 10px;font-size:12px">
        <span style="color:#3949AB;font-weight:600">${icon('calendar-clock', 13)} Next Follow-up: ${formatDate(r['Next Follow-up Date'])}</span>
        ${r._assignedToLabel ? `<span style="color:#555">${icon('user-check', 13)} Assigned: ${escapeHtml(r._assignedToLabel)}</span>` : ''}
      </div>` : ''}
    </div>`;
  }).join('');
}

function _fuTable(rows, emptyMsg, ctx) {
  const data = (rows || [])
    .map(row => ctx ? _decorateFollowup(row, ctx) : row)
    .sort(_compareFollowupDue);
  const counts = data.reduce((m, row) => {
    const bucket = _followupDueBucket(row);
    if (bucket === 'overdue' || bucket === 'today' || bucket === 'future') m[bucket]++;
    return m;
  }, { overdue: 0, today: 0, future: 0 });

  if (!data.length) {
    return `
      <div class="fu-table-summary">
        <span class="fu-summary-pill danger">Overdue 0</span>
        <span class="fu-summary-pill success">Today 0</span>
        <span class="fu-summary-pill">Future 0</span>
      </div>
      <div class="table-wrap fu-table-wrap">
        <table class="fu-table">
          <thead>
            <tr>
              <th>Due</th><th>Lead Details</th><th>Last Remark</th><th>Remark Date</th><th>Stage</th><th>Owner</th><th>Action</th>
            </tr>
          </thead>
          <tbody><tr><td colspan="7" class="empty-table-cell">${emptyMsg}</td></tr></tbody>
        </table>
      </div>`;
  }

  return `
    <div class="fu-table-summary">
      <span class="fu-summary-pill danger">Overdue ${counts.overdue}</span>
      <span class="fu-summary-pill success">Today ${counts.today}</span>
      <span class="fu-summary-pill">Future ${counts.future}</span>
    </div>
    <div class="table-wrap fu-table-wrap">
      <table class="fu-table">
        <thead>
          <tr>
            <th>Due</th>
            <th>Lead Details</th>
            <th>Last Remark</th>
            <th>Remark Date</th>
            <th>Stage</th>
            <th>Owner</th>
            <th>Action</th>
          </tr>
        </thead>
        <tbody>${data.map(_fuTableRow).join('')}</tbody>
      </table>
    </div>`;
}

function _canDeleteFollowup() {
  return String(App.user.department || '').trim().toUpperCase() === 'MIS' || App.user.role === 'ADMIN';
}

function _fuTableRow(r) {
  const leadId = r['Lead ID'] || '';
  const company = r._companyName || (leadId ? 'Linked lead unavailable' : 'Standalone');
  const doneAction = _isOpenFollowupRow(r)
    ? `<button type="button" class="btn btn-primary btn-sm fu-action-btn" data-followup-id="${escapeHtml(r['Follow-up ID'] || '')}" onclick="openMarkFollowupDoneForm(this.dataset.followupId)">${icon('check-circle', 14)} Mark Done</button>`
    : '';
  const leadAction = leadId && r._leadLabel !== 'Linked lead unavailable'
    ? `<button type="button" class="btn btn-outlined btn-sm fu-action-btn" data-lead-id="${escapeHtml(leadId)}" onclick="_openFollowupLead(this)">${icon('history', 14)} Lead & History</button>`
    : `<span class="muted-text">No linked lead</span>`;
  const deleteAction = _canDeleteFollowup()
    ? `<button type="button" class="btn btn-sm fu-action-btn" style="color:#D32F2F;border-color:#D32F2F" data-followup-id="${escapeHtml(r['Follow-up ID'] || '')}" onclick="_confirmDeleteFollowup(this.dataset.followupId)">${icon('trash-2', 14)} Delete</button>`
    : '';
  const action = `<div class="fu-action-stack">${doneAction}${leadAction}${deleteAction}</div>`;
  return `<tr class="fu-row fu-row-${_followupDueBucket(r)}">
    ${_fuDueCell(r)}
    <td>
      <div class="fu-lead-title">${escapeHtml(company)}</div>
      ${r._contactPerson ? `<div class="fu-lead-sub">${icon('user', 12)} ${escapeHtml(r._contactPerson)}</div>` : ''}
      ${r._leadPhone ? `<div class="fu-lead-sub">${icon('phone', 12)} ${escapeHtml(r._leadPhone)}</div>` : ''}
    </td>
    <td><div class="fu-discussion">${escapeHtml(r._remarkLabel || r['Discussion'] || r['Remark'] || '-')}</div></td>
    <td><div class="fu-date-sub">${formatDate(r['Done Date'] || r['Follow-up Date'] || '')}</div></td>
    <td>${r._leadStageLabel ? `<span class="badge" style="background:#E3F2FD;color:#1565C0">${escapeHtml(r._leadStageLabel)}</span>` : '-'}</td>
    <td><div>${escapeHtml(r._assignedToLabel || r._createdByLabel || '-')}</div></td>
    <td>${action}</td>
  </tr>`;
}

function _confirmDeleteFollowup(followupId) {
  if (!followupId) return;
  if (!confirm('Delete this follow-up permanently? This cannot be undone.')) return;
  const row = AppCache.getRows('followups').find(r => r['Follow-up ID'] === followupId);
  AppCache.removeRow('followups', 'Follow-up ID', followupId);
  if (App.currentPage.startsWith('followups')) _renderFUTab(window.currentFollowupTab || 'all');
  QueueManager.enqueue({
    module: 'followups', actionType: 'deleteFollowup',
    payload: { id: followupId },
    onDone: () => toast('Follow-up deleted.'),
    onFail: j => {
      if (row) AppCache.addRow('followups', row);
      if (App.currentPage.startsWith('followups')) _renderFUTab(window.currentFollowupTab || 'all');
      toast('Delete failed: ' + (j.error || 'Error'), 'error');
    }
  });
  toast('Deleting…', 'info');
}

function _fuDueCell(row) {
  const bucket = _followupDueBucket(row);
  const date = _fuPlannedDate(row);
  const labels = { overdue: 'Overdue', today: 'Today', future: 'Future', done: 'Done', none: 'No Date' };
  return `<td class="fu-due-cell fu-due-${bucket}">
    <div class="fu-due-label">${labels[bucket]}</div>
    <div class="fu-due-date">${date ? formatDate(date) : '-'}</div>
  </td>`;
}

function _followupDueBucket(row) {
  if (row && !_isOpenFollowupRow(row)) return 'done';
  const d = _fmtDate(_fuPlannedDate(row));
  if (!d) return 'none';
  const today = localDateInputValue();
  if (d < today) return 'overdue';
  if (d === today) return 'today';
  return 'future';
}

function _compareFollowupDue(a, b) {
  const order = { overdue: 0, today: 1, future: 2, none: 3, done: 4 };
  const bucketDiff = order[_followupDueBucket(a)] - order[_followupDueBucket(b)];
  if (bucketDiff) return bucketDiff;
  const ad = _fmtDate(_fuPlannedDate(a)) || '9999-12-31';
  const bd = _fmtDate(_fuPlannedDate(b)) || '9999-12-31';
  if (ad !== bd) return ad.localeCompare(bd);
  return _followupTimeValue(b['Created At']) - _followupTimeValue(a['Created At']);
}

function _followupTimeValue(value) {
  const raw = String(value || '').trim();
  if (!raw) return 0;
  const normalized = raw.includes(' ') && !raw.includes('T') ? raw.replace(' ', 'T') : raw;
  const t = new Date(normalized).getTime();
  return Number.isNaN(t) ? 0 : t;
}

function _openFollowupLead(btn) {
  const leadId = btn?.dataset?.leadId || '';
  if (!leadId) return;
  if (typeof openLeadDetail === 'function') openLeadDetail(leadId);
}

function _activityLogCards(rows, emptyMsg, ctx) {
  if (!rows.length) return `<p style="color:#999;padding:20px">${emptyMsg}</p>`;
  return rows.map(row => {
    const r = _decorateFollowup(row, ctx);
    const title = r._updatedStageLabel ? `Moved to ${r._updatedStageLabel}` : (r['Discussion'] || 'Activity recorded');
    return `<div class="fu-card activity-log-card" style="border-left-color:#607D8B">
      <div class="fu-card-header">
        <div class="fu-card-title">
          <span class="badge" style="background:#ECEFF1;color:#455A64;margin-right:8px">Activity</span>
          ${escapeHtml(title)}
        </div>
        <span style="color:#999;font-size:12px">${formatDate(r['Created At'] || r['Follow-up Date'])}</span>
      </div>
      <div class="fu-card-meta">
        ${r._createdByLabel ? `<span>${icon('user', 12)} ${escapeHtml(r._createdByLabel)}</span>` : ''}
        ${r._clientLabel ? `<span>${icon('building-2', 12)} ${escapeHtml(r._clientLabel)}</span>` : ''}
      </div>
    </div>`;
  }).join('');
}

function _followupHistoryTable(rows, emptyMsg, ctx) {
  const data = (rows || []).slice().sort((a, b) => _followupTimeValue(b['Created At'] || b['Done Date']) - _followupTimeValue(a['Created At'] || a['Done Date']));
  if (!data.length) return `<div class="table-wrap fu-table-wrap"><table class="fu-table history-table"><tbody><tr><td class="empty-table-cell">${escapeHtml(emptyMsg)}</td></tr></tbody></table></div>`;
  return `<div class="table-wrap fu-table-wrap">
    <table class="fu-table history-table">
      <thead><tr>
        <th>Planned Date</th><th>Done Date</th><th>Done By</th><th>Contact Mode</th><th>Remark</th><th>Stage</th><th>Next Planned</th>
      </tr></thead>
      <tbody>${data.map(row => {
        const stageLabel = row['Updated Stage ID']
          ? (ctx?.stageMap?.[row['Updated Stage ID']]?.['Stage Name'] || row['Updated Stage ID'])
          : '-';
        const contactMode = row['Contact Mode'] || '';
        const contactModeColor = {'Call Connected':'#16a34a','WhatsApp Chat':'#2563eb','Call Missed':'#dc2626'}[contactMode] || '#6b7280';
        const contactModeHTML = contactMode
          ? `<span style="font-size:11px;font-weight:600;color:${contactModeColor};background:${contactModeColor}18;padding:2px 8px;border-radius:10px;white-space:nowrap">${escapeHtml(contactMode)}</span>`
          : '-';
        return `<tr>
          <td>${formatDate(row['Planned Date']) || '-'}</td>
          <td>${formatDate(row['Done Date']) || '-'}</td>
          <td>${escapeHtml(ctx?.userMap?.[row['Done By']] || row['Done By'] || '-')}</td>
          <td>${contactModeHTML}</td>
          <td><div class="fu-discussion">${escapeHtml(row['Remark'] || '-')}</div></td>
          <td>${stageLabel !== '-' ? `<span class="badge" style="background:#E3F2FD;color:#1565C0">${escapeHtml(stageLabel)}</span>` : '-'}</td>
          <td>${formatDate(row['Next Planned Date']) || '-'}</td>
        </tr>`;
      }).join('')}</tbody>
    </table>
  </div>`;
}

function _activityLogTable(rows, emptyMsg, ctx) {
  const data = (rows || []).slice().sort((a, b) => _followupTimeValue(b['Created At']) - _followupTimeValue(a['Created At']));
  if (!data.length) return `<div class="table-wrap fu-table-wrap"><table class="fu-table history-table"><tbody><tr><td class="empty-table-cell">${escapeHtml(emptyMsg)}</td></tr></tbody></table></div>`;
  return `<div class="table-wrap fu-table-wrap">
    <table class="fu-table history-table">
      <thead><tr><th>Date</th><th>Action</th><th>From</th><th>To</th><th>Remark</th><th>By</th></tr></thead>
      <tbody>${data.map(row => `<tr>
        <td>${formatDate(row['Created At']) || '-'}</td>
        <td><span class="badge" style="background:#ECEFF1;color:#455A64">${escapeHtml(row['Action Type'] || 'Activity')}</span></td>
        <td>${escapeHtml(_activityValueLabel(row['Old Value'], ctx)) || '-'}</td>
        <td>${escapeHtml(_activityValueLabel(row['New Value'], ctx)) || '-'}</td>
        <td><div class="fu-discussion">${escapeHtml(row['Remark'] || '-')}</div></td>
        <td>${escapeHtml(ctx?.userMap?.[row['Created By']] || row['Created By'] || '-')}</td>
      </tr>`).join('')}</tbody>
    </table>
  </div>`;
}

function _activityValueLabel(value, ctx) {
  if (!value) return '';
  return ctx?.stageMap?.[value]?.['Stage Name'] || value;
}

function _fuLeadLabel(l) {
  return [l['Client Description'], l['Source']].filter(Boolean).join(' - ');
}

function _followupCustomFieldMeta(row) {
  return (App.config.followupFields || [])
    .filter(f => row[f['Column Key']] !== undefined && row[f['Column Key']] !== '')
    .map(f => `<span>${icon('clipboard-list', 12)} ${escapeHtml(f['Field Name'])}: ${_customFieldDisplayValue(row[f['Column Key']], f)}</span>`)
    .join('');
}

function _renderCustomQuery() {
  el('fu-body').innerHTML = `
    <div class="query-builder">
      <div style="font-weight:600;margin-bottom:10px;font-size:13px">Build Query</div>
      <div id="query-rows"></div>
      <button class="query-add-btn" onclick="_addQueryRow()">${icon('plus', 14)} Add Filter</button>
      <div style="margin-top:12px;display:flex;gap:8px">
        <button class="btn btn-primary btn-sm" onclick="_runCustomQuery()">Run Query</button>
        <button class="btn btn-outlined btn-sm" onclick="_clearQuery()">Clear</button>
      </div>
    </div>
    <div id="query-results"></div>`;
  renderIcons(el('fu-body'));
  _addQueryRow(); // start with one row
}
</script>

<script>
async function loadLeadForm() {
  el('page-title').textContent = 'Add New Lead';
  const cfg = App.config;
  const leadFields = cfg.leadFields || [];
  const configOptions = _configOptionsMap(cfg._allConfigs || []);
  const canAssign = ['ADMIN', 'MANAGER'].includes(App.user.role);
  const productInterests = cfg.productInterests || [];
  const stageMap = cfg.stages.reduce((m, s) => { m[s['Stage ID']] = s['Stage Name']; return m; }, {});
  const initialStage = (cfg.stages || []).find(function(s) { return s['Is Initial Stage'] === true || s['Is Initial Stage'] === 'TRUE'; }) || cfg.stages[0];
  const hiddenStageInput = initialStage ? '<input type="hidden" name="Stage ID" value="' + escapeHtml(initialStage['Stage ID']) + '">' : '';
  const statesHTML    = cfg.states.map(function(s){ return '<option>' + escapeHtml(s) + '</option>'; }).join('');
  const categoriesHTML = cfg.categories.map(function(c){ return '<option>' + escapeHtml(c) + '</option>'; }).join('');
  const sourcesHTML   = cfg.sources.map(function(s){ return '<option>' + escapeHtml(s) + '</option>'; }).join('');
  const prioritiesHTML = cfg.priorities.map(function(p){ return '<option>' + escapeHtml(p) + '</option>'; }).join('');
  const productInterestHTML = productInterests.length
    ? '<div class="form-group"><label>Product Interest</label><select class="form-control" name="Product Interest"><option value="">Select Product Interest</option>'
      + productInterests.map(function(p){ return '<option>' + escapeHtml(p) + '</option>'; }).join('')
      + '</select></div>'
    : '';
  const assignedToHTML = canAssign
    ? '<div class="form-group"><label>Assigned To</label><select class="form-control" name="Assigned To">'
      + cfg.users.map(function(u){ return '<option value="' + escapeHtml(u.id) + '"' + (u.id === App.user.id ? ' selected' : '') + '>' + escapeHtml(u.name) + '</option>'; }).join('')
      + '</select></div>'
    : '';

  el('content').innerHTML = `
    <div id="lf-wrap" style="max-width:700px;margin:0 auto;padding-bottom:40px">
      <div class="card" style="border-top:6px solid var(--md-primary);padding:32px 36px 28px">
        <div style="margin-bottom:28px">
          <h1 style="font-size:22px;font-weight:700;color:var(--md-primary);margin-bottom:6px">Add New Lead</h1>
          <p style="color:#666;font-size:13px">Fill in the lead details below. Fields marked * are required.</p>
        </div>

        <form id="lf-form" autocomplete="off">
          ${hiddenStageInput}

          <div class="form-row">
            <div class="form-group">
              <label>Company Name *</label>
              <input class="form-control input-capitalize" name="Company Name" autocapitalize="words" required placeholder="e.g. Acme Corp">
            </div>
            <div class="form-group">
              <label>Contact Person *</label>
              <input class="form-control input-capitalize" name="Contact Person" autocapitalize="words" required placeholder="e.g. Raj Kumar">
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>Phone *</label>
              <input class="form-control" name="Phone" type="tel" required placeholder="+91 98765 43210">
            </div>
            <div class="form-group">
              <label>Alternate No</label>
              <input class="form-control" name="Alternate No" type="tel" placeholder="+91 98765 43210">
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>Email</label>
              <input class="form-control input-lowercase" name="Email" type="email" autocapitalize="none" autocorrect="off" placeholder="name@company.com">
            </div>
            <div class="form-group">
              <label>GST No</label>
              <input class="form-control input-uppercase" name="GST No" oninput="this.value=this.value.toUpperCase()" placeholder="22AAAAA0000A1Z5">
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>State *</label>
              <select class="form-control" name="State" required>
                <option value="">Select State</option>
                ${statesHTML}
              </select>
            </div>
            <div class="form-group">
              <label>City *</label>
              <select class="form-control" name="City" required>
                <option value="">Select City</option>
              </select>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label>Category *</label>
              <select class="form-control" name="Category" required>
                <option value="">Select</option>
                ${categoriesHTML}
              </select>
            </div>
            <div class="form-group">
              <label>Address</label>
              <input class="form-control" name="Address" placeholder="Street / Area">
            </div>
          </div>

          <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--md-primary);margin:20px 0 14px;padding-bottom:6px;border-bottom:1px solid #E8EAF6">Lead Information</div>

          <div class="form-row">
            <div class="form-group">
              <label>Client Description *</label>
              <input class="form-control" name="Client Description" placeholder="Brief description of the lead" required>
            </div>
            <div class="form-group">
              <label>Source *</label>
              <select class="form-control" name="Source" required>
                <option value="">Select Source</option>
                ${sourcesHTML}
              </select>
            </div>
          </div>

          <div class="form-group">
            <label>Priority</label>
            <select class="form-control" name="Priority">
              ${prioritiesHTML}
            </select>
          </div>

          ${productInterestHTML}
          ${assignedToHTML}

          ${_lfCustomFieldsHTML(leadFields, configOptions)}

          <div style="margin-top:28px;display:flex;gap:12px;align-items:center;flex-wrap:wrap">
            <button type="submit" class="btn btn-primary" style="min-width:160px;padding:10px 24px;font-size:15px">
              ${icon('send', 16)} Submit Lead
            </button>
            <button type="button" class="btn btn-outlined" onclick="_lfResetForm()">Clear Form</button>
          </div>

        </form>
      </div>
    </div>`;

  renderIcons();
  initLeadCustomFields(el('content'));
  _initStateCityDropdowns(el('content'), '', '');
  _lfInitValidator();
}

function _lfCustomFieldsHTML(leadFields, configOptions) {
  if (!leadFields.length) return '';
  const cfg = App.config;
  const allStages = cfg.allStages || cfg.stages || [];
  const initialStage = cfg.stages.find(s => s['Is Initial Stage'] === true || s['Is Initial Stage'] === 'TRUE') || cfg.stages[0];
  const initialStageId = initialStage ? initialStage['Stage ID'] : '';
  const stage = allStages.find(s => s['Stage ID'] === initialStageId);
  // Show global fields (no stage) AND fields belonging to the initial stage, excluding skip_only fields
  const visibleFields = leadFields.filter(f =>
    (!f['Stage ID'] || f['Stage ID'] === initialStageId) &&
    (f['Skip Visibility'] || 'normal') !== 'skip_only'
  );
  if (!visibleFields.length) return '';
  const isSkippable = false; // Skip toggle not applicable on initial stage (Add Lead)
  const skipToggle = '';
  return `
    <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--md-primary);margin:20px 0 14px;padding-bottom:6px;border-bottom:1px solid #E8EAF6">Additional Fields</div>
    <div class="custom-field-section" data-skippable="${isSkippable ? 'true' : 'false'}">
      ${skipToggle}
      ${visibleFields.map(f => _customFieldControlHTML(f, { 'Stage ID': initialStageId }, configOptions)).join('')}
    </div>`;
}

function _lfInitValidator() {
  const form = el('lf-form');
  if (!form) return;
  const v = _makeValidator(form);
  const f = name => form.querySelector(`[name="${name}"]`);
  v.addField(f('Company Name'),   [{ rule: 'required', errorMessage: 'Company name is required.' }]);
  if (f('Client Description'))
    v.addField(f('Client Description'), [{ rule: 'required', errorMessage: 'Client description is required.' }]);
  if (f('Contact Person'))
    v.addField(f('Contact Person'),[{ rule: 'required', errorMessage: 'Contact person is required.' }]);
  if (f('Phone'))
    v.addField(f('Phone'), [{ rule: 'function', validator: val => !!val && /^[0-9+\-\s()]{7,20}$/.test(val), errorMessage: 'Phone number is required (7–20 digits).' }]);
  if (f('Category'))
    v.addField(f('Category'),      [{ rule: 'required', errorMessage: 'Category is required.' }]);
  if (f('Source'))
    v.addField(f('Source'),        [{ rule: 'required', errorMessage: 'Source is required.' }]);
  if (f('State'))
    v.addField(f('State'),         [{ rule: 'required', errorMessage: 'State is required.' }]);
  if (f('City'))
    v.addField(f('City'),          [{ rule: 'required', errorMessage: 'City is required.' }]);
  if (f('Email'))
    v.addField(f('Email'), [{ rule: 'function', validator: val => !val || /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val), errorMessage: 'Enter a valid email.' }]);
  if (f('GST No'))
    v.addField(f('GST No'), [{ rule: 'function', validator: val => !val || /^[0-9]{2}[A-Za-z]{5}[0-9]{4}[A-Za-z][1-9A-Za-z]Z[0-9A-Za-z]$/i.test(val), errorMessage: 'Enter a valid GST number.' }]);

  v.onSuccess(async () => {
    if (!validateCfMultiselects(form)) return;
    const btn = form.querySelector('[type=submit]');
    setButtonLoading(btn, 'Submitting...');
    let tempId = '';
    try {
      const payload = await collectLeadFormPayload(form);

      const duplicates = await _lfCheckDuplicates(payload['Phone'], payload['Email'], payload['Company Name']);
      if (duplicates.length) {
        resetButtonLoading(btn);
        const proceed = await _lfShowDuplicateWarning(duplicates);
        if (!proceed) return;
        setButtonLoading(btn, 'Submitting...');
      }

      tempId = 'temp-' + Date.now();
      AppCache.addRow('leads', {
        ...payload, 'Lead ID': tempId, '_queueTemp': true,
        'Lead Status': 'Open',
        'Created At': _nowStr(), 'Updated At': _nowStr()
      });
      const finalRecordId = await api.saveLead(payload);
      if (finalRecordId) AppCache.patchRow('leads', 'Lead ID', tempId, { 'Lead ID': finalRecordId, '_queueTemp': false });
      if (AppCache.isLoaded('followups')) _refreshFollowupsCache().catch(() => {});
      _lfShowSuccess(payload['Company Name'] || payload['Client Description']);
    } catch (err) {
      if (tempId) AppCache.removeRow('leads', 'Lead ID', tempId);
      toast(err.message || err, 'error');
      resetButtonLoading(btn);
    }
  });
}

function _lfShowSuccess(label) {
  const wrap = el('lf-wrap');
  if (!wrap) return;
  wrap.innerHTML = `
    <div class="card" style="border-top:6px solid #388E3C;padding:48px 36px;text-align:center">
      <div style="width:64px;height:64px;background:#E8F5E9;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px">
        ${icon('check-circle', 36)}
      </div>
      <h2 style="font-size:22px;font-weight:700;color:#388E3C;margin-bottom:8px">Lead Submitted!</h2>
      <p style="color:#555;font-size:14px;margin-bottom:28px"><b>${escapeHtml(label)}</b> has been added successfully.</p>
      <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
        <button class="btn btn-primary" onclick="loadLeadForm()">${icon('plus', 14)} Add Another Lead</button>
        ${canNavigate('leads') ? `<button class="btn btn-outlined" onclick="navigate('leads')">${icon('list', 14)} View All Leads</button>` : ''}
      </div>
    </div>`;
  renderIcons(wrap);
}

function _lfResetForm() {
  const form = el('lf-form');
  if (form) form.reset();
}

function _lfCheckDuplicates(phone, email, companyName) {
  return new Promise(resolve => {
    google.script.run
      .withSuccessHandler(r => resolve(r && r.success ? (r.data || []) : []))
      .withFailureHandler(() => resolve([]))
      .apiCheckLeadDuplicates(App.token, phone || '', email || '', '', companyName || '');
  });
}

function _lfShowDuplicateWarning(duplicates) {
  return new Promise(resolve => {
    const rows = duplicates.map(d => `
      <tr style="border-bottom:1px solid #f3f4f6">
        <td style="padding:8px 10px;font-weight:600;color:#111827">${escapeHtml(d['Company Name'] || '—')}</td>
        <td style="padding:8px 10px;color:#374151">${escapeHtml(d['Contact Person'] || '—')}</td>
        <td style="padding:8px 10px;color:#374151">${escapeHtml(d['Phone'] || '—')}</td>
        <td style="padding:8px 10px"><span style="padding:2px 8px;border-radius:999px;font-size:11px;font-weight:600;background:${d['Lead Status']==='Open'?'#dcfce7':'#f3f4f6'};color:${d['Lead Status']==='Open'?'#15803d':'#6b7280'}">${escapeHtml(d['Lead Status'] || 'Open')}</span></td>
      </tr>`).join('');
    const overlay = showModal(`
      <div class="modal-header">
        <h2 style="color:#b45309;display:flex;align-items:center;gap:8px">
          <span style="width:28px;height:28px;border-radius:50%;background:#fef3c7;display:flex;align-items:center;justify-content:center;flex-shrink:0">${icon('alert-triangle',16)}</span>
          Duplicate Lead Detected
        </h2>
      </div>
      <div style="padding:4px 0 12px">
        <p style="color:#6b7280;font-size:13.5px;margin-bottom:14px">A lead with the same phone, email, or company already exists. Duplicate creation is blocked.</p>
        <div style="overflow-x:auto;border:1px solid #e5e7eb;border-radius:10px">
          <table style="width:100%;border-collapse:collapse;font-size:13px">
            <thead><tr style="background:#f9fafb">
              <th style="padding:8px 10px;text-align:left;color:#6b7280;font-weight:600">Company</th>
              <th style="padding:8px 10px;text-align:left;color:#6b7280;font-weight:600">Contact</th>
              <th style="padding:8px 10px;text-align:left;color:#6b7280;font-weight:600">Phone</th>
              <th style="padding:8px 10px;text-align:left;color:#6b7280;font-weight:600">Status</th>
            </tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>
        <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:18px">
          <button id="lf-dup-close-btn" style="padding:9px 18px;border-radius:8px;border:1.5px solid #e5e7eb;background:#fff;color:#374151;font-size:13.5px;font-weight:500;cursor:pointer">Close</button>
        </div>
      </div>`);
    renderIcons(overlay);
    overlay.querySelector('#lf-dup-close-btn').onclick = () => { overlay.remove(); resolve(false); };
    overlay.querySelector('.modal-close')?.addEventListener('click', () => resolve(false), { once: true });
  });
}

window.loadLeadForm = loadLeadForm;
</script>

<script>
const BulkView = (() => {
  let hot = null;
  let config = [];
  let errors = [];
  let lastBatchId = '';

  function _html() {
    return `
    <div class="bulk-page">
      <style>
        .bulk-page { display:flex; flex-direction:column; gap:12px; height:calc(100vh - 150px); min-height:520px; }
        .bulk-toolbar { display:flex; justify-content:space-between; align-items:center; gap:10px; flex-wrap:wrap; }
        .bulk-actions { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
        .bulk-meta { font-size:12px; color:#6b7280; }
        .bulk-grid-wrap { border:1px solid #e5e7eb; border-radius:10px; background:#fff; min-height:0; flex:1; position:relative; overflow:hidden; }
        .bulk-progress { height:8px; background:#f3f4f6; border-radius:999px; overflow:hidden; min-width:180px; }
        .bulk-progress span { display:block; height:100%; width:0%; background:var(--md-primary); transition:width .2s ease; }
        .bulk-summary { display:flex; gap:8px; flex-wrap:wrap; }
        .bulk-pill { padding:7px 12px; border-radius:8px; font-size:12px; font-weight:700; background:#f9fafb; color:#374151; }
        .bulk-pill.ok { background:#dcfce7; color:#166534; }
        .bulk-pill.err { background:#fee2e2; color:#991b1b; }
        .bulk-error-row { background:#fff5f5 !important; }
        .bulk-error-cell { background:#fee2e2 !important; color:#991b1b !important; font-weight:600 !important; }
        .bulk-cell-errmsg { background:#fff5f5 !important; color:#dc2626 !important; font-size:11px !important; white-space:normal !important; line-height:1.4 !important; }
        .bulk-cell-status { font-weight:700 !important; }
        .bulk-cell-status-saved { background:#dcfce7 !important; color:#166534 !important; }
        .bulk-cell-status-saving { background:#dbeafe !important; color:#1d4ed8 !important; }
        .bulk-cell-status-queued { background:#f3f4f6 !important; color:#4b5563 !important; }
        .bulk-cell-status-error { background:#fee2e2 !important; color:#991b1b !important; }
      </style>
      <div class="bulk-toolbar">
        <div>
          <div style="font-size:14px;font-weight:700;color:#111827">Bulk Entry</div>
          <div class="bulk-meta" id="bulk-config-meta">Paste Excel rows, validate, then save in one batch.</div>
        </div>
        <div class="bulk-actions">
          <button class="btn btn-outlined btn-sm bulk-action" onclick="BulkView.clear()">${icon('trash-2', 14)} Clear</button>
          <button class="btn btn-outlined btn-sm bulk-action" onclick="BulkView.validate()">${icon('check-circle', 14)} Validate</button>
          <button class="btn btn-primary btn-sm bulk-action" onclick="BulkView.save()">${icon('save', 14)} Save</button>
          <button class="btn btn-outlined btn-sm bulk-action" onclick="BulkView.createFollowupsOnly()">${icon('phone-plus', 14)} Follow-ups Only</button>
          <button class="btn btn-outlined btn-sm" id="bulk-error-btn" onclick="BulkView.downloadErrors()" style="display:none">${icon('download', 14)} Error CSV</button>
        </div>
      </div>
      <div class="bulk-summary" id="bulk-summary"></div>
      <div style="display:flex;align-items:center;gap:10px">
        <div class="bulk-progress"><span id="bulk-progress-bar"></span></div>
        <span class="bulk-meta" id="bulk-progress-label">Ready</span>
      </div>
      <div class="bulk-grid-wrap"><div id="bulk-hot"></div></div>
    </div>`;
  }

  function _columns() {
    const dataCols = config.map(f => {
      if (f.allowedValues && f.allowedValues.length) {
        return { data: f.fieldName, title: f.fieldName + (f.required ? ' *' : ''), type: 'autocomplete', source: f.allowedValues, strict: true, filter: true };
      }
      return { data: f.fieldName, title: f.fieldName + (f.required ? ' *' : ''), type: f.dataType === 'Number' ? 'numeric' : 'text' };
    });
    return [
      ...dataCols,
      { data: '__status__', title: 'Status', readOnly: true, width: 110 },
      { data: '__recordId__', title: 'Lead ID', readOnly: true, width: 160 },
      { data: '__errors__', title: 'Errors', readOnly: true, width: 260 }
    ];
  }

  function _emptyRows(count = 50) {
    return Array.from({ length: count }, _blankRow);
  }

  function _blankRow() {
    return config.reduce((row, f) => { row[f.fieldName] = ''; return row; }, { __status__: '', __recordId__: '', __errors__: '' });
  }

  function _gridRows() {
    if (!hot) return [];
    return hot.getSourceData()
      .map((row, i) => ({
        rowNumber: i + 1,
        data: Object.keys(row || {}).reduce((m, key) => {
          if (!String(key).startsWith('__')) m[key] = row[key];
          return m;
        }, {})
      }))
      .filter(item => Object.values(item.data).some(v => String(v ?? '').trim() !== ''));
  }

  function _rows() {
    return _gridRows().map(item => ({ ...item.data, __rowNumber: item.rowNumber }));
  }

  function _setBusy(busy) {
    document.querySelectorAll('.bulk-action').forEach(btn => { btn.disabled = !!busy; });
  }

  function _setRowMeta(rowNumber, patch) {
    if (!hot || !rowNumber) return;
    const row = hot.getSourceDataAtRow(rowNumber - 1);
    if (!row) return;
    Object.assign(row, patch || {});
    hot.render();
  }

  function _setProgress(percent, label) {
    const bar = el('bulk-progress-bar');
    const text = el('bulk-progress-label');
    if (bar) bar.style.width = Math.max(0, Math.min(100, percent)) + '%';
    if (text) text.textContent = label || '';
  }

  function _renderSummary(summary = {}) {
    const box = el('bulk-summary');
    if (!box) return;
    box.innerHTML = [
      `<span class="bulk-pill">Rows: ${summary.total || 0}</span>`,
      `<span class="bulk-pill ok">Valid: ${summary.valid || 0}</span>`,
      `<span class="bulk-pill err">Errors: ${summary.errors || 0}</span>`
    ].join('');
  }

  function _markErrors(errorRows = []) {
    errors = errorRows || [];
    const btn = el('bulk-error-btn');
    if (btn) btn.style.display = errors.length ? '' : 'none';
    if (!hot) return;

    const errorMap = {};
    errors.forEach(e => {
      const fields = new Set((e.fieldErrors || []).map(fe => fe.fieldName).filter(Boolean));
      errorMap[e.rowNumber] = { msg: e.errors || '', fields };
    });

    hot.getSourceData().forEach((row, i) => {
      row.__errors__ = (errorMap[i + 1] || {}).msg || '';
      if (errorMap[i + 1]) row.__status__ = 'Error';
      else if (!['Saved', 'Saving'].includes(String(row.__status__ || ''))) row.__status__ = '';
    });

    hot.updateSettings({
      cells(row, col, prop) {
        const rowData = hot.getSourceDataAtRow(row) || {};
        if (prop === '__status__') {
          const status = String(rowData.__status__ || '').toLowerCase();
          if (status === 'saved') return { className: 'bulk-cell-status bulk-cell-status-saved' };
          if (status === 'follow-up created') return { className: 'bulk-cell-status bulk-cell-status-saved' };
          if (status === 'saving' || status === 'processing') return { className: 'bulk-cell-status bulk-cell-status-saving' };
          if (status === 'queued') return { className: 'bulk-cell-status bulk-cell-status-queued' };
          if (status === 'error') return { className: 'bulk-cell-status bulk-cell-status-error' };
          return { className: 'bulk-cell-status' };
        }
        const err = errorMap[row + 1];
        if (!err) return {};
        if (prop === '__errors__') return { className: 'bulk-cell-errmsg' };
        if (err.fields.has(String(prop))) return { className: 'bulk-error-cell' };
        return { className: 'bulk-error-row' };
      }
    });
  }

  function _pasteIntoGrid(text) {
    const pasted = String(text || '').replace(/\r?\n$/, '');
    const rows = typeof Papa !== 'undefined'
      ? Papa.parse(pasted, { delimiter: '\t', skipEmptyLines: true }).data
      : pasted.split(/\r?\n/).map(r => r.split('\t'));
    if (!rows.length) return 0;
    const selected = hot.getSelectedLast && hot.getSelectedLast();
    const startRow = selected ? Math.max(0, selected[0]) : 0;
    const selectedCol = selected ? Math.max(0, selected[1]) : 0;
    const startCol = Math.min(selectedCol, Math.max(0, config.length - 1));
    const safeRows = rows.map(row => row.slice(0, Math.max(0, config.length - startCol)));
    const data = hot.getSourceData().map(row => ({ ...row }));
    while (data.length < startRow + safeRows.length + 5) data.push(_blankRow());
    hot.loadData(data);
    hot.populateFromArray(startRow, startCol, safeRows, undefined, undefined, 'BulkPaste');
    const endRow = startRow + safeRows.length - 1;
    const endCol = Math.min(config.length - 1, startCol + Math.max(...safeRows.map(r => r.length), 1) - 1);
    hot.selectCell(startRow, startCol, endRow, endCol);
    hot.render();
    return safeRows.filter(r => r.some(c => String(c ?? '').trim())).length;
  }

  function handlePaste(e) {
    const target = e.target;
    const inBulkGrid = target && target.closest && target.closest('.bulk-grid-wrap');
    if (!inBulkGrid) return;
    e.preventDefault();
    e.stopPropagation();
    const text = (e.clipboardData || window.clipboardData || {}).getData('text/plain') || '';
    if (!text.trim() || !hot) return;
    const count = _pasteIntoGrid(text);
    if (count) _setProgress(0, `Pasted ${count} row(s) - click Validate to check`);
  }

  async function load() {
    el('content').innerHTML = _html();
    renderIcons(el('content'));
    if (typeof Handsontable === 'undefined') {
      el('bulk-hot').innerHTML = '<div style="padding:24px;color:#991b1b">Handsontable did not load. Check CDN/network access.</div>';
      return;
    }
    config = await api.getBulkConfig();
    const meta = el('bulk-config-meta');
    if (meta) meta.textContent = `Required fields: ${config.filter(f => f.required).map(f => f.fieldName).join(', ') || 'None'} · Max 500 rows per import`;

    const content = el('content');
    if (content) content.addEventListener('paste', handlePaste);
    const gridWrap = el('bulk-hot')?.closest('.bulk-grid-wrap');
    if (gridWrap) gridWrap.addEventListener('paste', handlePaste);

    hot = new Handsontable(el('bulk-hot'), {
      data: _emptyRows(),
      columns: _columns(),
      colHeaders: [...config.map(f => f.fieldName + (f.required ? ' *' : '')), 'Status', 'Lead ID', 'Errors'],
      rowHeaders: true,
      stretchH: 'all',
      minSpareRows: 5,
      licenseKey: 'non-commercial-and-evaluation',
      contextMenu: true,
      manualColumnResize: true,
      copyPaste: true,
      height: '100%',
      afterPaste(data) {
        const count = (data || []).filter(r => r.some(c => String(c ?? '').trim())).length;
        if (count) _setProgress(0, `Pasted ${count} row(s) - click Validate to check`);
      },
    });
    _renderSummary();
    _setProgress(0, 'Ready');
  }

  async function validate() {
    const rows = _rows();
    if (!rows.length) {
      Swal.fire('No rows', 'Paste at least one row before validating.', 'info');
      return { summary: { total: 0, valid: 0, errors: 0 }, errorRows: [] };
    }
    if (rows.length > 500) {
      Swal.fire('Too many rows', 'Please import 500 rows or fewer at a time.', 'warning');
      return { summary: { total: rows.length, valid: 0, errors: rows.length }, errorRows: [] };
    }
    _setBusy(true);
    _setProgress(20, 'Validating...');
    try {
      const result = await api.validateBulkRows(rows);
      _markErrors(result.errorRows || []);
      _renderSummary(result.summary || {});
      _setProgress(100, result.summary?.errors ? 'Validation completed with errors' : 'Validation passed');
      Swal.fire(result.summary?.errors ? 'Validation errors' : 'Ready to save',
        result.summary?.errors ? `${result.summary.errors} row(s) need correction.` : `${result.summary.valid} row(s) are valid.`,
        result.summary?.errors ? 'warning' : 'success');
      return result;
    } catch (err) {
      _setProgress(0, 'Validation failed');
      Swal.fire('Validation failed', err.message || String(err), 'error');
      throw err;
    } finally {
      _setBusy(false);
    }
  }

  async function save() {
    const gridRows = _gridRows();
    if (!gridRows.length) {
      Swal.fire('No rows', 'Paste at least one row before saving.', 'info');
      return;
    }
    if (gridRows.length > 500) {
      Swal.fire('Too many rows', 'Please import 500 rows or fewer at a time.', 'warning');
      return;
    }
    _setBusy(true);
    _setProgress(5, 'Validating before save...');
    try {
      const validation = await api.validateBulkRows(_rows());
      _markErrors(validation.errorRows || []);
      const invalidRows = new Set((validation.errorRows || []).map(r => Number(r.rowNumber)));

      if (invalidRows.size === gridRows.length) {
        _setProgress(0, 'All rows have errors — fix before saving');
        Swal.fire('Validation failed', `All ${gridRows.length} row(s) have errors.`, 'error');
        return;
      }

      const initialStageId = _getBulkInitialStageId();
      const jobMap = {}; // requestId → rowNumber
      errors = [];
      lastBatchId = Date.now().toString();
      let validIdx = 0;

      for (let i = 0; i < gridRows.length; i++) {
        const item = gridRows[i];
        if (invalidRows.has(item.rowNumber)) continue;
        const normalizedRow = (validation.validRows || [])[validIdx++];
        if (!normalizedRow) continue;

        const payload = { ...normalizedRow };
        if (!payload['Stage ID']) payload['Stage ID'] = initialStageId;

        const requestId = 'blk-' + lastBatchId + '-r' + item.rowNumber;
        _setRowMeta(item.rowNumber, { __status__: 'Queued', __errors__: '', __recordId__: '' });
        _setProgress(Math.round((i / gridRows.length) * 60) + 5, `Queueing row ${item.rowNumber}...`);

        try {
          await api.enqueueJob('leads', 'saveLead', payload, requestId);
          jobMap[requestId] = item.rowNumber;
        } catch (e) {
          _setRowMeta(item.rowNumber, { __status__: 'Error', __errors__: e.message || 'Queue failed' });
          errors.push({ rowNumber: item.rowNumber, errors: e.message || 'Queue failed', fieldErrors: [], ...item.data });
        }
      }

      const totalQueued = Object.keys(jobMap).length;
      _setProgress(65, `${totalQueued} job(s) queued — waiting for processing...`);
      _renderSummary({ total: gridRows.length, valid: 0, errors: invalidRows.size + (gridRows.length - invalidRows.size - totalQueued) });

      if (totalQueued > 0) {
        await _pollBulkJobs(jobMap);
        await _refreshLeadsCache().catch(e => console.warn('[BulkView] Lead refresh failed', e));
      }

      const saved = Object.entries(jobMap).filter(([, rn]) => {
        const row = hot?.getSourceDataAtRow(rn - 1);
        return row && String(row.__status__ || '').toLowerCase() === 'saved';
      }).length;
      const failed = gridRows.length - saved;

      _renderSummary({ total: gridRows.length, valid: saved, errors: failed });
      _markErrors(errors);
      _setProgress(100, failed ? `Done — ${failed} row(s) failed` : 'All leads saved');
      Swal.fire(failed ? 'Completed with errors' : 'Bulk save complete',
        `${saved} lead(s) saved. ${failed} failed.`,
        failed ? 'warning' : 'success');
    } catch (err) {
      _setProgress(0, 'Save failed');
      Swal.fire('Save failed', err.message || String(err), 'error');
    } finally {
      _setBusy(false);
    }
  }

  function _getBulkInitialStageId() {
    const stages = (App.config.stages || [])
      .filter(s => s['Is Active'] !== false && s['Is Active'] !== 'FALSE')
      .sort((a, b) => Number(a['Stage Order'] || 0) - Number(b['Stage Order'] || 0));
    const initial = stages.find(s => s['Is Initial Stage'] === true || s['Is Initial Stage'] === 'TRUE') || stages[0];
    return initial ? (initial['Stage ID'] || '') : '';
  }

  async function _pollBulkJobs(jobMap) {
    const allIds = Object.keys(jobMap);
    const pending = new Set(allIds);
    const maxWaitMs = 5 * 60 * 1000; // 5-minute ceiling

    while (pending.size > 0 && Date.now() - (_pollBulkJobs._start || (_pollBulkJobs._start = Date.now())) < maxWaitMs) {
      await new Promise(r => setTimeout(r, 4000));
      try {
        const statuses = await api.getJobStatuses([...pending]);
        for (const [rid, info] of Object.entries(statuses || {})) {
          const rowNumber = jobMap[rid];
          if (!rowNumber) continue;
          const st = String(info.status || '');
          if (st === 'DONE') {
            _setRowMeta(rowNumber, { __status__: 'Saved', __recordId__: info.finalRecordId || '', __errors__: '' });
            pending.delete(rid);
          } else if (st === 'DEAD') {
            const errMsg = info.error || 'Job failed permanently';
            _setRowMeta(rowNumber, { __status__: 'Error', __errors__: errMsg });
            errors.push({ rowNumber, errors: errMsg, fieldErrors: [] });
            pending.delete(rid);
          } else if (st === 'PROCESSING' || st === 'FAILED') {
            _setRowMeta(rowNumber, { __status__: 'Processing', __errors__: '' });
          }
        }
        const done = allIds.length - pending.size;
        _setProgress(65 + Math.round(done / allIds.length * 34), `${done}/${allIds.length} processed...`);
      } catch (e) {
        console.warn('[BulkView] Poll error:', e);
      }
    }
    _pollBulkJobs._start = null;
    // Anything still pending — leave as Queued, worker will pick it up
    for (const rid of pending) {
      _setRowMeta(jobMap[rid], { __status__: 'Queued', __errors__: 'Still processing — refresh to check' });
    }
  }

  async function createFollowupsOnly() {
    const gridRows = _gridRows();
    if (!gridRows.length) {
      Swal.fire('No rows', 'Paste rows that identify existing leads first.', 'info');
      return;
    }
    if (gridRows.length > 500) {
      Swal.fire('Too many rows', 'Please process 500 rows or fewer at a time.', 'warning');
      return;
    }
    _setBusy(true);
    errors = [];
    let created = 0;
    let failed = 0;
    lastBatchId = Date.now().toString();
    try {
      for (let i = 0; i < gridRows.length; i++) {
        const item = gridRows[i];
        _setRowMeta(item.rowNumber, { __status__: 'Saving', __errors__: '', __recordId__: '' });
        _setProgress(Math.round((i / gridRows.length) * 100), `Creating follow-up for row ${item.rowNumber}...`);
        const result = await api.createBulkFollowupOnlyRow(item.data, item.rowNumber);
        if (result.saved) {
          created++;
          _setRowMeta(item.rowNumber, { __status__: result.status || 'Follow-up Created', __recordId__: result.recordId || '', __errors__: '' });
        } else {
          failed++;
          _setRowMeta(item.rowNumber, { __status__: 'Error', __errors__: result.errors || 'Follow-up creation failed' });
          errors.push({
            rowNumber: item.rowNumber,
            errors: result.errors || 'Follow-up creation failed',
            fieldErrors: result.fieldErrors || [],
            ...item.data
          });
        }
      }
      _renderSummary({ total: gridRows.length, valid: created, errors: failed });
      _markErrors(errors);
      _setProgress(100, failed ? 'Follow-up repair completed with errors' : 'Follow-up repair completed');
      if (created) {
        await Promise.all([
          _refreshLeadsCache().catch(e => console.warn('[BulkView] Lead refresh failed', e)),
          api.getFollowups({}).then(rows => AppCache.setRows('followups', rows)).catch(e => console.warn('[BulkView] Follow-up refresh failed', e))
        ]);
      }
      Swal.fire(failed ? 'Completed with errors' : 'Follow-ups repaired',
        `${created} follow-up(s) created. ${failed} row(s) failed.`,
        failed ? 'warning' : 'success');
    } catch (err) {
      _setProgress(0, 'Follow-up repair failed');
      Swal.fire('Follow-up repair failed', err.message || String(err), 'error');
    } finally {
      _setBusy(false);
    }
  }

  async function downloadErrors() {
    if (!errors.length) return;
    const flatErrors = errors.map(({ fieldErrors, ...row }) => ({
      ...row,
      fieldErrors: Array.isArray(fieldErrors) ? fieldErrors.map(e => e.fieldName ? `${e.fieldName}: ${e.message}` : e.message).join('; ') : ''
    }));
    const csv = typeof Papa !== 'undefined' ? Papa.unparse(flatErrors) : await api.createErrorCsv(flatErrors);
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `bulk-errors-${lastBatchId || Date.now()}.csv`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  }

  function clear() {
    if (hot) hot.loadData(_emptyRows());
    _markErrors([]);
    _renderSummary();
    _setProgress(0, 'Ready');
  }

  return { load, validate, save, createFollowupsOnly, downloadErrors, clear, handlePaste };
})();

async function loadBulkView() {
  return BulkView.load();
}
window.loadBulkView = loadBulkView;
</script>

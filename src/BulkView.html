<script>
const BulkView = (() => {
  let hot = null;
  let config = [];
  let errors = [];
  let lastBatchId = '';
  let bulkMode = 'create';
  let bulkTab = 'entry';
  const BULK_CHUNK_SIZE = 25;

  // ── Lazy-load Handsontable + Papaparse on demand ─────────────────────────────
  // These are heavy (~1 MB) and only the Bulk Entry page needs them, so they are
  // NOT in the eager <head>. We inject them the first time this page opens and
  // poll for the globals (the GAS sandbox iframe doesn't always fire script
  // onload reliably, so polling the global is the source of truth).
  let _bulkLibsPromise = null;
  function _injectBulkLib(tag, key, attrs) {
    if (document.querySelector(tag + '[data-bulklib="' + key + '"]')) return;
    const node = document.createElement(tag);
    node.setAttribute('data-bulklib', key);
    Object.keys(attrs).forEach(k => node.setAttribute(k, attrs[k]));
    document.head.appendChild(node);
  }
  function ensureBulkLibs() {
    if (typeof Handsontable !== 'undefined' && typeof Papa !== 'undefined') return Promise.resolve(true);
    if (_bulkLibsPromise) return _bulkLibsPromise;
    _bulkLibsPromise = new Promise(resolve => {
      _injectBulkLib('link', 'hot-css', { rel: 'stylesheet', href: 'https://cdn.jsdelivr.net/npm/handsontable@14.6.1/dist/handsontable.full.min.css' });
      _injectBulkLib('script', 'hot-js', { src: 'https://cdn.jsdelivr.net/npm/handsontable@14.6.1/dist/handsontable.full.min.js' });
      _injectBulkLib('script', 'papa-js', { src: 'https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js' });
      const deadline = Date.now() + 25000;
      (function poll() {
        if (typeof Handsontable !== 'undefined' && typeof Papa !== 'undefined') return resolve(true);
        if (Date.now() > deadline) { _bulkLibsPromise = null; return resolve(false); }
        setTimeout(poll, 120);
      })();
    });
    return _bulkLibsPromise;
  }

  function _html() {
    return `
    <div class="bulk-page">
      <style>
        .bulk-page { display:flex; flex-direction:column; gap:12px; height:calc(100vh - 150px); min-height:520px; }
        #bulk-entry-panel { display:flex; flex-direction:column; gap:12px; flex:1; min-height:0; }
        .bulk-toolbar { display:flex; justify-content:space-between; align-items:center; gap:10px; flex-wrap:wrap; }
        .bulk-actions { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
        .bulk-meta { font-size:12px; color:#6b7280; }
        .bulk-grid-wrap { border:1px solid #e5e7eb; border-radius:10px; background:#fff; min-height:360px; flex:1; position:relative; overflow:hidden; }
        #bulk-hot { width:100%; height:100%; min-height:360px; }
        .bulk-grid-loading { display:flex; align-items:center; justify-content:center; height:100%; min-height:360px; color:#64748b; font-size:13px; font-weight:700; }
        .bulk-progress { height:8px; background:#f3f4f6; border-radius:999px; overflow:hidden; min-width:180px; }
        .bulk-progress span { display:block; height:100%; width:0%; background:var(--md-primary); transition:width .2s ease; }
        .bulk-summary { display:flex; gap:8px; flex-wrap:wrap; }
        .bulk-pill { padding:7px 12px; border-radius:8px; font-size:12px; font-weight:700; background:#f9fafb; color:#374151; }
        .bulk-pill.ok { background:#dcfce7; color:#166534; }
        .bulk-pill.err { background:#fee2e2; color:#991b1b; }
        .bulk-error-row { background:#fff5f5 !important; }
        .bulk-error-cell { background:#fee2e2 !important; color:#991b1b !important; font-weight:600 !important; }
        .bulk-cell-errmsg { background:#fff5f5 !important; color:#dc2626 !important; font-size:11px !important; white-space:normal !important; line-height:1.4 !important; }
        .bulk-cell-status { font-weight:700 !important; }
        .bulk-cell-status-saved { background:#dcfce7 !important; color:#166534 !important; }
        .bulk-cell-status-saving { background:#dbeafe !important; color:#1d4ed8 !important; }
        .bulk-cell-status-queued { background:#f3f4f6 !important; color:#4b5563 !important; }
        .bulk-cell-status-error { background:#fee2e2 !important; color:#991b1b !important; }
        .bulk-mode, .bulk-tabs { display:inline-flex; align-items:center; gap:4px; padding:3px; border:1px solid #e5e7eb; border-radius:8px; background:#f9fafb; }
        .bulk-mode-btn, .bulk-tab { border:0; background:transparent; color:#4b5563; height:28px; padding:0 9px; border-radius:6px; font-size:12px; font-weight:700; cursor:pointer; display:inline-flex; align-items:center; gap:5px; }
        .bulk-mode-btn.active, .bulk-tab.active { background:#fff; color:#111827; box-shadow:0 1px 2px rgba(15,23,42,.08); }
        .bulk-tabs { width:max-content; }
        .bulk-queue-card { border:1px solid #e5e7eb; border-radius:10px; background:#fff; overflow:hidden; }
        .bulk-queue-head { display:flex; justify-content:space-between; align-items:center; gap:10px; padding:10px 12px; border-bottom:1px solid #e5e7eb; }
        .bulk-queue-stats { display:grid; grid-template-columns:repeat(auto-fit,minmax(120px,1fr)); gap:8px; margin-bottom:10px; }
        .bulk-queue-stat { background:#fff; border:1px solid #e5e7eb; border-radius:9px; padding:10px; }
        .bulk-queue-stat strong { display:block; font-size:20px; color:#111827; line-height:1; }
        .bulk-queue-stat span { font-size:11px; color:#6b7280; font-weight:700; }
        .bulk-queue-table { width:100%; border-collapse:collapse; font-size:12px; }
        .bulk-queue-table th { text-align:left; padding:9px 10px; background:#f8fafc; color:#64748b; font-size:10px; text-transform:uppercase; }
        .bulk-queue-table td { padding:9px 10px; border-top:1px solid #f1f5f9; vertical-align:top; }
        .bulk-row-detail { background:#f8fafc; padding:10px; border-radius:8px; border:1px solid #e5e7eb; }
        .bulk-row-detail-head { display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:8px; }
        .bulk-row-detail-title { font-size:12px; font-weight:800; color:#111827; }
        .bulk-row-mini-stats { display:flex; flex-wrap:wrap; gap:6px; }
        .bulk-row-mini-stat { border:1px solid #e5e7eb; border-radius:999px; background:#fff; color:#475569; padding:3px 8px; font-size:11px; font-weight:800; }
        .bulk-row-mini-stat.saved { color:#166534; background:#dcfce7; border-color:#bbf7d0; }
        .bulk-row-mini-stat.error { color:#991b1b; background:#fee2e2; border-color:#fecaca; }
        .bulk-row-mini-stat.pending { color:#92400e; background:#fef3c7; border-color:#fde68a; }
        .bulk-row-table { width:100%; border-collapse:collapse; background:#fff; border-radius:7px; overflow:hidden; }
        .bulk-row-table th { padding:7px 8px; background:#fff; border-bottom:1px solid #e5e7eb; color:#64748b; font-size:10px; text-transform:uppercase; }
        .bulk-row-table td { padding:7px 8px; border-top:1px solid #f1f5f9; font-size:11px; max-width:210px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
        .bulk-row-status { display:inline-flex; align-items:center; border-radius:999px; padding:3px 7px; font-size:10px; font-weight:800; }
        .bulk-row-status.saved { color:#166534; background:#dcfce7; }
        .bulk-row-status.error { color:#991b1b; background:#fee2e2; }
        .bulk-row-status.pending { color:#92400e; background:#fef3c7; }
      </style>
      <div class="bulk-toolbar">
        <div>
          <div style="font-size:14px;font-weight:700;color:#111827">Bulk Entry</div>
          <div class="bulk-meta" id="bulk-config-meta">Paste Excel rows, validate, then save in one batch.</div>
        </div>
        <div class="bulk-actions">
          <div class="bulk-mode">
            <button class="bulk-mode-btn active" id="bulk-mode-create" onclick="BulkView.setMode('create')">${icon('plus-circle', 13)} Create Leads</button>
            <button class="bulk-mode-btn" id="bulk-mode-update" onclick="BulkView.setMode('update')">${icon('pencil', 13)} Update Leads</button>
          </div>
          <select class="form-control" id="bulk-assign-user" style="height:32px;width:170px;font-size:12px" onchange="BulkView.assignUser(this.value)">
            <option value="">Assign user...</option>
          </select>
          <button class="btn btn-outlined btn-sm bulk-action" onclick="BulkView.clear()">${icon('trash-2', 14)} Clear</button>
          <button class="btn btn-outlined btn-sm bulk-action" onclick="BulkView.validate()">${icon('check-circle', 14)} Validate</button>
          <button class="btn btn-primary btn-sm bulk-action" onclick="BulkView.save()">${icon('save', 14)} Save</button>
          <button class="btn btn-outlined btn-sm bulk-action" onclick="BulkView.createFollowupsOnly()">${icon('phone-plus', 14)} Follow-ups Only</button>
          <button class="btn btn-outlined btn-sm" id="bulk-error-btn" onclick="BulkView.downloadErrors()" style="display:none">${icon('download', 14)} Error CSV</button>
        </div>
      </div>
      <div id="bulk-entry-panel">
      <div class="bulk-summary" id="bulk-summary"></div>
      <div style="display:flex;align-items:center;gap:10px">
        <div class="bulk-progress"><span id="bulk-progress-bar"></span></div>
        <span class="bulk-meta" id="bulk-progress-label">Ready</span>
      </div>
      <div class="bulk-grid-wrap"><div id="bulk-hot"></div></div>
      </div>
    </div>`;
  }

  function _columns() {
    const dataCols = config.map(f => {
      if (String(f.targetHeader || f.targetColumn || f.fieldName || '').trim().toLowerCase() === 'assigned to') {
        return {
          data: f.fieldName,
          title: f.fieldName,
          type: 'autocomplete',
          source: _assignableUserValues(),
          strict: true,
          filter: true,
          renderer: _assignedToRenderer,
          width: 170
        };
      }
      if (f.allowedValues && f.allowedValues.length) {
        return { data: f.fieldName, title: f.fieldName + (f.required ? ' *' : ''), type: 'autocomplete', source: f.allowedValues, strict: true, filter: true };
      }
      return { data: f.fieldName, title: f.fieldName + (f.required ? ' *' : ''), type: f.dataType === 'Number' ? 'numeric' : 'text' };
    });
    return [
      ...dataCols,
      { data: '__status__', title: 'Status', readOnly: true, width: 110 },
      { data: '__recordId__', title: 'Lead ID', readOnly: true, width: 160 },
      { data: '__errors__', title: 'Errors', readOnly: true, width: 260 }
    ];
  }

  function _assignedToFieldName() {
    const field = config.find(f => String(f.targetHeader || f.targetColumn || f.fieldName || '').trim().toLowerCase() === 'assigned to');
    return field ? field.fieldName : '';
  }

  function _assignableUsers() {
    return (App.config.users || [])
      .filter(u => String(u.status || u.Status || 'Active') !== 'Inactive')
      .map(u => ({
        id: String(u.id || u.ID || u['User ID'] || u['Email Address'] || u.email || '').trim(),
        name: String(u.name || u.Name || u.email || u['Email Address'] || u.id || '').trim()
      }))
      .filter(u => u.id);
  }

  function _assignableUserValues() {
    return _assignableUsers().map(u => u.id);
  }

  function _userNameById(userId) {
    const id = String(userId || '').trim();
    if (!id) return '';
    const user = _assignableUsers().find(u => u.id === id);
    return user ? (user.name || user.id) : id;
  }

  function _userIdByName(value) {
    const text = String(value || '').trim();
    if (!text) return '';
    const users = _assignableUsers();
    const byId = users.find(u => u.id.toLowerCase() === text.toLowerCase());
    if (byId) return byId.id;
    const byName = users.find(u => String(u.name || '').trim().toLowerCase() === text.toLowerCase());
    return byName ? byName.id : text;
  }

  function _assignedToRenderer(instance, td, row, col, prop, value, cellProperties) {
    const display = _userNameById(value);
    Handsontable.renderers.TextRenderer(instance, td, row, col, prop, display, cellProperties);
    td.title = value && display !== String(value) ? `${display} (${value})` : display;
    return td;
  }

  function _fillAssignUserOptions() {
    const sel = el('bulk-assign-user');
    if (!sel) return;
    const users = _assignableUsers();
    sel.innerHTML = '<option value="">Assign user...</option>' + users.map(u =>
      `<option value="${escapeHtml(u.id)}">${escapeHtml(u.name || u.id)}</option>`
    ).join('');
  }

  function assignUser(userId) {
    if (!hot || !userId) return;
    const fieldName = _assignedToFieldName();
    if (!fieldName) {
      Swal.fire('Assigned To missing', 'Bulk Config must include Assigned To mapped to the Assigned To column. It has been added by setup; refresh this page after redeploy.', 'warning');
      return;
    }
    const selected = hot.getSelectedRangeLast && hot.getSelectedRangeLast();
    const rowsToPatch = new Set();
    if (selected) {
      const from = Math.min(selected.from.row, selected.to.row);
      const to = Math.max(selected.from.row, selected.to.row);
      for (let r = from; r <= to; r++) rowsToPatch.add(r);
    } else {
      _gridRows().forEach(item => rowsToPatch.add(item.rowNumber - 1));
    }
    rowsToPatch.forEach(rowIndex => {
      const row = hot.getSourceDataAtRow(rowIndex);
      if (row) row[fieldName] = userId;
    });
    hot.render();
    _setProgress(0, `Assigned ${rowsToPatch.size} row(s) - validate before save`);
    const sel = el('bulk-assign-user');
    if (sel) sel.value = '';
  }

  function _emptyRows(count = 50) {
    return Array.from({ length: count }, _blankRow);
  }

  function _blankRow() {
    return config.reduce((row, f) => { row[f.fieldName] = ''; return row; }, { __status__: '', __recordId__: '', __errors__: '' });
  }

  function _gridRows() {
    if (!hot) return [];
    const assignedField = _assignedToFieldName();
    return hot.getSourceData()
      .map((row, i) => ({
        rowNumber: i + 1,
        data: Object.keys(row || {}).reduce((m, key) => {
          if (!String(key).startsWith('__')) {
            m[key] = key === assignedField ? _userIdByName(row[key]) : row[key];
          }
          return m;
        }, {})
      }))
      .filter(item => Object.values(item.data).some(v => String(v ?? '').trim() !== ''));
  }

  function _rows() {
    return _gridRows().map(item => ({ ...item.data, __rowNumber: item.rowNumber }));
  }

  function _chunk(items, size) {
    const chunks = [];
    for (let i = 0; i < items.length; i += size) chunks.push(items.slice(i, i + size));
    return chunks;
  }

  function _setBusy(busy) {
    document.querySelectorAll('.bulk-action').forEach(btn => { btn.disabled = !!busy; });
  }

  function _updateModeUI() {
    ['create', 'update'].forEach(mode => {
      const btn = el('bulk-mode-' + mode);
      if (btn) btn.classList.toggle('active', bulkMode === mode);
    });
    const meta = el('bulk-config-meta');
    if (meta) {
      const required = config.filter(f => f.required).map(f => f.fieldName).join(', ') || 'None';
      meta.textContent = bulkMode === 'update'
        ? `Update mode: match by Lead ID, Phone, Email, or Company Name. Required fields: ${required} - Max 500 rows.`
        : `Create mode: duplicates are blocked before save. Required fields: ${required} - Max 500 rows.`;
    }
  }

  function setMode(mode) {
    bulkMode = mode === 'update' ? 'update' : 'create';
    _markErrors([]);
    _renderSummary();
    _setProgress(0, bulkMode === 'update' ? 'Update mode selected - validate before save' : 'Create mode selected - validate before save');
    _updateModeUI();
    renderIcons(el('content'));
  }

  function _setRowMeta(rowNumber, patch) {
    if (!hot || !rowNumber) return;
    const row = hot.getSourceDataAtRow(rowNumber - 1);
    if (!row) return;
    Object.assign(row, patch || {});
    hot.render();
  }

  function _setProgress(percent, label) {
    const bar = el('bulk-progress-bar');
    const text = el('bulk-progress-label');
    if (bar) bar.style.width = Math.max(0, Math.min(100, percent)) + '%';
    if (text) text.textContent = label || '';
  }

  function _renderSummary(summary = {}) {
    const box = el('bulk-summary');
    if (!box) return;
    box.innerHTML = [
      `<span class="bulk-pill">Rows: ${summary.total || 0}</span>`,
      `<span class="bulk-pill ok">Valid: ${summary.valid || 0}</span>`,
      `<span class="bulk-pill err">Errors: ${summary.errors || 0}</span>`
    ].join('');
  }

  function _markErrors(errorRows = []) {
    errors = errorRows || [];
    const btn = el('bulk-error-btn');
    if (btn) btn.style.display = errors.length ? '' : 'none';
    if (!hot) return;

    const errorMap = {};
    errors.forEach(e => {
      const fields = new Set((e.fieldErrors || []).map(fe => fe.fieldName).filter(Boolean));
      errorMap[e.rowNumber] = { msg: e.errors || '', fields };
    });

    hot.getSourceData().forEach((row, i) => {
      row.__errors__ = (errorMap[i + 1] || {}).msg || '';
      if (errorMap[i + 1]) row.__status__ = 'Error';
      else if (!['Saved', 'Saving'].includes(String(row.__status__ || ''))) row.__status__ = '';
    });

    hot.updateSettings({
      cells(row, col, prop) {
        const rowData = hot.getSourceDataAtRow(row) || {};
        if (prop === '__status__') {
          const status = String(rowData.__status__ || '').toLowerCase();
          if (status === 'saved') return { className: 'bulk-cell-status bulk-cell-status-saved' };
          if (status === 'follow-up created') return { className: 'bulk-cell-status bulk-cell-status-saved' };
          if (status === 'saving' || status === 'processing') return { className: 'bulk-cell-status bulk-cell-status-saving' };
          if (status === 'queued') return { className: 'bulk-cell-status bulk-cell-status-queued' };
          if (status === 'error') return { className: 'bulk-cell-status bulk-cell-status-error' };
          return { className: 'bulk-cell-status' };
        }
        const err = errorMap[row + 1];
        if (!err) return {};
        if (prop === '__errors__') return { className: 'bulk-cell-errmsg' };
        if (err.fields.has(String(prop))) return { className: 'bulk-error-cell' };
        return { className: 'bulk-error-row' };
      }
    });
  }

  function _pasteIntoGrid(text) {
    const pasted = String(text || '').replace(/\r?\n$/, '');
    const rows = typeof Papa !== 'undefined'
      ? Papa.parse(pasted, { delimiter: '\t', skipEmptyLines: true }).data
      : pasted.split(/\r?\n/).map(r => r.split('\t'));
    if (!rows.length) return 0;
    const selected = hot.getSelectedLast && hot.getSelectedLast();
    const startRow = selected ? Math.max(0, selected[0]) : 0;
    const selectedCol = selected ? Math.max(0, selected[1]) : 0;
    const startCol = Math.min(selectedCol, Math.max(0, config.length - 1));
    const safeRows = rows.map(row => row.slice(0, Math.max(0, config.length - startCol)));
    const data = hot.getSourceData().map(row => ({ ...row }));
    while (data.length < startRow + safeRows.length + 5) data.push(_blankRow());
    hot.loadData(data);
    hot.populateFromArray(startRow, startCol, safeRows, undefined, undefined, 'BulkPaste');
    const endRow = startRow + safeRows.length - 1;
    const endCol = Math.min(config.length - 1, startCol + Math.max(...safeRows.map(r => r.length), 1) - 1);
    hot.selectCell(startRow, startCol, endRow, endCol);
    hot.render();
    return safeRows.filter(r => r.some(c => String(c ?? '').trim())).length;
  }

  function handlePaste(e) {
    const target = e.target;
    const inBulkGrid = target && target.closest && target.closest('.bulk-grid-wrap');
    if (!inBulkGrid) return;
    e.preventDefault();
    e.stopPropagation();
    const text = (e.clipboardData || window.clipboardData || {}).getData('text/plain') || '';
    if (!text.trim() || !hot) return;
    const count = _pasteIntoGrid(text);
    if (count) _setProgress(0, `Pasted ${count} row(s) - click Validate to check`);
  }

  async function load() {
    el('content').innerHTML = _html();
    renderIcons(el('content'));
    el('bulk-hot').innerHTML = '<div class="bulk-grid-loading">Loading bulk editor…</div>';
    const ready = await ensureBulkLibs();
    if (!ready || typeof Handsontable === 'undefined') {
      el('bulk-hot').innerHTML = '<div style="padding:24px;color:#991b1b">Bulk editor could not load. Check your network and reload the page.</div>';
      return;
    }
    el('bulk-hot').innerHTML = '<div class="bulk-grid-loading">Loading Excel view...</div>';
    config = await api.getBulkConfig();
    _updateModeUI();
    _fillAssignUserOptions();

    const content = el('content');
    if (content) content.addEventListener('paste', handlePaste);
    const gridWrap = el('bulk-hot')?.closest('.bulk-grid-wrap');
    if (gridWrap) gridWrap.addEventListener('paste', handlePaste);

    const hotEl = el('bulk-hot');
    const gridHeight = Math.max(360, (gridWrap && gridWrap.clientHeight) || 0);
    hot = new Handsontable(hotEl, {
      data: _emptyRows(),
      columns: _columns(),
      colHeaders: [...config.map(f => f.fieldName + (f.required ? ' *' : '')), 'Status', 'Lead ID', 'Errors'],
      rowHeaders: true,
      stretchH: 'all',
      minSpareRows: 5,
      licenseKey: 'non-commercial-and-evaluation',
      contextMenu: true,
      manualColumnResize: true,
      copyPaste: true,
      height: gridHeight,
      beforeChange(changes) {
        const assignedField = _assignedToFieldName();
        if (!assignedField || !Array.isArray(changes)) return;
        changes.forEach(change => {
          if (change && change[1] === assignedField) change[3] = _userIdByName(change[3]);
        });
      },
      afterPaste(data) {
        const count = (data || []).filter(r => r.some(c => String(c ?? '').trim())).length;
        if (count) _setProgress(0, `Pasted ${count} row(s) - click Validate to check`);
      },
    });
    requestAnimationFrame(() => {
      if (!hot) return;
      const latestHeight = Math.max(360, (gridWrap && gridWrap.clientHeight) || gridHeight);
      hot.updateSettings({ height: latestHeight });
      hot.render();
    });
    _renderSummary();
    _setProgress(0, 'Ready');
  }

  async function validate() {
    const rows = _rows();
    if (!rows.length) {
      Swal.fire('No rows', 'Paste at least one row before validating.', 'info');
      return { summary: { total: 0, valid: 0, errors: 0 }, errorRows: [] };
    }
    if (rows.length > 500) {
      Swal.fire('Too many rows', 'Please import 500 rows or fewer at a time.', 'warning');
      return { summary: { total: rows.length, valid: 0, errors: rows.length }, errorRows: [] };
    }
    _setBusy(true);
    _setProgress(20, 'Validating...');
    try {
      const result = await api.validateBulkRows(rows, bulkMode);
      _markErrors(result.errorRows || []);
      _renderSummary(result.summary || {});
      _setProgress(100, result.summary?.errors ? 'Validation completed with errors' : 'Validation passed');
      Swal.fire(result.summary?.errors ? 'Validation errors' : 'Ready to save',
        result.summary?.errors ? `${result.summary.errors} row(s) need correction.` : `${result.summary.valid} row(s) are valid.`,
        result.summary?.errors ? 'warning' : 'success');
      return result;
    } catch (err) {
      _setProgress(0, 'Validation failed');
      Swal.fire('Validation failed', err.message || String(err), 'error');
      throw err;
    } finally {
      _setBusy(false);
    }
  }

  function _getBulkInitialStageId() {
    const stages = (App.config.stages || [])
      .filter(s => s['Is Active'] !== false && s['Is Active'] !== 'FALSE')
      .sort((a, b) => Number(a['Stage Order'] || 0) - Number(b['Stage Order'] || 0));
    const initial = stages.find(s => s['Is Initial Stage'] === true || s['Is Initial Stage'] === 'TRUE') || stages[0];
    return initial ? (initial['Stage ID'] || '') : '';
  }

  async function createFollowupsOnly() {
    const gridRows = _gridRows();
    if (!gridRows.length) {
      Swal.fire('No rows', 'Paste rows that identify existing leads first.', 'info');
      return;
    }
    if (gridRows.length > 500) {
      Swal.fire('Too many rows', 'Please process 500 rows or fewer at a time.', 'warning');
      return;
    }
    _setBusy(true);
    errors = [];
    let created = 0;
    let failed = 0;
    lastBatchId = Date.now().toString();
    try {
      for (let i = 0; i < gridRows.length; i++) {
        const item = gridRows[i];
        _setRowMeta(item.rowNumber, { __status__: 'Saving', __errors__: '', __recordId__: '' });
        _setProgress(Math.round((i / gridRows.length) * 100), `Creating follow-up for row ${item.rowNumber}...`);
        const result = await api.createBulkFollowupOnlyRow(item.data, item.rowNumber);
        if (result.saved) {
          created++;
          _setRowMeta(item.rowNumber, { __status__: result.status || 'Follow-up Created', __recordId__: result.recordId || '', __errors__: '' });
        } else {
          failed++;
          _setRowMeta(item.rowNumber, { __status__: 'Error', __errors__: result.errors || 'Follow-up creation failed' });
          errors.push({
            rowNumber: item.rowNumber,
            errors: result.errors || 'Follow-up creation failed',
            fieldErrors: result.fieldErrors || [],
            ...item.data
          });
        }
      }
      _renderSummary({ total: gridRows.length, valid: created, errors: failed });
      _markErrors(errors);
      _setProgress(100, failed ? 'Follow-up repair completed with errors' : 'Follow-up repair completed');
      if (created) {
        await Promise.all([
          _refreshLeadsCache().catch(e => console.warn('[BulkView] Lead refresh failed', e)),
          api.getFollowups({}).then(rows => AppCache.setRows('followups', rows)).catch(e => console.warn('[BulkView] Follow-up refresh failed', e))
        ]);
      }
      Swal.fire(failed ? 'Completed with errors' : 'Follow-ups repaired',
        `${created} follow-up(s) created. ${failed} row(s) failed.`,
        failed ? 'warning' : 'success');
    } catch (err) {
      _setProgress(0, 'Follow-up repair failed');
      Swal.fire('Follow-up repair failed', err.message || String(err), 'error');
    } finally {
      _setBusy(false);
    }
  }

  async function saveQueued() {
    const gridRows = _gridRows();
    if (!gridRows.length) {
      Swal.fire('No rows', 'Paste at least one row before saving.', 'info');
      return;
    }
    if (gridRows.length > 500) {
      Swal.fire('Too many rows', 'Please import 500 rows or fewer at a time.', 'warning');
      return;
    }
    _setBusy(true);
    _setProgress(5, 'Validating before save...');
    try {
      const validation = await api.validateBulkRows(_rows(), bulkMode);
      _markErrors(validation.errorRows || []);
      const invalidRows = new Set((validation.errorRows || []).map(r => Number(r.rowNumber)));
      if (invalidRows.size === gridRows.length) {
        _setProgress(0, 'All rows have errors - fix before saving');
        Swal.fire('Validation failed', `All ${gridRows.length} row(s) have errors.`, 'error');
        return;
      }

      const initialStageId = _getBulkInitialStageId();
      const rowByNumber = {};
      const validItems = [];
      errors = [...(validation.errorRows || [])];
      lastBatchId = Date.now().toString();
      let validIdx = 0;

      gridRows.forEach(item => {
        if (invalidRows.has(item.rowNumber)) return;
        const normalizedRow = (validation.validRows || [])[validIdx++];
        if (!normalizedRow) return;
        const payload = { ...normalizedRow };
        if (bulkMode === 'create' && !payload['Stage ID']) payload['Stage ID'] = initialStageId;
        payload.__rowNumber = item.rowNumber;
        rowByNumber[item.rowNumber] = item;
        validItems.push({ rowNumber: item.rowNumber, payload });
        _setRowMeta(item.rowNumber, { __status__: 'Queued', __errors__: '', __recordId__: '' });
      });

      let savedCount = 0;
      const chunks = _chunk(validItems, BULK_CHUNK_SIZE);
      // Save each chunk synchronously (25 rows/call stays well under the GAS time limit).
      for (let i = 0; i < chunks.length; i++) {
        const chunk = chunks[i];
        const chunkNo = i + 1;
        _setProgress(Math.round((i / Math.max(chunks.length, 1)) * 85) + 10, `Saving chunk ${chunkNo}/${chunks.length} (${chunk.length} rows)...`);
        chunk.forEach(item => _setRowMeta(item.rowNumber, { __status__: 'Saving', __errors__: '' }));
        try {
          const res = await api.saveBulkRows(chunk.map(item => item.payload), bulkMode);
          const byNum = {};
          (Array.isArray(res && res.rowResults) ? res.rowResults : []).forEach(r => {
            if (Number(r.rowNumber)) byNum[Number(r.rowNumber)] = r;
          });
          chunk.forEach(item => {
            const r = byNum[item.rowNumber];
            const original = rowByNumber[item.rowNumber] || {};
            if (r && r.saved) {
              savedCount++;
              _setRowMeta(item.rowNumber, { __status__: r.status || 'Saved', __recordId__: r.recordId || '', __errors__: '' });
            } else {
              const errMsg = (r && r.errors) || 'Bulk save failed';
              _setRowMeta(item.rowNumber, { __status__: 'Error', __errors__: errMsg });
              errors.push({ rowNumber: item.rowNumber, errors: errMsg, fieldErrors: (r && r.fieldErrors) || [], ...(original.data || {}) });
            }
          });
        } catch (e) {
          chunk.forEach(item => {
            const original = rowByNumber[item.rowNumber] || {};
            _setRowMeta(item.rowNumber, { __status__: 'Error', __errors__: e.message || 'Save failed' });
            errors.push({ rowNumber: item.rowNumber, errors: e.message || 'Save failed', fieldErrors: [], ...(original.data || {}) });
          });
        }
      }
      await _refreshLeadsCache().catch(e => console.warn('[BulkView] Lead refresh failed', e));

      const saved = savedCount;
      const failed = gridRows.length - saved;
      _renderSummary({ total: gridRows.length, valid: saved, errors: failed });
      _markErrors(errors);
      _setProgress(100, failed ? `Done - ${failed} row(s) failed` : 'All leads saved');
      Swal.fire(failed ? 'Completed with errors' : 'Bulk save complete',
        `${saved} lead(s) saved. ${failed} failed.`,
        failed ? 'warning' : 'success');
    } catch (err) {
      _setProgress(0, 'Save failed');
      Swal.fire('Save failed', err.message || String(err), 'error');
    } finally {
      _setBusy(false);
    }
  }

  async function downloadErrors() {
    if (!errors.length) return;
    const flatErrors = errors.map(({ fieldErrors, ...row }) => ({
      ...row,
      fieldErrors: Array.isArray(fieldErrors) ? fieldErrors.map(e => e.fieldName ? `${e.fieldName}: ${e.message}` : e.message).join('; ') : ''
    }));
    const csv = typeof Papa !== 'undefined' ? Papa.unparse(flatErrors) : await api.createErrorCsv(flatErrors);
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `bulk-errors-${lastBatchId || Date.now()}.csv`;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  }

  function clear() {
    if (hot) hot.loadData(_emptyRows());
    _markErrors([]);
    _renderSummary();
    _setProgress(0, 'Ready');
  }

  return { load, validate, save: saveQueued, createFollowupsOnly, downloadErrors, clear, handlePaste, setMode, assignUser };
})();

async function loadBulkView() {
  return BulkView.load();
}
window.loadBulkView = loadBulkView;
</script>

<script>
function _dbRefreshCityFilterOptions() {
  const cityEl = el('db-f-city');
  if (!cityEl) return;
  const current = cityEl.value || '';
  const state = el('db-f-state')?.value || '';
  const cities = AppCache.getRows('leads')
    .filter(l => !state || String(l['State'] || '') === state)
    .map(l => String(l['City'] || '').trim())
    .filter(Boolean)
    .filter((v, i, arr) => arr.indexOf(v) === i)
    .sort((a, b) => a.localeCompare(b));
  cityEl.innerHTML = '<option value="">All Cities</option>' +
    cities.map(c => `<option value="${escapeHtml(c)}">${escapeHtml(c)}</option>`).join('');
  cityEl.value = cities.includes(current) ? current : '';
}

function _dbRenderGeoAnalytics(leads, fus) {
  _dbRenderIndiaLeadMap(leads);
  _dbRenderStateChart(leads);
  _dbRenderCityChart(leads);
  _dbRenderStageByStateChart(leads);
  _dbRenderGeoSummaryTable('db-state-summary', _dbGeoSummary(leads, fus, 'State'), 'State');
  _dbRenderGeoSummaryTable('db-city-summary', _dbGeoSummary(leads, fus, 'City'), 'City');
  _dbRenderGeoMatrix('db-stage-state-matrix', leads, 'State');
  _dbRenderGeoMatrix('db-stage-city-matrix', leads, 'City', 10);
  _dbRenderCityList('db-hot-cities', _dbGeoSummary(leads, fus, 'City').filter(r => r.open > 0).sort((a,b) => b.open - a.open).slice(0, 12), 'open');
  _dbRenderCityList('db-problem-cities', _dbGeoSummary(leads, fus, 'City').filter(r => r.total >= 2).sort((a,b) => b.problemPct - a.problemPct || b.overdue - a.overdue).slice(0, 12), 'problemPct');
}

const _DB_STATE_ISO = {
  'Andhra Pradesh':'IN-AP','Arunachal Pradesh':'IN-AR','Assam':'IN-AS','Bihar':'IN-BR',
  'Chhattisgarh':'IN-CT','Goa':'IN-GA','Gujarat':'IN-GJ','Haryana':'IN-HR',
  'Himachal Pradesh':'IN-HP','Jharkhand':'IN-JH','Karnataka':'IN-KA','Kerala':'IN-KL',
  'Madhya Pradesh':'IN-MP','Maharashtra':'IN-MH','Manipur':'IN-MN','Meghalaya':'IN-ML',
  'Mizoram':'IN-MZ','Nagaland':'IN-NL','Odisha':'IN-OR','Punjab':'IN-PB',
  'Rajasthan':'IN-RJ','Sikkim':'IN-SK','Tamil Nadu':'IN-TN','Telangana':'IN-TG',
  'Tripura':'IN-TR','Uttar Pradesh':'IN-UP','Uttarakhand':'IN-UT','West Bengal':'IN-WB',
  'Andaman and Nicobar Islands':'IN-AN','Chandigarh':'IN-CH','Delhi':'IN-DL',
  'Jammu and Kashmir':'IN-JK','Ladakh':'IN-LA','Lakshadweep':'IN-LD','Puducherry':'IN-PY',
  'Dadra and Nagar Haveli and Daman and Diu':'IN-DH'
};

function _dbRenderIndiaLeadMap(leads) {
  const wrap = el('db-india-map');
  if (!wrap) return;

  const stateCounts = {};
  leads.forEach(l => {
    const state = _dbNormalizeIndianState(l['State']);
    if (!state) return;
    stateCounts[state] = (stateCounts[state] || 0) + 1;
  });

  const totalMapped = Object.values(stateCounts).reduce((sum, n) => sum + n, 0);

  if (!totalMapped) {
    wrap.innerHTML = '<p style="text-align:center;color:#bbb;padding:24px;font-size:13px">No state data available for the selected filters</p>';
    return;
  }

  wrap.style.minHeight = '480px';
  wrap.innerHTML = '<div style="text-align:center;padding:60px 0;color:#bbb;font-size:12px">Loading map…</div>';

  const drawMap = () => {
    const data = new google.visualization.DataTable();
    data.addColumn('string', 'State');
    data.addColumn('number', 'Leads');
    data.addColumn({ type: 'string', role: 'tooltip', p: { html: true } });

    Object.entries(stateCounts).forEach(([state, count]) => {
      const code = _DB_STATE_ISO[state];
      if (!code) return;
      data.addRow([code, count,
        `<div style="padding:9px 13px;font-size:12px;font-family:system-ui,sans-serif">
          <b style="display:block;margin-bottom:3px">${escapeHtml(state)}</b>
          <span style="color:#555">${count} lead${count !== 1 ? 's' : ''}</span>
        </div>`
      ]);
    });

    const primary = getComputedStyle(document.documentElement).getPropertyValue('--md-primary').trim() || '#1565C0';
    const w = wrap.offsetWidth || 700;

    const options = {
      region: 'IN',
      resolution: 'provinces',
      colorAxis: { colors: ['#dbeafe', primary] },
      backgroundColor: { fill: 'transparent' },
      datalessRegionColor: '#f1f5f9',
      defaultColor: '#f1f5f9',
      tooltip: { isHtml: true, trigger: 'focus' },
      legend: { position: 'bottom', textStyle: { color: '#666', fontSize: 11 } },
      enableRegionInteractivity: true,
      width: w,
      height: Math.min(Math.round(w * 0.78), 560)
    };

    wrap.innerHTML = '';
    const chart = new google.visualization.GeoChart(wrap);
    chart.draw(data, options);

    const top = Object.entries(stateCounts).sort((a, b) => b[1] - a[1])[0];
    const summary = document.createElement('div');
    summary.style.cssText = 'font-size:11px;color:#666;margin-top:8px;text-align:right';
    summary.innerHTML = `Mapped leads: <b>${totalMapped}</b>${top ? ` · Top state: <b>${escapeHtml(top[0])} (${top[1]})</b>` : ''}`;
    wrap.appendChild(summary);
  };

  if (window.google && window.google.visualization && window.google.visualization.GeoChart) {
    drawMap();
  } else if (window.google && window.google.charts) {
    google.charts.setOnLoadCallback(drawMap);
  } else {
    wrap.innerHTML = '<p style="text-align:center;color:#bbb;padding:24px;font-size:13px">Google Charts library not loaded</p>';
  }
}

function _dbNormalizeIndianState(value) {
  const raw = String(value || '').trim();
  if (!raw) return '';
  const key = raw.toLowerCase().replace(/[^a-z0-9]+/g, '');
  const aliases = {
    andamanandnicobarislands: 'Andaman and Nicobar Islands',
    andaman: 'Andaman and Nicobar Islands',
    andhrapradesh: 'Andhra Pradesh',
    arunachalpradesh: 'Arunachal Pradesh',
    assam: 'Assam',
    bihar: 'Bihar',
    chandigarh: 'Chandigarh',
    chhattisgarh: 'Chhattisgarh',
    dadraandnagarhavelianddamananddiu: 'Dadra and Nagar Haveli and Daman and Diu',
    damananddiu: 'Dadra and Nagar Haveli and Daman and Diu',
    delhi: 'Delhi',
    nctdelhi: 'Delhi',
    goa: 'Goa',
    gujarat: 'Gujarat',
    haryana: 'Haryana',
    himachalpradesh: 'Himachal Pradesh',
    jammuandkashmir: 'Jammu and Kashmir',
    jandk: 'Jammu and Kashmir',
    jk: 'Jammu and Kashmir',
    jharkhand: 'Jharkhand',
    karnataka: 'Karnataka',
    kerala: 'Kerala',
    ladakh: 'Ladakh',
    lakshadweep: 'Lakshadweep',
    madhyapradesh: 'Madhya Pradesh',
    maharashtra: 'Maharashtra',
    manipur: 'Manipur',
    meghalaya: 'Meghalaya',
    mizoram: 'Mizoram',
    nagaland: 'Nagaland',
    odisha: 'Odisha',
    orissa: 'Odisha',
    puducherry: 'Puducherry',
    pondicherry: 'Puducherry',
    punjab: 'Punjab',
    rajasthan: 'Rajasthan',
    sikkim: 'Sikkim',
    tamilnadu: 'Tamil Nadu',
    telangana: 'Telangana',
    tripura: 'Tripura',
    uttarpradesh: 'Uttar Pradesh',
    up: 'Uttar Pradesh',
    uttarakhand: 'Uttarakhand',
    westbengal: 'West Bengal'
  };
  return aliases[key] || raw;
}

function _dbRenderStateChart(leads) {
  const ctx = el('db-state-chart');
  if (!ctx) return;
  const rows = _dbGroupCount(leads, 'State').slice(0, 12);
  _dbCharts.state = new Chart(ctx, {
    type: 'bar',
    data: { labels: rows.map(r => r.key), datasets: [{ label: 'Leads', data: rows.map(r => r.count), backgroundColor: '#1565C0', borderRadius: 4 }] },
    options: _dbChartOptions(false)
  });
}

function _dbRenderCityChart(leads) {
  const ctx = el('db-city-chart');
  if (!ctx) return;
  const rows = _dbGroupCount(leads, 'City').slice(0, 15).reverse();
  _dbCharts.city = new Chart(ctx, {
    type: 'bar',
    data: { labels: rows.map(r => r.key), datasets: [{ label: 'Leads', data: rows.map(r => r.count), backgroundColor: '#2E7D32', borderRadius: 4 }] },
    options: _dbChartOptions(true)
  });
}

function _dbRenderStageByStateChart(leads) {
  const ctx = el('db-stage-state-chart');
  if (!ctx) return;
  const states = _dbGroupCount(leads, 'State').slice(0, 10).map(r => r.key);
  const stages = App.config.allStages || App.config.stages || [];
  const colors = ['#1565C0','#2E7D32','#F57C00','#6A1B9A','#00838F','#C62828','#455A64','#AD1457','#7B1FA2','#5D4037'];
  const datasets = stages.map((s, i) => ({
    label: s['Stage Name'] || 'Stage',
    data: states.map(st => leads.filter(l => String(l['State'] || 'Unknown') === st && l['Stage ID'] === s['Stage ID']).length),
    backgroundColor: safeColor(s['Color'], colors[i % colors.length]),
    borderWidth: 0
  })).filter(ds => ds.data.some(Boolean));
  _dbCharts.stageState = new Chart(ctx, {
    type: 'bar',
    data: { labels: states, datasets },
    options: {
      responsive: true,
      plugins: { legend: { position: 'bottom', labels: { font: { size: 10 }, boxWidth: 10 } } },
      scales: { x: { stacked: true, ticks: { font: { size: 10 } } }, y: { stacked: true, beginAtZero: true, ticks: { stepSize: 1, font: { size: 11 } } } }
    }
  });
}

function _dbGeoSummary(leads, fus, field) {
  const today = localDateInputValue();
  const leadIdsWithOpenFu = new Set(fus.filter(_isOpenFollowupRow).map(f => f['Lead ID']));
  const overdueByLead = fus.filter(f => _isOpenFollowupRow(f) && (_fmtDate(_fuPlannedDate(f)) || '') < today)
    .reduce((m, f) => { m[f['Lead ID']] = (m[f['Lead ID']] || 0) + 1; return m; }, {});
  const map = {};
  leads.forEach(l => {
    const key = String(l[field] || 'Unknown').trim() || 'Unknown';
    if (!map[key]) map[key] = { key, total: 0, open: 0, won: 0, lost: 0, disqualified: 0, pending: 0, overdue: 0, stages: {} };
    const r = map[key];
    r.total++;
    const status = String(l['Lead Status'] || 'Open');
    if (status === 'Won') r.won++;
    else if (status === 'Lost') r.lost++;
    else r.open++;
    const stageName = AppLookup.stageName(l['Stage ID']);
    if (/disqualif/i.test(stageName)) r.disqualified++;
    if (leadIdsWithOpenFu.has(l['Lead ID'])) r.pending++;
    r.overdue += overdueByLead[l['Lead ID']] || 0;
    r.stages[stageName] = (r.stages[stageName] || 0) + 1;
  });
  return Object.values(map).map(r => {
    r.conversion = r.total ? Math.round(r.won / r.total * 100) : 0;
    r.problemPct = r.total ? Math.round((r.lost + r.disqualified) / r.total * 100) : 0;
    r.topStage = Object.entries(r.stages).sort((a,b) => b[1] - a[1])[0]?.join(' - ') || '-';
    return r;
  }).sort((a,b) => b.total - a.total || a.key.localeCompare(b.key));
}

function _dbRenderGeoSummaryTable(id, rows, label) {
  const wrap = el(id);
  if (!wrap) return;
  if (!rows.length) { wrap.innerHTML = '<p style="text-align:center;color:#bbb;padding:20px;font-size:13px">No data</p>'; return; }
  wrap.innerHTML = `<table style="width:100%;border-collapse:collapse;font-size:12px">
    <thead><tr style="background:#f8f8f8">${[label,'Total','Open','Won','Lost','Disq.','Conv %','Pending FU','Overdue FU'].map((h,i) =>
      `<th style="padding:8px 10px;border-bottom:2px solid #e5e7eb;text-align:${i?'center':'left'};font-size:10px;text-transform:uppercase;color:#555">${h}</th>`).join('')}</tr></thead>
    <tbody>${rows.slice(0, 40).map(r => `<tr style="border-bottom:1px solid #f3f4f6">
      <td style="padding:8px 10px;font-weight:600;white-space:nowrap">${escapeHtml(r.key)}</td>
      <td style="padding:8px 10px;text-align:center">${r.total}</td>
      <td style="padding:8px 10px;text-align:center;color:#1565C0;font-weight:600">${r.open}</td>
      <td style="padding:8px 10px;text-align:center;color:#2E7D32;font-weight:600">${r.won}</td>
      <td style="padding:8px 10px;text-align:center;color:#C62828">${r.lost}</td>
      <td style="padding:8px 10px;text-align:center;color:#6b7280">${r.disqualified}</td>
      <td style="padding:8px 10px;text-align:center;font-weight:700;color:${r.conversion >= 40 ? '#2E7D32' : r.conversion >= 20 ? '#F57C00' : '#C62828'}">${r.conversion}%</td>
      <td style="padding:8px 10px;text-align:center">${r.pending}</td>
      <td style="padding:8px 10px;text-align:center;color:${r.overdue ? '#C62828' : '#6b7280'};font-weight:${r.overdue ? '700' : '400'}">${r.overdue}</td>
    </tr>`).join('')}</tbody>
  </table>`;
}

function _dbRenderGeoMatrix(id, leads, field, limit) {
  const wrap = el(id);
  if (!wrap) return;
  const keys = _dbGroupCount(leads, field).slice(0, limit || 12).map(r => r.key);
  const stages = (App.config.allStages || App.config.stages || []).filter(s => leads.some(l => l['Stage ID'] === s['Stage ID']));
  if (!keys.length || !stages.length) { wrap.innerHTML = '<p style="text-align:center;color:#bbb;padding:20px;font-size:13px">No data</p>'; return; }
  wrap.innerHTML = `<table style="width:100%;border-collapse:collapse;font-size:12px">
    <thead><tr style="background:#f8f8f8"><th style="padding:8px 10px;text-align:left;position:sticky;left:0;background:#f8f8f8">Stage</th>${keys.map(k => `<th style="padding:8px 10px;text-align:center;white-space:nowrap">${escapeHtml(k)}</th>`).join('')}</tr></thead>
    <tbody>${stages.map(s => `<tr style="border-bottom:1px solid #f3f4f6">
      <td style="padding:8px 10px;font-weight:600;white-space:nowrap;position:sticky;left:0;background:#fff">${escapeHtml(s['Stage Name'] || '')}</td>
      ${keys.map(k => `<td style="padding:8px 10px;text-align:center">${leads.filter(l => String(l[field] || 'Unknown') === k && l['Stage ID'] === s['Stage ID']).length || ''}</td>`).join('')}
    </tr>`).join('')}</tbody>
  </table>`;
}

function _dbRenderCityList(id, rows, sortField) {
  const wrap = el(id);
  if (!wrap) return;
  if (!rows.length) { wrap.innerHTML = '<p style="text-align:center;color:#bbb;padding:20px;font-size:13px">No data</p>'; return; }
  wrap.innerHTML = `<table style="width:100%;border-collapse:collapse;font-size:12px">
    <thead><tr style="background:#f8f8f8">${['City','Open','Conv %','Problem %','Overdue','Top Stage'].map((h,i) =>
      `<th style="padding:8px 10px;border-bottom:2px solid #e5e7eb;text-align:${i===0||i===5?'left':'center'};font-size:10px;text-transform:uppercase;color:#555">${h}</th>`).join('')}</tr></thead>
    <tbody>${rows.map(r => `<tr style="border-bottom:1px solid #f3f4f6">
      <td style="padding:8px 10px;font-weight:600;white-space:nowrap">${escapeHtml(r.key)}</td>
      <td style="padding:8px 10px;text-align:center;color:#1565C0;font-weight:700">${r.open}</td>
      <td style="padding:8px 10px;text-align:center;color:#2E7D32;font-weight:700">${r.conversion}%</td>
      <td style="padding:8px 10px;text-align:center;color:${r.problemPct ? '#C62828' : '#6b7280'};font-weight:700">${r.problemPct}%</td>
      <td style="padding:8px 10px;text-align:center;color:${r.overdue ? '#C62828' : '#6b7280'};font-weight:700">${r.overdue}</td>
      <td style="padding:8px 10px;white-space:nowrap">${escapeHtml(r.topStage)}</td>
    </tr>`).join('')}</tbody>
  </table>`;
}

function _dbGroupCount(rows, field) {
  const map = {};
  rows.forEach(r => {
    const key = String(r[field] || 'Unknown').trim() || 'Unknown';
    map[key] = (map[key] || 0) + 1;
  });
  return Object.entries(map).map(([key, count]) => ({ key, count })).sort((a,b) => b.count - a.count || a.key.localeCompare(b.key));
}

function _dbChartOptions(horizontal) {
  return {
    indexAxis: horizontal ? 'y' : 'x',
    responsive: true,
    plugins: { legend: { display: false } },
    scales: {
      x: { beginAtZero: true, ticks: { stepSize: 1, font: { size: 11 } } },
      y: { beginAtZero: true, ticks: { stepSize: 1, font: { size: 11 } } }
    }
  };
}
</script>

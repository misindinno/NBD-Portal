<script>
function _canAddFollowup() {
  return String(App?.user?.role || '').toUpperCase() === 'ADMIN';
}

function _addFollowupButtonHTML(leadId = '', leadName = '', size = 'sm') {
  if (!_canAddFollowup()) return '';
  const leadArg = escapeHtml(JSON.stringify(String(leadId || '')));
  const nameArg = escapeHtml(JSON.stringify(String(leadName || '')));
  return `<button class="btn btn-primary btn-${size}" onclick="openFollowupForm(${leadArg},${nameArg})">
    ${icon('plus', 14)}<span class="fu-btn-text"> Add Follow-up</span>
  </button>`;
}

async function openFollowupForm(leadId = '', leadName = '') {
  if (!_canAddFollowup()) {
    toast('Only admins can add follow-ups.', 'error');
    return;
  }
  const cfg = App.config;
  const formData = await _getFollowupFormData();
  const leads = formData.leads || [];
  const selectedLead = leads.find(l => l['Lead ID'] === leadId);
  const selectedLeadNbdLocked = !!(selectedLead && (selectedLead['NBD Lead ID'] || selectedLead['Pushed To NBD At']));
  const canMoveSelectedLead = !!leadId && !selectedLeadNbdLocked;
  const selectedLeadLabel = leadName || (selectedLead ? _fuLeadLabel(selectedLead) : '');
  const followupFields = cfg.followupFields || [];
  const configOptions = _configOptionsMap(cfg._allConfigs || []);
  const overlay = showModal(`
    <div class="modal-header">
      <h2>${leadName ? `Follow-up: ${escapeHtml(leadName)}` : 'Add Follow-up'}</h2>
      <button class="modal-close" onclick="this.closest('.modal-overlay').remove()">✕</button>
    </div>
    <form id="fu-form">
      <div class="form-row">
        <div class="form-group">
          <label>Planned Date *</label>
          <input class="form-control" name="Planned Date" type="date" value="${localDateInputValue()}" required>
        </div>
        <div class="form-group">
          <label>Type *</label>
          <select class="form-control" name="Follow-up Type" required>
            ${cfg.followupTypes.map(t => `<option>${escapeHtml(t)}</option>`).join('')}
          </select>
        </div>
      </div>

      <div class="form-group">
        <label>Link to Lead <span style="color:#999;font-weight:400">(optional)</span></label>
        <div style="display:flex;gap:8px">
          <input type="hidden" name="Lead ID" id="fu-lead-id" value="${escapeHtml(leadId)}">
          <input class="form-control" id="fu-lead-display" value="${escapeHtml(selectedLeadLabel)}" placeholder="Standalone follow-up" readonly>
          <button type="button" class="btn btn-outlined btn-sm" onclick="_fuPickLead()" style="white-space:nowrap">Pick Lead</button>
          <button type="button" class="btn btn-outlined btn-sm" onclick="_clearSelectedLead()" title="Clear lead">${icon('x', 14)}</button>
        </div>
      </div>

      <div class="form-group">
        <label>Discussion / Remarks *</label>
        <textarea class="form-control" name="Discussion" rows="3" required></textarea>
      </div>

      <div class="form-group">
        <label>City</label>
        <input class="form-control" name="City" placeholder="City">
      </div>

      <div class="form-group" id="fu-stage-wrap" style="${canMoveSelectedLead ? '' : 'display:none'}">
        <label>Move to Next Stage</label>
        <select class="form-control" name="Updated Stage ID" ${canMoveSelectedLead ? '' : 'disabled'}>
          ${canMoveSelectedLead ? _fuNextStageOptionsHTML(leadId, leads) : '<option value="">No Change</option>'}
        </select>
      </div>

      <div class="form-group">
        <label>Next Action</label>
        <input class="form-control" name="Next Action" placeholder="What to do next...">
      </div>

      ${buildFollowupCustomFieldsHTML({}, followupFields, configOptions)}

      <div class="modal-footer">
        <button type="button" class="btn btn-outlined" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
        <button type="submit" class="btn btn-primary">Save Follow-up</button>
      </div>
    </form>`);

  const fuForm = overlay.querySelector('#fu-form');
  initFollowupCustomFields(overlay);
  _initFollowupValidator(fuForm).onSuccess(async () => {
    if (fuForm.dataset.submitting === '1') return;
    if (!validateCfMultiselects(fuForm)) return;
    fuForm.dataset.submitting = '1';
    const btn = fuForm.querySelector('[type=submit]');
    setButtonLoading(btn, 'Saving...');
    try {
      const payload = await collectLeadFormPayload(fuForm);
      if (!payload['Lead ID'])          delete payload['Lead ID'];
      if (!payload['Updated Stage ID']) delete payload['Updated Stage ID'];
      if (!payload['Lead ID'])          delete payload['Updated Stage ID'];
      payload['Follow-up Date'] = payload['Follow-up Date'] || payload['Planned Date'];
      payload['Next Follow-up Date'] = payload['Planned Date'];
      payload['Status'] = 'Open';
      const snapshot = await _getFollowupPageSnapshot();
      const snapshotLead = payload['Lead ID'] ? (snapshot.leads || []).find(l => l['Lead ID'] === payload['Lead ID']) : null;
      payload['Stage ID'] = snapshotLead ? (snapshotLead['Stage ID'] || '') : '';
      const confirmed = await _confirmFollowupCreateReview(payload, snapshotLead);
      if (!confirmed) {
        resetButtonLoading(btn);
        fuForm.dataset.submitting = '';
        return;
      }

      const saveResult = await api.saveFollowupDirect(payload);
      overlay.remove();
      _fuPageSnapshot = null;
      if (App.currentPage.startsWith('followups')) await _renderFUTab(window.currentFollowupTab || 'all', true);
      if (App.currentPage === 'dashboard') loadDashboard();
      toast('Follow-up saved' + (saveResult ? ': ' + saveResult : '') + '!');
    } catch (err) {
      toast(err.message || String(err), 'error');
      resetButtonLoading(btn);
      fuForm.dataset.submitting = '';
    }
  });
  initFollowupCustomFields(overlay);
  const leadInput = overlay.querySelector('#fu-lead-id');
  if (leadInput) leadInput.addEventListener('input', () => _toggleFUStageField(!!leadInput.value.trim()));
}

async function _confirmFollowupCreateReview(payload, lead) {
  const stage = payload['Updated Stage ID']
    ? (App.config.allStages || App.config.stages || []).find(s => s['Stage ID'] === payload['Updated Stage ID'])
    : null;
  const rows = [
    ['Lead', lead ? _fuLeadLabel(lead) : 'Standalone follow-up'],
    ['Planned Date', formatDate(payload['Planned Date']) || payload['Planned Date'] || '-'],
    ['Follow-up Type', payload['Follow-up Type'] || '-'],
    ['Move Stage', stage ? (stage['Stage Name'] || '-') : 'No Change'],
    ['Next Action', payload['Next Action'] || '-'],
    ['Remarks', payload['Discussion'] || payload['Remark'] || '-']
  ];
  const html = `
    <div style="text-align:left;border:1px solid #e5e7eb;border-radius:10px;overflow:hidden;margin-top:8px">
      ${rows.map(([label, value]) => `
        <div style="display:grid;grid-template-columns:120px 1fr;border-bottom:1px solid #f1f5f9;min-height:34px">
          <div style="background:#f8fafc;color:#64748b;font-size:11px;font-weight:800;text-transform:uppercase;padding:9px 10px">${escapeHtml(label)}</div>
          <div style="color:#111827;font-size:12.5px;font-weight:600;padding:9px 10px;white-space:pre-wrap">${escapeHtml(value)}</div>
        </div>`).join('')}
    </div>`;
  const result = await Swal.fire({
    title: 'Review Follow-up',
    html,
    icon: 'question',
    showCancelButton: true,
    confirmButtonText: 'Confirm & Save',
    cancelButtonText: 'Edit',
    width: 560
  });
  return result.isConfirmed;
}

async function openMarkFollowupDoneForm(followupId) {
  const snapshot = await _getFollowupPageSnapshot();
  const row = (snapshot.followups || []).find(f => f['Follow-up ID'] === followupId);
  if (!row) return toast('Follow-up not found in the current view.', 'error');
  const lead = row['Lead ID'] ? (snapshot.leads || []).find(l => l['Lead ID'] === row['Lead ID']) : null;
  const ctx = _buildFollowupContext(snapshot.leads || [], snapshot);
  const decorated = _decorateFollowup(row, ctx);
  const issueOptions = (App.config._allConfigs || [])
    .filter(c => c['Config Type'] === 'Issues' && c['Status'] === 'Active')
    .map(c => '<option>' + escapeHtml(c['Value']) + '</option>').join('');
  const stageOptionsHTML = lead ? _fuNextStageOptionsHTML(lead['Lead ID'], snapshot.leads || []) : '<option value="">No Change</option>';
  const todayStr = localDateInputValue();
  const _maxD = new Date(); _maxD.setDate(_maxD.getDate() + 7);
  const maxNextDate = _maxD.toISOString().split('T')[0];
  const stageMap = (App.config.allStages || App.config.stages || []).reduce(function(m,s){m[s['Stage ID']]=s;return m;},{});
  const leadIsFinalStage = !!(lead && _fuIsFinalStage(stageMap[lead['Stage ID']]));
  const leadStageName = lead && stageMap[lead['Stage ID']] ? stageMap[lead['Stage ID']]['Stage Name'] : '—';
  const leadFields    = App.config.leadFields || [];
  const configOptions = _configOptionsMap(App.config._allConfigs || []);
  const leadDetailHTML = lead
    ? '<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px 20px;font-size:12px;margin-bottom:10px">'
      + '<div><div style="color:#9ca3af;font-size:10px;text-transform:uppercase;letter-spacing:.4px;font-weight:600">Company</div><div style="font-weight:600;color:#111827">' + escapeHtml(lead['Company Name']||'—') + '</div></div>'
      + '<div><div style="color:#9ca3af;font-size:10px;text-transform:uppercase;letter-spacing:.4px;font-weight:600">Contact</div><div style="font-weight:600;color:#111827">' + escapeHtml(lead['Contact Person']||'—') + '</div></div>'
      + '<div><div style="color:#9ca3af;font-size:10px;text-transform:uppercase;letter-spacing:.4px;font-weight:600">Phone</div><div style="font-weight:600;color:#111827">' + escapeHtml(lead['Phone']||'—') + '</div></div>'
      + '<div><div style="color:#9ca3af;font-size:10px;text-transform:uppercase;letter-spacing:.4px;font-weight:600">Stage</div><div style="font-weight:600;color:#111827">' + escapeHtml(leadStageName) + '</div></div>'
      + '</div>'
    : '<div style="font-size:13px;color:#6b7280;margin-bottom:8px">Standalone follow-up</div>';
  const issueFieldHTML = issueOptions
    ? '<div class="form-group"><label>Issues</label><select class="form-control" name="Issues"><option value="">None</option>' + issueOptions + '</select></div>'
    : '';
  const stageFieldHTML = lead
    ? '<div class="form-group"><label>Move to Stage</label><select class="form-control" name="Updated Stage ID" onchange="_onMarkDoneStageChange(this);_updateDoneNextDateRequirement(this.form)">' + stageOptionsHTML + '</select></div><div id="fu-done-stage-fields"></div>'
    : '';

  const overlay = showModal(`
    <div class="modal-header">
      <h2>Mark Follow-up Done</h2>
      <button class="modal-close" onclick="this.closest('.modal-overlay').remove()">✕</button>
    </div>
    <div style="background:#f9fafb;border:1px solid #e5e7eb;border-radius:8px;padding:12px 14px;margin-bottom:14px">
      ${leadDetailHTML}
      <div style="border-top:1px solid #e5e7eb;padding-top:8px">
        <div style="font-size:11px;color:#9ca3af;margin-bottom:3px">Planned: ${formatDate(_fuPlannedDate(row))}</div>
        <div style="font-size:13px;color:#374151;font-weight:500">${escapeHtml(row['Discussion'] || '—')}</div>
      </div>
    </div>
    <form id="fu-done-form" data-current-final-stage="${leadIsFinalStage ? 'true' : 'false'}">
      <div class="form-row">
        <div class="form-group">
          <label>Done Date *</label>
          <input class="form-control" name="Done Date" type="date" value="${todayStr}" disabled max="${todayStr}" required>
        </div>
        <div class="form-group">
          <label>Next Planned Date <span id="fu-next-date-required" style="font-size:10px;color:#ef4444;font-weight:700">*</span></label>
          <input class="form-control" name="Next Follow-up Date" type="date" min="${todayStr}" max="${maxNextDate}" onchange="_updateDoneNextDateRequirement(this.form)" oninput="_updateDoneNextDateRequirement(this.form)">
          <div id="fu-next-date-help" style="font-size:11px;color:#6b7280;margin-top:4px">Next planned date is required until the lead reaches a final stage. Choose a date within 7 days.</div>
        </div>
      </div>
      <div class="form-group">
        <label style="font-size:12.5px;font-weight:600;color:#1f2937;display:block;margin-bottom:8px">Contact Mode <span style="color:#ef4444">*</span></label>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px">
          ${[
            { val:'Call Connected', ic:'phone-call',    col:'#16a34a', abg:'#f0fdf4', ab:'#22c55e', ibg:'#dcfce7' },
            { val:'WhatsApp Chat',  ic:'message-circle',col:'#2563eb', abg:'#eff6ff', ab:'#3b82f6', ibg:'#dbeafe' },
            { val:'Not Picked',    ic:'phone-missed',  col:'#dc2626', abg:'#fef2f2', ab:'#f87171', ibg:'#fee2e2' },
          ].map(o => `
          <label class="fu-contact-mode-opt"
            data-col="${o.col}" data-abg="${o.abg}" data-ab="${o.ab}" data-ibg="${o.ibg}"
            style="display:flex;align-items:center;gap:10px;padding:11px 14px;height:52px;border:1.5px solid #e5e7eb;border-radius:12px;cursor:pointer;background:#fafafa;transition:border-color .15s,background .15s,box-shadow .15s;box-shadow:0 1px 2px rgba(0,0,0,.04)">
            <input type="radio" name="Contact Mode" value="${o.val}" style="position:absolute;opacity:0;width:0;height:0;pointer-events:none">
            <span class="fcm-icon" style="flex-shrink:0;width:30px;height:30px;border-radius:8px;background:#f3f4f6;display:flex;align-items:center;justify-content:center;color:${o.col};transition:background .15s">${icon(o.ic, 16)}</span>
            <span style="font-size:12.5px;font-weight:500;color:#374151;white-space:nowrap;line-height:1">${o.val}</span>
          </label>`).join('')}
        </div>
        <span class="form-error-msg" id="fu-contact-mode-err" style="display:none">Please select a contact mode.</span>
      </div>
      <div class="form-group">
        <label>Done Remark *</label>
        <textarea class="form-control" name="Remark" rows="3" required placeholder="What happened in this follow-up?"></textarea>
      </div>
      ${issueFieldHTML}
      ${stageFieldHTML}
      <div class="modal-footer">
        <button type="button" class="btn btn-outlined" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
        <button type="submit" class="btn btn-primary">${icon('check-circle', 16)} Save Done</button>
      </div>
    </form>`);

  const form = overlay.querySelector('#fu-done-form');

  // Contact mode radio visual selection
  form.querySelectorAll('.fu-contact-mode-opt').forEach(lbl => {
    lbl.addEventListener('mouseenter', () => {
      if (lbl.querySelector('input[type="radio"]').checked) return;
      lbl.style.borderColor = '#d1d5db';
      lbl.style.background = '#f9fafb';
      lbl.style.boxShadow = '0 2px 6px rgba(0,0,0,.07)';
    });
    lbl.addEventListener('mouseleave', () => {
      if (lbl.querySelector('input[type="radio"]').checked) return;
      lbl.style.borderColor = '#e5e7eb';
      lbl.style.background = '#fafafa';
      lbl.style.boxShadow = '0 1px 2px rgba(0,0,0,.04)';
    });
    lbl.addEventListener('click', () => {
      form.querySelectorAll('.fu-contact-mode-opt').forEach(l => {
        l.style.borderColor = '#e5e7eb';
        l.style.background = '#fafafa';
        l.style.boxShadow = '0 1px 2px rgba(0,0,0,.04)';
        const ic = l.querySelector('.fcm-icon');
        if (ic) ic.style.background = '#f3f4f6';
      });
      const { ab, abg, ibg } = lbl.dataset;
      lbl.style.borderColor = ab;
      lbl.style.background = abg;
      lbl.style.boxShadow = `0 0 0 3px ${ab}33`;
      const ic = lbl.querySelector('.fcm-icon');
      if (ic) ic.style.background = ibg;
      const errEl = document.getElementById('fu-contact-mode-err');
      if (errEl) errEl.style.display = 'none';
    });
  });

  const validator = _makeValidator(form);
  validator.addField(form.querySelector('[name="Done Date"]'),          [{ rule: 'required', errorMessage: 'Done date is required.' }]);
  validator.addField(form.querySelector('[name="Remark"]'),             [{ rule: 'required', errorMessage: 'Done remark is required.' }]);
  validator.addField(form.querySelector('[name="Next Follow-up Date"]'),[
    { rule: 'function', validator: function(val) {
        const closesFollowup = _markDoneClosesFollowup(form);
        if (!val) return closesFollowup;
        const d = new Date(val); const t = new Date(); t.setHours(0,0,0,0);
        const mx = new Date(t); mx.setDate(mx.getDate() + 7);
        return d >= t && d <= mx;
      }, errorMessage: 'Next planned date is required unless the lead is on a final stage, and must be within the next 7 days.' }
  ]);
  _updateDoneNextDateRequirement(form);
  validator.onSuccess(async () => {
    if (form.dataset.submitting === '1') return;
    if (!form.querySelector('[name="Contact Mode"]:checked')) {
      const errEl = document.getElementById('fu-contact-mode-err');
      if (errEl) errEl.style.display = '';
      return;
    }
    if (!validateCfMultiselects(form)) return;
    const stageFieldsCont = document.getElementById('fu-done-stage-fields');
    if (stageFieldsCont) {
      const firstInvalid = stageFieldsCont.querySelector('[required]:invalid');
      if (firstInvalid) { firstInvalid.reportValidity(); return; }
    }
    form.dataset.submitting = '1';
    const btn = form.querySelector('[type=submit]');
    setButtonLoading(btn, 'Saving...');
    try {
      const payload = await collectLeadFormPayload(form);
      if (!payload['Updated Stage ID']) delete payload['Updated Stage ID'];
      if (!payload['Issues'])           delete payload['Issues'];
      const closesFollowup = _markDoneClosesFollowup(form);
      if (closesFollowup) delete payload['Next Follow-up Date'];
      await api.markFollowupDoneDirect(followupId, payload);
      overlay.remove();
      _fuPageSnapshot = null;
      if (App.currentPage.startsWith('followups')) await _renderFUTab(window.currentFollowupTab || 'all', true);
      if (App.currentPage === 'dashboard') loadDashboard();
      toast(closesFollowup ? 'Follow-up closed.' : 'Follow-up saved. Next follow-up planned.');
    } catch (err) {
      toast(err.message || String(err), 'error');
      resetButtonLoading(btn);
      form.dataset.submitting = '';
    }
  });
  renderIcons(overlay);
}

function _applyFollowupDoneResult(result) {
  if (!result) return;
  _fuPageSnapshot = null;
  if (App.currentPage.startsWith('followups')) _renderFUTab(window.currentFollowupTab || 'all', true);
  if (App.currentPage === 'dashboard') loadDashboard();
}

// Lead picker — shows a quick searchable list of open leads
async function _fuPickLead() {
  const formData = await _getFollowupFormData(true);
  const leads = formData.leads || [];
  _fuPageSnapshot = { ...(_fuPageSnapshot || {}), leads };
  const open  = leads.filter(l => l['Lead Status'] === 'Open');
  const overlay = showModal(`
    <div class="modal-header">
      <h2>Pick a Lead</h2>
      <button class="modal-close" onclick="this.closest('.modal-overlay').remove()">✕</button>
    </div>
    <input class="form-control" id="lead-picker-search" placeholder="Search lead or company..." style="margin-bottom:12px" oninput="_filterLeadPicker(this.value)">
    <div id="lead-picker-list" style="max-height:320px;overflow-y:auto">
      ${open.map(l => `
        <div class="fu-card lead-picker-item" style="cursor:pointer;border-left-color:#1565C0"
          data-lead-id="${escapeHtml(l['Lead ID']||'')}"
          data-lead-name="${escapeHtml(_fuLeadLabel(l))}">
          <div class="fu-card-title">${escapeHtml(l['Client Description']||'')}</div>
          <div class="fu-card-meta">
            ${l['Company Name'] ? `<span>${icon('building-2', 12)} ${escapeHtml(l['Company Name'])}</span>` : ''}
            <span>${escapeHtml(l['Source']||'')}</span>
            <span class="badge badge-${_badgeClass(l['Priority'])}">${escapeHtml(l['Priority']||'')}</span>
          </div>
        </div>`).join('')}
    </div>`);
  overlay.querySelectorAll('.lead-picker-item').forEach(item => {
    item.addEventListener('click', () => {
      _selectLead(item.dataset.leadId || '', item.dataset.leadName || '');
    });
  });
  overlay._leads = open;
}

function _filterLeadPicker(q) {
  const items = el('lead-picker-list').querySelectorAll('.fu-card');
  items.forEach(item => {
    item.style.display = item.textContent.toLowerCase().includes(q.toLowerCase()) ? '' : 'none';
  });
}

function _selectLead(leadId, leadName) {
  const leadInput   = el('fu-lead-id');
  const leadDisplay = el('fu-lead-display');
  const leadRows = (_fuPageSnapshot && _fuPageSnapshot.leads) || [];
  const lead = leadRows.find(l => l['Lead ID'] === leadId);
  const isNbdLocked = !!(lead && (lead['NBD Lead ID'] || lead['Pushed To NBD At']));
  if (leadInput)   leadInput.value   = leadId;
  if (leadDisplay) leadDisplay.value = leadName || '';
  const stageSelect = el('fu-stage-wrap')?.querySelector('[name="Updated Stage ID"]');
  if (stageSelect) stageSelect.innerHTML = isNbdLocked ? '<option value="">No Change</option>' : _fuNextStageOptionsHTML(leadId, leadRows);
  _toggleFUStageField(!!leadId && !isNbdLocked);
  document.querySelectorAll('.modal-overlay')[1]?.remove();
}

function _fuNextStageOptionsHTML(leadId, leads = []) {
  if (!leadId) return '<option value="">No Change</option>';
  const lead = leads.find(l => l['Lead ID'] === leadId);
  const activeStageIds = (App.config.stages || []).reduce((m, s) => { m[s['Stage ID']] = true; return m; }, {});
  const stages = [
    ...(App.config.stages || []),
    ...((App.config.allStages || []).filter(s => _fuIsFinalStage(s) && !activeStageIds[s['Stage ID']]))
  ];
  const idx = lead ? stages.findIndex(s => s['Stage ID'] === lead['Stage ID']) : -1;
  const next = idx >= 0 && idx < stages.length - 1 ? stages[idx + 1] : null;
  const currentLabel = idx >= 0 ? ` (currently: ${escapeHtml(stages[idx]['Stage Name'])})` : '';
  if (idx < 0) return '<option value="">No Change</option>';
  if (_fuIsFinalStage(stages[idx])) return `<option value="">No Change â€” already at final stage</option>`;
  const regularStages = stages.filter(s => !_fuIsFinalStage(s));
  const lastRegularId = regularStages[regularStages.length - 1]?.['Stage ID'];
  const candidates = [];
  if (next && !_fuIsFinalStage(next)) candidates.push(next);
  stages.filter(s => _fuIsFinalStage(s) && _fuIsLostOrDisqualifiedStage(s)).forEach(s => candidates.push(s));
  if (lead['Stage ID'] === lastRegularId) {
    stages.filter(s => _fuIsFinalStage(s) && !_fuIsLostOrDisqualifiedStage(s)).forEach(s => candidates.push(s));
  }
  const seen = {};
  const options = candidates.filter(s => {
    if (!s || seen[s['Stage ID']]) return false;
    seen[s['Stage ID']] = true;
    return true;
  });
  if (options.length) {
    return `<option value="">No Change${currentLabel}</option>` +
      options.map(s => `<option value="${escapeHtml(s['Stage ID'])}">${escapeHtml(s['Stage Name'])}</option>`).join('');
  }
  if (!next) return `<option value="">No Change — already at final stage</option>`;
  return `<option value="">No Change${currentLabel}</option><option value="${escapeHtml(next['Stage ID'])}">${escapeHtml(next['Stage Name'])}</option>`;
}

function _fuIsLostOrDisqualifiedStage(stage) {
  const outcome = String(stage?.['Stage Outcome'] || '').trim().toLowerCase();
  const name = String(stage?.['Stage Name'] || '').trim().toLowerCase();
  return outcome === 'lost' || outcome.includes('disqualif') || /lost|disqualif/.test(name);
}

function _clearSelectedLead() {
  const leadInput = el('fu-lead-id');
  const leadDisplay = el('fu-lead-display');
  if (leadInput) leadInput.value = '';
  if (leadDisplay) leadDisplay.value = '';
  _toggleFUStageField(false);
}

function _badgeClass(value) {
  return String(value || '').toLowerCase().replace(/[^a-z0-9_-]/g, '');
}

function _toggleFUStageField(enabled) {
  const wrap = el('fu-stage-wrap');
  const select = wrap?.querySelector('[name="Updated Stage ID"]');
  if (!wrap || !select) return;
  wrap.style.display = enabled ? '' : 'none';
  // Fix #23: explicitly clear value before disabling so FormData never submits a stale stage
  select.value = enabled ? select.value : '';
  select.disabled = !enabled;
}

function _initFollowupValidator(form) {
  const v = _makeValidator(form);
  const f = name => form.querySelector(`[name="${name}"]`);
  v.addField(f('Planned Date'), [{ rule: 'required', errorMessage: 'Planned date is required.' }]);
  v.addField(f('Follow-up Type'), [{ rule: 'required', errorMessage: 'Please select a follow-up type.' }]);
  v.addField(f('Discussion'),     [{ rule: 'required', errorMessage: 'Discussion / remarks are required.' }]);
  return v;
}

function buildFollowupCustomFieldsHTML(d = {}, fields = [], configOptions = {}) {
  const visible = (fields || []).filter(f => f['Is Visible'] !== false && f['Is Visible'] !== 'FALSE');
  if (!visible.length) return '';
  return `<div class="custom-field-section">
    <h3 style="font-size:14px;font-weight:600;margin:8px 0 12px;color:var(--md-primary)">Follow-up Fields</h3>
    ${visible.map(f => _customFieldControlHTML(f, d, configOptions)).join('')}
  </div>`;
}

function initFollowupCustomFields(root) {
  root.querySelectorAll('.lead-custom-field').forEach(row => {
    row.style.display = '';
    row.querySelectorAll('input,select,textarea').forEach(input => {
      input.disabled = false;
      if (!(input.type === 'hidden' && input.hasAttribute('data-cf-ms-value'))) {
        input.required = input.dataset.required === 'true';
      }
    });
  });
  _initCfMultiselects(root);
}

function _fuClientLabel(c) {
  return [c['Company Name'], c['Contact Person'], c['City']]
    .filter(Boolean)
    .join(' - ');
}

function _selectedMarkDoneStageIsFinal(form) {
  const stageId = form?.querySelector('[name="Updated Stage ID"]')?.value || '';
  if (!stageId) return false;
  const stages = App.config.allStages || App.config.stages || [];
  return _fuIsFinalStage(stages.find(s => s['Stage ID'] === stageId));
}

function _markDoneClosesFollowup(form) {
  return form?.dataset?.currentFinalStage === 'true' || _selectedMarkDoneStageIsFinal(form);
}

function _updateDoneNextDateRequirement(form) {
  if (!form) return;
  const finalStageCloses = form?.dataset?.currentFinalStage === 'true' || _selectedMarkDoneStageIsFinal(form);
  const input = form.querySelector('[name="Next Follow-up Date"]');
  const marker = form.querySelector('#fu-next-date-required');
  const help = form.querySelector('#fu-next-date-help');
  if (input) {
    input.required = !finalStageCloses;
    if (finalStageCloses) input.value = '';
  }
  if (marker) {
    marker.textContent = finalStageCloses ? '(will close)' : '*';
    marker.style.color = finalStageCloses ? '#9ca3af' : '#ef4444';
    marker.style.fontWeight = finalStageCloses ? '400' : '700';
  }
  if (help) help.textContent = finalStageCloses
    ? 'This follow-up will close because the lead is on a final stage.'
    : 'Next planned date is required until the lead reaches a final stage. Choose a date within 7 days.';
}

function _onMarkDoneStageChange(select) {
  const stageId   = select.value;
  const container = document.getElementById('fu-done-stage-fields');
  if (!container) return;
  container.innerHTML = '';
  delete container._cfRefresh;
  if (!stageId) return;

  const configOptions = _configOptionsMap(App.config._allConfigs || []);
  const stages  = App.config.allStages || App.config.stages || [];
  const stage   = stages.find(s => s['Stage ID'] === stageId);
  const fields  = (App.config.leadFields || []).filter(f =>
    (!f['Stage ID'] || f['Stage ID'] === stageId) &&
    f['Is Visible'] !== false && f['Is Visible'] !== 'FALSE' &&
    f['Field Type'] !== 'Formula'
  );
  if (!fields.length) return;

  const hasSkipOnlyFields = fields.some(f => (f['Skip Visibility'] || 'normal') === 'skip_only');
  const isSkippable = !!(stage && (stage['Is Skippable'] === true || stage['Is Skippable'] === 'TRUE')) && hasSkipOnlyFields;
  const skipToggle = isSkippable ? `
    <div class="cf-skip-row">
      <label class="cf-skip-label">
        <input type="checkbox" class="cf-skip-checkbox" onchange="_toggleSkipFields(this)">
        <span>Skip custom fields for this stage</span>
      </label>
      <input type="hidden" name="__stage_skipped" value="">
    </div>` : '';

  container.innerHTML = `<div class="custom-field-section" data-skippable="${isSkippable ? 'true' : 'false'}">
    <h3 style="font-size:14px;font-weight:600;margin:8px 0 12px;color:var(--md-primary)">Stage Fields</h3>
    ${skipToggle}
    ${fields.map(f => _customFieldControlHTML(f, { 'Stage ID': stageId }, configOptions)).join('')}
  </div>`;
  _initCfMultiselects(container);
  renderIcons(container);

  if (isSkippable) {
    container._cfRefresh = function() {
      const skipCb = container.querySelector('.cf-skip-checkbox');
      const skipped = !!(skipCb && skipCb.checked);
      container.querySelectorAll('.lead-custom-field').forEach(row => {
        const skipVis = row.dataset.skipVis || 'normal';
        const active  = skipped ? skipVis === 'skip_only' : skipVis === 'normal';
        row.style.display = active ? 'block' : 'none';
        row.querySelectorAll('input,select,textarea').forEach(inp => {
          inp.disabled = !active;
          if (!(inp.type === 'hidden' && inp.hasAttribute('data-cf-ms-value'))) {
            inp.required = active && inp.dataset.required === 'true';
          }
        });
        const trigger = row.querySelector('.cf-ms-trigger');
        if (trigger) { trigger.style.opacity = active ? '' : '.45'; trigger.style.pointerEvents = active ? '' : 'none'; }
      });
    };
    container._cfRefresh();
  }
}
</script>

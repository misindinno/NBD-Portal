<style>
  /* ── Login overlay (Vela) ───────────────────────────────────────────────── */
  #nbd-login-overlay {
    --lo-acc:    #6C5CE7;
    --lo-acc-h:  #5546d6;
    --lo-ink:    #161427;
    --lo-ink2:   #3a3850;
    --lo-muted:  #6b6880;
    --lo-muted2: #a3a1b5;
    --lo-line:   #e7e6ef;
    --lo-field:  #e4e3ee;
    --lo-bg:     #FBFBFD;
    --lo-err:    #EF4444;
    --lo-ok:     #34E5C4;

    position: fixed; inset: 0; z-index: 99999;
    background: var(--lo-bg);
    font-family: 'Manrope', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow-y: auto;
  }
  #nbd-login-overlay *, #nbd-login-overlay *::before, #nbd-login-overlay *::after { box-sizing: border-box; }
  #nbd-login-overlay ::selection { background: #6C5CE7; color: #fff; }
  #nbd-login-overlay input:-webkit-autofill { -webkit-box-shadow: 0 0 0 1000px #fff inset; }

  .lo-stage { display: flex; width: 100%; min-height: 100vh; }

  /* ── Left hero panel ─────────────────────────────────────────────────────── */
  .lo-side {
    position: relative; flex: 1.08; overflow: hidden;
    background: linear-gradient(158deg, #1a1640 0%, #241c5e 46%, #3a1c64 100%);
  }
  @media (max-width: 880px) { .lo-side { display: none; } }

  /* ── Right form panel ────────────────────────────────────────────────────── */
  .lo-pane {
    flex: 1; display: flex; align-items: center; justify-content: center;
    padding: 40px; overflow-y: auto; background: var(--lo-bg);
  }
  @media (max-width: 600px) { .lo-pane { padding: 28px 20px; } }
  .lo-form-card { width: 100%; max-width: 392px; }

  .lo-title {
    font-family: 'Space Grotesk', sans-serif; font-size: 28px; font-weight: 700;
    color: var(--lo-ink); margin: 0; letter-spacing: -.6px;
  }
  .lo-subtitle { font-size: 14.5px; color: var(--lo-muted); margin: 8px 0 0; line-height: 1.5; }

  /* Google SSO area */
  .lo-sso { margin-top: 28px; }
  #lo-google-container { display: flex; justify-content: center; align-items: center; min-height: 46px; }

  /* Divider */
  .lo-divider { display: flex; align-items: center; gap: 14px; margin: 22px 0; }
  .lo-divider .lo-line { flex: 1; height: 1px; background: #ececf3; }
  .lo-divider .lo-dtxt { font-size: 12px; font-weight: 600; color: #9a98ab; letter-spacing: .3px; white-space: nowrap; }

  /* Fields */
  #lo-form { display: flex; flex-direction: column; gap: 16px; }
  .lo-field { display: block; }
  .lo-label { display: block; font-size: 13px; font-weight: 600; color: var(--lo-ink2); margin-bottom: 7px; }
  .lo-input-wrap { position: relative; display: flex; align-items: center; }
  .lo-input-icon { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); display: flex; color: var(--lo-muted2); pointer-events: none; }
  .lo-input-icon svg { width: 18px; height: 18px; }
  .lo-input {
    appearance: none; width: 100%; height: 48px; padding: 0 14px 0 42px;
    border-radius: 12px; border: 1px solid var(--lo-field); background: #fff;
    font-family: inherit; font-size: 14.5px; color: var(--lo-ink); outline: none;
    transition: border-color .18s ease, box-shadow .18s ease;
  }
  .lo-input.pad-r { padding-right: 44px; }
  .lo-input::placeholder { color: var(--lo-muted2); }
  .lo-input:focus { border-color: var(--lo-acc); box-shadow: 0 0 0 4px rgba(108,92,231,.13); }
  .lo-input.err { border-color: var(--lo-err); box-shadow: 0 0 0 4px rgba(239,68,68,.12); }
  .lo-field-err { font-size: 12px; color: var(--lo-err); margin-top: 6px; }

  .lo-pw-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 7px; }
  .lo-pw-toggle {
    position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
    width: 32px; height: 32px; display: flex; align-items: center; justify-content: center;
    border: none; background: transparent; cursor: pointer; color: var(--lo-muted2);
    border-radius: 8px; transition: color .15s ease;
  }
  .lo-pw-toggle:hover { color: var(--lo-acc); }
  .lo-pw-toggle svg { width: 18px; height: 18px; }

  .lo-link { font-size: 12.5px; font-weight: 600; color: var(--lo-acc); text-decoration: none; }
  .lo-link:hover { color: var(--lo-acc-h); }

  /* Remember me (CSS-driven checkbox) */
  .lo-remember { display: flex; align-items: center; gap: 9px; cursor: pointer; user-select: none; margin-top: 2px; }
  .lo-remember > input { position: absolute; opacity: 0; width: 0; height: 0; }
  .lo-check {
    width: 19px; height: 19px; border-radius: 6px; border: 1.8px solid #cfcddd;
    background: #fff; display: flex; align-items: center; justify-content: center;
    transition: all .15s ease; flex-shrink: 0;
  }
  .lo-check svg { opacity: 0; transition: opacity .12s ease; }
  .lo-remember > input:checked + .lo-check { background: var(--lo-acc); border-color: var(--lo-acc); }
  .lo-remember > input:checked + .lo-check svg { opacity: 1; }
  .lo-remember > input:focus-visible + .lo-check { box-shadow: 0 0 0 4px rgba(108,92,231,.18); }
  .lo-remember-txt { font-size: 13.5px; color: #4a4860; font-weight: 500; }

  /* Submit */
  .lo-btn {
    position: relative; overflow: hidden; width: 100%; height: 50px; margin-top: 8px;
    border: none; border-radius: 12px; cursor: pointer; font-family: inherit;
    font-size: 15px; font-weight: 700; color: #fff;
    background: linear-gradient(120deg, #6C5CE7, #5B7CFA 48%, #22C7E6);
    box-shadow: 0 10px 26px -8px rgba(108,92,231,.6);
    display: flex; align-items: center; justify-content: center; gap: 9px;
    transition: transform .16s ease, box-shadow .16s ease, opacity .16s ease;
  }
  .lo-btn:hover { transform: translateY(-2px); box-shadow: 0 16px 34px -8px rgba(108,92,231,.72); }
  .lo-btn:active { transform: translateY(0) scale(.97); }
  .lo-btn:disabled { opacity: .72; cursor: default; transform: none; box-shadow: 0 8px 20px -8px rgba(108,92,231,.5); }
  .lo-btn-content { display: inline-flex; align-items: center; gap: 9px; animation: btnContentIn .3s ease both; }

  /* Footer note */
  .lo-foot { text-align: center; font-size: 14px; color: var(--lo-muted); margin: 26px 0 0; }

  /* Error / info alerts (ids/classes referenced by AppAuth.html) */
  .lo-err-msg, .lo-info-msg {
    display: flex; align-items: flex-start; gap: 9px; font-size: 13px;
    padding: 11px 14px; border-radius: 10px; margin-bottom: 16px; line-height: 1.45;
    animation: lo-in .2s ease;
  }
  .lo-err-msg { background: rgba(239,68,68,.07); border: 1px solid rgba(239,68,68,.2); color: #B91C1C; }
  .lo-info-msg { background: rgba(108,92,231,.07); border: 1px solid rgba(108,92,231,.2); color: #4338CA; }
  .lo-err-msg svg, .lo-info-msg svg { flex-shrink: 0; margin-top: 1px; }

  .lo-spinner {
    width: 18px; height: 18px; border: 2.4px solid rgba(255,255,255,.35);
    border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite; flex-shrink: 0;
  }

  /* ── Keyframes ───────────────────────────────────────────────────────────── */
  @keyframes blob1 { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(50px,-36px) scale(1.18); } }
  @keyframes blob2 { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(-44px,30px) scale(1.12); } }
  @keyframes blob3 { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(36px,40px) scale(1.22); } }
  @keyframes blob4 { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(-38px,-28px) scale(1.1); } }
  @keyframes floatUp { 0% { transform: translateY(0); opacity: 0; } 12% { opacity: .55; } 88% { opacity: .55; } 100% { transform: translateY(-160px); opacity: 0; } }
  @keyframes barLive { 0%,100% { transform: scaleY(.74); } 50% { transform: scaleY(1); } }
  @keyframes drawLine { to { stroke-dashoffset: 0; } }
  @keyframes gridScroll { from { transform: translateY(0); } to { transform: translateY(44px); } }
  @keyframes floatCard { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
  @keyframes floatChipA { 0%,100% { transform: translateY(0) rotate(-1deg); } 50% { transform: translateY(-14px) rotate(-1deg); } }
  @keyframes floatChipB { 0%,100% { transform: translateY(0) rotate(1.5deg); } 50% { transform: translateY(10px) rotate(1.5deg); } }
  @keyframes revealUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes revealHero { from { opacity: 0; transform: translateY(30px) scale(.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
  @keyframes pulseDot { 0%,100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.7); opacity: .35; } }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes ripple { from { transform: translate(-50%,-50%) scale(0); opacity: .55; } to { transform: translate(-50%,-50%) scale(1); opacity: 0; } }
  @keyframes btnContentIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes lo-in { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
</style>

<script>
// ─── Growth Engine Dashboard (Supervisor / OTP / CS Scorecards) ──────────────
// Reframes raw leads/followups around the only arithmetic that grows sales:
//   Closing pairs = Opening pairs + Additions − Drops
// Using existing data as proxies for product-thread metrics until a real
// sales-data ingest is wired up (per the planning doc).

// ── Default plans (editable via UI; later read from Config sheet) ─────────────
const _dbDefaultPlan = {
  monthlyAdds: 25,         // Target pairs added per month
  monthlyDrops: 10,        // Max pairs dropped per month
  ontimeReorder: 85,       // On-time reorder %
  avgSalePerPair: 18300,   // ₹ / month / pair
  winRate: 18,             // Cross-sell pipeline win rate %
  penetrationTarget: 3.0   // Avg products per active client (of 6 verticals)
};

function _dbGetPlan() {
  try {
    const stored = localStorage.getItem('_dbPlan_v1');
    if (stored) return Object.assign({}, _dbDefaultPlan, JSON.parse(stored));
  } catch (e) {}
  return Object.assign({}, _dbDefaultPlan);
}

function _dbSavePlan(patch) {
  const plan = Object.assign({}, _dbGetPlan(), patch || {});
  try { localStorage.setItem('_dbPlan_v1', JSON.stringify(plan)); } catch (e) {}
  return plan;
}
window._dbSavePlan = _dbSavePlan;

// ── Tab state ────────────────────────────────────────────────────────────────
let _dbActiveTab = (typeof localStorage !== 'undefined' && localStorage.getItem('_dbActiveTab_v1')) || 'engine';

function _dbUpdatePageHeading() {
  const copy = {
    engine: {
      title: 'Growth Engine',
      sub: 'Plan vs Actual on the only lever that grows sales - additions, drops, and net.'
    },
    otp: {
      title: 'Retention Dashboard',
      sub: 'Track overdue recovery, on-time follow-ups, and retention risk.'
    },
    cs: {
      title: 'Growth Dashboard',
      sub: 'Track won movement, active opportunities, and closing focus.'
    },
    analytics: {
      title: 'Detailed Dashboard',
      sub: 'Detailed lead, follow-up, source, city, and activity analytics.'
    }
  };
  const meta = copy[_dbActiveTab] || copy.engine;
  if (el('db-page-title')) el('db-page-title').textContent = meta.title;
  if (el('db-page-sub')) el('db-page-sub').textContent = meta.sub;
}

function _dbSetTab(tab) {
  _dbActiveTab = ['engine','otp','cs','analytics'].includes(tab) ? tab : 'engine';
  try { localStorage.setItem('_dbActiveTab_v1', _dbActiveTab); } catch(e) {}
  _dbUpdatePageHeading();
  const tabsEl = el('db-tabs');
  if (tabsEl) tabsEl.querySelectorAll('.db-tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === _dbActiveTab));
  document.querySelectorAll('.db-tab-section').forEach(s => { s.style.display = s.dataset.tab === _dbActiveTab ? '' : 'none'; });
  if (typeof _dbRenderActiveTab === 'function') _dbRenderActiveTab();
}
window._dbSetTab = _dbSetTab;

function _dbTabsHTML(active) {
  const tabs = [
    ['engine',    'Growth Engine',  'gauge'],
    ['otp',       'Retention (OTP)','shield'],
    ['cs',        'Growth (CS)',    'trending-up'],
    ['analytics', 'Detailed',       'bar-chart-2']
  ];
  return `<div class="db-tab-bar" id="db-tabs">
    ${tabs.map(([id, label, ic]) => `
      <button class="db-tab-btn ${active === id ? 'active' : ''}" data-tab="${id}" onclick="_dbSetTab('${id}')">
        ${icon(ic, 14)} <span>${escapeHtml(label)}</span>
      </button>`).join('')}
  </div>`;
}

// ── Date helpers ─────────────────────────────────────────────────────────────
function _dbMonthStartISO(date) {
  const d = date ? new Date(date) : new Date();
  d.setDate(1); d.setHours(0,0,0,0);
  return _fmtDate(d.toISOString());
}

function _dbMonthLabel(date) {
  const d = date ? new Date(date) : new Date();
  return d.toLocaleString('en-IN', { month: 'short', year: '2-digit' });
}

function _dbStageMap() {
  return (App.config.allStages || App.config.stages || []).reduce((m, s) => { m[s['Stage ID']] = s; return m; }, {});
}

function _dbStageFinality(sid, stageMap) {
  const s = stageMap[sid]; if (!s) return { isFinal: false, isLost: false };
  const isFinal = s['Is Final Stage'] === true || s['Is Final Stage'] === 'TRUE';
  const out = String(s['Stage Outcome'] || '').trim().toLowerCase();
  const nm  = String(s['Stage Name']   || '').trim().toLowerCase();
  const isLost = out === 'lost' || /lost|disqualif/.test(nm);
  return { isFinal, isLost };
}

// ── Core lever metrics (Additions / Drops / Net for a given window) ──────────
function _dbLeverMetricsForWindow(leads, monthStart, monthEndExclusive) {
  const stageMap = _dbStageMap();
  let additions = 0, drops = 0, monthEndLeads = 0;
  leads.forEach(l => {
    const fin = _dbStageFinality(l['Stage ID'], stageMap);
    const movedAt = _fmtDate(l['Stage Updated At'] || l['Updated At'] || l['Created At']);
    const created = _fmtDate(l['Created At']);
    const isWonStatus = String(l['Lead Status'] || '') === 'Won';
    const isLostStatus = ['Lost','Disqualified'].includes(String(l['Lead Status'] || ''));
    const becameWon  = (isWonStatus && fin.isFinal && !fin.isLost) && movedAt >= monthStart && movedAt < monthEndExclusive;
    const becameLost = (isLostStatus || (fin.isFinal && fin.isLost)) && movedAt >= monthStart && movedAt < monthEndExclusive;
    if (becameWon)  additions++;
    if (becameLost) drops++;
    // Active at end of window (proxy for closing pairs)
    if (created < monthEndExclusive && (!fin.isFinal || (movedAt >= monthEndExclusive))) monthEndLeads++;
  });
  return { additions, drops, net: additions - drops, closing: monthEndLeads };
}

// ── On-time reorder % from followup history ──────────────────────────────────
function _dbOnTimeReorderPct(fuHistory, monthStart) {
  const rows = (fuHistory || []).filter(r => {
    const done = _fmtDate(r['Done Date'] || r['Created At']);
    return done && done >= monthStart;
  });
  if (!rows.length) return null;
  const ontime = rows.filter(r => {
    const done = _fmtDate(r['Done Date']);
    const planned = _fmtDate(r['Planned Date']);
    return done && planned && done <= planned;
  }).length;
  return Math.round(ontime / rows.length * 100);
}

// ── Pair value (placeholder until sales-data ingest) ─────────────────────────
function _dbAvgSalePerPair(leads) {
  // Try a few common money-ish fields; default to plan.
  const valueKeys = ['Order Value', 'Deal Value', 'Estimated Value', 'Value', 'Amount'];
  let sum = 0, count = 0;
  leads.forEach(l => {
    for (const k of valueKeys) {
      const v = Number(l[k]);
      if (!isNaN(v) && v > 0) { sum += v; count++; break; }
    }
  });
  return count ? Math.round(sum / count) : _dbGetPlan().avgSalePerPair;
}

// ── Active context ───────────────────────────────────────────────────────────
function _dbActiveContext(leads) {
  const stageMap = _dbStageMap();
  const active = leads.filter(l => {
    const fin = _dbStageFinality(l['Stage ID'], stageMap);
    return !fin.isFinal && String(l['Lead Status'] || 'Open').toLowerCase() === 'open';
  });
  return { active, stageMap };
}

// ── Variance → Action panel ──────────────────────────────────────────────────
function _dbBuildVarianceActions(metrics, plan) {
  const actions = [];
  const pctOff = (actual, target) => target ? Math.round((actual - target) / target * 100) : 0;

  const addsVar = pctOff(metrics.additions, plan.monthlyAdds);
  if (addsVar <= -15) actions.push({
    cls: 'danger',
    icon: 'trending-down',
    title: `Additions ${Math.abs(addsVar)}% below plan`,
    body: `${metrics.additions}/${plan.monthlyAdds} won so far. CS pipeline has <strong>${metrics.inPipeline || 0}</strong> warm leads stuck — push the late-stage ones to close this week.`
  });

  const dropsVar = pctOff(metrics.drops, plan.monthlyDrops);
  if (dropsVar >= 15) actions.push({
    cls: 'danger',
    icon: 'alert-triangle',
    title: `Drops ${dropsVar}% above plan`,
    body: `${metrics.drops}/${plan.monthlyDrops} lost so far. Run an OTP recovery blitz on the top at-risk pairs by value (Retention tab).`
  });

  if (metrics.onTimePct !== null && metrics.onTimePct < plan.ontimeReorder - 5) actions.push({
    cls: 'warning',
    icon: 'clock',
    title: `On-time reorder ${metrics.onTimePct}% vs plan ${plan.ontimeReorder}%`,
    body: `Call discipline slipping. Review overdue follow-ups in the OTP tab and reassign anything older than 7 days with no contact.`
  });

  if (metrics.net >= 0 && addsVar > -15 && dropsVar < 15) actions.push({
    cls: 'success',
    icon: 'check-circle-2',
    title: `Net +${metrics.net} pairs — on plan`,
    body: `Both levers on track. Keep feeding the revival queue and protect the top 5 by value.`
  });

  if (!actions.length) actions.push({
    cls: 'neutral',
    icon: 'info',
    title: 'Everything within plan tolerance',
    body: 'No variance over 15% on either lever. Review again at end of week.'
  });

  return actions;
}

// ── Plan editor (lightweight inline modal) ───────────────────────────────────
function _dbOpenPlanEditor() {
  const plan = _dbGetPlan();
  const row = (label, key, value, suffix = '') => `
    <div class="db-plan-row">
      <label>${escapeHtml(label)}</label>
      <input type="number" data-plan-key="${key}" value="${value}" step="any" />
      <span class="db-plan-suffix">${escapeHtml(suffix)}</span>
    </div>`;
  showModal(`
    <div class="modal-header">
      <h2>${icon('target', 18)} Edit Monthly Plan</h2>
      <button class="modal-close" onclick="this.closest('.modal-overlay').remove()">✕</button>
    </div>
    <div style="padding:4px 0 14px;color:#475569;font-size:12.5px">Targets the Growth Engine, OTP and CS scorecards compare against. Stored locally per browser.</div>
    <div class="db-plan-form">
      ${row('Additions per month',  'monthlyAdds',      plan.monthlyAdds,      'pairs')}
      ${row('Drops per month (cap)','monthlyDrops',     plan.monthlyDrops,     'pairs')}
      ${row('On-time reorder',      'ontimeReorder',    plan.ontimeReorder,    '%')}
      ${row('Avg sale / pair',      'avgSalePerPair',   plan.avgSalePerPair,   '₹ / month')}
      ${row('Cross-sell win rate',  'winRate',          plan.winRate,          '%')}
      ${row('Penetration target',   'penetrationTarget',plan.penetrationTarget,'of 6')}
    </div>
    <div class="modal-footer">
      <button class="btn btn-outlined" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
      <button class="btn btn-primary" onclick="(function(o){const p={};o.querySelectorAll('[data-plan-key]').forEach(i=>{p[i.dataset.planKey]=Number(i.value)||0;});_dbSavePlan(p);o.remove();_dbRenderActiveTab();})(this.closest('.modal-overlay'))">${icon('save', 14)} Save Plan</button>
    </div>`);
}
window._dbOpenPlanEditor = _dbOpenPlanEditor;

function _dbScorecardSections() {
  return `
    <div class="db-tab-section" data-tab="engine">
      <div id="db-engine-kpis" class="fu-kpis db-kpis"></div>
      <div class="db-chart-row">
        <div class="db-section">
          <div class="db-section-title">${icon('bar-chart-3', 14)} Plan vs Actual — the growth levers</div>
          <div class="db-canvas-wrap"><canvas id="db-eng-levers"></canvas></div>
        </div>
        <div class="db-section">
          <div class="db-section-title">${icon('line-chart', 14)} Active pairs trend</div>
          <div class="db-canvas-wrap"><canvas id="db-eng-trend"></canvas></div>
        </div>
      </div>
      <div class="db-chart-row">
        <div class="db-section">
          <div class="db-section-title">${icon('move-horizontal', 14)} This month's pair movement</div>
          <div id="db-eng-waterfall" class="db-waterfall"></div>
        </div>
        <div class="db-section">
          <div class="db-section-title">${icon('alert-circle', 14)} Variance → act swiftly</div>
          <div id="db-eng-variance" class="db-variance-list"></div>
        </div>
      </div>
    </div>

    <div class="db-tab-section" data-tab="otp" style="display:none">
      <div id="db-otp-kpis" class="fu-kpis db-kpis"></div>
      <div class="db-chart-row">
        <div class="db-section">
          <div class="db-section-title">${icon('bar-chart-3', 14)} Drops vs Recoveries (weekly)</div>

        </div>
        <div class="db-section">

      <div class="db-section">

    <div class="db-tab-section" data-tab="cs" style="display:none">

      </div>

    <div class="db-tab-section" data-tab="analytics" style="display:none" id="db-analytics-shell">

}

// ── Render the active tab ────────────────────────────────────────────────────
function _dbRenderActiveTab() {
  const data = _dbFilteredData();
  _dbUpdatePageHeading();
  if (_dbActiveTab === 'engine')         _dbRenderGrowthEngineTab(data);
  else if (_dbActiveTab === 'otp')       _dbRenderOTPTab(data);
  else if (_dbActiveTab === 'cs')        _dbRenderCSTab(data);
  else if (_dbActiveTab === 'analytics') _dbRenderAnalyticsTab(data.leads, data.fus);
}
window._dbRenderActiveTab = _dbRenderActiveTab;

// ── Growth Engine (Supervisor master) ────────────────────────────────────────
function _dbRenderGrowthEngineTab(data) {
  const leads = data.leads, fus = data.fus, history = data.history || [];
  const plan = _dbGetPlan();
  const { active } = _dbActiveContext(leads);
  const win = _dbActiveWindow(data.filters);
  const m = _dbLeverMetricsForWindow(leads, win.from, win.toExclusive);
  const onTimePct = _dbOnTimeReorderPct(history, win.from);
  const avgSale = _dbAvgSalePerPair(leads);
  const opening = active.length - m.net;
  const monthlySales = active.length * avgSale;
  const monthlySalesPlan = plan.monthlyAdds * avgSale + opening * avgSale;
  const _rates = computeCallRates(history);

  const kpis = [
    { label: 'Active Pairs',   value: active.length,                 sub: `opening ${opening}`,            icon: 'layers',         cls: 'blue' },
    { label: 'Net Change',     value: (m.net >= 0 ? '+' : '') + m.net,sub: `plan +${plan.monthlyAdds - plan.monthlyDrops} ${m.net >= plan.monthlyAdds - plan.monthlyDrops ? '▲' : '▼'}`, icon: 'arrow-up-down',   cls: m.net >= 0 ? 'success' : 'danger' },
    { label: 'Avg Sale / Pair',value: `₹${_dbFmtMoney(avgSale)}`,    sub: '/month',                         icon: 'tag',            cls: 'neutral' },
    { label: 'Monthly Sales',  value: `₹${_dbFmtMoney(monthlySales)}`, sub: `plan ₹${_dbFmtMoney(monthlySalesPlan)}`, icon: 'wallet', cls: 'purple' },
    { label: 'Additions',      value: `${m.additions} / ${plan.monthlyAdds}`,  sub: m.additions >= plan.monthlyAdds ? 'on plan' : 'behind ▼', icon: 'plus-circle',  cls: 'success' },
    { label: 'Drops',          value: `${m.drops} / ${plan.monthlyDrops}`,     sub: m.drops <= plan.monthlyDrops ? 'on plan' : 'over ▲',     icon: 'minus-circle', cls: 'danger' },
    { label: 'Connection Call Rate', value: `${_rates.connectionRate}%`, sub: `${_rates.connects} connects / ${_rates.attempts} attempts`, icon: 'activity',     cls: 'blue' },
    { label: 'Conversion Rate',      value: `${_rates.conversionRate}%`, sub: `${_rates.conversions} stage-moves`,                          icon: 'trending-up', cls: 'success' }
  ];
  _dbRenderKpiGrid('db-engine-kpis', kpis);

  // Lever bars: Adds | Drops | Net (plan vs actual)
  _dbDestroyChart('engLevers');
  const lvrCtx = el('db-eng-levers');
  if (lvrCtx) {
    _dbCharts.engLevers = new Chart(lvrCtx, {
      type: 'bar',
      data: {
        labels: ['Additions', 'Drops', 'Net add'],
        datasets: [
          { label: 'Plan',   data: [plan.monthlyAdds, plan.monthlyDrops, plan.monthlyAdds - plan.monthlyDrops], backgroundColor: '#CBD5E1', borderRadius: 4 },
          { label: 'Actual', data: [m.additions, m.drops, m.net], backgroundColor: ['#16A34A','#DC2626','#2563EB'], borderRadius: 4 }
        ]
      },
      options: _dbChartOpts()
    });
  }

  // Active pairs trend (last 6 months)
  _dbDestroyChart('engTrend');
  const trendCtx = el('db-eng-trend');
  if (trendCtx) {
    const months = [];
    for (let i = 5; i >= 0; i--) {
      const d = new Date(); d.setDate(1); d.setMonth(d.getMonth() - i);
      months.push(d);
    }
    const actual = months.map(d => {
      const start = _dbMonthStartISO(d);
      const e = new Date(d); e.setMonth(e.getMonth() + 1);
      const end = _dbMonthStartISO(e);
      const lm = _dbLeverMetricsForWindow(leads, start, end);
      return lm.closing;
    });
    const planLine = months.map((_, i, arr) => actual[0] + (plan.monthlyAdds - plan.monthlyDrops) * i);
    _dbCharts.engTrend = new Chart(trendCtx, {
      type: 'line',
      data: {
        labels: months.map(d => _dbMonthLabel(d)),
        datasets: [
          { label: 'Actual', data: actual,   borderColor: '#16A34A', backgroundColor: 'rgba(22,163,74,.12)', tension: 0.35, fill: true, pointRadius: 4 },
          { label: 'Plan',   data: planLine, borderColor: '#94A3B8', borderDash: [5,4], pointRadius: 0, fill: false, tension: 0.2 }
        ]
      },
      options: _dbChartOpts()
    });
  }

  // Waterfall
  const wf = el('db-eng-waterfall');
  if (wf) {
    const peak = Math.max(opening, active.length, m.additions, m.drops, 1);
    const block = (label, value, color, fill = false) => `
      <div class="db-wf-col">
        <div class="db-wf-bar" style="height:${Math.max(20, value / peak * 160)}px;background:${color};${fill ? '' : 'opacity:.6'}"></div>
        <div class="db-wf-val">${escapeHtml(value)}</div>
        <div class="db-wf-lbl">${escapeHtml(label)}</div>
      </div>`;
    wf.innerHTML = `
      ${block('opening', opening, '#64748B', true)}
      <div class="db-wf-op">+</div>
      ${block('added',   m.additions, '#22C55E', true)}
      <div class="db-wf-op">−</div>
      ${block('dropped', m.drops, '#EF4444', true)}
      <div class="db-wf-op">=</div>
      ${block('closing', active.length, '#3B82F6', true)}`;
  }

  // Variance → Action
  const variance = el('db-eng-variance');
  if (variance) {
    const inPipeline = leads.filter(l => {
      const s = _dbStageMap()[l['Stage ID']];
      const nm = String(s && s['Stage Name'] || '').toLowerCase();
      return /sample|feedback|negotiation/.test(nm);
    }).length;
    const actions = _dbBuildVarianceActions({ additions: m.additions, drops: m.drops, net: m.net, onTimePct, inPipeline }, plan);
    variance.innerHTML = actions.map(a => `
      <div class="db-action db-action-${a.cls}">
        <div class="db-action-icon">${icon(a.icon, 16)}</div>
        <div class="db-action-body">
          <div class="db-action-title">${a.title}</div>
          <div class="db-action-text">${a.body}</div>
        </div>
      </div>`).join('');
    renderIcons(variance);
  }
}

// ── OTP Retention Scorecard ──────────────────────────────────────────────────
function _dbRenderOTPTab(data) {
  const leads = data.leads, fus = data.fus, history = data.history || [];
  const plan = _dbGetPlan();
  const stageMap = _dbStageMap();
  const win = _dbActiveWindow(data.filters);
  const m = _dbLeverMetricsForWindow(leads, win.from, win.toExclusive);
  const onTimePct = _dbOnTimeReorderPct(history, win.from) || 0;
  const avgSale = _dbAvgSalePerPair(leads);

  const { active } = _dbActiveContext(leads);
  const todayStr = localDateInputValue();
  const openFus = fus.filter(f => _isOpenFollowupRow(f));
  const overdueFus = openFus.filter(f => { const d = _fmtDate(_fuPlannedDate(f)); return d && d < todayStr; });

  const _rates = computeCallRates(history);

  const kpis = [
    { label: 'Active Pairs Defended', value: active.length,           sub: 'on cycle + amber',           icon: 'shield',         cls: 'blue' },
    { label: 'Drops This Month',      value: m.drops,                 sub: `plan ≤${plan.monthlyDrops}`, icon: 'trending-down',  cls: m.drops > plan.monthlyDrops ? 'danger' : 'neutral' },
    { label: 'Recoveries',            value: m.additions,             sub: 'wins this month',            icon: 'rotate-cw',      cls: 'success' },
    { label: 'On-Time Reorder',       value: `${onTimePct}%`,         sub: `plan ${plan.ontimeReorder}%`,icon: 'clock',          cls: onTimePct >= plan.ontimeReorder ? 'success' : 'warning' },
    { label: 'Avg Sale / Pair',       value: `₹${_dbFmtMoney(avgSale)}`, sub: '/month',                  icon: 'tag',            cls: 'neutral' },
    { label: 'Net Base Change',       value: (m.net >= 0 ? '+' : '') + m.net, sub: `${m.additions} won − ${m.drops} lost`, icon: 'arrow-up-down', cls: m.net >= 0 ? 'success' : 'danger' },
    { label: 'Connection Call Rate',  value: `${_rates.connectionRate}%`, sub: `${_rates.connects} / ${_rates.attempts}`, icon: 'activity',     cls: 'blue' },
    { label: 'Conversion Rate',       value: `${_rates.conversionRate}%`, sub: `${_rates.conversions} converted`,         icon: 'trending-up',  cls: 'success' }
  ];
  _dbRenderKpiGrid('db-otp-kpis', kpis);

  // Drops vs recoveries (last 4 weeks)
  _dbDestroyChart('otpWeekly');
  const wkCtx = el('db-otp-weekly');
  if (wkCtx) {
    const weeks = [];
    for (let i = 3; i >= 0; i--) {
      const start = new Date(); start.setDate(start.getDate() - (start.getDay() + 7 * i));
      start.setHours(0,0,0,0);
      const end = new Date(start); end.setDate(end.getDate() + 7);
      weeks.push({ start: _fmtDate(start.toISOString()), end: _fmtDate(end.toISOString()), label: `W${4-i}` });
    }
    const wkDrops = weeks.map(w => _dbLeverMetricsForWindow(leads, w.start, w.end).drops);
    const wkRecov = weeks.map(w => _dbLeverMetricsForWindow(leads, w.start, w.end).additions);
    _dbCharts.otpWeekly = new Chart(wkCtx, {
      type: 'bar',
      data: {
        labels: weeks.map(w => w.label),
        datasets: [
          { label: 'Drops',      data: wkDrops, backgroundColor: '#FCA5A5', borderRadius: 4 },
          { label: 'Recoveries', data: wkRecov, backgroundColor: '#86EFAC', borderRadius: 4 }
        ]
      },
      options: _dbChartOpts()
    });
  }

  // On-time % trend (last 6 months)
  _dbDestroyChart('otpOntime');
  const otCtx = el('db-otp-ontime');
  if (otCtx) {
    const months = [];
    for (let i = 5; i >= 0; i--) { const d = new Date(); d.setDate(1); d.setMonth(d.getMonth() - i); months.push(d); }
    const data = months.map(d => {
      const start = _dbMonthStartISO(d);
      return _dbOnTimeReorderPct(AppCache.getRows('followupHistory'), start) || 0;
    });
    _dbCharts.otpOntime = new Chart(otCtx, {
      type: 'line',
      data: {
        labels: months.map(d => _dbMonthLabel(d)),
        datasets: [
          { label: 'Actual', data, borderColor: '#DC2626', backgroundColor: 'rgba(220,38,38,.10)', tension: 0.35, fill: true, pointRadius: 4 },
          { label: `Plan ${plan.ontimeReorder}%`, data: months.map(() => plan.ontimeReorder), borderColor: '#94A3B8', borderDash: [5,4], pointRadius: 0, fill: false }
        ]
      },
      options: _dbChartOpts({ y: { min: 0, max: 100 } })
    });
  }

  // Top at-risk pairs table
  const atRisk = el('db-otp-atrisk');
  if (atRisk) {
    const userMap = App.config.userNameMap || {};
    const ranked = overdueFus
      .map(f => {
        const lead = leads.find(l => l['Lead ID'] === f['Lead ID']);
        const planned = _fmtDate(_fuPlannedDate(f));
        const daysOver = planned ? Math.floor((new Date(todayStr) - new Date(planned)) / 86400000) : 0;
        return {
          client: lead ? (lead['Company Name'] || lead['Contact Person'] || '—') : (f['Lead ID'] || '—'),
          product: lead ? (lead['Source'] || lead['Category'] || '—') : '—',
          value: lead ? Number(lead['Order Value'] || lead['Deal Value'] || lead['Value'] || avgSale) : avgSale,
          daysOver,
          owner: lead && userMap[lead['Assigned To']] || (lead && lead['Assigned To']) || '—',
          state: daysOver >= 14 ? 'escalated' : 'working'
        };
      })
      .sort((a, b) => (b.value * b.daysOver) - (a.value * a.daysOver))
      .slice(0, 10);
    atRisk.innerHTML = ranked.length ? `
      <table class="db-table">
        <thead><tr><th>Client</th><th>Product / Source</th><th>Value /mo</th><th>Days red</th><th>Owner</th><th>State</th></tr></thead>
        <tbody>${ranked.map(r => `
          <tr>
            <td><strong>${escapeHtml(r.client)}</strong></td>
            <td>${escapeHtml(r.product)}</td>
            <td>₹${_dbFmtMoney(r.value)}</td>
            <td><span class="db-pill ${r.daysOver >= 14 ? 'danger' : 'warning'}">${r.daysOver}d</span></td>
            <td>${escapeHtml(r.owner)}</td>
            <td><span class="db-state-${r.state}">${r.state}</span></td>
          </tr>`).join('')}</tbody>
      </table>` : '<div class="db-empty">No overdue follow-ups — the base is defended.</div>';
  }
}

// ── CS Growth Scorecard ──────────────────────────────────────────────────────
function _dbRenderCSTab(data) {
  const leads = data.leads, fus = data.fus, history = data.history || [];
  const plan = _dbGetPlan();
  const stageMap = _dbStageMap();
  const win = _dbActiveWindow(data.filters);
  const m = _dbLeverMetricsForWindow(leads, win.from, win.toExclusive);
  const avgSale = _dbAvgSalePerPair(leads);

  const inPipeline = leads.filter(l => {
    const s = stageMap[l['Stage ID']];
    const nm = String(s && s['Stage Name'] || '').toLowerCase();
    return /sample|feedback|negotiation/.test(nm);
  });
  const completedThisMonth = leads.filter(l => {
    const fin = _dbStageFinality(l['Stage ID'], stageMap);
    const movedAt = _fmtDate(l['Stage Updated At'] || l['Updated At']);
    return fin.isFinal && movedAt >= win.from && movedAt < win.toExclusive;
  });
  const wonThisMonth = completedThisMonth.filter(l => String(l['Lead Status'] || '') === 'Won');
  const winRate = completedThisMonth.length ? Math.round(wonThisMonth.length / completedThisMonth.length * 100) : 0;

  // Penetration (proxy): distinct sources/categories per client → average
  const clientGroups = new Map();
  leads.forEach(l => {
    const key = (l['Company Name'] || l['Lead ID'] || '').toString().trim().toLowerCase();
    if (!key) return;
    if (!clientGroups.has(key)) clientGroups.set(key, new Set());
    const product = String(l['Source'] || l['Category'] || '').trim();
    if (product) clientGroups.get(key).add(product);
  });
  const penetration = clientGroups.size
    ? (Array.from(clientGroups.values()).reduce((s, set) => s + set.size, 0) / clientGroups.size).toFixed(1)
    : '0.0';

  const _ratesCS = computeCallRates(history);

  const kpis = [
    { label: 'New Pairs Added', value: `${m.additions} / ${plan.monthlyAdds}`, sub: m.additions < plan.monthlyAdds ? 'behind ▼' : 'on plan', icon: 'plus-circle', cls: m.additions >= plan.monthlyAdds ? 'success' : 'warning' },
    { label: 'In Pipeline',     value: inPipeline.length,             sub: 'sample / negotiation',   icon: 'list-checks',  cls: 'blue' },
    { label: 'Win Rate',        value: `${winRate}%`,                 sub: `plan ${plan.winRate}%`,  icon: 'target',       cls: winRate >= plan.winRate ? 'success' : 'warning' },
    { label: 'Revivals Won',    value: 0,                              sub: 'dormant → active',       icon: 'rotate-ccw',   cls: 'purple' },
    { label: 'Avg Sale / Pair', value: `₹${_dbFmtMoney(avgSale)}`,    sub: `plan ₹${_dbFmtMoney(plan.avgSalePerPair)}`, icon: 'tag', cls: 'neutral' },
    { label: 'Penetration',     value: `${penetration} → ${plan.penetrationTarget}`, sub: 'avg products / client', icon: 'pie-chart', cls: 'success' },
    { label: 'Connection Call Rate', value: `${_ratesCS.connectionRate}%`, sub: `${_ratesCS.connects} / ${_ratesCS.attempts}`, icon: 'activity',     cls: 'blue' },
    { label: 'Conversion Rate',      value: `${_ratesCS.conversionRate}%`, sub: `${_ratesCS.conversions} converted`,           icon: 'trending-up',  cls: 'success' }
  ];
  _dbRenderKpiGrid('db-cs-kpis', kpis);

  // Monthly added vs plan (last 6 months)
  _dbDestroyChart('csMonthly');
  const monCtx = el('db-cs-monthly');
  if (monCtx) {
    const months = [];
    for (let i = 5; i >= 0; i--) { const d = new Date(); d.setDate(1); d.setMonth(d.getMonth() - i); months.push(d); }
    const actuals = months.map(d => {
      const s = _dbMonthStartISO(d);
      const e = new Date(d); e.setMonth(e.getMonth() + 1);
      return _dbLeverMetricsForWindow(leads, s, _dbMonthStartISO(e)).additions;
    });
    _dbCharts.csMonthly = new Chart(monCtx, {
      type: 'bar',
      data: {
        labels: months.map(d => _dbMonthLabel(d)),
        datasets: [
          { label: 'Plan',   data: months.map(() => plan.monthlyAdds), backgroundColor: '#CBD5E1', borderRadius: 4 },
          { label: 'Actual', data: actuals,                            backgroundColor: '#6366F1', borderRadius: 4 }
        ]
      },
      options: _dbChartOpts()
    });
  }

  // Cumulative YTD
  _dbDestroyChart('csCumulative');
  const cumCtx = el('db-cs-cumulative');
  if (cumCtx) {
    const ytdMonths = [];
    const yearStart = new Date(); yearStart.setMonth(0); yearStart.setDate(1);
    const monthsSoFar = new Date().getMonth() + 1;
    for (let i = 0; i < monthsSoFar; i++) { const d = new Date(yearStart); d.setMonth(i); ytdMonths.push(d); }
    let running = 0;
    const actualCum = ytdMonths.map(d => {
      const s = _dbMonthStartISO(d);
      const e = new Date(d); e.setMonth(e.getMonth() + 1);
      running += _dbLeverMetricsForWindow(leads, s, _dbMonthStartISO(e)).additions;
      return running;
    });
    const planCum = ytdMonths.map((_, i) => plan.monthlyAdds * (i + 1));
    _dbCharts.csCumulative = new Chart(cumCtx, {
      type: 'line',
      data: {
        labels: ytdMonths.map(d => _dbMonthLabel(d)),
        datasets: [
          { label: `Actual ${actualCum[actualCum.length-1] || 0}`, data: actualCum, borderColor: '#6366F1', backgroundColor: 'rgba(99,102,241,.12)', tension: 0.35, fill: true, pointRadius: 4 },
          { label: `Plan ${planCum[planCum.length-1] || 0}`,       data: planCum,   borderColor: '#94A3B8', borderDash: [5,4], pointRadius: 0, fill: false }
        ]
      },
      options: _dbChartOpts()
    });
  }

  // Closest to closing table
  const closing = el('db-cs-closing');
  if (closing) {
    const ranked = inPipeline
      .map(l => {
        const s = stageMap[l['Stage ID']];
        const stageName = s ? s['Stage Name'] : '—';
        const upside = Number(l['Order Value'] || l['Deal Value'] || l['Value'] || avgSale);
        const affinity = /negotiat/i.test(stageName) ? 72 : /sample|feedback/i.test(stageName) ? 55 : 30;
        return { client: l['Company Name'] || l['Contact Person'] || l['Lead ID'], product: l['Source'] || l['Category'] || '—', stage: stageName, upside, affinity };
      })
      .sort((a, b) => (b.affinity * b.upside) - (a.affinity * a.upside))
      .slice(0, 10);
    closing.innerHTML = ranked.length ? `
      <table class="db-table">
        <thead><tr><th>Client</th><th>Product / Source</th><th>Stage</th><th>Upside /mo</th><th>Affinity</th></tr></thead>
        <tbody>${ranked.map(r => `
          <tr>
            <td><strong>${escapeHtml(r.client)}</strong></td>
            <td>${escapeHtml(r.product)}</td>
            <td><span class="db-pill blue">${escapeHtml(r.stage)}</span></td>
            <td>₹${_dbFmtMoney(r.upside)}</td>
            <td>${r.affinity}%</td>
          </tr>`).join('')}</tbody>
      </table>` : '<div class="db-empty">No late-stage leads to push. Feed the pipeline from the new-lead pool.</div>';
  }
}

  if (!shell.dataset.hydrated) {
    shell.innerHTML = `
      <div id="db-kpi1" class="fu-kpis db-kpis"></div>
      <div id="db-kpi2" class="fu-kpis db-kpis"></div>
      <div style="display:grid;grid-template-columns:minmax(0,3fr) minmax(0,2fr);gap:16px;margin-bottom:16px;min-width:0">
        <div class="db-section">
          <div class="db-section-title">${icon('git-branch-plus',14)} Lead Pipeline Funnel</div>
          <div id="db-funnel"></div>
        </div>
        <div class="db-section">
          <div class="db-section-title">${icon('phone-call',14)} Follow-up Status</div>
          <div style="position:relative;max-width:220px;margin:0 auto">
            <canvas id="db-fu-donut"></canvas>
            <div id="db-fu-center" style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none"></div>
          </div>
          <div id="db-fu-legend" style="margin-top:14px;display:grid;grid-template-columns:1fr 1fr;gap:6px"></div>
        </div>
      </div>
      <div class="db-section" style="margin-bottom:14px">
        <div class="db-section-title">${icon('map-pinned',14)} India State Lead Heat Map</div>
        <div id="db-india-map"></div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(min(100%,380px),1fr));gap:14px;margin-bottom:14px">
        <div class="db-section">
          <div class="db-section-title">${icon('users',14)} Team Leaderboard</div>
          <div id="db-leaderboard"></div>
        </div>
        <div class="db-section">
          <div class="db-section-title">${icon('activity',14)} Recent Activity</div>
          <div id="db-activity"></div>
        </div>
      </div>`;
    renderIcons(shell);
    shell.dataset.hydrated = '1';
  }
  const s = _dbStats(leads, fus);
  if (typeof _dbRenderKPIs        === 'function') _dbRenderKPIs(s);
  if (typeof _dbRenderFunnel      === 'function') _dbRenderFunnel(leads);
  if (typeof _dbRenderFollowupDonut === 'function') _dbRenderFollowupDonut(s);
  if (typeof _dbRenderGeoAnalytics === 'function') _dbRenderGeoAnalytics(leads, fus);
  if (typeof _dbRenderLeaderboard  === 'function') _dbRenderLeaderboard(leads, fus);
  if (typeof _dbRenderActivity     === 'function') _dbRenderActivity(leads);
}

// ── Small helpers ────────────────────────────────────────────────────────────
function _dbRenderKpiGrid(containerId, kpis) {
  const wrap = el(containerId); if (!wrap) return;
  wrap.innerHTML = kpis.map(k => `
    <div class="fu-kpi fu-kpi-${k.cls || 'neutral'}" style="cursor:default">
      <span class="fu-kpi-icon">${icon(k.icon || 'circle', 17)}</span>
      <span class="fu-kpi-value">${k.value}</span>
      <span class="fu-kpi-label">${escapeHtml(k.label)}</span>
      <span class="fu-kpi-sub">${k.sub || ''}</span>
    </div>`).join('');
  renderIcons(wrap);
}

function _dbFmtMoney(n) {
  n = Number(n) || 0;
  if (n >= 10000000) return (n / 10000000).toFixed(2) + 'Cr';
  if (n >= 100000)   return (n / 100000).toFixed(2) + 'L';
  if (n >= 1000)     return (n / 1000).toFixed(1) + 'k';
  return String(Math.round(n));
}

function _dbChartOpts(scaleOverride) {
  return {
    responsive: true, maintainAspectRatio: false,
    plugins: { legend: { position: 'top', labels: { font: { size: 11 }, boxWidth: 12 } } },
    scales: Object.assign({
      y: { beginAtZero: true, ticks: { precision: 0, font: { size: 11 } }, grid: { color: '#f1f5f9' } },
      x: { ticks: { font: { size: 11 } }, grid: { display: false } }
    }, scaleOverride || {})
  };
}

function _dbDestroyChart(key) {
  if (_dbCharts[key]) { try { _dbCharts[key].destroy(); } catch(e) {} delete _dbCharts[key]; }
}
</script>

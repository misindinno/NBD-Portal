<script>
// ─── Cache helpers ────────────────────────────────────────────────────────────
const _fetching = {};

function _ensureCached(col, fetchFn) {
  // Cache removed: always fetch fresh. The in-flight guard only prevents a double
  // fetch of the same collection within a single render, not across navigations.
  if (_fetching[col]) return _fetching[col];
  _fetching[col] = fetchFn()
    .then(rows => col === 'leads'
      ? _applyPendingLeadQueueOverlay(rows)
      : col === 'followups'
        ? _applyPendingFollowupQueueOverlay(rows)
        : rows)
    .then(rows => AppCache.setRows(col, rows))
    .finally(() => delete _fetching[col]);
  return _fetching[col];
}

// ─── Shared date/time helpers ─────────────────────────────────────────────────
function _fmtDate(d) {
  if (!d) return '';
  const s = String(d);
  if (/^\d{4}-\d{2}-\d{2}/.test(s)) return s.slice(0, 10);
  try { return localDateInputValue(new Date(s.replace(' ', 'T'))); } catch(e) { return ''; }
}

function _nowStr() {
  const d = new Date();
  d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
  return d.toISOString().slice(0, 19).replace('T', ' ');
}

// ─── Cache revalidation ───────────────────────────────────────────────────────
// Sequence number of the last change log entry we processed.
let _lastChangeSeq = 0;

// App version seen at startup — compared against server on every poll.
// null = not yet initialized (first poll sets it without triggering a reload).
let _knownAppVersion = null;

async function _checkCacheStamps() {
  try {
    // Stamp-based invalidation (server-side write detection)
    const stamps = await api.getDataStamps();

    // ── App version check (live reload) ──────────────────────────────────────
    if (stamps.appVersion && stamps.appVersion !== '0') {
      if (_knownAppVersion === null) {
        _knownAppVersion = stamps.appVersion; // first poll — store baseline
      } else if (stamps.appVersion !== _knownAppVersion) {
        _showUpdateBanner();
        return; // skip cache refresh — page is about to reload
      }
    }

    const _stamp = key => { const n = Number(stamps[key]); return n > 0 ? n : null; };
    const _stale = (key, col) => { const s = _stamp(key); return s !== null && s > AppCache.getServerSyncedAt(col); };
    if (_stale('leads',          'leads'))          await _refreshLeadsCache();
    if (_stale('followups',      'followups') && !String(App.currentPage || '').startsWith('followups')) {
      await _refreshFollowupsCache();
    }
    if (_stale('followupHistory','followupHistory') && !String(App.currentPage || '').startsWith('followups')) {
      await _refreshFollowupHistoryCache();
    }
    if (_stale('activityLogs',   'activityLogs'))   await _refreshActivityLogsCache();
    const configStamp = Math.max(_stamp('stages') || 0, _stamp('fields') || 0, _stamp('config') || 0);
    if (configStamp > 0 && configStamp > AppCache.getLoadedAt('config')) await _refreshAppConfig();

    // Change-log incremental sync (queue worker writes here after each job)
    const changes = await api.getChanges(_lastChangeSeq);
    if (changes && changes.length) {
      const seqs = changes.map(c => c.sequence).filter(s => s > 0);
      if (seqs.length) _lastChangeSeq = Math.max(...seqs);
      _applyChangeLog(changes);
    }
  } catch(e) {
    console.warn('[AppData] Cache revalidation failed', e);
  }
}

// ─── Update banner ────────────────────────────────────────────────────────────
let _updateCountdown = null;

function _showUpdateBanner() {
  if (document.getElementById('app-update-banner')) return; // already visible

  const banner = document.createElement('div');
  banner.id = 'app-update-banner';
  banner.innerHTML = `
    <div class="app-update-inner">
      <span class="app-update-icon">${icon('refresh-cw', 16)}</span>
      <span class="app-update-msg">A new version of the portal is available. Reloading in <b id="app-update-count">10</b>s…</span>
      <button class="app-update-btn" onclick="window.location.reload()">Reload Now</button>
      <button class="app-update-dismiss" onclick="_dismissUpdateBanner()" title="Dismiss">✕</button>
    </div>`;
  document.body.appendChild(banner);
  renderIcons(banner);

  let secs = 10;
  _updateCountdown = setInterval(() => {
    secs--;
    const el_ = document.getElementById('app-update-count');
    if (el_) el_.textContent = secs;
    if (secs <= 0) { clearInterval(_updateCountdown); window.location.reload(); }
  }, 1000);
}

function _dismissUpdateBanner() {
  const b = document.getElementById('app-update-banner');
  if (b) b.remove();
  if (_updateCountdown) { clearInterval(_updateCountdown); _updateCountdown = null; }
}

function _applyChangeLog(changes) {
  const modules = {};
  const collections = {};
  changes.forEach(c => {
    if (c.module) modules[c.module] = true;
    _collectionsForQueueAction(c.actionType, c.module).forEach(col => { collections[col] = true; });
  });

  if (modules['leads'] || collections.leads) {
    QueueManager.onServerChange('leads');
    if (['leads', 'pipeline', 'dashboard', 'today'].includes(App.currentPage)) _refreshLeadsCache().catch(e => console.warn('[AppData] Lead refresh failed', e));
  }
  if (modules['followups'] || collections.followups) {
    QueueManager.onServerChange('followups');
    if (App.currentPage?.startsWith('followups')) {
      if (typeof _fuMarkStateStale === 'function') _fuMarkStateStale();
    } else if (App.currentPage === 'dashboard') {
      _refreshFollowupsCache().catch(e => console.warn('[AppData] Follow-up refresh failed', e));
    }
  }
  if (collections.followupHistory && AppCache.isLoaded('followupHistory') && !App.currentPage?.startsWith('followups')) {
    _refreshFollowupHistoryCache().catch(e => console.warn('[AppData] Follow-up history refresh failed', e));
  }
  if (collections.activityLogs && AppCache.isLoaded('activityLogs')) {
    _refreshActivityLogsCache().catch(e => console.warn('[AppData] Activity log refresh failed', e));
  }
  if (collections.config) {
    _refreshAppConfig().catch(e => console.warn('[AppData] Config refresh failed', e));
  }
  // Refresh queue page if it's open and any module changed
  const anyModule = modules['leads'] || modules['followups'] || modules['config'] || modules['stages'] || modules['fields'];
  if (anyModule && App.currentPage === 'queue') {
    if (typeof _refreshQueuePage === 'function') _refreshQueuePage();
  }

  // Re-render config tabs that read from App.config when config data changes
  if ((modules['config'] || modules['stages'] || modules['fields']) && App.currentPage === 'config') {
    if (typeof loadStagesConfig === 'function') loadStagesConfig();
    if (typeof loadDropdownsConfig === 'function') loadDropdownsConfig();
  }
}

function _collectionsForQueueAction(actionType, moduleName) {
  const map = {
    saveLead:                ['leads', 'followups'],
    saveBulkRows:            ['leads', 'followups'],
    deleteLead:              ['leads', 'followups', 'followupHistory', 'activityLogs'],
    archiveLead:             ['leads', 'followups', 'activityLogs'],
    restoreArchivedLead:     ['leads', 'followups', 'activityLogs'],
    updateLeadStage:         ['leads', 'activityLogs'],
    moveLeadStageWithFields: ['leads', 'activityLogs'],
    saveFollowup:            ['followups', 'leads', 'activityLogs'],
    markFollowupDone:        ['followups', 'followupHistory', 'leads', 'activityLogs'],
    deleteFollowup:          ['followups'],
    addConfig:               ['config'],
    updateConfigStatus:      ['config'],
    saveStage:               ['config'],
    reorderStages:           ['config'],
    saveFieldConfig:         ['config'],
    savePortalSettings:      ['config', 'leads'],
    saveUser:                ['config']
  };
  if (map[actionType]) return map[actionType];
  return {
    leads: ['leads'],
    followups: ['followups'],
    config: ['config'],
    stages: ['config'],
    fields: ['config']
  }[moduleName] || [];
}

function _refreshAfterQueueJob(job) {
  const collections = _collectionsForQueueAction(job?.actionType, job?.module);
  if (collections.includes('leads')) _refreshLeadsCache().catch(e => console.warn('[AppData] Lead refresh failed after queue job', e));
  if (collections.includes('followups')) {
    if (App.currentPage?.startsWith('followups')) {
      if (typeof _fuMarkStateStale === 'function') _fuMarkStateStale();
    } else {
      _refreshFollowupsCache().catch(e => console.warn('[AppData] Follow-up refresh failed after queue job', e));
    }
  }
  if (collections.includes('followupHistory') && AppCache.isLoaded('followupHistory') && !App.currentPage?.startsWith('followups')) {
    _refreshFollowupHistoryCache().catch(e => console.warn('[AppData] Follow-up history refresh failed after queue job', e));
  }
  if (collections.includes('activityLogs') && AppCache.isLoaded('activityLogs')) _refreshActivityLogsCache().catch(e => console.warn('[AppData] Activity log refresh failed after queue job', e));
  if (collections.includes('config')) _refreshAppConfig().catch(e => console.warn('[AppData] Config refresh failed after queue job', e));
  if (App.currentPage === 'queue' && typeof _refreshQueuePage === 'function') _refreshQueuePage();
}

function _recoverFailedQueueJob(job) {
  toast('Queued save failed: ' + (job?.error || 'Unknown error'), 'error');
  _refreshAfterQueueJob(job);
}

// Today renders from cache and is otherwise never re-rendered on a background
// refresh, so it goes stale mid-view. Re-render it from the now-fresh cache
// (no skeleton, no refetch) when it is the active page, coalescing the several
// per-tick collection refreshes into one render and preserving worklist scroll.
let _todayRerenderQueued = false;
function _rerenderTodayIfActive() {
  if (App.currentPage !== 'today' || typeof _renderToday !== 'function') return;
  if (_todayRerenderQueued) return;
  _todayRerenderQueued = true;
  setTimeout(() => {
    _todayRerenderQueued = false;
    if (App.currentPage !== 'today') return;
    const sc = document.querySelector('#today-page .fu-table-scroll');
    const top = sc ? sc.scrollTop : 0;
    window._todayBgRender = true;
    try { _renderToday(); } catch (e) { window._todayBgRender = false; return; }
    window._todayBgRender = false;
    const sc2 = document.querySelector('#today-page .fu-table-scroll');
    if (sc2 && top) sc2.scrollTop = top;
  }, 0);
}

async function _refreshLeadsCache() {
  const rows = await api.getLeads().catch(() => api.getFollowupLeads());
  AppCache.setRows('leads', await _applyPendingLeadQueueOverlay(rows));
  try { renderSidebar(); } catch (e) {}
  const pg = App.currentPage;
  if (pg === 'leads') {
    if (window.leadTable) {
      window.leadTable.replaceData(AppCache.getRows('leads'));
      if (typeof window.applyLeadFilters === 'function') window.applyLeadFilters();
    } else { loadLeads(); }
  } else if (pg === 'pipeline') {
    loadPipeline();
  } else if (pg === 'dashboard') {
    loadDashboard();
  }
  _rerenderTodayIfActive();
}

async function _applyPendingLeadQueueOverlay(rows) {
  const list = (rows || []).map(r => ({ ...r }));
  const patches = {};
  const applyPatch = (leadId, patch) => {
    if (!leadId || !patch || !patch['Stage ID']) return;
    patches[leadId] = { ...(patches[leadId] || {}), ...patch };
  };

  if (typeof QueueManager !== 'undefined' && typeof QueueManager.getPendingLeadPatches === 'function') {
    Object.entries(QueueManager.getPendingLeadPatches()).forEach(([leadId, patch]) => applyPatch(leadId, patch));
  }

  try {
    const jobs = await api.getQueueHistory(100);
    (jobs || []).forEach(job => {
      const status = String(job.status || '');
      if (!['QUEUED', 'PROCESSING', 'FAILED'].includes(status)) return;
      if (!['updateLeadStage', 'moveLeadStageWithFields'].includes(job.actionType)) return;
      const payload = job.pendingPayload || {};
      const fields = payload.fields && typeof payload.fields === 'object' ? payload.fields : {};
      applyPatch(payload.leadId, {
        ...fields,
        'Stage ID': payload.stageId,
        'Stage Updated At': job.createdAt || _nowStr(),
        'Updated At': job.updatedAt || job.createdAt || _nowStr(),
        '_queuePendingStage': true
      });
    });
  } catch (e) {
    console.warn('[AppData] Pending queue overlay failed', e);
  }

  if (!Object.keys(patches).length) return list;
  return list.map(row => {
    const patch = patches[row['Lead ID']];
    return patch ? { ...row, ...patch } : row;
  });
}

async function _refreshFollowupsCache() {
  const rows = await api.getFollowups({});
  AppCache.setRows('followups', await _applyPendingFollowupQueueOverlay(rows));
  try { renderSidebar(); } catch (e) {}
  const pg = App.currentPage;
  if (pg && pg.startsWith('followups')) {
    _renderFUTab(window.currentFollowupTab || 'all', true);
  } else if (pg === 'dashboard') {
    loadDashboard();
  }
  _rerenderTodayIfActive();
}

async function _applyPendingFollowupQueueOverlay(rows) {
  let list = (rows || []).map(r => ({ ...r }));
  if (typeof QueueManager === 'undefined' || typeof QueueManager.getPendingFollowupOps !== 'function') return list;
  const ops = QueueManager.getPendingFollowupOps() || [];
  if (!ops.length) return list;

  const byId = list.reduce((m, row) => {
    const id = String(row['Follow-up ID'] || '');
    if (id) m[id] = row;
    return m;
  }, {});

  ops.forEach(op => {
    const followupId = String(op.followupId || '');
    if (!followupId) return;

    if (op.type === 'save') {
      const payload = { ...(op.payload || {}) };
      const row = {
        ...payload,
        'Follow-up ID': followupId,
        'Planned Date': payload['Planned Date'] || payload['Next Follow-up Date'] || payload['Follow-up Date'] || '',
        'Follow-up Date': payload['Follow-up Date'] || payload['Planned Date'] || payload['Next Follow-up Date'] || '',
        'Next Follow-up Date': payload['Next Follow-up Date'] || payload['Planned Date'] || '',
        'Status': payload['Status'] || 'Open',
        'Created By': payload['Created By'] || App?.user?.id || '',
        'Created At': payload['Created At'] || _queueIsoToLocal_(op.enqueuedAt),
        'Updated At': payload['Updated At'] || _queueIsoToLocal_(op.enqueuedAt),
        '_queueTemp': true,
        '_queuePending': true,
        '_queueRequestId': op.requestId || ''
      };
      byId[followupId] = { ...(byId[followupId] || {}), ...row };
      return;
    }

    if (op.type === 'delete') {
      delete byId[followupId];
      return;
    }

    if (op.type === 'done') {
      const row = byId[followupId];
      if (!row) return;
      const data = op.data || {};
      const nextDate = data['Next Follow-up Date'] || data['Next Planned Date'] || '';
      if (nextDate) {
        byId[followupId] = {
          ...row,
          'Status': 'Open',
          'Planned Date': nextDate,
          'Next Follow-up Date': nextDate,
          'Next Action': data['Next Action'] || row['Next Action'] || '',
          'Updated Stage ID': data['Updated Stage ID'] || row['Updated Stage ID'] || '',
          'Stage ID': data['Updated Stage ID'] || row['Stage ID'] || '',
          'Done Date': '',
          'Done By': '',
          'Updated At': _queueIsoToLocal_(op.enqueuedAt),
          '_queuePending': true,
          '_queueRequestId': op.requestId || ''
        };
      } else {
        delete byId[followupId];
      }
    }
  });

  return Object.values(byId).sort((a, b) => _queueTimeValue_(b['Created At'] || b['Updated At']) - _queueTimeValue_(a['Created At'] || a['Updated At']));
}

function _queueIsoToLocal_(value) {
  if (!value) return _nowStr();
  try {
    const d = typeof value === 'number' ? new Date(value) : new Date(String(value));
    if (isNaN(d)) return _nowStr();
    d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
    return d.toISOString().slice(0, 19).replace('T', ' ');
  } catch (_) {
    return _nowStr();
  }
}

function _queueTimeValue_(value) {
  const raw = String(value || '').trim();
  if (!raw) return 0;
  const normalized = raw.includes(' ') && !raw.includes('T') ? raw.replace(' ', 'T') : raw;
  const time = new Date(normalized).getTime();
  return Number.isNaN(time) ? 0 : time;
}

async function _refreshFollowupHistoryCache() {
  const rows = await api.getFollowupHistory({});
  AppCache.setRows('followupHistory', rows);
  const pg = App.currentPage;
  if (pg && pg.startsWith('followups')) _renderFUTab(window.currentFollowupTab || 'all', true);
  _rerenderTodayIfActive();
}

async function _refreshActivityLogsCache() {
  const rows = await api.getLeadActivityLogs({});
  AppCache.setRows('activityLogs', rows);
  _rerenderTodayIfActive();
}

async function _refreshAppConfig() {
  const config = await api.getAppConfig();
  Store.dispatch('SET_CONFIG', config);
  AppCache.touch('config');
  AppLookup.rebuild();
}

function startCacheRevalidation() {
  // Cache system removed: no background polling. Every page fetches fresh data
  // from the server (Sheets API primary, SpreadsheetApp fallback) on navigation.
}
</script>

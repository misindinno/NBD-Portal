<script>
async function loadConfig() {
  el('page-title').textContent = 'Configuration';
  const canEditConfig = !!App.user?.canEditConfig;
  const canManageUsers = !!App.user?.canManageUsers;
  const tabs = [];
  if (canEditConfig) {
    tabs.push(['cfg-settings', 'Settings']);
    tabs.push(['cfg-stages', 'Pipeline Stages']);
    tabs.push(['cfg-dropdowns', 'Dropdowns']);
    tabs.push(['cfg-fields', 'Custom Fields']);
  }
  if (canManageUsers) tabs.push(['cfg-users', 'Users']);
  if (!tabs.length) {
    el('content').innerHTML = `<div class="card" style="padding:24px;color:#666">You do not have permission to manage configuration.</div>`;
    return;
  }
  const activeTab = tabs[0][0];
  el('content').innerHTML = `
    <div class="tabs">
      ${tabs.map(([id, label], i) => `<button class="tab-btn ${i === 0 ? 'active' : ''}" onclick="switchConfigTab(this,'${id}')">${label}</button>`).join('')}
    </div>
    ${tabs.map(([id], i) => `<div id="${id}" style="${i === 0 ? '' : 'display:none'}">${i === 0 ? skeletonPage(id === 'cfg-stages' ? 'cards' : 'table') : ''}</div>`).join('')}`;
  renderIcons();
  if (activeTab === 'cfg-settings') loadPortalSettings();
  if (activeTab === 'cfg-stages') loadStagesConfig();
  if (activeTab === 'cfg-dropdowns') loadDropdownsConfig();
  if (activeTab === 'cfg-fields') { if (typeof loadFieldConfig === 'function') loadFieldConfig(); }
  if (activeTab === 'cfg-users') { if (typeof loadUsersConfig === 'function') loadUsersConfig(); }
}

function switchConfigTab(btn, tabId) {
  btn.closest('#content').querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  ['cfg-settings','cfg-stages','cfg-dropdowns','cfg-fields','cfg-users'].forEach(id => {
    const div = el(id);
    if (div) div.style.display = id === tabId ? '' : 'none';
  });
  if (tabId === 'cfg-settings' && (!el('cfg-settings').innerHTML || el('cfg-settings').innerHTML.includes('skeleton'))) loadPortalSettings();
  if (tabId === 'cfg-stages' && (!el('cfg-stages').innerHTML || el('cfg-stages').innerHTML.includes('skeleton'))) loadStagesConfig();
  if (tabId === 'cfg-dropdowns' && (!el('cfg-dropdowns').innerHTML || el('cfg-dropdowns').innerHTML.includes('skeleton'))) loadDropdownsConfig();
  if (tabId === 'cfg-fields' && (!el('cfg-fields').innerHTML || el('cfg-fields').innerHTML.includes('skeleton'))) {
    if (typeof loadFieldConfig === 'function') loadFieldConfig();
    else el('cfg-fields').innerHTML = '<div class="card" style="padding:24px;color:#c00;font-size:13px">⚠ loadFieldConfig is not available — the web app may need to be redeployed after the latest code update.</div>';
  }
  if (tabId === 'cfg-users' && (!el('cfg-users').innerHTML || el('cfg-users').innerHTML.includes('skeleton'))) {
    if (typeof loadUsersConfig === 'function') loadUsersConfig();
    else el('cfg-users').innerHTML = '<div class="card" style="padding:24px;color:#c00;font-size:13px">⚠ loadUsersConfig is not available — the web app may need to be redeployed after the latest code update.</div>';
  }
}

async function loadPortalSettings() {
  if (!el('cfg-settings')) return;
  const departments = App.config.departments || [];
  const selected = _parseDepartmentList(App.config.settings?.visibleDepartments || []);
  el('cfg-settings').innerHTML = `
    <form id="portal-settings-form" class="card" style="padding:18px;max-width:760px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:16px;margin-bottom:14px;flex-wrap:wrap">
        <div>
          <h3 style="font-size:16px;font-weight:600;margin-bottom:4px">Portal Data Departments</h3>
          <p style="color:#666;font-size:13px">Selected departments control which users and assigned records appear across the portal. Leave all unchecked to show everything.</p>
        </div>
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          <button type="button" class="btn btn-sm btn-outlined" onclick="_setAllSettingDepartments(this.closest('form'), true)">All</button>
          <button type="button" class="btn btn-sm btn-outlined" onclick="_setAllSettingDepartments(this.closest('form'), false)">None</button>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(165px,1fr));gap:10px;margin-bottom:18px">
        ${departments.map(d => `<label style="display:flex;align-items:center;gap:8px;font-size:13px">
          <input type="checkbox" name="visibleDepartments" value="${escapeHtml(d)}" ${selected.includes(d)?'checked':''}>
          ${escapeHtml(d)}
        </label>`).join('') || '<div style="font-size:13px;color:#888">No departments found. Add departments on user profiles first.</div>'}
      </div>
      <div class="modal-footer" style="padding:0;border-top:none">
        <button type="submit" class="btn btn-primary">${icon('save', 14)} Save Settings</button>
      </div>
    </form>`;
  renderIcons(el('cfg-settings'));
  el('portal-settings-form').addEventListener('submit', async e => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const btn = e.target.querySelector('[type=submit]');
    setButtonLoading(btn);
    resetButtonLoading(btn);
    QueueManager.enqueue({
      module: 'config', actionType: 'savePortalSettings',
      payload: { visibleDepartments: fd.getAll('visibleDepartments') },
      onDone: async () => {
        await _refreshAppConfig().catch(() => {});
        api.getLeads().then(rows => AppCache.setRows('leads', rows)).catch(() => {});
        toast('Settings saved!');
        if (App.currentPage === 'config') loadPortalSettings();
      },
      onFail: j => toast('Save failed: ' + (j.error || 'Error'), 'error')
    });
    toast('Saving settings…', 'info');
  });

  // ── Update Permissions card ──────────────────────────────────────────────
  const permCard = document.createElement('div');
  permCard.className = 'card';
  permCard.style.cssText = 'padding:18px;max-width:760px;margin-top:18px';
  permCard.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap;margin-bottom:14px">
      <div>
        <h3 style="font-size:16px;font-weight:600;margin-bottom:4px">OAuth Permissions</h3>
        <p style="color:#666;font-size:13px">Probes every OAuth scope declared in appsscript.json. Run this after adding new scopes or if pages fail to load with a permissions error.</p>
        <p style="color:#999;font-size:12px;margin-top:4px">Note: Drive scope can only be fully probed from the Google Sheets menu (⚙ Update Permissions), not the web app.</p>
      </div>
      <button id="btn-update-perms" class="btn btn-outlined" style="white-space:nowrap">${icon('shield',14)} Update Permissions</button>
    </div>
    <div id="perm-results" style="display:none;font-size:13px;margin-top:6px"></div>`;
  el('cfg-settings').appendChild(permCard);
  renderIcons(permCard);

  el('btn-update-perms').addEventListener('click', async () => {
    const btn = el('btn-update-perms');
    const resultBox = el('perm-results');
    setButtonLoading(btn);
    resultBox.style.display = 'none';
    try {
      const { results, allGranted } = await api.updatePermissions();
      resultBox.style.display = 'block';
      resultBox.innerHTML = results.map(r =>
        `<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid #f0f0f0">
          <span style="font-size:15px">${r.ok ? '✅' : '❌'}</span>
          <span style="font-weight:500;flex:1">${escapeHtml(r.label)}</span>
          ${!r.ok ? `<span style="color:#c00;font-size:12px">${escapeHtml(r.error || '')}</span>` : ''}
        </div>`
      ).join('') +
      `<div style="margin-top:10px;padding:8px 12px;border-radius:6px;font-size:13px;
          background:${allGranted ? '#f0fdf4' : '#fff7ed'};color:${allGranted ? '#166534' : '#92400e'}">
        ${allGranted
          ? '✅ All scopes authorized. You can redeploy the web app now.'
          : '⚠️ Some scopes failed. Open the Google Sheets menu → ' + escapeHtml(App.config?.settings?.appTitle || 'NBD Portal') + ' → Update Permissions to complete authorization.'}
      </div>`;
      if (allGranted) toast('All permissions granted!', 'success');
    } catch (err) {
      toast('Error: ' + err.message, 'error');
    } finally {
      resetButtonLoading(btn);
    }
  });
}

window.loadConfig = loadConfig;
window.switchConfigTab = switchConfigTab;
window.loadPortalSettings = loadPortalSettings;

// ── Pipeline Stages ────────────────────────────────────────────────────────
</script>

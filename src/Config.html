<script>
async function loadConfig() {
  el('page-title').textContent = 'Configuration';
  const canEditConfig = !!App.user?.canEditConfig;
  const canManageUsers = !!App.user?.canManageUsers;
  const tabs = [];
  if (canEditConfig) {
    tabs.push(['cfg-settings', 'Settings']);
    tabs.push(['cfg-stages', 'Pipeline Stages']);
    tabs.push(['cfg-dropdowns', 'Dropdowns']);
    tabs.push(['cfg-fields', 'Custom Fields']);
  }
  if (canManageUsers) tabs.push(['cfg-users', 'Users']);
  if (!tabs.length) {
    el('content').innerHTML = `<div class="card" style="padding:24px;color:#666">You do not have permission to manage configuration.</div>`;
    return;
  }
  const activeTab = tabs[0][0];
  el('content').innerHTML = `
    <div class="tabs">
      ${tabs.map(([id, label], i) => `<button class="tab-btn ${i === 0 ? 'active' : ''}" onclick="switchConfigTab(this,'${id}')">${label}</button>`).join('')}
    </div>
    ${tabs.map(([id], i) => `<div id="${id}" style="${i === 0 ? '' : 'display:none'}">${i === 0 ? skeletonPage(id === 'cfg-stages' ? 'cards' : 'table') : ''}</div>`).join('')}`;
  renderIcons();
  if (activeTab === 'cfg-settings') loadPortalSettings();
  if (activeTab === 'cfg-stages') loadStagesConfig();
  if (activeTab === 'cfg-dropdowns') loadDropdownsConfig();
  if (activeTab === 'cfg-fields') loadFieldConfig();
  if (activeTab === 'cfg-users') loadUsersConfig();
}

function switchConfigTab(btn, tabId) {
  btn.closest('#content').querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  ['cfg-settings','cfg-stages','cfg-dropdowns','cfg-fields','cfg-users'].forEach(id => {
    const div = el(id);
    if (div) div.style.display = id === tabId ? '' : 'none';
  });
  if (tabId === 'cfg-settings' && (!el('cfg-settings').innerHTML || el('cfg-settings').innerHTML.includes('skeleton'))) loadPortalSettings();
  if (tabId === 'cfg-stages' && (!el('cfg-stages').innerHTML || el('cfg-stages').innerHTML.includes('skeleton'))) loadStagesConfig();
  if (tabId === 'cfg-dropdowns' && (!el('cfg-dropdowns').innerHTML || el('cfg-dropdowns').innerHTML.includes('skeleton'))) loadDropdownsConfig();
  if (tabId === 'cfg-fields' && (!el('cfg-fields').innerHTML || el('cfg-fields').innerHTML.includes('skeleton'))) loadFieldConfig();
  if (tabId === 'cfg-users' && (!el('cfg-users').innerHTML || el('cfg-users').innerHTML.includes('skeleton'))) loadUsersConfig();
}

async function loadPortalSettings() {
  const departments = App.config.departments || [];
  const selected = _parseDepartmentList(App.config.settings?.visibleDepartments || []);
  el('cfg-settings').innerHTML = `
    <form id="portal-settings-form" class="card" style="padding:18px;max-width:760px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:16px;margin-bottom:14px;flex-wrap:wrap">
        <div>
          <h3 style="font-size:16px;font-weight:600;margin-bottom:4px">Portal Data Departments</h3>
          <p style="color:#666;font-size:13px">Selected departments control which users and assigned records appear across the portal. Leave all unchecked to show everything.</p>
        </div>
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          <button type="button" class="btn btn-sm btn-outlined" onclick="_setAllSettingDepartments(this.closest('form'), true)">All</button>
          <button type="button" class="btn btn-sm btn-outlined" onclick="_setAllSettingDepartments(this.closest('form'), false)">None</button>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(165px,1fr));gap:10px;margin-bottom:18px">
        ${departments.map(d => `<label style="display:flex;align-items:center;gap:8px;font-size:13px">
          <input type="checkbox" name="visibleDepartments" value="${escapeHtml(d)}" ${selected.includes(d)?'checked':''}>
          ${escapeHtml(d)}
        </label>`).join('') || '<div style="font-size:13px;color:#888">No departments found. Add departments on user profiles first.</div>'}
      </div>
      <div class="modal-footer" style="padding:0;border-top:none">
        <button type="submit" class="btn btn-primary">${icon('save', 14)} Save Settings</button>
      </div>
    </form>`;
  renderIcons(el('cfg-settings'));
  el('portal-settings-form').addEventListener('submit', async e => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const btn = e.target.querySelector('[type=submit]');
    setButtonLoading(btn);
    resetButtonLoading(btn);
    QueueManager.enqueue({
      module: 'config', actionType: 'savePortalSettings',
      payload: { visibleDepartments: fd.getAll('visibleDepartments') },
      onDone: async () => {
        await _refreshAppConfig().catch(() => {});
        api.getLeads().then(rows => AppCache.setRows('leads', rows)).catch(() => {});
        toast('Settings saved!');
        if (App.currentPage === 'config') loadPortalSettings();
      },
      onFail: j => toast('Save failed: ' + (j.error || 'Error'), 'error')
    });
    toast('Saving settings…', 'info');
  });
}

// ── Pipeline Stages ──────────────────────────────────────────────────────────
function loadStagesConfig() {
  const c = el('cfg-stages');
  if (!c) return;
  const stages = App.config.allStages || [];
  const nextOrder = stages.reduce((max, s) => Math.max(max, Number(s['Stage Order']) || 0), 0) + 1;
  c.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <p style="color:#666;font-size:13px">Drag to reorder stages</p>
      <button class="btn btn-primary btn-sm" onclick='openStageForm({"Stage Order":${nextOrder}})'>${icon('plus', 14)} Add Stage</button>
    </div>
    <div id="stages-list">
      ${stages.map(s => `
        <div class="card" style="margin-bottom:8px;display:flex;align-items:center;gap:12px;cursor:move" data-stage-id="${s['Stage ID']}">
          <span class="drag-handle" style="color:#999">${icon('grip-vertical', 18)}</span>
          <div style="width:12px;height:12px;border-radius:50%;background:${safeColor(s['Color'])}"></div>
          <div style="flex:1">
            <b>${escapeHtml(s['Stage Name'])}</b>
            <span style="color:#999;font-size:12px;margin-left:8px">Order: ${escapeHtml(s['Stage Order'])}</span>
            ${s['Is Initial Stage'] === true || s['Is Initial Stage'] === 'TRUE' ? '<span class="badge" style="background:#E8F5E9;color:#2E7D32;margin-left:6px">Initial</span>' : ''}
            ${s['Is Final Stage'] ? '<span class="badge" style="background:#E3F2FD;color:#1565C0;margin-left:6px">Final</span>' : ''}
            ${s['TAT Days'] ? '<span class="badge" style="background:#FFF8E1;color:#F57F17;margin-left:6px">TAT: ' + escapeHtml(s['TAT Days']) + 'd</span>' : ''}
            ${s['Is Skippable'] === true || s['Is Skippable'] === 'TRUE' ? '<span class="badge" style="background:#F3E5F5;color:#6A1B9A;margin-left:6px">Skippable</span>' : ''}
          </div>
          <button class="btn btn-sm btn-outlined" onclick="openStageForm(${JSON.stringify(s).replace(/"/g,'&quot;')})">Edit</button>
        </div>`).join('')}
    </div>`;
  renderIcons(c);

  Sortable.create(el('stages-list'), {
    animation: 150,
    handle: '.drag-handle',
    onEnd: async (evt) => {
      const orderedIds = Array.from(evt.to.children).map(el => el.dataset.stageId);
      QueueManager.enqueue({
        module: 'stages', actionType: 'reorderStages',
        payload: { ids: orderedIds },
        onDone: () => { toast('Stages reordered!'); _refreshAppConfig().catch(() => {}); },
        onFail: j => {
          toast('Reorder failed: ' + (j.error || 'Error'), 'error');
          if (App.currentPage === 'config') loadStagesConfig();
        }
      });
      toast('Saving order…', 'info');
    }
  });
}

function openStageForm(data = {}) {
  const isEdit = !!data['Stage ID'];
  const stageFields = isEdit
    ? (App.config.leadFields || []).filter(f => f['Stage ID'] === data['Stage ID'])
    : [];
  const stageFieldsHTML = stageFields.length
    ? `<div class="card" style="margin:12px 0;padding:14px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <div style="font-weight:600;font-size:13px">Stage Custom Fields</div>
          <button type="button" class="btn btn-sm btn-outlined" onclick="this.closest('.modal-overlay').remove();_goToFieldsTab()">Manage</button>
        </div>
        <div style="display:flex;flex-wrap:wrap;gap:6px">
          ${stageFields.map(f => `<span class="badge" style="background:#F5F5F5;color:#555;padding:4px 10px">${escapeHtml(f['Field Name'])} <span style="color:#999;font-size:11px">${escapeHtml(f['Field Type'])}</span>${f['Is Required']===true||f['Is Required']==='TRUE'?' <span style="color:#D32F2F">*</span>':''}</span>`).join('')}
        </div>
      </div>`
    : (isEdit ? `<div style="font-size:12px;color:#999;margin:8px 0">No custom fields linked to this stage. Add them in the Custom Fields tab.</div>` : '');
  const overlay = showModal(`
    <div class="modal-header">
      <h2>${isEdit ? 'Edit' : 'Add'} Stage</h2>
      <button class="modal-close" onclick="this.closest('.modal-overlay').remove()">✕</button>
    </div>
    <form id="stage-form">
      <div class="form-group"><label>Stage Name *</label>
        <input class="form-control" name="Stage Name" value="${escapeHtml(data['Stage Name']||'')}" required></div>
      <div class="form-row">
        <div class="form-group"><label>Color (Hex) *</label>
          <input class="form-control" name="Color" type="color" value="${safeColor(data['Color'], '#2196F3')}" required></div>
        <div class="form-group"><label>Stage Order</label>
          <input class="form-control" name="Stage Order" type="number" value="${escapeHtml(data['Stage Order']||1)}"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>TAT (Days)</label>
          <input class="form-control" name="TAT Days" type="number" min="0" placeholder="Expected days in this stage" value="${escapeHtml(data['TAT Days']||'')}"></div>
        <div class="form-group" style="display:flex;flex-direction:column;justify-content:flex-end;gap:8px">
          <label><input type="checkbox" name="Is Active" ${data['Is Active']!==false&&data['Is Active']!=='FALSE'?'checked':''}> Is Active</label>
          <label><input type="checkbox" name="Is Final Stage" ${data['Is Final Stage']?'checked':''}> Is Final Stage</label>
          <label><input type="checkbox" name="Is Initial Stage" ${data['Is Initial Stage']===true||data['Is Initial Stage']==='TRUE'?'checked':''}> Is Initial Stage</label>
          <label><input type="checkbox" name="Is Skippable" ${data['Is Skippable']===true||data['Is Skippable']==='TRUE'?'checked':''}> Allow Skip</label>
        </div>
      </div>
      ${stageFieldsHTML}
      <div class="modal-footer">
        <button type="button" class="btn btn-outlined" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
        <button type="submit" class="btn btn-primary">Save</button>
      </div>
    </form>`);

  overlay.querySelector('#stage-form').addEventListener('submit', async e => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const payload = {
      'Stage Name': fd.get('Stage Name'),
      'Color': fd.get('Color'),
      'Stage Order': fd.get('Stage Order'),
      'TAT Days': fd.get('TAT Days') || '',
      'Is Active': fd.has('Is Active'),
      'Is Final Stage': fd.has('Is Final Stage'),
      'Is Initial Stage': fd.has('Is Initial Stage'),
      'Is Skippable': fd.has('Is Skippable')
    };
    if (isEdit) payload['Stage ID'] = data['Stage ID'];
    const btn = e.target.querySelector('[type=submit]');
    setButtonLoading(btn);
    overlay.remove();
    QueueManager.enqueue({
      module: 'stages', actionType: 'saveStage',
      payload,
      onDone: () => {
        toast('Stage saved!');
        _refreshAppConfig().catch(() => {});
        if (App.currentPage === 'config') loadStagesConfig();
      },
      onFail: j => toast('Save failed: ' + (j.error || 'Error'), 'error')
    });
    toast('Saving stage…', 'info');
  });
}

// ── Dropdowns Config ─────────────────────────────────────────────────────────
function loadDropdownsConfig() {
  const configs = App.config._allConfigs || [];
  const types = [...new Set(configs.map(c => c['Config Type']))];
  
  el('cfg-dropdowns').innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <select id="cfg-type-filter" class="form-control" style="width:200px">
        <option value="">All Types</option>
        ${types.map(t => `<option>${escapeHtml(t)}</option>`).join('')}
      </select>
      <button class="btn btn-primary btn-sm" onclick="openConfigForm()">${icon('plus', 14)} Add Config</button>
    </div>
    <div id="config-list"></div>`;
  renderIcons(el('cfg-dropdowns'));

  renderConfigList(configs);
  el('cfg-type-filter').addEventListener('change', e => {
    const filtered = e.target.value ? configs.filter(c => c['Config Type'] === e.target.value) : configs;
    renderConfigList(filtered);
  });
}

function renderConfigList(configs) {
  const grouped = configs.reduce((acc, c) => {
    const type = c['Config Type'];
    if (!acc[type]) acc[type] = [];
    acc[type].push(c);
    return acc;
  }, {});

  el('config-list').innerHTML = Object.keys(grouped).map(type => `
    <div class="card" style="margin-bottom:12px">
      <h3 style="font-size:14px;font-weight:600;margin-bottom:8px;color:var(--md-primary)">${escapeHtml(type)}</h3>
      <div style="display:flex;flex-wrap:wrap;gap:6px">
        ${grouped[type].map(c => `
          <span class="badge" style="background:${c['Status']==='Active'?'#E8F5E9':'#FFEBEE'};color:${c['Status']==='Active'?'#2E7D32':'#C62828'};padding:4px 10px;cursor:pointer"
            onclick="toggleConfigStatus('${c['Config ID']}','${c['Status']==='Active'?'Inactive':'Active'}')">
            ${escapeHtml(c['Value'])} ${c['Status']==='Active'?'✓':'✕'}
          </span>`).join('')}
      </div>
    </div>`).join('');
}

function openConfigForm() {
  const overlay = showModal(`
    <div class="modal-header">
      <h2>Add Config Value</h2>
      <button class="modal-close" onclick="this.closest('.modal-overlay').remove()">✕</button>
    </div>
    <form id="config-form">
      <div class="form-group"><label>Config Type *</label>
        <select class="form-control" name="type" required>
          <option value="">Select Type</option>
          <option>Lead Source</option><option>Priority</option><option>Follow-up Type</option>
          <option>Outcome</option><option>Product Interest</option>
          <option>Category</option><option>Lead Status</option><option>State</option>
        </select></div>
      <div class="form-group"><label>Value *</label>
        <input class="form-control" name="value" required></div>
      <div class="modal-footer">
        <button type="button" class="btn btn-outlined" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
        <button type="submit" class="btn btn-primary">Add</button>
      </div>
    </form>`);

  overlay.querySelector('#config-form').addEventListener('submit', async e => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const btn = e.target.querySelector('[type=submit]');
    setButtonLoading(btn, 'Adding...');
    overlay.remove();
    QueueManager.enqueue({
      module: 'config', actionType: 'addConfig',
      payload: { type: fd.get('type'), value: fd.get('value') },
      onDone: () => {
        toast('Config added!');
        _refreshAppConfig().catch(() => {});
        if (App.currentPage === 'config') loadDropdownsConfig();
      },
      onFail: j => toast('Save failed: ' + (j.error || 'Error'), 'error')
    });
    toast('Adding…', 'info');
  });
}

function toggleConfigStatus(id, newStatus) {
  QueueManager.enqueue({
    module: 'config', actionType: 'updateConfigStatus',
    payload: { id, status: newStatus },
    onDone: () => {
      toast('Status updated!');
      _refreshAppConfig().catch(() => {});
      if (App.currentPage === 'config') loadDropdownsConfig();
    },
    onFail: j => {
      toast('Update failed: ' + (j.error || 'Error'), 'error');
      if (App.currentPage === 'config') loadDropdownsConfig();
    }
  });
  toast('Updating…', 'info');
}

// ── Users Config ─────────────────────────────────────────────────────────────
async function loadFieldConfig() {
  el('cfg-fields').innerHTML = skeletonPage('table');
  const [fields, stages, configs] = await Promise.all([
    api.getAllFieldConfigs(''),
    api.getAllStages(),
    api.getAllConfigs()
  ]);
  _renderFieldConfig({ fields, stages, configs });
}

function _renderFieldConfig(ctx) {
  window._cfgFieldContext = ctx;
  el('cfg-fields').innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <div>
        <p style="color:#666;font-size:13px;margin-bottom:8px">Create lead and follow-up fields with validation and file upload support</p>
        <select id="field-sheet-filter" class="form-control" style="width:180px">
          <option value="">All targets</option>
          <option value="Leads">Leads</option>
          <option value="Followups">Follow-ups</option>
        </select>
      </div>
      <button class="btn btn-primary btn-sm" onclick="openFieldForm()">${icon('plus', 14)} Add Field</button>
    </div>
    <div id="field-config-list"></div>`;
  renderIcons(el('cfg-fields'));
  renderFieldConfigList();
  el('field-sheet-filter')?.addEventListener('change', renderFieldConfigList);
}

function renderFieldConfigList() {
  const ctx = window._cfgFieldContext || { fields: [], stages: [] };
  const sheetFilter = el('field-sheet-filter')?.value || '';
  const fields = sheetFilter
    ? (ctx.fields || []).filter(f => (f['Sheet Name'] || 'Leads') === sheetFilter)
    : (ctx.fields || []);
  const stageMap = (ctx.stages || []).reduce((m, s) => { m[s['Stage ID']] = s['Stage Name']; return m; }, {});
  const rows = fields.map(f => {
    const sheetName = f['Sheet Name'] || 'Leads';
    const stageLabel = sheetName === 'Leads' ? (stageMap[f['Stage ID']] || 'All stages') : '-';
    return `<tr>
      <td><b>${escapeHtml(f['Field Name']||'')}</b><div style="font-size:11px;color:#888">${escapeHtml(f['Column Key']||'')}</div></td>
      <td>${escapeHtml(sheetName === 'Followups' ? 'Follow-ups' : sheetName)}</td>
      <td>${escapeHtml(stageLabel)}</td>
      <td>${escapeHtml(f['Field Type']||'Text')}</td>
      <td>${f['Is Required']===true||f['Is Required']==='TRUE'?'Yes':'No'}</td>
      <td>${_fieldValidationSummary(f)}</td>
      <td>${f['Is Visible']===false||f['Is Visible']==='FALSE'?'No':'Yes'}</td>
      <td>${f['Skip Visibility']==='skip_only'?'<span class="badge" style="background:#F3E5F5;color:#6A1B9A">Skip Only</span>':'Normal'}</td>
      <td><button class="btn btn-sm btn-outlined" onclick='openFieldForm(${JSON.stringify(f).replace(/'/g,"&apos;")})'>Edit</button></td>
    </tr>`;
  }).join('');
  el('field-config-list').innerHTML = `
    <div class="table-wrap"><table>
      <thead><tr><th>Field</th><th>Target</th><th>Stage</th><th>Type</th><th>Required</th><th>Validation</th><th>Visible</th><th>Skip</th><th></th></tr></thead>
      <tbody>${rows || '<tr><td colspan="8" style="color:#888;text-align:center;padding:18px">No custom fields yet.</td></tr>'}</tbody>
    </table></div>`;
  renderIcons(el('field-config-list'));
}

function openFieldForm(data = {}) {
  const ctx = window._cfgFieldContext || { stages: App.config.stages || [], configs: [] };
  const isEdit = !!data['Field ID'];
  const filterTarget = el('field-sheet-filter')?.value || '';
  const targetSheet = data['Sheet Name'] || filterTarget || 'Leads';
  const configTypes = [...new Set((ctx.configs || []).map(c => c['Config Type']).filter(Boolean))].sort();
  const fieldTypes = ['Text','Textarea','Number','Date','Date Time','Time','Select','Multi Select','Checkbox','Email','Phone','URL','File','Formula'];
  const overlay = showModal(`
    <div class="modal-header">
      <h2>${isEdit ? 'Edit' : 'Add'} Custom Field</h2>
      <button class="modal-close" onclick="this.closest('.modal-overlay').remove()">&#x2715;</button>
    </div>
    <form id="field-form">
      <div class="form-row">
        <div class="form-group"><label>Field Name *</label>
          <input class="form-control" name="Field Name" value="${escapeHtml(data['Field Name']||'')}" required></div>
        <div class="form-group"><label>Column Key</label>
          <input class="form-control" name="Column Key" value="${escapeHtml(data['Column Key']||'')}" placeholder="Auto if blank" ${isEdit ? 'readonly' : ''}>
          <div style="font-size:11px;color:#777;margin-top:3px">Stored as the target sheet column.</div></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Target *</label>
          <select class="form-control" name="Sheet Name" required ${isEdit ? 'disabled' : ''} onchange="_toggleFieldTargetOptions(this.closest('form'))">
            <option value="Leads" ${targetSheet==='Leads'?'selected':''}>Leads</option>
            <option value="Followups" ${targetSheet==='Followups'?'selected':''}>Follow-ups</option>
          </select></div>
        <div class="form-group"><label>Field Type *</label>
          <select class="form-control" name="Field Type" id="field-type" required onchange="_toggleFieldTypeOptions(this.closest('form'))">
            ${fieldTypes.map(t => `<option ${data['Field Type']===t?'selected':''}>${t}</option>`).join('')}
          </select></div>
      </div>
      <div class="form-row">
        <div class="form-group field-option-stage"><label>Lead Stage</label>
          <select class="form-control" name="Stage ID">
            <option value="">All stages</option>
            ${(ctx.stages || []).map(s => `<option value="${escapeHtml(s['Stage ID'])}" ${data['Stage ID']===s['Stage ID']?'selected':''}>${escapeHtml(s['Stage Name'])}</option>`).join('')}
          </select></div>
        <div class="form-group field-option-select"><label>Dropdown Source</label>
          <input class="form-control" name="Dropdown Source" list="field-config-types" value="${escapeHtml(data['Dropdown Source']||'')}" placeholder="Config type or comma values">
          <datalist id="field-config-types">${configTypes.map(t => `<option value="${escapeHtml(t)}"></option>`).join('')}</datalist></div>
      </div>
      <div class="form-group"><label>Display Order</label>
        <input class="form-control" name="Display Order" type="number" value="${escapeHtml(data['Display Order']||100)}"></div>
      <div class="form-row">
        <div class="form-group"><label>Validation Min</label>
          <input class="form-control" name="Validation Min" value="${escapeHtml(data['Validation Min']||'')}" placeholder="Number/date min"></div>
        <div class="form-group"><label>Validation Max</label>
          <input class="form-control" name="Validation Max" value="${escapeHtml(data['Validation Max']||'')}" placeholder="Number/date max"></div>
      </div>
      <div class="form-group"><label>Validation Regex</label>
        <input class="form-control" name="Validation Regex" value="${escapeHtml(data['Validation Regex']||'')}" placeholder="Optional pattern"></div>
      <div class="form-group field-option-formula"><label>Formula Logic</label>
        <input class="form-control" name="Formula Logic" value="${escapeHtml(data['Formula Logic']||'')}" placeholder="SUM({{Quantity}}, 100)"></div>
      <div class="form-group"><label>Validation Message</label>
        <input class="form-control" name="Validation Message" value="${escapeHtml(data['Validation Message']||'')}" placeholder="Shown when validation fails"></div>
      <div class="form-row field-option-file">
        <div class="form-group"><label>Allowed File Types</label>
          <input class="form-control" name="File Types" value="${escapeHtml(data['File Types']||'')}" placeholder="application/pdf,image/*"></div>
        <div class="form-group"><label>Max File MB</label>
          <input class="form-control" name="Max File MB" type="number" value="${escapeHtml(data['Max File MB']||10)}"></div>
      </div>
      <div class="form-group"><label>Help Text</label>
        <input class="form-control" name="Help Text" value="${escapeHtml(data['Help Text']||'')}" placeholder="Optional hint below field"></div>
      <div class="form-row">
        <div class="form-group"><label><input type="checkbox" name="Is Required" ${data['Is Required']===true||data['Is Required']==='TRUE'?'checked':''}> Required</label></div>
        <div class="form-group"><label><input type="checkbox" name="Is Visible" ${data['Is Visible']!==false&&data['Is Visible']!=='FALSE'?'checked':''}> Visible</label></div>
      </div>
      <div class="form-group field-option-stage field-skip-vis-row"><label>Skip Visibility</label>
        <select class="form-control" name="Skip Visibility">
          <option value="normal" ${(data['Skip Visibility']||'normal')==='normal'?'selected':''}>Normal — always shown</option>
          <option value="skip_only" ${data['Skip Visibility']==='skip_only'?'selected':''}>Skip Only — shown when user skips</option>
        </select>
        <div style="font-size:11px;color:#777;margin-top:3px">Only applies to Leads stage fields when the stage has Allow Skip enabled.</div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-outlined" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
        <button type="submit" class="btn btn-primary">Save</button>
      </div>
    </form>`);

  _toggleFieldTargetOptions(overlay.querySelector('#field-form'));
  overlay.querySelector('#field-form').addEventListener('submit', async e => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const payload = Object.fromEntries(fd.entries());
    payload['Sheet Name'] = data['Sheet Name'] || fd.get('Sheet Name') || 'Leads';
    if (payload['Sheet Name'] === 'Followups') payload['Stage ID'] = '';
    payload['Is Required'] = fd.has('Is Required');
    payload['Is Visible'] = fd.has('Is Visible');
    payload['Skip Visibility'] = fd.get('Skip Visibility') || 'normal';
    if (isEdit) payload['Field ID'] = data['Field ID'];

    // ── Client-side validation via shared FieldValidation ──────────────────────
    const check = FieldValidation.validateField(payload, window._cfgFieldContext?.fields || []);
    if (!check.ok) {
      const inputEl = e.target.querySelector(`[name="${check.field}"]`);
      if (check.derivedKey && inputEl) inputEl.value = check.derivedKey;
      if (inputEl) {
        inputEl.setCustomValidity(check.message);
        inputEl.reportValidity();
        inputEl.addEventListener('input', () => inputEl.setCustomValidity(''), { once: true });
      } else {
        toast(check.message, 'error');
      }
      return;
    }
    payload['Column Key'] = check.derivedKey;
    // ── End validation ──────────────────────────────────────────────────────────

    const btn = e.target.querySelector('[type=submit]');
    setButtonLoading(btn);
    overlay.remove();
    QueueManager.enqueue({
      module: 'fields', actionType: 'saveFieldConfig',
      payload,
      onDone: () => {
        toast('Custom field saved!');
        _refreshAppConfig().catch(() => {});
        if (App.currentPage === 'config') loadFieldConfig();
      },
      onFail: j => toast('Save failed: ' + (j.error || 'Error'), 'error')
    });
    toast('Saving field…', 'info');
  });
}

function _toggleFieldTargetOptions(form) {
  const sheetName = form?.querySelector('[name="Sheet Name"]')?.value || 'Leads';
  const isLead = sheetName === 'Leads';
  form?.querySelectorAll('.field-option-stage').forEach(row => row.style.display = isLead ? '' : 'none');
  if (!isLead) {
    const stage = form?.querySelector('[name="Stage ID"]');
    if (stage) stage.value = '';
  }
  _toggleFieldTypeOptions(form);
}

function _toggleFieldTypeOptions(form) {
  const type = form?.querySelector('[name="Field Type"]')?.value;
  const isSelect = ['Select', 'Multi Select'].includes(type);
  const isFile = type === 'File';
  const isFormula = type === 'Formula';
  form?.querySelectorAll('.field-option-select').forEach(el => el.style.display = isSelect ? '' : 'none');
  form?.querySelectorAll('.field-option-file').forEach(el => el.style.display = isFile ? '' : 'none');
  form?.querySelectorAll('.field-option-formula').forEach(el => el.style.display = isFormula ? '' : 'none');
  // Fix #19: clear stale values when switching away from their respective types
  if (!isSelect) { const ds = form?.querySelector('[name="Dropdown Source"]'); if (ds) ds.value = ''; }
  if (!isFile)   { const mf = form?.querySelector('[name="Max File MB"]');    if (mf) mf.value = ''; }
  if (!isFile)   { const ft = form?.querySelector('[name="File Types"]');     if (ft) ft.value = ''; }
  if (!isFormula){ const fl = form?.querySelector('[name="Formula Logic"]');  if (fl) fl.value = ''; }
}

function _fieldValidationSummary(f) {
  const parts = [];
  if (f['Validation Min'] !== '') parts.push(`Min ${escapeHtml(f['Validation Min'])}`);
  if (f['Validation Max'] !== '') parts.push(`Max ${escapeHtml(f['Validation Max'])}`);
  if (f['Validation Regex']) parts.push('Regex');
  if (f['Field Type'] === 'File') parts.push(`${escapeHtml(f['Max File MB']||10)} MB`);
  return parts.join(', ') || '-';
}

async function loadUsersConfig() {
  el('cfg-users').innerHTML = skeletonPage('table');
  _renderUsersConfig(await api.getUsers());
}

    return m;

    <div class="table-wrap"><table>

}

      </div>
      <div class="form-row">
        <div class="form-group"><label>Company Phone</label>
          <input class="form-control" name="Company Phone" value="${escapeHtml(data['Company Phone']||'')}"></div>
        <div class="form-group"><label>Permission *</label>
          <select class="form-control" name="Permission" required onchange="_applyRoleModuleDefaults(this.closest('form'))">

      <div class="card" style="margin:12px 0;padding:14px;background:#F8F9FA;border:1px solid #E0E0E0">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:${isEdit?'0':'10px'}">
          <div style="font-weight:600;font-size:13px">${isEdit ? 'Change Password' : 'Set Password'}</div>
          ${isEdit ? `<button type="button" class="btn btn-sm btn-outlined" onclick="_togglePasswordSection(this)">Set New Password</button>` : ''}
        </div>
        <div id="pw-section" style="${isEdit ? 'display:none' : ''}">
          <div style="${isEdit ? 'margin-top:10px' : ''}">
            <div class="form-row">
              <div class="form-group">
                <label>${isEdit ? 'New Password' : 'Password'}</label>
                <div style="position:relative">

                  <button type="button" onclick="_togglePwVisibility(this)" tabindex="-1" style="position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;padding:0;color:#888;display:flex;align-items:center">
                    <svg class="pw-eye-on" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>

                    <svg class="pw-eye-on" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>

  overlay.querySelector('#user-form').addEventListener('submit', async e => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const modules = fd.getAll('Allowed Modules');

      'Name': fd.get('Name'),
      'Email Address': fd.get('Email Address'),
      'Job Title': fd.get('Job Title'),
      'Department': fd.get('Department'),
      'Company Phone': fd.get('Company Phone'),

      'Can Edit Config': fd.has('Can Edit Config'),
      'Is Active': fd.has('Is Active')
    };

      payload['_Original Email Address'] = data['Email Address'] || '';

    const btn = e.target.querySelector('[type=submit]');
    setButtonLoading(btn);

    const pwConfirm = fd.get('Password Confirm') || '';
    if (pw && pw !== pwConfirm) {
      const errEl = e.target.querySelector('#pw-match-err');
      if (errEl) errEl.style.display = 'block';
      resetButtonLoading(btn);
      return;
    }
    if (pw) payload['Password'] = pw;
    overlay.remove();
    QueueManager.enqueue({
      module: 'config', actionType: 'saveUser',
      payload,
      onDone: async () => {
        toast('User saved!');

const USER_MODULES = ['Dashboard','Leads','Pipeline','Followups','Reports','Config','Users','LeadForm'];
const USER_ROLE_MODULES = {
  ADMIN:   ['Dashboard','Leads','Pipeline','Followups','Reports','Config','Users'],
  MANAGER: ['Dashboard','Leads','Pipeline','Followups','Reports'],
  SALES:   ['Dashboard','Leads','Pipeline','Followups'],
  USER:    ['Dashboard','Followups'],
  VIEWER:  ['Dashboard','Leads','Pipeline','Followups','Reports']
};

function _userPermission(user = {}) {
  const text = String(user['Permission'] || user['Role'] || 'USER').trim().toUpperCase();
  if (USER_ROLE_MODULES[text]) return text;
  if (text.includes('ADMIN')) return 'ADMIN';
  if (text.includes('MANAGER')) return 'MANAGER';
  if (text.includes('SALES')) return 'SALES';
  if (text.includes('VIEWER')) return 'VIEWER';
  return 'USER';
}

function _effectiveUserModules(user = {}) {
  const role = _userPermission(user);
  if (String(user['Allowed Modules'] || '').trim().toUpperCase() === 'NONE') return [];
  const modules = _parseUserModules(user['Allowed Modules']);
  return modules.length ? modules : (USER_ROLE_MODULES[role] || USER_ROLE_MODULES.USER).slice();
}

function _parseUserModules(value) {
  return String(value || '')
    .split(',')
    .map(v => _canonicalUserModule(v))
    .filter(Boolean)
    .filter((m, i, arr) => arr.indexOf(m) === i);
}

function _canonicalUserModule(value) {
  const target = String(value || '').toLowerCase().replace(/[^a-z0-9]/g, '');
  return USER_MODULES.find(m => m.toLowerCase().replace(/[^a-z0-9]/g, '') === target) || '';
}

function _moduleLabel(moduleName) {
  if (moduleName === 'Followups') return 'Follow-ups';
  if (moduleName === 'LeadForm') return 'Lead Form';
  return moduleName;
}

function _userModuleBadges(user) {
  return `<div style="display:flex;flex-wrap:wrap;gap:4px">
    ${_effectiveUserModules(user).map(m => `<span class="badge" style="background:#F5F5F5;color:#555">${escapeHtml(_moduleLabel(m))}</span>`).join('')}
  </div>`;
}

function _parseDepartmentList(value) {
  const list = Array.isArray(value) ? value : String(value || '').split(',');
  return list
    .map(v => v.trim())
    .filter(Boolean)
    .filter((v, i, arr) => arr.indexOf(v) === i);
}

function _setAllSettingDepartments(form, checked) {
  form?.querySelectorAll('[name="visibleDepartments"]').forEach(input => { input.checked = checked; });
}

function _userCanEditConfig(user) {
  const role = _userPermission(user);
  return role === 'ADMIN' || _sheetTruthy(user['Can Edit Config'], false) || _effectiveUserModules(user).includes('Config');
}

function _userCanManageUsers(user) {
  const role = _userPermission(user);
  return role === 'ADMIN' || _effectiveUserModules(user).includes('Users');
}

function _sheetTruthy(value, defaultValue = false) {
  if (value === undefined || value === null || value === '') return defaultValue;
  if (value === true) return true;
  const text = String(value).trim().toUpperCase();
  return ['TRUE','YES','1'].includes(text);
}

function _applyRoleModuleDefaults(form) {
  const role = form?.querySelector('[name="Permission"]')?.value || 'USER';
  const defaults = USER_ROLE_MODULES[role] || USER_ROLE_MODULES.USER;
  form?.querySelectorAll('[name="Allowed Modules"]').forEach(input => {
    input.checked = defaults.includes(input.value);
  });
  const config = form?.querySelector('[name="Can Edit Config"]');
  if (config) config.checked = defaults.includes('Config') || role === 'ADMIN';
  _syncConfigPermission(form);
}

function _setAllUserModules(form, checked) {
  form?.querySelectorAll('[name="Allowed Modules"]').forEach(input => { input.checked = checked; });
  const config = form?.querySelector('[name="Can Edit Config"]');
  if (config) config.checked = checked;
  _syncConfigPermission(form);
}

function _syncConfigPermission(form, sourceIsConfigCheckbox = false) {
  if (!form) return;
  const configModule = Array.from(form.querySelectorAll('[name="Allowed Modules"]')).find(input => input.value === 'Config');
  const configPermission = form.querySelector('[name="Can Edit Config"]');
  if (!configModule || !configPermission) return;
  if (sourceIsConfigCheckbox) configModule.checked = configPermission.checked;
  if (configModule.checked) configPermission.checked = true;
}

function _togglePwVisibility(btn) {
  const input = btn.parentElement.querySelector('input');
  if (!input) return;
  const show = input.type === 'password';
  input.type = show ? 'text' : 'password';
  btn.querySelector('.pw-eye-on').style.display = show ? 'none' : '';
  btn.querySelector('.pw-eye-off').style.display = show ? '' : 'none';
}

function _goToFieldsTab() {
  const btn = Array.from(document.querySelectorAll('.tab-btn')).find(b => b.textContent.trim() === 'Custom Fields');
  if (btn) switchConfigTab(btn, 'cfg-fields');
}

function _togglePasswordSection(btn) {
  const section = btn.closest('.card').querySelector('#pw-section');
  if (!section) return;
  const visible = section.style.display !== 'none';
  section.style.display = visible ? 'none' : '';
  btn.textContent = visible ? 'Set New Password' : 'Cancel';
  if (visible) {
    const form = btn.closest('form');
    const pw = form.querySelector('[name="Password"]');
    const pc = form.querySelector('[name="Password Confirm"]');
    const err = form.querySelector('#pw-match-err');
    if (pw) pw.value = '';
    if (pc) pc.value = '';
    if (err) err.style.display = 'none';
  }
}

window.loadConfig = loadConfig;
</script>

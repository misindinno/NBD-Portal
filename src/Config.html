<script>
function _ensureConfigBaseHelpers() {
  if (!window._parseDepartmentList) window._parseDepartmentList = value => {
    const list = Array.isArray(value) ? value : String(value || '').split(',');
    return list.map(v => String(v || '').trim()).filter(Boolean).filter((v, i, arr) => arr.indexOf(v) === i);
  };
}
async function loadConfig() {
  _ensureConfigBaseHelpers();
  _installConfigFieldsFallback();
  el('page-title').textContent = 'Configuration';
  const canEditConfig = !!App.user?.canEditConfig;
  const canManageUsers = !!App.user?.canManageUsers;
  const tabs = [];
  if (canEditConfig) {
    tabs.push(['cfg-settings', 'Settings']);
    tabs.push(['cfg-stages', 'Pipeline Stages']);
    tabs.push(['cfg-dropdowns', 'Dropdowns']);
    tabs.push(['cfg-fields', 'Custom Fields']);
  }
  if (canManageUsers) tabs.push(['cfg-users', 'Users']);
  if (!tabs.length) {
    el('content').innerHTML = `<div class="card" style="padding:24px;color:#666">You do not have permission to manage configuration.</div>`;
    return;
  }
  const activeTab = tabs[0][0];
  el('content').innerHTML = `
    <div class="tabs">
      ${tabs.map(([id, label], i) => `<button class="tab-btn ${i === 0 ? 'active' : ''}" onclick="switchConfigTab(this,'${id}')">${label}</button>`).join('')}
    </div>
    ${tabs.map(([id], i) => `<div id="${id}" style="${i === 0 ? '' : 'display:none'}">${i === 0 ? skeletonPage(id === 'cfg-stages' ? 'cards' : 'table') : ''}</div>`).join('')}`;
  renderIcons();
  if (activeTab === 'cfg-settings') loadPortalSettings();
  if (activeTab === 'cfg-stages') loadStagesConfig();
  if (activeTab === 'cfg-dropdowns') loadDropdownsConfig();
  if (activeTab === 'cfg-fields') { if (typeof loadFieldConfig === 'function') loadFieldConfig(); }
  if (activeTab === 'cfg-users') { if (typeof loadUsersConfig === 'function') loadUsersConfig(); }
}

function switchConfigTab(btn, tabId) {
  _ensureConfigBaseHelpers();
  _installConfigFieldsFallback();
  btn.closest('#content').querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  ['cfg-settings','cfg-stages','cfg-dropdowns','cfg-fields','cfg-users'].forEach(id => {
    const div = el(id);
    if (div) div.style.display = id === tabId ? '' : 'none';
  });
  if (tabId === 'cfg-settings' && (!el('cfg-settings').innerHTML || el('cfg-settings').innerHTML.includes('skeleton'))) loadPortalSettings();
  if (tabId === 'cfg-stages' && (!el('cfg-stages').innerHTML || el('cfg-stages').innerHTML.includes('skeleton'))) loadStagesConfig();
  if (tabId === 'cfg-dropdowns' && (!el('cfg-dropdowns').innerHTML || el('cfg-dropdowns').innerHTML.includes('skeleton'))) loadDropdownsConfig();
  if (tabId === 'cfg-fields' && (!el('cfg-fields').innerHTML || el('cfg-fields').innerHTML.includes('skeleton'))) {
    if (typeof loadFieldConfig === 'function') loadFieldConfig();
    else el('cfg-fields').innerHTML = '<div class="card" style="padding:24px;color:#c00;font-size:13px">⚠ loadFieldConfig is not available — the web app may need to be redeployed after the latest code update.</div>';
  }
  if (tabId === 'cfg-users' && (!el('cfg-users').innerHTML || el('cfg-users').innerHTML.includes('skeleton'))) {
    if (typeof loadUsersConfig === 'function') loadUsersConfig();
    else el('cfg-users').innerHTML = '<div class="card" style="padding:24px;color:#c00;font-size:13px">⚠ loadUsersConfig is not available — the web app may need to be redeployed after the latest code update.</div>';
  }
}

async function loadPortalSettings() {
  _ensureConfigBaseHelpers();
  if (!el('cfg-settings')) return;
  const departments = App.config.departments || [];
  const selected = window._parseDepartmentList(App.config.settings?.visibleDepartments || []);
  el('cfg-settings').innerHTML = `
    <form id="portal-settings-form" class="card" style="padding:18px;max-width:760px">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:16px;margin-bottom:14px;flex-wrap:wrap">
        <div>
          <h3 style="font-size:16px;font-weight:600;margin-bottom:4px">Portal Data Departments</h3>
          <p style="color:#666;font-size:13px">Selected departments control which users and assigned records appear across the portal. Leave all unchecked to show everything.</p>
        </div>
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          <button type="button" class="btn btn-sm btn-outlined" onclick="_setAllSettingDepartments(this.closest('form'), true)">All</button>
          <button type="button" class="btn btn-sm btn-outlined" onclick="_setAllSettingDepartments(this.closest('form'), false)">None</button>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(165px,1fr));gap:10px;margin-bottom:18px">
        ${departments.map(d => `<label style="display:flex;align-items:center;gap:8px;font-size:13px">
          <input type="checkbox" name="visibleDepartments" value="${escapeHtml(d)}" ${selected.includes(d)?'checked':''}>
          ${escapeHtml(d)}
        </label>`).join('') || '<div style="font-size:13px;color:#888">No departments found. Add departments on user profiles first.</div>'}
      </div>
      <div style="margin-bottom:18px">
        <h3 style="font-size:16px;font-weight:600;margin-bottom:4px">Escalate Form URL</h3>
        <p style="color:#666;font-size:13px;margin-bottom:8px">Google Form link shown as the Escalate button in NBD portal (opens in new tab). Leave blank to disable.</p>
        <input type="url" name="escalateFormUrl" class="form-control" placeholder="https://docs.google.com/forms/..."
          value="${escapeHtml(App.config?.settings?.escalateFormUrl || '')}"
          style="max-width:500px;font-size:13px">
      </div>
      <div class="modal-footer" style="padding:0;border-top:none">
        <button type="submit" class="btn btn-primary">${icon('save', 14)} Save Settings</button>
      </div>
    </form>`;
  renderIcons(el('cfg-settings'));
  el('portal-settings-form').addEventListener('submit', async e => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const btn = e.target.querySelector('[type=submit]');
    setButtonLoading(btn);
    resetButtonLoading(btn);
    QueueManager.enqueue({
      module: 'config', actionType: 'savePortalSettings',
      payload: { visibleDepartments: fd.getAll('visibleDepartments'), escalateFormUrl: fd.get('escalateFormUrl') || '' },
      onDone: async () => {
        await _refreshAppConfig().catch(() => {});
        api.getLeads().then(rows => AppCache.setRows('leads', rows)).catch(() => {});
        toast('Settings saved!');
        if (App.currentPage === 'config') loadPortalSettings();
      },
      onFail: j => toast('Save failed: ' + (j.error || 'Error'), 'error')
    });
    toast('Saving settings…', 'info');
  });

  const writeTestCard = document.createElement('div');
  writeTestCard.className = 'card';
  writeTestCard.style.cssText = 'padding:18px;max-width:760px;margin-top:18px';
  writeTestCard.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap;margin-bottom:14px">
      <div>
        <h3 style="font-size:16px;font-weight:600;margin-bottom:4px">Sheets API Write Speed Test</h3>
        <p style="color:#666;font-size:13px">Writes one harmless sample row to <b>SHEETS_API_WRITE_TEST</b> using Google Sheets API append, then shows timing.</p>
      </div>
      <button id="btn-sheets-api-write-test" class="btn btn-outlined" style="white-space:nowrap">${icon('zap',14)} Test Update Speed</button>
    </div>
    <div id="sheets-api-write-results" style="display:none;font-size:13px;margin-top:6px"></div>`;
  el('cfg-settings').appendChild(writeTestCard);
  renderIcons(writeTestCard);

  el('btn-sheets-api-write-test').addEventListener('click', async () => {
    const btn = el('btn-sheets-api-write-test');
    const resultBox = el('sheets-api-write-results');
    setButtonLoading(btn, 'Testing...');
    resultBox.style.display = 'none';
    try {
      const result = await api.runSheetsApiSampleWrite({
        clientTimestamp: new Date().toISOString(),
        note: 'Config settings tab sample write speed test'
      });
      resultBox.style.display = 'block';
      resultBox.innerHTML = `
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:8px">
          ${_settingsMetric('API write', (result.apiWriteMs || 0) + ' ms')}
          ${_settingsMetric('Total server', (result.totalMs || 0) + ' ms')}
          ${_settingsMetric('Rows', result.updatedRows || 0)}
          ${_settingsMetric('Sheet', result.sheetName || '-')}
        </div>
        <div style="margin-top:10px;padding:9px 11px;border-radius:8px;background:#f8fafc;color:#475569;border:1px solid #e5e7eb">
          <div><b>Updated range:</b> ${escapeHtml(result.updatedRange || '-')}</div>
          <div><b>Test ID:</b> ${escapeHtml(result.testId || '-')}</div>
          <div><b>Server time:</b> ${escapeHtml(result.serverTimestamp || '-')}</div>
        </div>`;
      toast('Sheets API write test complete!', 'success');
    } catch (err) {
      resultBox.style.display = 'block';
      resultBox.innerHTML = `<div style="padding:10px;border-radius:8px;background:#fee2e2;color:#991b1b">${escapeHtml(err.message || String(err))}</div>`;
      toast('Write test failed: ' + (err.message || err), 'error');
    } finally {
      resetButtonLoading(btn);
    }
  });

  // ── Update Permissions card ──────────────────────────────────────────────
  const permCard = document.createElement('div');
  permCard.className = 'card';
  permCard.style.cssText = 'padding:18px;max-width:760px;margin-top:18px';
  permCard.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap;margin-bottom:14px">
      <div>
        <h3 style="font-size:16px;font-weight:600;margin-bottom:4px">OAuth Permissions</h3>
        <p style="color:#666;font-size:13px">Probes every OAuth scope declared in appsscript.json. Run this after adding new scopes or if pages fail to load with a permissions error.</p>
        <p style="color:#999;font-size:12px;margin-top:4px">Note: Drive scope can only be fully probed from the Google Sheets menu (⚙ Update Permissions), not the web app.</p>
      </div>
      <button id="btn-update-perms" class="btn btn-outlined" style="white-space:nowrap">${icon('shield',14)} Update Permissions</button>
    </div>
    <div id="perm-results" style="display:none;font-size:13px;margin-top:6px"></div>`;
  el('cfg-settings').appendChild(permCard);
  renderIcons(permCard);

  el('btn-update-perms').addEventListener('click', async () => {
    const btn = el('btn-update-perms');
    const resultBox = el('perm-results');
    setButtonLoading(btn);
    resultBox.style.display = 'none';
    try {
      const { results, allGranted } = await api.updatePermissions();
      resultBox.style.display = 'block';
      resultBox.innerHTML = results.map(r =>
        `<div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid #f0f0f0">
          <span style="font-size:15px">${r.ok ? '✅' : '❌'}</span>
          <span style="font-weight:500;flex:1">${escapeHtml(r.label)}</span>
          ${!r.ok ? `<span style="color:#c00;font-size:12px">${escapeHtml(r.error || '')}</span>` : ''}
        </div>`
      ).join('') +
      `<div style="margin-top:10px;padding:8px 12px;border-radius:6px;font-size:13px;
          background:${allGranted ? '#f0fdf4' : '#fff7ed'};color:${allGranted ? '#166534' : '#92400e'}">
        ${allGranted
          ? '✅ All scopes authorized. You can redeploy the web app now.'
          : '⚠️ Some scopes failed. Open the Google Sheets menu → ' + escapeHtml(App.config?.settings?.appTitle || 'NBD Portal') + ' → Update Permissions to complete authorization.'}
      </div>`;
      if (allGranted) toast('All permissions granted!', 'success');
    } catch (err) {
      toast('Error: ' + err.message, 'error');
    } finally {
      resetButtonLoading(btn);
    }
  });
}

function _settingsMetric(label, value) {
  return `<div style="padding:10px;border:1px solid #e5e7eb;border-radius:8px;background:#fff">
    <div style="font-size:11px;color:#64748b;font-weight:800;text-transform:uppercase">${escapeHtml(label)}</div>
    <div style="font-size:18px;color:#111827;font-weight:800;margin-top:3px">${escapeHtml(value)}</div>
  </div>`;
}

function _installConfigFieldsFallback() {
  if (typeof window.loadFieldConfig === 'function') return;
  window.__CONFIG_FIELDS_FALLBACK = true;
  if (!window._sheetTruthy) window._sheetTruthy = (value, defaultValue = false) => {
    if (value === undefined || value === null || value === '') return defaultValue;
    if (value === true) return true;
    return ['TRUE','YES','1'].includes(String(value).trim().toUpperCase());
  };
  window.loadFieldConfig = async function() {
    if (!el('cfg-fields')) return;
    el('cfg-fields').innerHTML = skeletonPage('table');
    const [fields, stages, configs] = await Promise.all([
      api.getAllFieldConfigs(''),
      api.getAllStages(),
      api.getAllConfigs()
    ]);
    window._cfgFieldContext = { fields, stages, configs };
    el('cfg-fields').innerHTML = `
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
        <div>
          <p style="color:#666;font-size:13px;margin-bottom:8px">Create lead and follow-up fields with validation and file upload support</p>
          <select id="field-sheet-filter" class="form-control" style="width:180px">
            <option value="">All targets</option>
            <option value="Leads">Leads</option>
            <option value="Followups">Follow-ups</option>
          </select>
        </div>
        <button class="btn btn-primary btn-sm" onclick="openFieldForm()">${icon('plus', 14)} Add Field</button>
      </div>
      <div id="field-config-list"></div>`;
    renderIcons(el('cfg-fields'));
    window.renderFieldConfigList();
    el('field-sheet-filter')?.addEventListener('change', window.renderFieldConfigList);
  };
  window.renderFieldConfigList = function() {
    const ctx = window._cfgFieldContext || { fields: [], stages: [] };
    const sheetFilter = el('field-sheet-filter')?.value || '';
    const fields = sheetFilter
      ? (ctx.fields || []).filter(f => (f['Sheet Name'] || 'Leads') === sheetFilter)
      : (ctx.fields || []);
    const stageMap = (ctx.stages || []).reduce((m, s) => { m[s['Stage ID']] = s['Stage Name']; return m; }, {});
    const rows = fields.map(f => {
      const sheetName = f['Sheet Name'] || 'Leads';
      const stageLabel = sheetName === 'Leads' ? (stageMap[f['Stage ID']] || 'All stages') : '-';
      return `<tr>
        <td><b>${escapeHtml(f['Field Name'] || '')}</b><div style="font-size:11px;color:#888">${escapeHtml(f['Column Key'] || '')}</div></td>
        <td>${escapeHtml(sheetName === 'Followups' ? 'Follow-ups' : sheetName)}</td>
        <td>${escapeHtml(stageLabel)}</td>
        <td>${escapeHtml(f['Field Type'] || 'Text')}</td>
        <td>${f['Is Required'] === true || f['Is Required'] === 'TRUE' ? 'Yes' : 'No'}</td>
        <td>${window._fieldValidationSummary(f)}</td>
        <td>${f['Is Visible'] === false || f['Is Visible'] === 'FALSE' ? 'No' : 'Yes'}</td>
        <td>${f['Skip Visibility'] === 'skip_only' ? '<span class="badge" style="background:#F3E5F5;color:#6A1B9A">Skip Only</span>' : 'Normal'}</td>
        <td><button class="btn btn-sm btn-outlined" onclick="openFieldForm('${escapeHtml(String(f['Field ID'] || ''))}')">Edit</button></td>
      </tr>`;
    }).join('');
    el('field-config-list').innerHTML = `
      <div class="table-wrap"><table>
        <thead><tr><th>Field</th><th>Target</th><th>Stage</th><th>Type</th><th>Required</th><th>Validation</th><th>Visible</th><th>Skip</th><th></th></tr></thead>
        <tbody>${rows || '<tr><td colspan="9" style="color:#888;text-align:center;padding:18px">No custom fields yet.</td></tr>'}</tbody>
      </table></div>`;
    renderIcons(el('field-config-list'));
  };
  window.openFieldForm = function(data = {}) {
    if (typeof data === 'string') {
      const ctx = window._cfgFieldContext || { fields: [] };
      data = (ctx.fields || []).find(f => f['Field ID'] === data) || {};
    }
    const ctx = window._cfgFieldContext || { stages: App.config.stages || [], configs: [] };
    const isEdit = !!data['Field ID'];
    const targetSheet = data['Sheet Name'] || el('field-sheet-filter')?.value || 'Leads';
    const configTypes = [...new Set((ctx.configs || []).map(c => c['Config Type']).filter(Boolean))].sort();
    const fieldTypes = ['Text','Textarea','Number','Date','Date Time','Time','Select','Multi Select','Checkbox','Email','Phone','URL','File','Formula'];
    const overlay = showModal(`
      <div class="modal-header">
        <h2>${isEdit ? 'Edit' : 'Add'} Custom Field</h2>
        <button class="modal-close" onclick="this.closest('.modal-overlay').remove()">&#x2715;</button>
      </div>
      <form id="field-form">
        <div class="form-row">
          <div class="form-group"><label>Field Name *</label><input class="form-control" name="Field Name" value="${escapeHtml(data['Field Name'] || '')}" required></div>
          <div class="form-group"><label>Column Key</label><input class="form-control" name="Column Key" value="${escapeHtml(data['Column Key'] || '')}" placeholder="Auto if blank" ${isEdit ? 'readonly' : ''}></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Target *</label><select class="form-control" name="Sheet Name" required ${isEdit ? 'disabled' : ''} onchange="_toggleFieldTargetOptions(this.closest('form'))">
            <option value="Leads" ${targetSheet === 'Leads' ? 'selected' : ''}>Leads</option>
            <option value="Followups" ${targetSheet === 'Followups' ? 'selected' : ''}>Follow-ups</option>
          </select></div>
          <div class="form-group"><label>Field Type *</label><select class="form-control" name="Field Type" required onchange="_toggleFieldTypeOptions(this.closest('form'))">
            ${fieldTypes.map(t => `<option ${data['Field Type'] === t ? 'selected' : ''}>${t}</option>`).join('')}
          </select></div>
        </div>
        <div class="form-row">
          <div class="form-group field-option-stage"><label>Lead Stage</label><select class="form-control" name="Stage ID">
            <option value="">All stages</option>
            ${(ctx.stages || []).map(s => `<option value="${escapeHtml(s['Stage ID'])}" ${data['Stage ID'] === s['Stage ID'] ? 'selected' : ''}>${escapeHtml(s['Stage Name'])}</option>`).join('')}
          </select></div>
          <div class="form-group field-option-select"><label>Dropdown Source</label>
            <input class="form-control" name="Dropdown Source" list="field-config-types" value="${escapeHtml(data['Dropdown Source'] || '')}" placeholder="Config type or comma values">
            <datalist id="field-config-types">${configTypes.map(t => `<option value="${escapeHtml(t)}"></option>`).join('')}</datalist>
          </div>
        </div>
        <div class="form-group"><label>Display Order</label><input class="form-control" name="Display Order" type="number" value="${escapeHtml(data['Display Order'] || 100)}"></div>
        <div class="form-row">
          <div class="form-group"><label>Validation Min</label><input class="form-control" name="Validation Min" value="${escapeHtml(data['Validation Min'] || '')}"></div>
          <div class="form-group"><label>Validation Max</label><input class="form-control" name="Validation Max" value="${escapeHtml(data['Validation Max'] || '')}"></div>
        </div>
        <div class="form-group"><label>Validation Regex</label><input class="form-control" name="Validation Regex" value="${escapeHtml(data['Validation Regex'] || '')}"></div>
        <div class="form-group field-option-formula"><label>Formula Logic</label><input class="form-control" name="Formula Logic" value="${escapeHtml(data['Formula Logic'] || '')}" placeholder="SUM({{Quantity}}, 100)"></div>
        <div class="form-group"><label>Validation Message</label><input class="form-control" name="Validation Message" value="${escapeHtml(data['Validation Message'] || '')}"></div>
        <div class="form-row field-option-file">
          <div class="form-group"><label>Allowed File Types</label><input class="form-control" name="File Types" value="${escapeHtml(data['File Types'] || '')}" placeholder="application/pdf,image/*"></div>
          <div class="form-group"><label>Max File MB</label><input class="form-control" name="Max File MB" type="number" value="${escapeHtml(data['Max File MB'] || 10)}"></div>
        </div>
        <div class="form-group field-option-file"><label><input type="checkbox" name="Allow Multiple" ${data['Allow Multiple'] === true || data['Allow Multiple'] === 'TRUE' ? 'checked' : ''}> Allow Multiple Files</label></div>
        <div class="form-group"><label>Help Text</label><input class="form-control" name="Help Text" value="${escapeHtml(data['Help Text'] || '')}"></div>
        <div class="form-row">
          <div class="form-group"><label><input type="checkbox" name="Is Required" ${data['Is Required'] === true || data['Is Required'] === 'TRUE' ? 'checked' : ''}> Required</label></div>
          <div class="form-group"><label><input type="checkbox" name="Is Visible" ${window._sheetTruthy(data['Is Visible'], true) ? 'checked' : ''}> Visible</label></div>
        </div>
        <div class="form-group field-option-stage" id="fc-per-stage-row" style="${data['Stage ID'] ? 'display:none' : ''}">
          <label><input type="checkbox" name="Per Stage" ${data['Per Stage'] === true || data['Per Stage'] === 'TRUE' ? 'checked' : ''}> Per Stage - store separate data for each stage</label>
        </div>
        <div class="form-group field-option-stage"><label>Skip Visibility</label><select class="form-control" name="Skip Visibility">
          <option value="normal" ${(data['Skip Visibility'] || 'normal') === 'normal' ? 'selected' : ''}>Normal - always shown</option>
          <option value="skip_only" ${data['Skip Visibility'] === 'skip_only' ? 'selected' : ''}>Skip Only - shown when user skips</option>
        </select></div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outlined" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
          <button type="submit" class="btn btn-primary">Save</button>
        </div>
      </form>`);
    const form = overlay.querySelector('#field-form');
    window._toggleFieldTargetOptions(form, true);
    form.querySelector('[name="Stage ID"]')?.addEventListener('change', () => window._toggleFieldTargetOptions(form));
    form.addEventListener('submit', e => {
      e.preventDefault();
      const fd = new FormData(e.target);
      const payload = Object.fromEntries(fd.entries());
      payload['Sheet Name'] = data['Sheet Name'] || fd.get('Sheet Name') || 'Leads';
      if (payload['Sheet Name'] === 'Followups') payload['Stage ID'] = '';
      payload['Is Required'] = fd.has('Is Required');
      payload['Is Visible'] = fd.has('Is Visible');
      payload['Per Stage'] = fd.has('Per Stage');
      payload['Allow Multiple'] = fd.has('Allow Multiple');
      payload['Skip Visibility'] = fd.get('Skip Visibility') || 'normal';
      if (isEdit) payload['Field ID'] = data['Field ID'];
      overlay.remove();
      QueueManager.enqueue({
        module: 'fields', actionType: 'saveFieldConfig', payload,
        onDone: () => { toast('Custom field saved!'); _refreshAppConfig().catch(() => {}); if (App.currentPage === 'config') window.loadFieldConfig(); },
        onFail: j => toast('Save failed: ' + (j.error || 'Error'), 'error')
      });
      toast('Saving field...', 'info');
    });
  };
  window._toggleFieldTargetOptions = function(form, preserveValues = false) {
    const isLead = (form?.querySelector('[name="Sheet Name"]')?.value || 'Leads') === 'Leads';
    form?.querySelectorAll('.field-option-stage').forEach(row => row.style.display = isLead ? '' : 'none');
    if (!isLead && !preserveValues) {
      const stage = form?.querySelector('[name="Stage ID"]');
      if (stage) stage.value = '';
    }
    const stageVal = form?.querySelector('[name="Stage ID"]')?.value || '';
    const perStageRow = form?.querySelector('#fc-per-stage-row');
    if (perStageRow) perStageRow.style.display = isLead && !stageVal ? '' : 'none';
    window._toggleFieldTypeOptions(form, preserveValues);
  };
  window._toggleFieldTypeOptions = function(form, preserveValues = false) {
    const type = form?.querySelector('[name="Field Type"]')?.value;
    form?.querySelectorAll('.field-option-select').forEach(el => el.style.display = ['Select','Multi Select'].includes(type) ? '' : 'none');
    form?.querySelectorAll('.field-option-file').forEach(el => el.style.display = type === 'File' ? '' : 'none');
    form?.querySelectorAll('.field-option-formula').forEach(el => el.style.display = type === 'Formula' ? '' : 'none');
  };
  window._fieldValidationSummary = function(f) {
    const parts = [];
    if (f['Validation Min']) parts.push(`Min ${escapeHtml(f['Validation Min'])}`);
    if (f['Validation Max']) parts.push(`Max ${escapeHtml(f['Validation Max'])}`);
    if (f['Validation Regex']) parts.push('Regex');
    if (f['Field Type'] === 'File') parts.push(`${escapeHtml(f['Max File MB'] || 10)} MB`);
    return parts.join(', ') || '-';
  };
}

window.loadConfig = loadConfig;
window.switchConfigTab = switchConfigTab;
window.loadPortalSettings = loadPortalSettings;

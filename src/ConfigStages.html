<script>
async function loadStagesConfig() {
  const container = el('cfg-stages');
  if (!container) return;
  container.innerHTML = skeletonPage('cards');
  let stages;
  try {
    stages = await api.getAllStages();
  } catch (err) {
    const c = el('cfg-stages');
    if (c) c.innerHTML = `<div class="card" style="padding:24px;color:#D32F2F">${escapeHtml(err.message || String(err))}</div>`;
    return;
  }
  const c = el('cfg-stages');
  if (!c) return;
  const nextOrder = stages.reduce((max, s) => Math.max(max, Number(s['Stage Order']) || 0), 0) + 1;
  c.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <p style="color:#666;font-size:13px">Drag to reorder stages</p>
      <button class="btn btn-primary btn-sm" onclick='openStageForm({"Stage Order":${nextOrder}})'>${icon('plus', 14)} Add Stage</button>
    </div>
    <div id="stages-list">
      ${stages.map(s => `
        <div class="card" style="margin-bottom:8px;display:flex;align-items:center;gap:12px;cursor:move" data-stage-id="${s['Stage ID']}">
          <span class="drag-handle" style="color:#999">${icon('grip-vertical', 18)}</span>
          <div style="width:12px;height:12px;border-radius:50%;background:${safeColor(s['Color'])}"></div>
          <div style="flex:1">
            <b>${escapeHtml(s['Stage Name'])}</b>
            <span style="color:#999;font-size:12px;margin-left:8px">Order: ${escapeHtml(s['Stage Order'])}</span>
            ${s['Is Initial Stage'] === true || s['Is Initial Stage'] === 'TRUE' ? '<span class="badge" style="background:#E8F5E9;color:#2E7D32;margin-left:6px">Initial</span>' : ''}
            ${s['Is Final Stage'] ? '<span class="badge" style="background:#E3F2FD;color:#1565C0;margin-left:6px">Final</span>' : ''}
            ${s['TAT Days'] ? '<span class="badge" style="background:#FFF8E1;color:#F57F17;margin-left:6px">TAT: ' + escapeHtml(s['TAT Days']) + 'd</span>' : ''}
            ${s['Is Skippable'] === true || s['Is Skippable'] === 'TRUE' ? '<span class="badge" style="background:#F3E5F5;color:#6A1B9A;margin-left:6px">Skippable</span>' : ''}
            ${s['Stage Outcome'] === 'Won'  ? '<span class="badge" style="background:#D1FAE5;color:#065F46;margin-left:6px">Won</span>'  : ''}
            ${s['Stage Outcome'] === 'Lost' ? '<span class="badge" style="background:#FEE2E2;color:#991B1B;margin-left:6px">Lost</span>' : ''}
          </div>
          <button class="btn btn-sm btn-outlined" onclick="openStageForm(${JSON.stringify(s).replace(/"/g,'&quot;')})">Edit</button>
        </div>`).join('')}
    </div>`;
  renderIcons(c);

  Sortable.create(el('stages-list'), {
    animation: 150,
    handle: '.drag-handle',
    onEnd: async (evt) => {
      const orderedIds = Array.from(evt.to.children).map(el => el.dataset.stageId);
      QueueManager.enqueue({
        module: 'stages', actionType: 'reorderStages',
        payload: { ids: orderedIds },
        onDone: () => { toast('Stages reordered!'); _refreshAppConfig().catch(() => {}); },
        onFail: j => {
          toast('Reorder failed: ' + (j.error || 'Error'), 'error');
          if (App.currentPage === 'config') loadStagesConfig();
        }
      });
      toast('Saving order…', 'info');
    }
  });
}

function openStageForm(data = {}) {
  const isEdit = !!data['Stage ID'];
  const stageFields = isEdit
    ? (App.config.leadFields || []).filter(f => f['Stage ID'] === data['Stage ID'])
    : [];
  const stageFieldsHTML = stageFields.length
    ? `<div class="card" style="margin:12px 0;padding:14px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <div style="font-weight:600;font-size:13px">Stage Custom Fields</div>
          <button type="button" class="btn btn-sm btn-outlined" onclick="this.closest('.modal-overlay').remove();_goToFieldsTab()">Manage</button>
        </div>
        <div style="display:flex;flex-wrap:wrap;gap:6px">
          ${stageFields.map(f => `<span class="badge" style="background:#F5F5F5;color:#555;padding:4px 10px">${escapeHtml(f['Field Name'])} <span style="color:#999;font-size:11px">${escapeHtml(f['Field Type'])}</span>${f['Is Required']===true||f['Is Required']==='TRUE'?' <span style="color:#D32F2F">*</span>':''}</span>`).join('')}
        </div>
      </div>`
    : (isEdit ? `<div style="font-size:12px;color:#999;margin:8px 0">No custom fields linked to this stage. Add them in the Custom Fields tab.</div>` : '');
  const overlay = showModal(`
    <div class="modal-header">
      <h2>${isEdit ? 'Edit' : 'Add'} Stage</h2>
      <button class="modal-close" onclick="this.closest('.modal-overlay').remove()">✕</button>
    </div>
    <form id="stage-form">
      <div class="form-group"><label>Stage Name *</label>
        <input class="form-control" name="Stage Name" value="${escapeHtml(data['Stage Name']||'')}" required></div>
      <div class="form-row">
        <div class="form-group"><label>Color (Hex) *</label>
          <input class="form-control" name="Color" type="color" value="${safeColor(data['Color'], '#2196F3')}" required></div>
        <div class="form-group"><label>Stage Order</label>
          <input class="form-control" name="Stage Order" type="number" value="${escapeHtml(data['Stage Order']||1)}"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>TAT (Days)</label>
          <input class="form-control" name="TAT Days" type="number" min="0" placeholder="Expected days in this stage" value="${escapeHtml(data['TAT Days']||'')}"></div>
        <div class="form-group"><label>Stage Outcome</label>
          <select class="form-control" name="Stage Outcome">
            <option value="" ${!data['Stage Outcome']?'selected':''}>None (stays Open)</option>
            <option value="Won"  ${data['Stage Outcome']==='Won' ?'selected':''}>Won — marks lead as Won</option>
            <option value="Lost" ${data['Stage Outcome']==='Lost'?'selected':''}>Lost — marks lead as Lost</option>
          </select>
        </div>
      </div>
      <div class="form-group" style="margin-top:4px">
        <label style="font-size:12.5px;font-weight:600;color:#1f2937;display:block;margin-bottom:8px">Stage Options</label>
        <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:10px">
          ${[
            { name:'Is Active',       label:'Is Active',       ic:'check-circle',  checked: data['Is Active']!==false&&data['Is Active']!=='FALSE',                         col:'#16a34a', abg:'#f0fdf4', ab:'#22c55e', ibg:'#dcfce7' },
            { name:'Is Final Stage',  label:'Is Final Stage',  ic:'flag',          checked: !!(data['Is Final Stage']),                                                     col:'#7c3aed', abg:'#f5f3ff', ab:'#8b5cf6', ibg:'#ede9fe' },
            { name:'Is Initial Stage',label:'Is Initial Stage',ic:'play',          checked: data['Is Initial Stage']===true||data['Is Initial Stage']==='TRUE',             col:'#2563eb', abg:'#eff6ff', ab:'#3b82f6', ibg:'#dbeafe' },
            { name:'Is Skippable',    label:'Allow Skip',      ic:'skip-forward',  checked: data['Is Skippable']===true||data['Is Skippable']==='TRUE',                     col:'#d97706', abg:'#fffbeb', ab:'#f59e0b', ibg:'#fef3c7' },
          ].map(o => `
          <label class="cfg-stg-toggle" data-col="${o.col}" data-abg="${o.abg}" data-ab="${o.ab}" data-ibg="${o.ibg}"
            style="display:flex;align-items:center;gap:10px;padding:11px 14px;border:1.5px solid ${o.checked?o.ab:'#e5e7eb'};border-radius:12px;cursor:pointer;background:${o.checked?o.abg:'#fafafa'};transition:border-color .15s,background .15s,box-shadow .15s;box-shadow:0 1px 2px rgba(0,0,0,.04)">
            <input type="checkbox" name="${o.name}" ${o.checked?'checked':''} style="position:absolute;opacity:0;width:0;height:0;pointer-events:none">
            <span class="cst-icon" style="flex-shrink:0;width:30px;height:30px;border-radius:8px;background:${o.checked?o.ibg:'#f3f4f6'};display:flex;align-items:center;justify-content:center;color:${o.checked?o.col:'#9ca3af'};transition:background .15s,color .15s">${icon(o.ic,16)}</span>
            <span class="cst-label" style="font-size:12.5px;font-weight:500;color:${o.checked?o.col:'#374151'};white-space:nowrap;line-height:1;transition:color .15s">${o.label}</span>
          </label>`).join('')}
        </div>
      </div>
      ${stageFieldsHTML}
      <div class="modal-footer">
        <button type="button" class="btn btn-outlined" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
        <button type="submit" class="btn btn-primary">Save</button>
      </div>
    </form>`);

  overlay.querySelectorAll('.cfg-stg-toggle').forEach(lbl => {
    const cb  = lbl.querySelector('input[type="checkbox"]');
    const ic  = lbl.querySelector('.cst-icon');
    const txt = lbl.querySelector('.cst-label');
    const col = lbl.dataset.col, abg = lbl.dataset.abg, ab = lbl.dataset.ab, ibg = lbl.dataset.ibg;
    const applyState = checked => {
      lbl.style.borderColor = checked ? ab   : '#e5e7eb';
      lbl.style.background  = checked ? abg  : '#fafafa';
      lbl.style.boxShadow   = checked ? `0 0 0 3px ${ab}33` : '0 1px 2px rgba(0,0,0,.04)';
      ic.style.background   = checked ? ibg  : '#f3f4f6';
      ic.style.color        = checked ? col  : '#9ca3af';
      txt.style.color       = checked ? col  : '#374151';
    };
    cb.addEventListener('change', () => applyState(cb.checked));
    lbl.addEventListener('mouseenter', () => { if (!cb.checked) lbl.style.borderColor = '#d1d5db'; });
    lbl.addEventListener('mouseleave', () => { if (!cb.checked) lbl.style.borderColor = '#e5e7eb'; });
  });

  overlay.querySelector('#stage-form').addEventListener('submit', async e => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const payload = {
      'Stage Name': fd.get('Stage Name'),
      'Color': fd.get('Color'),
      'Stage Order': fd.get('Stage Order'),
      'TAT Days': fd.get('TAT Days') || '',
      'Stage Outcome': fd.get('Stage Outcome') || '',
      'Is Active': fd.has('Is Active'),
      'Is Final Stage': fd.has('Is Final Stage'),
      'Is Initial Stage': fd.has('Is Initial Stage'),
      'Is Skippable': fd.has('Is Skippable')
    };
    if (isEdit) payload['Stage ID'] = data['Stage ID'];
    const btn = e.target.querySelector('[type=submit]');
    setButtonLoading(btn);
    overlay.remove();
    QueueManager.enqueue({
      module: 'stages', actionType: 'saveStage',
      payload,
      onDone: () => {
        toast('Stage saved!');
        _refreshAppConfig().catch(() => {});
        if (App.currentPage === 'config') loadStagesConfig();
      },
      onFail: j => toast('Save failed: ' + (j.error || 'Error'), 'error')
    });
    toast('Saving stage…', 'info');
  });
}

// ── Dropdowns Config ─────────────────────────────────────────────────────────
</script>

<script>
// ─── App Init ─────────────────────────────────────────────────────────────────
async function init() {
  renderIcons();
  renderInitialLoading();
  QueueManager.init();

  const token = localStorage.getItem('nbd_token');
  if (!token) { showLoginOverlay(); return; }

  try {
    await _continueAppInit(token);
  } catch (err) {
    const msg = String(err.message || err);
    localStorage.removeItem('nbd_token');
    if (/SESSION_EXPIRED|expired|invalid.*session/i.test(msg)) {
      showLoginOverlay('Your session expired. Please sign in again.');
    } else if (/ACCESS_DENIED|not authoris/i.test(msg)) {
      showLoginOverlay('Your account is not authorized to access this portal.');
    } else {
      showAccessDenied('', msg);
    }
  }
}

async function _continueAppInit(token) {
  Store.dispatch('SET_LOADING', { key: 'auth', value: true });
  const boot = await api.bootstrapWithToken(token);
  Store.dispatch('SET_USER', boot.user);
  Store.dispatch('SET_CONFIG', boot.config);
  AppCache.touch('config');
  AppLookup.rebuild();
  Store.dispatch('SET_LOADING', { key: 'auth', value: false });
  renderSidebar();

  const defaultPage = defaultPageForUser();
  _ensureCached('leads',          () => api.getLeads().catch(() => api.getFollowupLeads())).catch(() => {});
  _ensureCached('followups',      () => api.getFollowups({})).catch(() => {});
  _ensureCached('followupHistory',() => api.getFollowupHistory({})).catch(() => {});
  _ensureCached('activityLogs',   () => api.getLeadActivityLogs({})).catch(() => {});
  navigate(defaultPage);
  startCacheRevalidation();
}

function logout() {
  const token = localStorage.getItem('nbd_token');
  if (token) api.logout(token).catch(() => {});
  localStorage.removeItem('nbd_token');
  window.location.reload();
}

// ─── Google SSO helper ────────────────────────────────────────────────────────
function _initOverlayGoogleAuth(overlay) {
  const clientId  = typeof GOOGLE_CLIENT_ID !== 'undefined' ? GOOGLE_CLIENT_ID : '';
  const container = overlay.querySelector('#lo-google-container');
  const errEl     = overlay.querySelector('#lo-google-err');
  if (!container) return;

  if (!clientId) {
    if (errEl) { errEl.style.display = 'block'; errEl.textContent = 'Google sign-in not configured. Set GOOGLE_CLIENT_ID in Script Properties.'; }
    return;
  }

  container.innerHTML = '<div style="height:44px;display:flex;align-items:center;justify-content:center"><span class="lo-spinner"></span></div>';

  function doInit() {
    container.innerHTML = '';
    window.google.accounts.id.initialize({
      client_id: clientId,
      callback: async function(response) {
        container.innerHTML = '<div style="padding:10px;text-align:center;font-size:13px;color:#666">Signing in…</div>';
        if (errEl) errEl.style.display = 'none';
        try {
          const result = await api.loginWithGoogle(response.credential);
          localStorage.setItem('nbd_token', result.token);
          overlay.remove();
          await _continueAppInit(result.token);
        } catch (err) {
          container.innerHTML = '';
          window.google.accounts.id.renderButton(container, { theme: 'outline', size: 'large', text: 'signin_with', shape: 'rectangular', width: 300 });
          if (errEl) { errEl.style.display = 'block'; errEl.textContent = String(err.message || err); }
        }
      }
    });
    window.google.accounts.id.renderButton(container, { theme: 'outline', size: 'large', text: 'signin_with', shape: 'rectangular', width: 300 });
  }

  let tries = 0;
  const iv = setInterval(function() {
    if (window.google && window.google.accounts && window.google.accounts.id) {
      clearInterval(iv); doInit(); return;
    }
    if (++tries > 80) {
      clearInterval(iv);
      container.innerHTML = '';
      if (errEl) { errEl.style.display = 'block'; errEl.textContent = 'Google sign-in failed to load. Check your network connection.'; }
    }
  }, 100);
}

// ─── Login overlay ────────────────────────────────────────────────────────────
function showLoginOverlay(errorMsg) {
  const errHTML = errorMsg
    ? `<div class="lo-err-msg">
         <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
         ${escapeHtml(errorMsg)}
       </div>` : '';

  const overlay = document.createElement('div');
  overlay.id = 'nbd-login-overlay';
  overlay.innerHTML = `
    <div class="lo-stage">
      <aside class="lo-side">
        <div class="lo-side-grid"></div>
        <div class="lo-side-brand" style="position:relative;z-index:2"><span class="lo-mark"></span> ${APP_TITLE}</div>
        <div style="position:relative;z-index:2;flex:1;display:flex;flex-direction:column;justify-content:center;padding:8px 0">
          <p style="font-size:22px;font-weight:700;color:#fff;line-height:1.28;margin:0 0 4px">Your entire sales operation.</p>
          <p style="font-size:22px;font-weight:700;color:rgba(255,255,255,0.3);line-height:1.28;margin:0 0 36px">One simple portal.</p>
          <div style="display:flex;flex-direction:column;gap:22px">
            <div style="display:flex;gap:14px;align-items:flex-start">
              <div style="width:40px;height:40px;background:rgba(255,255,255,0.1);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.82)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><polyline points="16 11 18 13 22 9"/></svg>
              </div>
              <div><div style="font-size:13.5px;font-weight:600;color:rgba(255,255,255,0.9);margin-bottom:3px">Lead Management</div>
              <div style="font-size:12px;color:rgba(255,255,255,0.42);line-height:1.55">Capture, assign and track every prospect from first contact to close</div></div>
            </div>
            <div style="display:flex;gap:14px;align-items:flex-start">
              <div style="width:40px;height:40px;background:rgba(255,255,255,0.1);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.82)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
              </div>
              <div><div style="font-size:13.5px;font-weight:600;color:rgba(255,255,255,0.9);margin-bottom:3px">Sales Pipeline</div>
              <div style="font-size:12px;color:rgba(255,255,255,0.42);line-height:1.55">Visualise your funnel stage by stage and move deals forward in real time</div></div>
            </div>
            <div style="display:flex;gap:14px;align-items:flex-start">
              <div style="width:40px;height:40px;background:rgba(255,255,255,0.1);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.82)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
              </div>
              <div><div style="font-size:13.5px;font-weight:600;color:rgba(255,255,255,0.9);margin-bottom:3px">Smart Follow-ups</div>
              <div style="font-size:12px;color:rgba(255,255,255,0.42);line-height:1.55">Scheduled reminders so no opportunity ever slips through the cracks</div></div>
            </div>
            <div style="display:flex;gap:14px;align-items:flex-start">
              <div style="width:40px;height:40px;background:rgba(255,255,255,0.1);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.82)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
              </div>
              <div><div style="font-size:13.5px;font-weight:600;color:rgba(255,255,255,0.9);margin-bottom:3px">Team &amp; Roles</div>
              <div style="font-size:12px;color:rgba(255,255,255,0.42);line-height:1.55">Assign leads, set permissions and monitor your whole team's activity</div></div>
            </div>
          </div>
        </div>
        <div class="lo-stats">
          <div><div class="lo-stat-k">Leads</div><div class="lo-stat-v">50k<span class="lo-stat-u">+</span></div></div>
          <div><div class="lo-stat-k">Uptime</div><div class="lo-stat-v"><span class="lo-live"></span>99.9<span class="lo-stat-u">%</span></div></div>
          <div><div class="lo-stat-k">Follow-ups</div><div class="lo-stat-v">200k<span class="lo-stat-u">+</span></div></div>
        </div>
      </aside>
      <section class="lo-pane">
        <div class="lo-top"><div class="lo-top-brand"><span class="lo-mark"></span> ${APP_TITLE}</div></div>
        <div class="lo-wrap">
          <div class="lo-form-card">
            <h1 class="lo-title">Welcome back</h1>
            <p class="lo-subtitle">Sign in to your ${APP_TITLE} workspace.</p>
            ${errHTML}
            <form id="lo-form" novalidate autocomplete="on">
              <div class="lo-field">
                <label class="lo-label" for="lo-email">Email</label>
                <input id="lo-email" class="lo-input" type="email" name="email" placeholder="you@company.com" autocomplete="email" required>
                <div class="lo-field-err" id="lo-email-err" style="display:none"></div>
              </div>
              <div class="lo-field">
                <div class="lo-field-row"><label class="lo-label" for="lo-pw">Password</label></div>
                <div class="lo-input-wrap">
                  <input id="lo-pw" class="lo-input pad-r" type="password" name="password" placeholder="••••••••" autocomplete="current-password" required>
                  <button type="button" class="lo-pw-toggle" id="lo-pw-toggle" title="Show / hide password">
                    <svg id="lo-eye-on" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
                    <svg id="lo-eye-off" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" y1="2" x2="22" y2="22"/></svg>
                  </button>
                </div>
                <div class="lo-field-err" id="lo-pw-err" style="display:none"></div>
              </div>
              <button type="submit" class="lo-btn" id="lo-submit">Sign in</button>
            </form>
            <div class="lo-divider">or continue with</div>
            <div id="lo-google-container" style="min-height:44px;display:flex;justify-content:center;align-items:center;margin:4px 0 0"></div>
            <div id="lo-google-err" style="display:none;font-size:12px;color:#c00;text-align:center;margin-top:6px;padding:0 16px"></div>
          </div>
        </div>
        <div class="lo-bot"><span><span class="lo-status-dot"></span> All systems operational</span></div>
      </section>
    </div>`;

  document.body.appendChild(overlay);
  _initOverlayGoogleAuth(overlay);

  const pwInput = overlay.querySelector('#lo-pw');
  const eyeOn   = overlay.querySelector('#lo-eye-on');
  const eyeOff  = overlay.querySelector('#lo-eye-off');
  overlay.querySelector('#lo-pw-toggle').addEventListener('click', function() {
    const show = pwInput.type === 'password';
    pwInput.type = show ? 'text' : 'password';
    eyeOn.style.display = show ? 'none' : '';
    eyeOff.style.display = show ? '' : 'none';
  });

  const form       = overlay.querySelector('#lo-form');
  const submit     = overlay.querySelector('#lo-submit');
  const emailInput = overlay.querySelector('#lo-email');
  const emailErr   = overlay.querySelector('#lo-email-err');
  const pwErr      = overlay.querySelector('#lo-pw-err');

  form.addEventListener('submit', async function(e) {
    e.preventDefault();
    emailErr.style.display = 'none';
    pwErr.style.display    = 'none';
    emailInput.classList.remove('err');
    pwInput.classList.remove('err');

    const email = emailInput.value.trim();
    const pw    = pwInput.value;
    let valid   = true;

    if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      emailErr.textContent = 'Enter a valid email address.';
      emailErr.style.display = 'block';
      emailInput.classList.add('err');
      valid = false;
    }
    if (!pw || pw.length < 4) {
      pwErr.textContent = 'Password is required.';
      pwErr.style.display = 'block';
      pwInput.classList.add('err');
      valid = false;
    }
    if (!valid) return;

    submit.disabled = true;
    submit.innerHTML = '<span class="lo-spinner"></span> Signing in…';

    try {
      const result = await api.login(email, pw);
      localStorage.setItem('nbd_token', result.token);
      overlay.remove();
      await _continueAppInit(result.token);
    } catch (err) {
      submit.disabled = false;
      submit.textContent = 'Sign in';
      const existing = overlay.querySelector('.lo-err-msg');
      if (existing) existing.remove();
      const errDiv = document.createElement('div');
      errDiv.className = 'lo-err-msg';
      errDiv.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg> ${escapeHtml(String(err.message || err))}`;
      form.prepend(errDiv);
    }
  });

  setTimeout(function() { emailInput && emailInput.focus(); }, 80);
}
</script>

<script>
// ─── App Init ─────────────────────────────────────────────────────────────────
async function init() {
  renderIcons();
  renderInitialLoading();
  QueueManager.init();

  const token = localStorage.getItem('nbd_token');
  if (!token) { showLoginOverlay(); return; }

  try {
    await _continueAppInit(token);
  } catch (err) {
    const msg = String(err.message || err);
    localStorage.removeItem('nbd_token');
    if (/SESSION_EXPIRED|expired|invalid.*session/i.test(msg)) {
      showLoginOverlay('Your session expired. Please sign in again.');
    } else if (/ACCESS_DENIED|not authoris/i.test(msg)) {
      showLoginOverlay('Your account is not authorized to access this portal.');
    } else {
      showAccessDenied('', msg);
    }
  }
}

async function _continueAppInit(token) {
  Store.dispatch('SET_LOADING', { key: 'auth', value: true });
  const boot = await api.bootstrapWithToken(token);
  Store.dispatch('SET_USER', boot.user);
  Store.dispatch('SET_CONFIG', boot.config);
  AppCache.touch('config');
  AppLookup.rebuild();
  Store.dispatch('SET_LOADING', { key: 'auth', value: false });
  renderSidebar();

  const requestedPage = _initialRequestedPage();
  const defaultPage = requestedPage && canNavigate(requestedPage) ? requestedPage : defaultPageForUser();
  navigate(defaultPage);
}

function _initialRequestedPage() {
  const raw = String(typeof INITIAL_PAGE !== 'undefined' ? INITIAL_PAGE : '').trim().toLowerCase();
  const aliases = { bulkview: 'bulkview', bulkentry: 'bulkview', bulk: 'bulkview' };
  return aliases[raw] || raw;
}

function logout() {
  const token = localStorage.getItem('nbd_token');
  if (token) api.logout(token).catch(() => {});
  localStorage.removeItem('nbd_token');
  window.location.reload();
}

// ─── Google SSO helper ────────────────────────────────────────────────────────
function _initOverlayGoogleAuth(overlay) {
  const clientId  = typeof GOOGLE_CLIENT_ID !== 'undefined' ? GOOGLE_CLIENT_ID : '';
  const container = overlay.querySelector('#lo-google-container');
  const errEl     = overlay.querySelector('#lo-google-err');
  if (!container) return;

  if (!clientId) {
    if (errEl) { errEl.style.display = 'block'; errEl.textContent = 'Google sign-in is temporarily unavailable. Please use email login.'; }
    return;
  }

  container.innerHTML = '<div style="height:44px;display:flex;align-items:center;justify-content:center"><span class="lo-spinner"></span></div>';

  function doInit() {
    container.innerHTML = '';
    window.google.accounts.id.initialize({
      client_id: clientId,
      callback: async function(response) {
        container.innerHTML = '<div style="padding:10px;text-align:center;font-size:13px;color:#666">Signing in…</div>';
        if (errEl) errEl.style.display = 'none';
        try {
          const result = await api.loginWithGoogle(response.credential);
          localStorage.setItem('nbd_token', result.token);
          overlay.remove();
          await _continueAppInit(result.token);
        } catch (err) {
          container.innerHTML = '';
          window.google.accounts.id.renderButton(container, { theme: 'outline', size: 'large', text: 'signin_with', shape: 'rectangular', width: 300 });
          if (errEl) { errEl.style.display = 'block'; errEl.textContent = String(err.message || err); }
        }
      }
    });
    window.google.accounts.id.renderButton(container, { theme: 'outline', size: 'large', text: 'signin_with', shape: 'rectangular', width: 300 });
  }

  let tries = 0;
  const iv = setInterval(function() {
    if (window.google && window.google.accounts && window.google.accounts.id) {
      clearInterval(iv); doInit(); return;
    }
    if (++tries > 80) {
      clearInterval(iv);
      container.innerHTML = '';
      if (errEl) { errEl.style.display = 'block'; errEl.textContent = 'Google sign-in failed to load. Check your network connection.'; }
    }
  }, 100);
}

// ─── Login overlay ────────────────────────────────────────────────────────────
function showLoginOverlay(errorMsg, errorType) {
  const isSession = /session|expired/i.test(errorMsg || '');
  const msgClass  = (errorType === 'info' || isSession) ? 'lo-info-msg' : 'lo-err-msg';
  const errHTML   = errorMsg ? `
    <div class="${msgClass}">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;margin-top:1px"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <span>${escapeHtml(errorMsg)}</span>
    </div>` : '';

  const overlay = document.createElement('div');
  overlay.id = 'nbd-login-overlay';
  overlay.innerHTML = `
    <div class="lo-stage">

      <!-- ── Left hero panel ── -->
      <aside class="lo-side">
        <div class="lo-side-grid"></div>
        <div class="lo-side-glow"></div>

        <div class="lo-side-brand">
          <span class="lo-mark"></span>
          ${APP_TITLE}
          <span class="lo-badge">High-velocity sales</span>
        </div>

        <div class="lo-hero">
          <div>
            <p class="lo-h1">Your entire sales</p>
            <p class="lo-h1 lo-h1-dim">operation, simplified.</p>
            <p class="lo-tag">Real-time CRM workspace &nbsp;·&nbsp; Lead management &nbsp;·&nbsp; Smart follow-ups</p>
          </div>

          <!-- Product mockup -->
          <div class="lo-mockup">
            <div class="lo-mock-bar">
              <div class="lo-mock-dots"><span></span><span></span><span></span></div>
              <div class="lo-mock-url">lqportal.app / dashboard</div>
            </div>
            <div class="lo-mock-body">
              <div class="lo-mock-sidebar">
                <div class="lo-mock-nav active">Leads</div>
                <div class="lo-mock-nav">Pipeline</div>
                <div class="lo-mock-nav">Follow-ups</div>
                <div class="lo-mock-nav">Team</div>
              </div>
              <div class="lo-mock-main">
                <div class="lo-mock-stats">
                  <div class="lo-mock-stat">
                    <div class="lo-mock-stat-v">142</div>
                    <div class="lo-mock-stat-k">Today's Leads</div>
                  </div>
                  <div class="lo-mock-stat">
                    <div class="lo-mock-stat-v" style="color:#34D399">68%</div>
                    <div class="lo-mock-stat-k">Conversion</div>
                  </div>
                  <div class="lo-mock-stat">
                    <div class="lo-mock-stat-v" style="color:#FBB240">24</div>
                    <div class="lo-mock-stat-k">Follow-ups</div>
                  </div>
                </div>
                <div class="lo-mock-pipeline">
                  <div class="lo-mock-stage" style="--c:#6366F1"></div>
                  <div class="lo-mock-stage" style="--c:#8B5CF6"></div>
                  <div class="lo-mock-stage" style="--c:#10B981"></div>
                  <div class="lo-mock-stage" style="--c:#F59E0B"></div>
                </div>
                <div class="lo-mock-fu-list">
                  <div class="lo-mock-fu-item"><span class="lo-mock-fu-dot" style="background:#34D399"></span>Acme Corp &mdash; Call scheduled today</div>
                  <div class="lo-mock-fu-item"><span class="lo-mock-fu-dot" style="background:#FBB240"></span>Globex Ltd &mdash; Proposal follow-up due</div>
                </div>
              </div>
            </div>
          </div>

          <!-- Feature list -->
          <div class="lo-features">
            <div class="lo-feat">
              <div class="lo-feat-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.78)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><polyline points="16 11 18 13 22 9"/></svg></div>
              <div><div class="lo-feat-title">Lead Management</div><div class="lo-feat-sub">Capture, assign and track every prospect</div></div>
            </div>
            <div class="lo-feat">
              <div class="lo-feat-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.78)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg></div>
              <div><div class="lo-feat-title">Sales Pipeline</div><div class="lo-feat-sub">Visualise your funnel, move deals in real time</div></div>
            </div>
            <div class="lo-feat">
              <div class="lo-feat-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.78)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg></div>
              <div><div class="lo-feat-title">Smart Follow-ups</div><div class="lo-feat-sub">Scheduled reminders so no deal slips away</div></div>
            </div>
            <div class="lo-feat">
              <div class="lo-feat-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.78)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></div>
              <div><div class="lo-feat-title">Team &amp; Roles</div><div class="lo-feat-sub">Granular permissions across your workspace</div></div>
            </div>
          </div>
        </div>

        <div class="lo-stats">
          <div><div class="lo-stat-k">Leads tracked</div><div class="lo-stat-v">50k<span class="lo-stat-u">+</span></div></div>
          <div><div class="lo-stat-k">Uptime</div><div class="lo-stat-v"><span class="lo-live"></span>99.9<span class="lo-stat-u">%</span></div></div>
          <div><div class="lo-stat-k">Follow-ups</div><div class="lo-stat-v">200k<span class="lo-stat-u">+</span></div></div>
        </div>
      </aside>

      <!-- ── Right form panel ── -->
      <section class="lo-pane">
        <div class="lo-top">
          <div class="lo-top-brand">
            <span class="lo-mark" style="width:22px;height:22px;border-radius:6px"></span>
            ${APP_TITLE}
          </div>
          <div class="lo-top-secure">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            Secure workspace
          </div>
        </div>

        <div class="lo-wrap">
          <div class="lo-form-card">
            <h1 class="lo-title">Welcome back</h1>
            <p class="lo-subtitle">Sign in to your ${APP_TITLE} workspace.</p>
            ${errHTML}

            <form id="lo-form" novalidate autocomplete="on">
              <div class="lo-field">
                <label class="lo-label" for="lo-email">Email address</label>
                <div class="lo-input-wrap">
                  <span class="lo-input-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M2 7l10 7 10-7"/></svg>
                  </span>
                  <input id="lo-email" class="lo-input" type="email" name="email" placeholder="you@company.com" autocomplete="email" required>
                </div>
                <div class="lo-field-err" id="lo-email-err" style="display:none"></div>
              </div>

              <div class="lo-field">
                <label class="lo-label" for="lo-pw">Password</label>
                <div class="lo-input-wrap">
                  <span class="lo-input-icon">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
                  </span>
                  <input id="lo-pw" class="lo-input pad-r" type="password" name="password" placeholder="••••••••" autocomplete="current-password" required>
                  <button type="button" class="lo-pw-toggle" id="lo-pw-toggle" title="Show / hide password">
                    <svg id="lo-eye-on" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
                    <svg id="lo-eye-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" y1="2" x2="22" y2="22"/></svg>
                  </button>
                </div>
                <div class="lo-field-err" id="lo-pw-err" style="display:none"></div>
              </div>

              <div class="lo-meta-row">
                <label class="lo-remember">
                  <input type="checkbox" id="lo-remember"> Remember me
                </label>
                <a href="#" class="lo-forgot" onclick="return false">Forgot password?</a>
              </div>

              <button type="submit" class="lo-btn" id="lo-submit">Sign in</button>
            </form>

            <div class="lo-divider">or continue with</div>
            <div id="lo-google-container" style="min-height:44px;display:flex;justify-content:center;align-items:center"></div>
            <div id="lo-google-err" style="display:none;font-size:12px;color:var(--lo-muted);text-align:center;margin-top:8px"></div>

            <div class="lo-trust">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
              Protected by encrypted authentication
            </div>
          </div>
        </div>

        <div class="lo-bot">
          <span><span class="lo-status-dot"></span> All systems operational</span>
          <div style="display:flex;gap:16px">
            <a href="#" onclick="return false">Privacy Policy</a>
            <a href="#" onclick="return false">Terms of Service</a>
          </div>
        </div>
      </section>
    </div>`;

  document.body.appendChild(overlay);
  _initOverlayGoogleAuth(overlay);

  const pwInput = overlay.querySelector('#lo-pw');
  const eyeOn   = overlay.querySelector('#lo-eye-on');
  const eyeOff  = overlay.querySelector('#lo-eye-off');
  overlay.querySelector('#lo-pw-toggle').addEventListener('click', function() {
    const show = pwInput.type === 'password';
    pwInput.type = show ? 'text' : 'password';
    eyeOn.style.display = show ? 'none' : '';
    eyeOff.style.display = show ? '' : 'none';
  });

  const form       = overlay.querySelector('#lo-form');
  const submit     = overlay.querySelector('#lo-submit');
  const emailInput = overlay.querySelector('#lo-email');
  const emailErr   = overlay.querySelector('#lo-email-err');
  const pwErr      = overlay.querySelector('#lo-pw-err');

  form.addEventListener('submit', async function(e) {
    e.preventDefault();
    emailErr.style.display = 'none';
    pwErr.style.display    = 'none';
    emailInput.classList.remove('err');
    pwInput.classList.remove('err');

    const email = emailInput.value.trim();
    const pw    = pwInput.value;
    let valid   = true;

    if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      emailErr.textContent = 'Enter a valid email address.';
      emailErr.style.display = 'block';
      emailInput.classList.add('err');
      valid = false;
    }
    if (!pw || pw.length < 4) {
      pwErr.textContent = 'Password is required.';
      pwErr.style.display = 'block';
      pwInput.classList.add('err');
      valid = false;
    }
    if (!valid) return;

    submit.disabled = true;
    submit.innerHTML = '<span class="lo-spinner"></span> Signing in…';

    try {
      const result = await api.login(email, pw);
      localStorage.setItem('nbd_token', result.token);
      overlay.remove();
      await _continueAppInit(result.token);
    } catch (err) {
      submit.disabled = false;
      submit.textContent = 'Sign in';
      const existing = overlay.querySelector('.lo-err-msg');
      if (existing) existing.remove();
      const errDiv = document.createElement('div');
      errDiv.className = 'lo-err-msg';
      errDiv.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg> ${escapeHtml(String(err.message || err))}`;
      form.prepend(errDiv);
    }
  });

  setTimeout(function() { emailInput && emailInput.focus(); }, 80);
}
</script>

<script>
// ─── App Init ─────────────────────────────────────────────────────────────────
async function init() {
  renderIcons();
  renderInitialLoading();
  QueueManager.init();

  const token = localStorage.getItem('nbd_token');
  if (!token) { showLoginOverlay(); return; }

  try {
    await _continueAppInit(token);
  } catch (err) {
    const msg = String(err.message || err);
    localStorage.removeItem('nbd_token');
    if (/SESSION_EXPIRED|expired|invalid.*session/i.test(msg)) {
      showLoginOverlay('Your session expired. Please sign in again.');
    } else if (/ACCESS_DENIED|not authoris/i.test(msg)) {
      showLoginOverlay('Your account is not authorized to access this portal.');
    } else {
      showAccessDenied('', msg);
    }
  }
}

async function _continueAppInit(token) {
  Store.dispatch('SET_LOADING', { key: 'auth', value: true });

  // One round-trip loads the whole working set (user + config + leads + follow-ups).
  // Fall back to the legacy bootstrap (config only) for older deployments.
  let boot;
  try {
    boot = await api.bootstrapData(token);
  } catch (e) {
    boot = await api.bootstrapWithToken(token);
  }

  Store.dispatch('SET_USER', boot.user);
  Store.dispatch('SET_CONFIG', boot.config);
  AppCache.touch('config');
  AppLookup.rebuild();

  // Hydrate state from the single payload — pages then render with no extra fetches.
  if (Array.isArray(boot.leads))     AppCache.setRows('leads', boot.leads);
  if (Array.isArray(boot.followups)) AppCache.setRows('followups', boot.followups);
  if (boot.stamps && boot.stamps.appVersion && boot.stamps.appVersion !== '0') {
    _knownAppVersion = boot.stamps.appVersion;
  }

  Store.dispatch('SET_LOADING', { key: 'auth', value: false });
  renderSidebar();

  const requestedPage = _initialRequestedPage();
  const defaultPage = requestedPage && canNavigate(requestedPage) ? requestedPage : defaultPageForUser();

  // Legacy fallback path carries no leads — load them on demand so the sidebar fills.
  if (!AppCache.isLoaded('leads')) {
    _ensureCached('leads', () => api.getLeads().catch(() => api.getFollowupLeads()))
      .then(() => { try { renderSidebar(); } catch (e) {} }).catch(() => {});
  }

  navigate(defaultPage);
  startCacheRevalidation();
  _prefetchSecondary_();
}

// After first paint, warm the heavy collections (follow-up history + activity logs) in
// the background so lead-detail and Today views open instantly later. Non-blocking.
function _prefetchSecondary_() {
  setTimeout(function() {
    if (!AppCache.isLoaded('followupHistory')) _ensureCached('followupHistory', () => api.getFollowupHistory({})).catch(() => {});
    if (!AppCache.isLoaded('activityLogs'))    _ensureCached('activityLogs',    () => api.getLeadActivityLogs({})).catch(() => {});
  }, 1200);
}

function _initialRequestedPage() {
  const raw = String(typeof INITIAL_PAGE !== 'undefined' ? INITIAL_PAGE : '').trim().toLowerCase();
  const aliases = { bulkview: 'bulkview', bulkentry: 'bulkview', bulk: 'bulkview' };
  return aliases[raw] || raw;
}

function logout() {
  const token = localStorage.getItem('nbd_token');
  if (token) api.logout(token).catch(() => {});
  localStorage.removeItem('nbd_token');
  window.location.reload();
}

// Loads the Vela login typefaces (Manrope + Space Grotesk) once, on demand.
function _ensureLoginFonts_() {
  if (document.getElementById('lo-fonts')) return;
  const l = document.createElement('link');
  l.id = 'lo-fonts';
  l.rel = 'stylesheet';
  l.href = 'https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap';
  document.head.appendChild(l);
}

// ─── Google SSO helper ────────────────────────────────────────────────────────
function _initOverlayGoogleAuth(overlay) {
  const clientId  = typeof GOOGLE_CLIENT_ID !== 'undefined' ? GOOGLE_CLIENT_ID : '';
  const container = overlay.querySelector('#lo-google-container');
  const errEl     = overlay.querySelector('#lo-google-err');
  if (!container) return;

  const loadingHTML =
    '<div style="height:46px;display:flex;align-items:center;justify-content:center">' +
    '<span style="width:18px;height:18px;border:2.4px solid color-mix(in srgb,var(--brand) 25%,transparent);border-top-color:var(--lo-acc);border-radius:50%;animation:spin .7s linear infinite;display:inline-block"></span></div>';

  if (!clientId) {
    if (errEl) { errEl.style.display = 'block'; errEl.textContent = 'Google sign-in is temporarily unavailable. Please use email login.'; }
    return;
  }

  container.innerHTML = loadingHTML;

  function renderBtn() {
    const gw = Math.min(400, Math.max(240, container.clientWidth || 360));
    window.google.accounts.id.renderButton(container, { theme: 'outline', size: 'large', text: 'continue_with', shape: 'rectangular', width: gw });
  }

  function doInit() {
    container.innerHTML = '';
    window.google.accounts.id.initialize({
      client_id: clientId,
      callback: async function(response) {
        container.innerHTML = '<div style="padding:10px;text-align:center;font-size:13px;color:#666">Signing in…</div>';
        if (errEl) errEl.style.display = 'none';
        try {
          const result = await api.loginWithGoogle(response.credential);
          localStorage.setItem('nbd_token', result.token);
          overlay.remove();
          await _continueAppInit(result.token);
        } catch (err) {
          container.innerHTML = '';
          renderBtn();
          if (errEl) { errEl.style.display = 'block'; errEl.textContent = String(err.message || err); }
        }
      }
    });
    renderBtn();
  }

  let tries = 0;
  const iv = setInterval(function() {
    if (window.google && window.google.accounts && window.google.accounts.id) {
      clearInterval(iv); doInit(); return;
    }
    if (++tries > 80) {
      clearInterval(iv);
      container.innerHTML = '';
      if (errEl) { errEl.style.display = 'block'; errEl.textContent = 'Google sign-in failed to load. Check your network connection.'; }
    }
  }, 100);
}

  document.body.appendChild(overlay);
  _initOverlayGoogleAuth(overlay);

  const pwInput = overlay.querySelector('#lo-pw');
  const eyeOn   = overlay.querySelector('#lo-eye-on');
  const eyeOff  = overlay.querySelector('#lo-eye-off');
  overlay.querySelector('#lo-pw-toggle').addEventListener('click', function() {
    const show = pwInput.type === 'password';
    pwInput.type = show ? 'text' : 'password';
    eyeOn.style.display = show ? 'none' : '';
    eyeOff.style.display = show ? '' : 'none';
  });

  const form       = overlay.querySelector('#lo-form');
  const submit     = overlay.querySelector('#lo-submit');
  const emailInput = overlay.querySelector('#lo-email');
  const emailErr   = overlay.querySelector('#lo-email-err');
  const pwErr      = overlay.querySelector('#lo-pw-err');

  // Ripple flourish on the gradient button.
  submit.addEventListener('mousedown', function(e) {
    const r  = submit.getBoundingClientRect();
    const sp = document.createElement('span');
    sp.style.cssText = 'position:absolute;left:' + (e.clientX - r.left) + 'px;top:' + (e.clientY - r.top) +
      'px;width:320px;height:320px;border-radius:50%;background:rgba(255,255,255,.45);pointer-events:none;transform:translate(-50%,-50%) scale(0);animation:ripple .6s ease-out forwards;';
    submit.appendChild(sp);
    setTimeout(function() { sp.remove(); }, 600);
  });

  form.addEventListener('submit', async function(e) {
    e.preventDefault();
    emailErr.style.display = 'none';
    pwErr.style.display    = 'none';
    emailInput.classList.remove('err');
    pwInput.classList.remove('err');

    const email = emailInput.value.trim();
    const pw    = pwInput.value;
    let valid   = true;

    if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      emailErr.textContent = 'Enter a valid email address.';
      emailErr.style.display = 'block';
      emailInput.classList.add('err');
      valid = false;
    }
    if (!pw || pw.length < 4) {
      pwErr.textContent = 'Password is required.';
      pwErr.style.display = 'block';
      pwInput.classList.add('err');
      valid = false;
    }
    if (!valid) return;

    submit.disabled = true;
    submit.innerHTML = '<span class="lo-spinner"></span> Signing in…';

    try {
      const result = await api.login(email, pw);
      localStorage.setItem('nbd_token', result.token);
      overlay.remove();
      await _continueAppInit(result.token);
    } catch (err) {
      submit.disabled = false;
      submit.innerHTML = idleBtn;
      const existing = overlay.querySelector('.lo-err-msg');
      if (existing) existing.remove();
      const errDiv = document.createElement('div');
      errDiv.className = 'lo-err-msg';
      errDiv.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg> ${escapeHtml(String(err.message || err))}`;
      form.prepend(errDiv);
    }
  });

  setTimeout(function() { emailInput && emailInput.focus(); }, 80);
}
</script>

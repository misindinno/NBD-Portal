  .arch-empty-ic svg { width: 30px; height: 30px; }
  .arch-empty-title { font-size: 16px; font-weight: 800; color: #0f172a; margin-bottom: 5px; }
  .arch-empty-text { font-size: 13px; color: #64748b; }

  /* Bulk progress dialog (minimisable) */
  .arch-prog-overlay { position: fixed; inset: 0; background: rgba(15,23,42,.4); display: flex; align-items: center; justify-content: center; z-index: 1200; }
  .arch-prog-overlay.min { inset: auto; right: 20px; bottom: 20px; background: transparent; display: block; }
  .arch-prog-card { background: #fff; border-radius: 14px; width: min(420px, 92vw); padding: 20px; box-shadow: 0 14px 44px rgba(15,23,42,.28); }
  .arch-prog-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .arch-prog-title { display: flex; align-items: center; gap: 8px; font-size: 15px; font-weight: 800; color: #0f172a; }
  .arch-prog-icon { width: 30px; height: 30px; border: 1px solid #e5e7eb; border-radius: 8px; background: #fff; color: #475569; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; }
  .arch-prog-icon:hover { background: #f8fafc; }
  .arch-prog-bar { height: 8px; background: #eef0f6; border-radius: 20px; overflow: hidden; margin-bottom: 10px; }
  .arch-prog-bar-fill { height: 100%; background: var(--brand, #6366f1); border-radius: 20px; transition: width .25s ease; }
  .arch-prog-stats { display: flex; justify-content: space-between; font-size: 13px; color: #475569; margin-bottom: 18px; }
  .arch-prog-stats strong { color: #0f172a; }
  .arch-prog-foot { display: flex; justify-content: flex-end; gap: 8px; }
  .arch-prog-chip { display: inline-flex; align-items: center; gap: 9px; background: #fff; border: 1px solid #e5e7eb; border-radius: 999px; padding: 9px 16px; box-shadow: 0 6px 22px rgba(15,23,42,.18); font-size: 13px; font-weight: 700; color: #0f172a; cursor: pointer; }
  .arch-prog-chip svg { width: 15px; height: 15px; }
  .arch-prog-chip-pct { color: var(--brand, #6366f1); }
  .arch-prog-spin { display: inline-flex; animation: spin 1s linear infinite; }
</style>
<script>
// ── Archive page ──────────────────────────────────────────────────────────────
// One shared shell (title + tabs + tools) with two tab states. Tab switches and
// filter/sort/page changes re-render only what changed — the search input is never
// rebuilt (no caret jump), and archive/restore update rows in place (no full reload).
let _archiveTab = 'archived';
const _archTabs = {
  archived:    { rows: null, search: '', owner: '', sortKey: 'archived', sortDir: 'desc', page: 1, pageSize: 10, selected: new Set() },
  suggestions: { rows: null, search: '', owner: '', severity: 'all', sortKey: 'total', sortDir: 'desc', page: 1, pageSize: 10, selected: new Set() }
};
let _archSearchTimer = null;
let _archLoadSeq = 0;

async function loadArchive(tab = 'archived', force = false) {
  const content = el('content');
  if (!content) return;
  if (!el('archive-page')) {
    content.innerHTML = `
    <div id="archive-page" class="page-shell">
      <div class="arch-head">
        <h1 class="arch-title">Archive</h1>
        <p class="arch-sub">Review stale leads, act on archive suggestions, and keep archived records separate from active work.</p>
      </div>
      <div class="arch-controls">
        <div class="arch-tabs" role="tablist">
          <button class="arch-tab" data-tab="archived" onclick="_archiveSwitchTab('archived')">${icon('archive', 15)} Archived</button>
          <button class="arch-tab" data-tab="suggestions" onclick="_archiveSwitchTab('suggestions')">${icon('lightbulb', 15)} Suggestions</button>
        </div>
        <div class="arch-tools" id="arch-tools"></div>
      </div>
      <div id="archive-kpis" class="arch-kpis"></div>
      <div id="archive-body"></div>
    </div>`;
    renderIcons(content);
  }
  await _archActivateTab(tab === 'suggestions' ? 'suggestions' : 'archived', force);
}
window.loadArchive = loadArchive;

function _archiveSwitchTab(tab) { if (tab !== _archiveTab || !_archTabs[tab].rows) _archActivateTab(tab); }
window._archiveSwitchTab = _archiveSwitchTab;

async function _archActivateTab(tab, force) {
  _archiveTab = tab;
  const seq = ++_archLoadSeq;
  document.querySelectorAll('#archive-page .arch-tab').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  _archRenderTools();
  const t = _archTabs[tab];
  if (force) { t.rows = null; t.page = 1; t.selected.clear(); }
  if (!t.rows) {
    _archShowLoading();
    try {
      if (tab === 'archived') {
        const d = await api.getArchiveData();
        t.rows = (d && d.archived) || [];
      } else {
        t.rows = await _archGetSuggestionRows();
      }
    } catch (e) {
      if (seq !== _archLoadSeq || !el('archive-body')) return;
      el('archive-body').innerHTML = `<div class="arch-card" style="padding:24px;color:#991b1b">Could not load: ${escapeHtml(e && e.message || e)}</div>`;
      const k = el('archive-kpis'); if (k) k.innerHTML = '';
      return;
    }
    // The user may have switched tabs (or navigated) while the fetch was in flight.
    if (seq !== _archLoadSeq || _archiveTab !== tab || !el('archive-page')) return;
  }
  _archRenderAll();
}

// ── Suggestions: computed from the already-fetched portal cache ──────────────────
// Suggestions = active leads with >= MIN total "Not Picked" contacts. Full-read admins
// compute this locally from the cached leads + follow-up history — zero server call, the
// tab opens instantly. Scoped users (or department-scoped portals) keep the server
// endpoint: their cached history is filtered to their own scope and would undercount
// calls logged by other users. Must mirror getArchiveSuggestionsFast_ (ArchiveService).
const _ARCH_SUG_MODE = 'Not Picked';
const _ARCH_SUG_MIN = 7;

function _archCanComputeLocally() {
  const deptScoped = ((App.config?.settings?.visibleDepartments) || []).length > 0;
  return !!(App.user && App.user.role === 'ADMIN' && !deptScoped);
}

async function _archGetSuggestionRows() {
  if (!_archCanComputeLocally()) return (await api.getArchiveSuggestions()) || [];
  if (!AppCache.isLoaded('followupHistory')) {
    // Deep-link / early click: the history prefetch hasn't landed yet — fetch the one
    // collection (also warms Today + lead detail) instead of the heavy endpoint.
    try { await _ensureCached('followupHistory', () => api.getFollowupHistory({})); }
    catch (e) { return (await api.getArchiveSuggestions()) || []; }
  }
  return _archComputeSuggestionsFromCache();
}

// Handles both date formats in the cache: Sheets-API serial numbers and text timestamps.
function _archHistTime(h) {
  const v = (h && (h['Done Date'] || h['Created At'])) || '';
  if (v === '' || v == null) return 0;
  if (typeof v === 'number') return v; // Sheets serial — monotonic, fine for ordering
  const t = new Date(String(v).replace(' ', 'T')).getTime();
  return isNaN(t) ? 0 : t;
}

function _archComputeSuggestionsFromCache() {
  const finalStageIds = {};
  (App.config.allStages || App.config.stages || []).forEach(s => {
    const isFinal = s['Is Final Stage'] === true || String(s['Is Final Stage'] || '').trim().toLowerCase() === 'true';
    if (isFinal) finalStageIds[String(s['Stage ID'] || '').trim()] = true;
  });
  const byLead = {};
  (AppCache.getRows('followupHistory') || []).forEach(h => {
    const id = String(h['Lead ID'] || '').trim();
    if (!id) return;
    (byLead[id] || (byLead[id] = [])).push(h);
  });
  const suggestions = [];
  (AppCache.getRows('leads') || []).forEach(lead => {
    const id = String(lead['Lead ID'] || '').trim();
    if (!id) return;
    if (lead['NBD Lead ID'] || lead['Pushed To NBD At']) return;
    if (String(lead['Is Archived']).toLowerCase() === 'true' || lead['Is Archived'] === true) return;
    if (finalStageIds[String(lead['Stage ID'] || '').trim()]) return;
    const hist = (byLead[id] || []).slice().sort((a, b) => _archHistTime(a) - _archHistTime(b));
    let streak = 0, maxStreak = 0, total = 0, lastDate = '';
    hist.forEach(h => {
      const mode = String(h['Contact Mode'] || '').trim();
      if (!mode) return; // system / stage-change rows: not a contact attempt
      if (mode === _ARCH_SUG_MODE) {
        streak++; total++;
        if (streak > maxStreak) maxStreak = streak;
        lastDate = h['Done Date'] || h['Created At'] || lastDate;
      } else {
        streak = 0; // any answered/other contact breaks the run
      }
    });
    if (total >= _ARCH_SUG_MIN) {
      suggestions.push(Object.assign({}, lead, {
        _notPickedTotal: total,
        _notPickedStreak: maxStreak,
        _lastNotPickedDate: lastDate
      }));
    }
  });
  return suggestions.sort((a, b) =>
    (b._notPickedTotal - a._notPickedTotal) || (b._notPickedStreak - a._notPickedStreak));
}

function _archRenderTools() {
  const tools = el('arch-tools');
  if (!tools) return;
  tools.innerHTML =
    (_archiveTab === 'archived' ? `<button class="arch-btn" onclick="_exportArchiveCsv()">${icon('download', 14)} Export</button>` : '') +
    `<button class="arch-btn" onclick="loadArchive(_archiveTab, true)">${icon('refresh-cw', 14)} Refresh</button>`;
  renderIcons(tools);
}

function _archShowLoading() {
  const kpis = el('archive-kpis');
  if (kpis) kpis.innerHTML = '<div class="sk" style="height:70px;border-radius:12px"></div>'.repeat(3);
  const body = el('archive-body');
  if (body) body.innerHTML = skeletonPage('table');
}

// ── Shared helpers ───────────────────────────────────────────────────────────────
function _archKpi(o) {
  const clickable = !!o.onclick;
  const cls = `arch-kpi arch-kpi--${o.variant || 'total'}${clickable ? '' : ' static'}${o.active ? ' active' : ''}`;
  return `<${clickable ? 'button' : 'div'} class="${cls}"${clickable ? ` onclick="${o.onclick}"` : ''}>
    <span class="arch-kpi-ic">${icon(o.ic, 20)}</span>
    <span class="arch-kpi-body">
      <span class="arch-kpi-val">${escapeHtml(o.val)}</span>
      <span class="arch-kpi-label">${escapeHtml(o.label)}</span>
      <span class="arch-kpi-sub">${escapeHtml(o.sub)}</span>
    </span>
  </${clickable ? 'button' : 'div'}>`;
}

function _archFmtDate(v) {
  if (v === undefined || v === null || v === '') return '—';
  let d;
  if (typeof v === 'number') d = new Date(Math.round((v - 25569) * 86400000));
  else d = new Date(v);
  if (isNaN(d.getTime())) return String(v);
  const mon = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][d.getMonth()];
  return `${String(d.getDate()).padStart(2, '0')} ${mon} ${d.getFullYear()}`;
}
function _archFmtTime(v) { if (v == null || v === '') return 0; if (typeof v === 'number') return v; const t = new Date(v).getTime(); return isNaN(t) ? 0 : t; }
function _archOwnerName(id) { return (App.config.userNameMap && App.config.userNameMap[id]) || id || '—'; }

function _archOwners(t) {
  const map = {};
  (t.rows || []).forEach(r => { const id = r['Assigned To']; if (id) map[id] = _archOwnerName(id); });
  return Object.keys(map).map(id => ({ id, name: map[id] })).sort((a, b) => String(a.name).localeCompare(String(b.name)));
}

function _archFiltered(tab) {
  const t = _archTabs[tab];
  let rows = (t.rows || []).slice();
  if (tab === 'suggestions') {
    if (t.severity === 'warn') rows = rows.filter(r => Number(r._notPickedTotal) === 7);
    else if (t.severity === 'crit') rows = rows.filter(r => Number(r._notPickedTotal) >= 8);
  }
  if (t.owner) rows = rows.filter(r => String(r['Assigned To'] || '') === t.owner);
  if (t.search) {
    const q = t.search.toLowerCase();
    rows = rows.filter(r => {
      const hay = [r['Company Name'], r['Client Description'], r['City'], r['State'],
        _archOwnerName(r['Assigned To']), r['Lead ID'], tab === 'archived' ? r['Archive Reason'] : '']
        .map(x => String(x || '')).join(' ').toLowerCase();
      return hay.includes(q);
    });
  }
  const dir = t.sortDir === 'asc' ? 1 : -1;
  const val = (r) => {
    if (tab === 'suggestions') {
      if (t.sortKey === 'streak') return Number(r._notPickedStreak || 0);
      if (t.sortKey === 'last') return _archFmtTime(r._lastNotPickedDate);
      return Number(r._notPickedTotal || 0);
    }
    if (t.sortKey === 'pending') return Number(r._pendingDays || 0);
    if (t.sortKey === 'notpicked') return Number(r._notPickedCount || 0);
    if (t.sortKey === 'fu') return Number(r._followupCount || 0);
    return _archFmtTime(r['Archived At']);
  };
  rows.sort((a, b) => (val(a) - val(b)) * dir);
  return rows;
}

function _archTh(key, label) {
  const t = _archTabs[_archiveTab];
  const sorted = t.sortKey === key;
  const ar = sorted ? (t.sortDir === 'asc' ? '▲' : '▼') : '↕';
  return `<th class="sortable${sorted ? ' sorted' : ''}" onclick="_archSetSort('${key}')">${escapeHtml(label)} <span class="arch-sort-ic">${ar}</span></th>`;
}

// ── Rendering ────────────────────────────────────────────────────────────────────
function _archRenderAll() {
  _archRenderKpis();
  _archRenderCard();
}

function _archRenderKpis() {
  const kpis = el('archive-kpis');
  if (!kpis) return;
  if (_archiveTab === 'suggestions') {
    const t = _archTabs.suggestions;
    const all = t.rows || [];
    const crit = all.filter(r => Number(r._notPickedTotal) >= 8).length;
    const warn = all.filter(r => Number(r._notPickedTotal) === 7).length;
    kpis.innerHTML = [
      _archKpi({ label: 'Total suggestions', val: all.length, sub: 'leads flagged for review', ic: 'inbox', variant: 'total', onclick: `_archSugSetSeverity('all')`, active: t.severity === 'all' }),

function _archPagHTML(total, start, count, pageCount) {
  const t = _archTabs[_archiveTab];
  const from = total ? start + 1 : 0;
  const to = start + count;
  const btn = (label, page, opts) => `<button class="arch-pag-btn${opts && opts.active ? ' active' : ''}" ${opts && opts.disabled ? 'disabled' : ''} onclick="_archSetPage(${page})">${label}</button>`;
  let nums = '';
  const push = (p) => { nums += btn(String(p), p, { active: p === t.page }); };
  const dots = () => { nums += '<span class="arch-pag-dots">…</span>'; };
  if (pageCount <= 7) { for (let p = 1; p <= pageCount; p++) push(p); }
  else {
    push(1);
    if (t.page > 3) dots();
    for (let p = Math.max(2, t.page - 1); p <= Math.min(pageCount - 1, t.page + 1); p++) push(p);
    if (t.page < pageCount - 2) dots();
    push(pageCount);
  }
  return `<div class="arch-pag">
    <span class="arch-pag-left">
      <span class="arch-pag-info">Showing ${from}–${to} of ${total}</span>
      <label class="arch-pag-size">Rows
        <select onchange="_archSetPageSize(this.value)">
          ${[10, 25, 50].map(n => `<option value="${n}"${n === t.pageSize ? ' selected' : ''}>${n}</option>`).join('')}
        </select>
      </label>
    </span>
    <span class="arch-pag-btns">${btn(icon('chevron-left', 14), t.page - 1, { disabled: t.page <= 1 })}${nums}${btn(icon('chevron-right', 14), t.page + 1, { disabled: t.page >= pageCount })}</span>
  </div>`;
}

// ── In-place mutations (no full page reload — filters/page/tab survive) ─────────
function _archApplyArchived(doneIds, reason) {
  const set = new Set((doneIds || []).map(String));
  if (!set.size) return;
  const t = _archTabs.suggestions;
  // Build the archived-tab rows BEFORE touching the caches (we need the lead data).
  // Keeping the tab's rows warm means switching to Archived right after archiving is
  // instant — no refetch. A later force refresh still reconciles the approximations.
  if (_archTabs.archived.rows) {
    const ts = _nowStr();
    const newRows = Array.from(set).map(id => {
      const src = (t.rows || []).find(r => String(r['Lead ID']) === id)
        || (AppCache.getRows('leads') || []).find(r => String(r['Lead ID']) === id);
      if (!src) return null;
      const fuCount = (AppCache.getRows('followups') || []).filter(f => String(f['Lead ID']) === id).length;
      return Object.assign({}, src, {
        'Lead Status': 'Archived',
        'Is Archived': true,
        'Archived At': ts,
        'Archived By': (App.user && App.user.id) || '',
        'Archive Reason': String(reason || '').trim() || 'Archived from portal',
        _notPickedCount: Number(src._notPickedTotal || src._notPickedCount || 0),
        _followupCount: Number(src._followupCount || fuCount || 0),
        _latestFollowupStatus: '',
        _pendingDays: Number(src._pendingDays || 0)
      });
    }).filter(Boolean);
    _archTabs.archived.rows = [...newRows, ..._archTabs.archived.rows];
  }
  if (t.rows) t.rows = t.rows.filter(r => !set.has(String(r['Lead ID'])));
  set.forEach(id => t.selected.delete(id));
  if (el('archive-page') && _archiveTab === 'suggestions') { _archRenderKpis(); _archRenderLive(); }
  // In-place: drop the archived leads + their follow-ups from the cache and acknowledge
  // our own write, so the revalidation poll doesn't refetch + repaint the whole portal.
  Array.from(set).forEach(id => {
    try { AppCache.removeRow('leads', 'Lead ID', id); } catch (e) {}
    try { AppCache.removeRow('followups', 'Lead ID', id); } catch (e) {}
  });
  if (typeof _ackOwnArchive === 'function') _ackOwnArchive(Array.from(set), reason || '');
  try { renderSidebar(); } catch (e) {}
}

function _archApplyRestored(doneIds) {
  const set = new Set((doneIds || []).map(String));
  if (!set.size) return;
  const t = _archTabs.archived;
  if (t.rows) t.rows = t.rows.filter(r => !set.has(String(r['Lead ID'])));
  set.forEach(id => t.selected.delete(id));
  _archTabs.suggestions.rows = null; // a restored lead may qualify again
  if (el('archive-page') && _archiveTab === 'archived') { _archRenderKpis(); _archRenderLive(); }
  // A restore brings back rows the client can't reconstruct (the lead row + whichever
  // follow-ups reopened) — refresh both collections now, in place (no skeleton), rather
  // than invalidating and letting the poll repaint later.
  if (typeof _refreshLeadsCache === 'function') _refreshLeadsCache().catch(() => {});
  if (typeof _refreshFollowupsCache === 'function') _refreshFollowupsCache().catch(() => {});
  try { renderSidebar(); } catch (e) {}
}

// ── Bulk actions (chunked, minimisable progress dialog) ─────────────────────────
async function _archSugBulkArchive() {
  const ids = Array.from(_archTabs.suggestions.selected);
  if (!ids.length) return;
  const result = await Swal.fire({
    title: `Archive ${ids.length} lead${ids.length > 1 ? 's' : ''}?`,
    text: 'They will move to Archived and out of active work.',
    icon: 'question',
    input: 'text',
    inputPlaceholder: 'Reason (optional)',
    showCancelButton: true,
    confirmButtonText: 'Archive'
  });
  if (!result.isConfirmed) return;
  const reason = (result.value || '').trim() || '7+ unanswered calls (Not Picked)';
  _archBulkRun(ids, {
    verb: 'Archiving leads', doneVerb: 'archived', chunk: 15,
    exec: async (chunk) => {
      const res = await api.archiveLeads({ leadIds: chunk, reason });
      return { done: (res && res.archived) || [], failed: (res && res.failed || []).length };
    },
    after: (ids) => _archApplyArchived(ids, reason)
  });
}
window._archSugBulkArchive = _archSugBulkArchive;

async function _archBulkRestore() {
  const ids = Array.from(_archTabs.archived.selected);
  if (!ids.length) return;
  const result = await Swal.fire({
    title: `Restore ${ids.length} lead${ids.length > 1 ? 's' : ''}?`,
    text: 'They will move back to active leads.',
    icon: 'question',
    showCancelButton: true,
    confirmButtonText: 'Restore'
  });
  if (!result.isConfirmed) return;
  _archBulkRun(ids, {
    verb: 'Restoring leads', doneVerb: 'restored', chunk: 5,
    exec: async (chunk) => {
      const settled = await Promise.all(chunk.map(id =>
        api.restoreArchivedLead(id).then(() => id).catch(() => null)
      ));
      const done = settled.filter(Boolean);
      return { done, failed: chunk.length - done.length };
    },
    after: _archApplyRestored
  });
}
window._archBulkRestore = _archBulkRestore;

let _archBulkState = null;
async function _archBulkRun(ids, opts) {
  const s = _archBulkState = {
    total: ids.length, done: 0, failed: 0, doneIds: [],
    cancelled: false, finished: false, minimized: false,
    verb: opts.verb, doneVerb: opts.doneVerb
  };
  _archProgressOpen();
  for (let i = 0; i < ids.length && !s.cancelled; i += opts.chunk) {
    const chunk = ids.slice(i, i + opts.chunk);
    try {
      const res = await opts.exec(chunk);
      s.doneIds = s.doneIds.concat(res.done || []);
      s.done += (res.done || []).length;
      s.failed += Number(res.failed || 0);
    } catch (e) {
      s.failed += chunk.length;
    }
    _archProgressRender();
  }
  s.finished = true;
  _archProgressRender();
  toast(`${s.done} lead${s.done !== 1 ? 's' : ''} ${s.doneVerb}${s.failed ? `, ${s.failed} failed` : ''}.`);
  setTimeout(() => { if (_archBulkState && _archBulkState.finished) _archProgressRemove(); }, 4000);
  opts.after(s.doneIds);
}

function _archProgressOpen() {
  _archProgressRemove();
  const node = document.createElement('div');
  node.id = 'arch-progress';
  node.className = 'arch-prog-overlay';
  document.body.appendChild(node);
  _archProgressRender();
}
function _archProgressRender() {
  const node = document.getElementById('arch-progress');
  const s = _archBulkState;
  if (!node || !s) return;
  node.className = 'arch-prog-overlay' + (s.minimized ? ' min' : '');
  node.innerHTML = s.minimized ? _archProgressChipHTML() : _archProgressCardHTML();
  renderIcons(node);
}
function _archProgressCardHTML() {
  const s = _archBulkState;
  const processed = s.done + s.failed;
  const pct = s.total ? Math.round(processed / s.total * 100) : 0;
  const foot = s.finished
    ? `<button class="arch-btn" onclick="_archProgressRemove()" style="background:var(--brand,#6366f1);color:#fff;border-color:var(--brand,#6366f1)">Done</button>`
    : (s.cancelled ? `<button class="arch-btn" disabled>Cancelling…</button>` : `<button class="arch-btn" onclick="_archProgressCancel()">Cancel</button>`);
  return `<div class="arch-prog-card">
    <div class="arch-prog-head">
      <div class="arch-prog-title">${icon(s.finished ? 'check-circle' : 'archive', 16)} ${s.finished ? 'Complete' : s.verb}</div>
      <button class="arch-prog-icon" title="Minimize" onclick="_archProgressMinimize()">${icon('minus', 15)}</button>
    </div>
    <div class="arch-prog-bar"><div class="arch-prog-bar-fill" style="width:${pct}%"></div></div>
    <div class="arch-prog-stats">
      <span><strong>${processed}</strong> of ${s.total} processed</span>
      ${s.failed ? `<span style="color:#b91c1c">${s.failed} failed</span>` : `<span style="color:#059669">${s.done} ${s.doneVerb}</span>`}
    </div>
    <div class="arch-prog-foot">${foot}</div>
  </div>`;
}
function _archProgressChipHTML() {
  const s = _archBulkState;
  const processed = s.done + s.failed;
  const pct = s.total ? Math.round(processed / s.total * 100) : 0;
  return `<button class="arch-prog-chip" onclick="_archProgressMaximize()" title="Show progress">
    ${s.finished ? icon('check-circle', 15) : `<span class="arch-prog-spin">${icon('loader-circle', 15)}</span>`}
    <span>${s.finished ? (s.done + ' ' + s.doneVerb) : (s.verb + ' ' + processed + '/' + s.total)}</span>
    <span class="arch-prog-chip-pct">${pct}%</span>
  </button>`;
}
function _archProgressMinimize() { if (_archBulkState) { _archBulkState.minimized = true; _archProgressRender(); } }
function _archProgressMaximize() { if (_archBulkState) { _archBulkState.minimized = false; _archProgressRender(); } }
function _archProgressCancel() { if (_archBulkState) { _archBulkState.cancelled = true; _archProgressRender(); } }
function _archProgressRemove() { const node = document.getElementById('arch-progress'); if (node) node.remove(); _archBulkState = null; }
window._archProgressMinimize = _archProgressMinimize;
window._archProgressMaximize = _archProgressMaximize;
window._archProgressCancel = _archProgressCancel;
window._archProgressRemove = _archProgressRemove;

// ── CSV export (exports the filtered view of the Archived tab) ──────────────────
function _exportArchiveCsv() {
  const rows = _archTabs.archived.rows ? _archFiltered('archived') : [];
  if (!rows.length) {
    toast('No archive rows to export.', 'error');
    return;
  }
  const headers = [
    'Lead ID','Company Name','Contact Person','Phone','Email','City','State',
    'Assigned To','Lead Status','Next Follow-up Date','Last Follow-up Date',
    'Not Picked Count','Pending Days','Follow-up Count','Archived At','Archived By','Archive Reason'
  ];
  const csvRows = [headers].concat(rows.map(row => [
    row['Lead ID'] || '',
    row['Company Name'] || '',
    row['Contact Person'] || '',
    row['Phone'] || '',
    row['Email'] || '',
    row['City'] || '',
    row['State'] || '',
    _archOwnerName(row['Assigned To']),
    row['Lead Status'] || '',
    row['Next Follow-up Date'] || '',
    row['Last Follow-up Date'] || '',
    row._notPickedCount || 0,
    row._pendingDays || 0,
    row._followupCount || 0,
    row['Archived At'] || '',
    _archOwnerName(row['Archived By']),
    row['Archive Reason'] || ''
  ]));
  const csv = csvRows.map(cols => cols.map(_archiveCsvCell).join(',')).join('\r\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  const stamp = typeof localDateInputValue === 'function' ? localDateInputValue() : new Date().toISOString().slice(0, 10);
  a.download = `archive-${_archiveTab}-${stamp}.csv`;
  document.body.appendChild(a);
  a.click();
  URL.revokeObjectURL(a.href);
  a.remove();
}
window._exportArchiveCsv = _exportArchiveCsv;

function _archiveCsvCell(value) {
  const text = String(value ?? '');
  return /[",\r\n]/.test(text) ? '"' + text.replace(/"/g, '""') + '"' : text;
}

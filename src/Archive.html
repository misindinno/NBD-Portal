<script>
let _archiveTab = 'archived';
let _archiveData = { alerts: [], archived: [] };

async function loadArchive(tab = 'archived', force = false) {
  _archiveTab = 'archived';
  const content = el('content');
  if (!content) return;
  content.innerHTML = `
    <div id="archive-page" class="page-shell">
      <div class="fu-hero">
        <div class="fu-hero-left">
          <div class="fu-hero-icon" style="background:#F1F5F9;color:#334155">${icon('archive', 16)}</div>
          <div>
            <div class="fu-hero-title">Archive</div>
            <div class="fu-hero-sub">Review stale leads, archive them, and keep archived records separate from active work.</div>
          </div>
        </div>
        <div style="display:flex;gap:8px;align-items:center">
          <button class="btn btn-outlined btn-sm" onclick="_exportArchiveCsv()">${icon('download', 13)} Export</button>
          <button class="btn btn-outlined btn-sm" onclick="loadArchive(_archiveTab, true)">${icon('refresh-cw', 13)} Refresh</button>
        </div>
      </div>
      <div id="archive-kpis" class="fu-kpis" style="margin-bottom:14px"></div>
      <div id="archive-body">${skeletonPage('table')}</div>
    </div>`;
  renderIcons(content);

  if (force || !_archiveData._loaded) {
    _archiveData = await api.getArchiveData();
    _archiveData._loaded = true;
  }
  _renderArchive();
}

function _renderArchive() {
  const archived = _archiveData.archived || [];
  const kpis = el('archive-kpis');
  if (kpis) {
    kpis.innerHTML = [
      _archiveKpi('Archived Leads', archived.length, 'hidden from active work', 'archive', 'neutral'),
      _archiveKpi('Archived Follow-ups', archived.reduce((n, r) => n + Number(r._followupCount || 0), 0), 'linked records archived', 'phone', 'blue'),
      _archiveKpi('Not Picked Count', archived.reduce((n, r) => n + Number(r._notPickedCount || 0), 0), 'before archive', 'phone-missed', 'danger')
    ].join('');
    renderIcons(kpis);
  }
  const rows = archived;
  const body = el('archive-body');
  if (!body) return;
  body.innerHTML = `
    <div class="fu-worklist-card">
      <div class="fu-worklist-head">
        <div>
          <div class="fu-worklist-title">Archived Leads <span class="fu-worklist-count">${rows.length}</span></div>
          <div style="font-size:12px;color:#64748b">Leads manually marked as archived with their linked follow-ups.</div>
        </div>
      </div>
      <div class="fu-table-scroll">
        <table class="fu-table">
          <thead><tr>
            <th>Lead</th><th>Owner</th><th>Pending</th><th>Not Picked</th><th>Follow-ups</th><th>Archived</th><th></th>
          </tr></thead>
          <tbody>${rows.length ? rows.map(_archiveRowHTML).join('') : `<tr><td colspan="7" class="empty-table-cell">No archived leads found.</td></tr>`}</tbody>
        </table>
      </div>
    </div>`;
  renderIcons(body);
}

function _archiveKpi(label, value, sub, ic, cls) {
  return `<div class="fu-kpi fu-kpi-${cls}">
    <span class="fu-kpi-icon">${icon(ic, 17)}</span>
    <span class="fu-kpi-value">${escapeHtml(value)}</span>
    <span class="fu-kpi-label">${escapeHtml(label)}</span>
    <span class="fu-kpi-sub">${escapeHtml(sub)}</span>
  </div>`;
}

function _archiveRowHTML(row) {
  const leadId = String(row['Lead ID'] || '');
  const owner = App.config.userNameMap?.[row['Assigned To']] || row['Assigned To'] || '—';
  const title = row['Company Name'] || row['Client Description'] || leadId || '—';
  const place = [row['City'], row['State']].filter(Boolean).join(', ');
  const pending = Number(row._pendingDays || 0);
  const archivedInfo = row['Archived At']
    ? `${formatDateTime(row['Archived At'])}${row['Archive Reason'] ? ' - ' + row['Archive Reason'] : ''}`
    : '28+ days pending and 10+ Not Picked';
  return `<tr class="fu-row">
    <td onclick="_archiveOpenLead('${escapeHtml(leadId)}')" style="cursor:pointer">
      <div class="fu-lead-title">${escapeHtml(title)}</div>
      <div class="fu-lead-sub">${escapeHtml(place || leadId)}</div>
    </td>
    <td>${escapeHtml(owner)}</td>
    <td><span class="badge" style="background:#FEF3C7;color:#92400E">${escapeHtml(pending)} days</span></td>
    <td><span class="badge" style="background:#FEE2E2;color:#991B1B">${escapeHtml(row._notPickedCount || 0)}</span></td>
    <td>${escapeHtml(row._followupCount || 0)}</td>
    <td><div class="fu-discussion" title="${escapeHtml(archivedInfo)}">${escapeHtml(archivedInfo)}</div></td>
    <td style="text-align:right">
      <button class="btn btn-outlined btn-sm" onclick="_restoreArchivedLead('${escapeHtml(leadId)}')">${icon('rotate-ccw', 13)} Restore</button>
    </td>
  </tr>`;
}

function _archiveOpenLead(leadId) {
  if (leadId && typeof openLeadDetail === 'function') openLeadDetail(leadId);
}

async function _restoreArchivedLead(leadId) {
  const result = await Swal.fire({
    title: 'Restore lead?',
    text: 'This will move the lead back to active leads.',
    icon: 'question',
    showCancelButton: true,
    confirmButtonText: 'Restore'
  });
  if (!result.isConfirmed) return;
  await api.restoreArchivedLead(leadId);
  toast('Lead restored.');
  AppCache.invalidate('leads');
  AppCache.invalidate('followups');
  _archiveData._loaded = false;
  await loadArchive(_archiveTab, true);
  if (typeof renderSidebar === 'function') renderSidebar();
}

function _exportArchiveCsv() {
  const rows = _archiveData.archived || [];
  if (!rows.length) {
    toast('No archive rows to export.', 'error');
    return;
  }
  const headers = [
    'Lead ID','Company Name','Contact Person','Phone','Email','City','State',
    'Assigned To','Lead Status','Next Follow-up Date','Last Follow-up Date',
    'Not Picked Count','Pending Days','Follow-up Count','Archived At','Archived By','Archive Reason'
  ];
  const csvRows = [headers].concat(rows.map(row => [
    row['Lead ID'] || '',
    row['Company Name'] || '',
    row['Contact Person'] || '',
    row['Phone'] || '',
    row['Email'] || '',
    row['City'] || '',
    row['State'] || '',
    App.config.userNameMap?.[row['Assigned To']] || row['Assigned To'] || '',
    row['Lead Status'] || '',
    row['Next Follow-up Date'] || '',
    row['Last Follow-up Date'] || '',
    row._notPickedCount || 0,
    row._pendingDays || 0,
    row._followupCount || 0,
    row['Archived At'] || '',
    App.config.userNameMap?.[row['Archived By']] || row['Archived By'] || '',
    row['Archive Reason'] || ''
  ]));
  const csv = csvRows.map(cols => cols.map(_archiveCsvCell).join(',')).join('\r\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  const stamp = typeof localDateInputValue === 'function' ? localDateInputValue() : new Date().toISOString().slice(0, 10);
  a.download = `archive-${_archiveTab}-${stamp}.csv`;
  document.body.appendChild(a);
  a.click();
  URL.revokeObjectURL(a.href);
  a.remove();
}

function _archiveCsvCell(value) {
  const text = String(value ?? '');
  return /[",\r\n]/.test(text) ? '"' + text.replace(/"/g, '""') + '"' : text;
}

window.loadArchive = loadArchive;
</script>

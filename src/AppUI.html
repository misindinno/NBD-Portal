<script>
function _isNBDPortal() {
  return String(typeof APP_TITLE !== 'undefined' ? APP_TITLE : '').toLowerCase().includes('nbd');
}
window._isNBDPortal = _isNBDPortal;

// ─── Page meta ────────────────────────────────────────────────────────────────
const _PAGE_META = {
  dashboard: { title: 'Dashboard',        crumb: 'Dashboard' },
  today:     { title: "Today's Activity", crumb: "Today's Activity" },
  leads:     { title: 'Lead Master',      crumb: 'Lead Master' },
  pipeline:  { title: 'Pipeline',         crumb: 'Pipeline' },
  followups: { title: 'Follow Up',        crumb: 'Follow Up' },
  leadform:  { title: 'Lead Form',        crumb: 'Lead Form' },
  bulkview:  { title: 'Bulk Entry',       crumb: 'Bulk Entry' },
  config:    { title: 'Config',           crumb: 'Config' },
  queue:     { title: 'Queue',            crumb: 'Queue' },
};

async function _runPageLoader(page, loaderName, args = []) {
  const deadline = Date.now() + 2500;
  while (Date.now() < deadline) {
    let fn = window[loaderName];
    if (typeof fn !== 'function') {
      try { fn = (0, eval)(loaderName); } catch (e) { fn = null; }
    }
    if (typeof fn === 'function') return fn(...args);
    await new Promise(resolve => setTimeout(resolve, 50));
  }
  const scriptCount = document.scripts ? document.scripts.length : 0;
  throw new Error(`${loaderName} is not available after waiting. Loaded scripts: ${scriptCount}. Please redeploy the latest portal files and hard-refresh.`);
}
window._runPageLoader = _runPageLoader;

async function navigate(page) {
  if (!canNavigate(page)) {
    el('page-title').textContent = 'Access Denied';
    el('content').innerHTML = `<div class="card" style="padding:24px;color:#666">You do not have permission to open this module.</div>`;
    return;
  }
  Store.dispatch('SET_PAGE', page);
  el('content').setAttribute('data-page', page);
  document.querySelectorAll('#sidebar nav a').forEach(a => a.classList.remove('active'));
  const link = document.querySelector(`#sidebar nav a[data-page="${page}"]`);
  if (link) link.classList.add('active');
  const meta = _PAGE_META[page] || { title: page.charAt(0).toUpperCase() + page.slice(1), crumb: page };
  el('page-title').textContent = meta.title;
  const crumbEl = el('tb-breadcrumb-page');
  if (crumbEl) crumbEl.textContent = meta.crumb;
  setContentLoading(pageSkeletonType(page));
  try {
    if      (page === 'dashboard')         await _runPageLoader(page, 'loadDashboard');
    else if (page === 'today')             await _runPageLoader(page, 'loadToday');
    else if (page === 'leads')             await _runPageLoader(page, 'loadLeads');
    else if (page === 'pipeline')          await _runPageLoader(page, 'loadPipeline');
    else if (page === 'followups')         await _runPageLoader(page, 'loadFollowups', ['all']);
    else if (page === 'followups-today')   await _runPageLoader(page, 'loadFollowups', ['today']);
    else if (page === 'followups-overdue') await _runPageLoader(page, 'loadFollowups', ['overdue']);
    else if (page === 'followups-custom')  await _runPageLoader(page, 'loadFollowups', ['custom']);
    else if (page === 'followups-new')     { await _runPageLoader(page, 'loadFollowups', ['all']); await _runPageLoader(page, 'openFollowupForm'); }
    else if (page === 'config')            await _runPageLoader(page, 'loadConfig');
    else if (page === 'leadform')          await _runPageLoader(page, 'loadLeadForm');
    else if (page === 'bulkview')          await _runPageLoader(page, 'loadBulkView');
    else if (page === 'queue')             await _runPageLoader(page, 'loadQueuePage');
    else el('content').innerHTML = '<p>Page not found.</p>';
  } catch(err) {
    el('content').innerHTML = `<p style="color:#D32F2F;padding:20px">Failed to load page: ${escapeHtml(err.message)}</p>`;
  }
}

// ─── Sidebar ──────────────────────────────────────────────────────────────────
function renderInitialLoading() {
  const nav = qs('#sidebar nav');
  if (nav) {
    nav.innerHTML = Array.from({ length: 5 }, () => `
      <div class="nav-skeleton-item">
        <span class="skeleton-nav-icon"></span>
        <span class="skeleton-nav-line"></span>
      </div>`).join('');
  }
  setContentLoading('dashboard');
}

function renderSidebar() {
  const u   = App.user;
  const nav = qs('#sidebar nav');
  const isAdmin = u.role === 'ADMIN';
  const show = mod => isAdmin || hasModule(mod);

  const fuCount    = AppCache.getRows('followups').filter(r => String(r['Status']||'Open').toLowerCase() !== 'closed').length;
  const pipeCount  = AppCache.getRows('leads').filter(r => String(r['Lead Status']||'Open').toLowerCase() === 'open').length;
  const queueCount = typeof QueueManager !== 'undefined' ? QueueManager.pendingCount() : 0;
  const isLqPortal = String(typeof APP_TITLE !== 'undefined' ? APP_TITLE : '').toLowerCase().includes('lq');
  const badge = n => n > 0 ? `<span class="nav-badge">${n > 99 ? '99+' : n}</span>` : '';

  const navItem = (page, lucideIcon, label, extraBadge = '') =>
    `<a href="#" data-page="${page}" data-tooltip="${label}" onclick="navigate('${page}');return false;">
      ${icon(lucideIcon, 18)}
      <span class="nav-item-label">${label}</span>
      ${extraBadge}
    </a>`;

  let html = '';

  const mainItems = [
    show('Dashboard') ? navItem('dashboard', 'layout-dashboard', 'Dashboard') : '',
    show('Dashboard') ? navItem('today',     'activity',         "Today's Activity") : '',
    show('Followups') ? navItem('followups', 'phone-call',       'Follow Up', badge(fuCount))   : '',
    show('Pipeline')  ? navItem('pipeline',  'kanban',           'Pipeline',  badge(pipeCount)) : '',
  ].filter(Boolean).join('');
  if (mainItems) html += `<div class="nav-section">Main</div>${mainItems}`;

  const leadItems = [
    show('Leads')     ? navItem('leads',    'list-todo',  'Lead Master') : '',
    show('LeadForm')  ? navItem('leadform', 'file-plus',  'Lead Form')   : '',
    isLqPortal && show('BulkEntry') ? navItem('bulkview', 'table-2',    'Bulk Entry')  : '',
  ].filter(Boolean).join('');
  if (leadItems) html += `<div class="nav-section">Leads</div>${leadItems}`;

  // Queue — visible to all authenticated users
  html += `<div class="nav-section">System</div>`;
  html += navItem('queue', 'list-checks', 'Queue', badge(queueCount));
  if (u.canEditConfig || u.canManageUsers) {
    html += navItem('config', 'settings-2', 'Config');
  }

  nav.innerHTML = html;

  const displayName = u.title || u.name || u.email || '';
  const role        = { ADMIN: 'Administrator', MANAGER: 'Manager', SALES: 'Sales', USER: 'User' }[u.role] || u.role || '';
  const initials    = displayName.trim().split(/\s+/).map(w => w[0]||'').join('').slice(0,2).toUpperCase() || '?';

  qs('#user-name').textContent = displayName;

  const avatarEl = el('sb-user-avatar');
  const nameEl   = el('sb-user-name-footer');
  const roleEl   = el('sb-user-role-footer');
  if (avatarEl) avatarEl.textContent = initials;
  if (nameEl)   nameEl.textContent   = displayName;
  if (roleEl)   roleEl.textContent   = role;

  const tbAvatar = el('tb-user-avatar-top');
  const tbName   = el('tb-user-name-top');
  const tbRole   = el('tb-user-role-top');
  if (tbAvatar) tbAvatar.textContent = initials;
  if (tbName)   tbName.textContent   = displayName;
  if (tbRole)   tbRole.textContent   = role;

  const logoutBtn = el('logout-btn');
  if (logoutBtn) logoutBtn.classList.add('visible');

  renderIcons(nav);
}

function toggleNavGroup(id) {
  const grp = el(id);
  if (grp) grp.classList.toggle('open');
}

function hasModule(name) {
  const target = String(name || '').toLowerCase().replace(/[^a-z0-9]/g, '');
  return (App.user.modules || []).some(m => String(m || '').toLowerCase().replace(/[^a-z0-9]/g, '') === target);
}

function canNavigate(page) {
  if (!App.user) return false;
  const moduleMap = {
    dashboard: 'Dashboard', leads: 'Leads', pipeline: 'Pipeline',
    followups: 'Followups', 'followups-today': 'Followups',
    'followups-overdue': 'Followups', 'followups-custom': 'Followups', 'followups-new': 'Followups'
  };
  if (page === 'config')    return !!(App.user.canEditConfig || App.user.canManageUsers);
  if (page === 'leadform')  return hasModule('LeadForm');
  if (page === 'bulkview')  return String(typeof APP_TITLE !== 'undefined' ? APP_TITLE : '').toLowerCase().includes('lq') && (hasModule('BulkEntry') || App.user.role === 'ADMIN');
  if (page === 'queue')     return !!App.user;
  if (page === 'today')     return !!App.user;
  return hasModule(moduleMap[page] || page);
}

function defaultPageForUser() {
  const ordered = [
    ['dashboard', 'Dashboard'], ['leads', 'Leads'], ['pipeline', 'Pipeline'],
    ['followups', 'Followups'], ['leadform', 'LeadForm']
  ];
  const match = ordered.find(([page]) => canNavigate(page));
  if (match) return match[0];
  if (App.user?.canEditConfig || App.user?.canManageUsers) return 'config';
  return 'dashboard';
}

function toggleSidebar() {
  const sidebar = el('sidebar');
  if (!sidebar) return;
  if (window.matchMedia('(max-width: 768px)').matches) {
    sidebar.classList.toggle('mobile-open');
  } else {
    sidebar.classList.toggle('collapsed');
    const btn = el('sb-toggle-btn');
    if (btn) {
      const collapsed = sidebar.classList.contains('collapsed');
      btn.title = collapsed ? 'Expand sidebar' : 'Collapse sidebar';
      btn.innerHTML = collapsed ? `<i data-lucide="panel-left-open"></i>` : `<i data-lucide="panel-left-close"></i>`;
      renderIcons(btn);
    }
  }
}

// ─── Global Search ────────────────────────────────────────────────────────────
let _searchFocusedIdx = -1;
let _searchDebounce   = null;

function _topbarSearchInput(input) {
  clearTimeout(_searchDebounce);
  const q = (input.value || '').trim();
  const drop = el('tb-search-drop');
  if (!drop) return;
  if (!q) { _closeSearchDrop(); return; }
  _searchDebounce = setTimeout(() => _runGlobalSearch(q), 200);
}

function _gsBadgeCls(s) {
  const sl = String(s || '').toLowerCase();
  if (sl === 'won')  return 'tb-sd-badge-won';
  if (sl === 'lost') return 'tb-sd-badge-lost';
  if (sl === 'hold') return 'tb-sd-badge-hold';
  return 'tb-sd-badge-open';
}

function _runGlobalSearch(q) {
  const drop = el('tb-search-drop');
  if (!drop) return;
  const ql = q.toLowerCase();

  const leads     = AppCache.getRows('leads');
  const followups = AppCache.getRows('followups');
  const leadMap   = leads.reduce((m, l) => { m[l['Lead ID']] = l; return m; }, {});

  // Leads — match by Company, Description, City
  const matchedLeads = leads.filter(l =>
    String(l['Company Name']        || '').toLowerCase().includes(ql) ||
    String(l['Client Description']  || '').toLowerCase().includes(ql) ||
    String(l['City']                || '').toLowerCase().includes(ql)
  );

  // Contacts — match by Contact Person or Phone (skip leads already in Leads section)
  const leadSection = new Set(matchedLeads.map(l => l['Lead ID']));
  const matchedContacts = leads.filter(l =>
    !leadSection.has(l['Lead ID']) && (
      String(l['Contact Person'] || '').toLowerCase().includes(ql) ||
      String(l['Phone']          || '').toLowerCase().includes(ql)
    )
  );

  // Follow-ups — match by Discussion or Remark
  const matchedFU = followups.filter(f =>
    String(f['Discussion'] || '').toLowerCase().includes(ql) ||
    String(f['Remark']     || '').toLowerCase().includes(ql)
  );

  const total = matchedLeads.length + matchedContacts.length + matchedFU.length;

  if (!total) {
    drop.innerHTML = `<div style="padding:18px 14px;text-align:center;color:#9CA3AF;font-size:13px">No results for "${escapeHtml(q)}"</div>`;
    drop.style.display = 'block';
    _searchFocusedIdx = -1;
    return;
  }

  // Track all items for keyboard nav
  const navItems = [];
  let html = '';

  const section = (label, items, renderRow) => {
    if (!items.length) return '';
    const shown = items.slice(0, 4);
    let out = `<div class="tb-sd-section-head">${escapeHtml(label)}<span class="tb-sd-section-count">${items.length}</span></div>`;
    shown.forEach(item => {
      const idx = navItems.length;
      navItems.push(item);
      out += renderRow(item, idx);
    });
    return out;
  };

  // ── Leads section ──
  html += section('Leads', matchedLeads, (l, idx) => {
    const name    = escapeHtml(l['Company Name'] || '—');
    const contact = escapeHtml(l['Contact Person'] || '');
    const status  = l['Lead Status'] || 'Open';
    const stage   = escapeHtml(AppLookup.stageName(l['Stage ID']) || '');
    const leadId  = escapeHtml(String(l['Lead ID'] || ''));
    return `<div class="tb-sd-item" data-idx="${idx}" data-gs-type="lead" data-gs-id="${leadId}" onclick="_gsOpenLead('${leadId}')">
      <div class="tb-sd-icon">${icon('building-2', 15)}</div>
      <div style="flex:1;min-width:0">
        <div class="tb-sd-name">${name}</div>
        <div class="tb-sd-sub">${contact ? contact + ' · ' : ''}${stage}</div>
      </div>
      <span class="tb-sd-badge ${_gsBadgeCls(status)}">${escapeHtml(status)}</span>
    </div>`;
  });

  // ── Contacts section ──
  html += section('Contacts', matchedContacts, (l, idx) => {
    const contact = escapeHtml(l['Contact Person'] || '—');
    const company = escapeHtml(l['Company Name'] || '');
    const phone   = escapeHtml(l['Phone'] || '');
    const leadId  = escapeHtml(String(l['Lead ID'] || ''));
    return `<div class="tb-sd-item" data-idx="${idx}" data-gs-type="lead" data-gs-id="${leadId}" onclick="_gsOpenLead('${leadId}')">
      <div class="tb-sd-icon tb-sd-icon-contacts">${icon('user', 15)}</div>
      <div style="flex:1;min-width:0">
        <div class="tb-sd-name">${contact}</div>
        <div class="tb-sd-sub">${company}${phone ? ' · ' + phone : ''}</div>
      </div>
    </div>`;
  });

  // ── Follow-ups section ──
  html += section('Follow-ups', matchedFU, (f, idx) => {
    const lead    = leadMap[f['Lead ID']] || {};
    const company = escapeHtml(lead['Company Name'] || '—');
    const disc    = escapeHtml(f['Discussion'] || f['Remark'] || '');
    const date    = f['Follow-up Date'] || f['Planned Date'] || '';
    const leadId  = escapeHtml(String(f['Lead ID'] || ''));
    return `<div class="tb-sd-item" data-idx="${idx}" data-gs-type="followup" data-gs-id="${leadId}" onclick="_gsOpenFollowup('${leadId}')">
      <div class="tb-sd-icon tb-sd-icon-followup">${icon('phone-call', 15)}</div>
      <div style="flex:1;min-width:0">
        <div class="tb-sd-name">${company}</div>
        <div class="tb-sd-sub" style="max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${disc}">${disc}</div>
      </div>
      ${date ? `<span style="font-size:11px;color:#9ca3af;white-space:nowrap;flex-shrink:0">${formatDate(date)}</span>` : ''}
    </div>`;
  });

  if (total > 12) {
    html += `<div class="tb-sd-footer" onclick="_gsViewAll(${JSON.stringify(q)})">View all ${total} results for "${escapeHtml(q)}" →</div>`;
  }

  drop.innerHTML = html;
  drop._navItems = navItems;
  drop.style.display = 'block';
  _searchFocusedIdx = -1;
  renderIcons(drop);
}

function _gsOpenLead(leadId) {
  _closeSearchDrop();
  if (!canNavigate('leads')) { toast('No access to Lead Master.', 'error'); return; }
  navigate('leads');
  setTimeout(() => { if (typeof openLeadDetail === 'function') openLeadDetail(leadId); }, 500);
}

function _gsOpenFollowup(leadId) {
  _closeSearchDrop();
  if (leadId && canNavigate('leads')) {
    navigate('leads');
    setTimeout(() => { if (typeof openLeadDetail === 'function') openLeadDetail(leadId); }, 500);
  } else if (canNavigate('followups')) {
    navigate('followups');
  }
}

function _gsViewAll(query) {
  const q = String(query || '').trim();
  _closeSearchDrop();
  if (!canNavigate('leads')) { toast('No access to Lead Master.', 'error'); return; }
  navigate('leads');
  setTimeout(() => {
    const s = qs('#lead-search') || qs('input[placeholder*="Search"]');
    if (s) { s.value = q; s.dispatchEvent(new Event('input')); }
  }, 500);
}

function _topbarSearchKey(event) {
  const drop = el('tb-search-drop');
  if (!drop || drop.style.display === 'none') return;
  const items = Array.from(drop.querySelectorAll('.tb-sd-item'));
  if (!items.length) return;
  if (event.key === 'ArrowDown') {
    event.preventDefault();
    _searchFocusedIdx = Math.min(_searchFocusedIdx + 1, items.length - 1);
    items.forEach((it, i) => it.classList.toggle('focused', i === _searchFocusedIdx));
  } else if (event.key === 'ArrowUp') {
    event.preventDefault();
    _searchFocusedIdx = Math.max(_searchFocusedIdx - 1, 0);
    items.forEach((it, i) => it.classList.toggle('focused', i === _searchFocusedIdx));
  } else if (event.key === 'Enter') {
    event.preventDefault();
    const focused = items[_searchFocusedIdx];
    if (focused) {
      const type = focused.dataset.gsType;
      const id   = focused.dataset.gsId || '';
      if (type === 'followup') _gsOpenFollowup(id);
      else _gsOpenLead(id);
    } else {
      const inp = el('tb-search-input');
      if (inp && inp.value.trim()) _gsViewAll(inp.value.trim());
    }
  } else if (event.key === 'Escape') {
    _closeSearchDrop();
  }
}

function _closeSearchDrop() {
  const drop = el('tb-search-drop');
  if (drop) { drop.style.display = 'none'; drop.innerHTML = ''; }
  const inp = el('tb-search-input');
  if (inp) inp.value = '';
  _searchFocusedIdx = -1;
}

function _topbarSearch(query) {
  const q = String(query || '').trim();
  if (!q) return;
  _closeSearchDrop();
  if (!canNavigate('leads')) { toast('No access to Lead Master.', 'error'); return; }
  navigate('leads');
  setTimeout(() => {
    const s = qs('#lead-search') || qs('input[placeholder*="Search"]');
    if (s) { s.value = q; s.dispatchEvent(new Event('input')); }
  }, 400);
}

function _topbarRefresh(btn) {
  if (btn) btn.classList.add('spinning');
  AppCache.invalidateAll();
  const page = Store.getState().currentPage || 'dashboard';
  navigate(page);
  setTimeout(() => { if (btn) btn.classList.remove('spinning'); }, 1500);
}

function _topbarHelp() {
  toast('For help, contact your system administrator.', 'info');
}
</script>

<script>
function _isNBDPortal() {
  return String(typeof APP_TITLE !== 'undefined' ? APP_TITLE : '').toLowerCase().includes('nbd');
}
window._isNBDPortal = _isNBDPortal;

function _nbdEscalateBtn(size) {
  const url = String(App?.config?.settings?.escalateFormUrl || '').trim();
  const cls  = size === 'sm' ? 'btn btn-primary btn-sm' : 'btn btn-primary';
  const style = size === 'sm' ? '' : 'height:32px;padding:0 14px;font-size:13px;white-space:nowrap;flex-shrink:0';
  const styleAttr = style ? ` style="${style}"` : '';
  if (!url) return `<button class="${cls}"${styleAttr} disabled title="Escalate form URL not configured in Settings">${icon('external-link', 14)} Escalate</button>`;
  return `<button class="${cls}"${styleAttr} onclick='window.open(${JSON.stringify(url)},"_blank")'>${icon('external-link', 14)} Escalate</button>`;
}
window._nbdEscalateBtn = _nbdEscalateBtn;

function _installConfigRouteFallback() {
  if (typeof window.loadConfig === 'function') return;
  window.__CONFIG_ROUTE_FALLBACK = true;
  if (!window._parseDepartmentList) window._parseDepartmentList = value => {
    const list = Array.isArray(value) ? value : String(value || '').split(',');
    return list.map(v => String(v || '').trim()).filter(Boolean).filter((v, i, arr) => arr.indexOf(v) === i);
  };
  if (!window._sheetTruthy) window._sheetTruthy = (value, defaultValue = false) => {
    if (value === undefined || value === null || value === '') return defaultValue;
    if (value === true) return true;
    return ['TRUE','YES','1'].includes(String(value).trim().toUpperCase());
  };
  if (!window.loadPortalSettings) window.loadPortalSettings = async function() {
    if (!el('cfg-settings')) return;
    const departments = App.config.departments || [];
    const selected = window._parseDepartmentList(App.config.settings?.visibleDepartments || []);
    el('cfg-settings').innerHTML = `
      <form id="portal-settings-form" class="card" style="padding:18px;max-width:760px">
        <h3 style="font-size:16px;font-weight:600;margin-bottom:4px">Portal Data Departments</h3>
        <p style="color:#666;font-size:13px;margin-bottom:14px">Selected departments control which users and assigned records appear across the portal. Leave all unchecked to show everything.</p>
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(165px,1fr));gap:10px;margin-bottom:18px">
          ${departments.map(d => `<label style="display:flex;align-items:center;gap:8px;font-size:13px">
            <input type="checkbox" name="visibleDepartments" value="${escapeHtml(d)}" ${selected.includes(d)?'checked':''}>
            ${escapeHtml(d)}
          </label>`).join('') || '<div style="font-size:13px;color:#888">No departments found. Add departments on user profiles first.</div>'}
        </div>
        <div style="margin-bottom:18px">
          <h3 style="font-size:16px;font-weight:600;margin-bottom:4px">Escalate Form URL</h3>
          <input type="url" name="escalateFormUrl" class="form-control" placeholder="https://docs.google.com/forms/..."
            value="${escapeHtml(App.config?.settings?.escalateFormUrl || '')}" style="max-width:500px;font-size:13px">
        </div>
        <div class="modal-footer" style="padding:0;border-top:none">
          <button type="submit" class="btn btn-primary">${icon('save', 14)} Save Settings</button>
        </div>
      </form>`;
    renderIcons(el('cfg-settings'));
    el('portal-settings-form').addEventListener('submit', e => {
      e.preventDefault();
      const fd = new FormData(e.target);
      QueueManager.enqueue({
        module: 'config',
        actionType: 'savePortalSettings',
        payload: { visibleDepartments: fd.getAll('visibleDepartments'), escalateFormUrl: fd.get('escalateFormUrl') || '' },
        onDone: async () => { await _refreshAppConfig().catch(() => {}); toast('Settings saved!'); },
        onFail: j => toast('Save failed: ' + (j.error || 'Error'), 'error')
      });
      toast('Saving settings...', 'info');
    });
  };
  if (!window.loadStagesConfig) window.loadStagesConfig = async function() {
    const container = el('cfg-stages');
    if (!container) return;
    container.innerHTML = skeletonPage('cards');
    let stages = [];
    try {
      stages = await api.getAllStages();
    } catch (err) {
      container.innerHTML = `<div class="card" style="padding:24px;color:#D32F2F">${escapeHtml(err.message || String(err))}</div>`;
      return;
    }
    const nextOrder = stages.reduce((max, s) => Math.max(max, Number(s['Stage Order']) || 0), 0) + 1;
    container.innerHTML = `
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
        <p style="color:#666;font-size:13px">Drag to reorder stages</p>
        <button class="btn btn-primary btn-sm" onclick='openStageForm({"Stage Order":${nextOrder}})'>${icon('plus', 14)} Add Stage</button>
      </div>
      <div id="stages-list">
        ${stages.map(s => `
          <div class="card" style="margin-bottom:8px;display:flex;align-items:center;gap:12px;cursor:move" data-stage-id="${escapeHtml(s['Stage ID'] || '')}">
            <span class="drag-handle" style="color:#999">${icon('grip-vertical', 18)}</span>
            <div style="width:12px;height:12px;border-radius:50%;background:${safeColor(s['Color'], '#2196F3')}"></div>
            <div style="flex:1">
              <b>${escapeHtml(s['Stage Name'] || '')}</b>
              <span style="color:#999;font-size:12px;margin-left:8px">Order: ${escapeHtml(s['Stage Order'] || '')}</span>
              ${window._sheetTruthy(s['Is Initial Stage'], false) ? '<span class="badge" style="background:#E8F5E9;color:#2E7D32;margin-left:6px">Initial</span>' : ''}
              ${window._sheetTruthy(s['Is Final Stage'], false) ? '<span class="badge" style="background:#E3F2FD;color:#1565C0;margin-left:6px">Final</span>' : ''}
              ${s['TAT Days'] ? '<span class="badge" style="background:#FFF8E1;color:#F57F17;margin-left:6px">TAT: ' + escapeHtml(s['TAT Days']) + 'd</span>' : ''}
              ${window._sheetTruthy(s['Is Skippable'], false) ? '<span class="badge" style="background:#F3E5F5;color:#6A1B9A;margin-left:6px">Skippable</span>' : ''}
            </div>
            <button class="btn btn-sm btn-outlined" onclick="openStageForm(${String(JSON.stringify(s)).replace(/"/g,'&quot;')})">Edit</button>
          </div>`).join('')}
      </div>`;
    renderIcons(container);
    if (window.Sortable && el('stages-list')) {
      Sortable.create(el('stages-list'), {
        animation: 150,
        handle: '.drag-handle',
        onEnd: evt => {
          const orderedIds = Array.from(evt.to.children).map(node => node.dataset.stageId);
          QueueManager.enqueue({
            module: 'stages',
            actionType: 'reorderStages',
            payload: { ids: orderedIds },
            onDone: () => { toast('Stages reordered!'); _refreshAppConfig().catch(() => {}); },
            onFail: j => { toast('Reorder failed: ' + (j.error || 'Error'), 'error'); window.loadStagesConfig(); }
          });
          toast('Saving order...', 'info');
        }
      });
    }
  };
  if (!window.openStageForm) window.openStageForm = function(data = {}) {
    const isEdit = !!data['Stage ID'];
    const overlay = showModal(`
      <div class="modal-header">
        <h2>${isEdit ? 'Edit' : 'Add'} Stage</h2>
        <button class="modal-close" onclick="this.closest('.modal-overlay').remove()">&#x2715;</button>
      </div>
      <form id="stage-form">
        <div class="form-group"><label>Stage Name *</label><input class="form-control" name="Stage Name" value="${escapeHtml(data['Stage Name'] || '')}" required></div>
        <div class="form-row">
          <div class="form-group"><label>Color *</label><input class="form-control" name="Color" type="color" value="${safeColor(data['Color'], '#2196F3')}" required></div>
          <div class="form-group"><label>Stage Order</label><input class="form-control" name="Stage Order" type="number" value="${escapeHtml(data['Stage Order'] || 1)}"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>TAT Days</label><input class="form-control" name="TAT Days" type="number" min="0" value="${escapeHtml(data['TAT Days'] || '')}"></div>
          <div class="form-group"><label>Stage Outcome</label><select class="form-control" name="Stage Outcome">
            <option value="" ${!data['Stage Outcome'] ? 'selected' : ''}>None</option>
            <option value="Won" ${data['Stage Outcome'] === 'Won' ? 'selected' : ''}>Won</option>
            <option value="Lost" ${data['Stage Outcome'] === 'Lost' ? 'selected' : ''}>Lost</option>
          </select></div>
        </div>
        <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin:12px 0">
          ${[
            ['Is Active', 'Is Active', true],
            ['Is Final Stage', 'Is Final Stage', false],
            ['Is Initial Stage', 'Is Initial Stage', false],
            ['Is Skippable', 'Allow Skip', false]
          ].map(([name, label, def]) => `<label style="display:flex;align-items:center;gap:8px;font-size:13px"><input type="checkbox" name="${name}" ${window._sheetTruthy(data[name], def) ? 'checked' : ''}> ${label}</label>`).join('')}
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-outlined" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
          <button type="submit" class="btn btn-primary">Save</button>
        </div>
      </form>`);
    overlay.querySelector('#stage-form').addEventListener('submit', e => {
      e.preventDefault();
      const fd = new FormData(e.target);
      const payload = {
        'Stage Name': fd.get('Stage Name'),
        'Color': fd.get('Color'),
        'Stage Order': fd.get('Stage Order'),
        'TAT Days': fd.get('TAT Days') || '',
        'Stage Outcome': fd.get('Stage Outcome') || '',
        'Is Active': fd.has('Is Active'),
        'Is Final Stage': fd.has('Is Final Stage'),
        'Is Initial Stage': fd.has('Is Initial Stage'),
        'Is Skippable': fd.has('Is Skippable')
      };
      if (isEdit) payload['Stage ID'] = data['Stage ID'];
      overlay.remove();
      QueueManager.enqueue({
        module: 'stages',
        actionType: 'saveStage',
        payload,
        onDone: () => { toast('Stage saved!'); _refreshAppConfig().catch(() => {}); if (App.currentPage === 'config') window.loadStagesConfig(); },
        onFail: j => toast('Save failed: ' + (j.error || 'Error'), 'error')
      });
      toast('Saving stage...', 'info');
    });
  };
  if (!window.loadFieldConfig) window.loadFieldConfig = async function() {
    if (!el('cfg-fields')) return;
    el('cfg-fields').innerHTML = skeletonPage('table');
    const [fields, stages, configs] = await Promise.all([
      api.getAllFieldConfigs(''),
      api.getAllStages(),
      api.getAllConfigs()
    ]);
    window._cfgFieldContext = { fields, stages, configs };
    el('cfg-fields').innerHTML = `
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
        <div>
          <p style="color:#666;font-size:13px;margin-bottom:8px">Create lead and follow-up fields with validation and file upload support</p>
          <select id="field-sheet-filter" class="form-control" style="width:180px">
            <option value="">All targets</option>
            <option value="Leads">Leads</option>
            <option value="Followups">Follow-ups</option>
          </select>
        </div>
        <button class="btn btn-primary btn-sm" onclick="openFieldForm()">${icon('plus', 14)} Add Field</button>
      </div>
      <div id="field-config-list"></div>`;
    renderIcons(el('cfg-fields'));
    window.renderFieldConfigList();
    el('field-sheet-filter')?.addEventListener('change', window.renderFieldConfigList);
  };
  if (!window.renderFieldConfigList) window.renderFieldConfigList = function() {
    const ctx = window._cfgFieldContext || { fields: [], stages: [] };
    const sheetFilter = el('field-sheet-filter')?.value || '';
    const fields = sheetFilter ? (ctx.fields || []).filter(f => (f['Sheet Name'] || 'Leads') === sheetFilter) : (ctx.fields || []);
    const stageMap = (ctx.stages || []).reduce((m, s) => { m[s['Stage ID']] = s['Stage Name']; return m; }, {});
    const rows = fields.map(f => {
      const sheetName = f['Sheet Name'] || 'Leads';
      const stageLabel = sheetName === 'Leads' ? (stageMap[f['Stage ID']] || 'All stages') : '-';
      return `<tr>
        <td><b>${escapeHtml(f['Field Name'] || '')}</b><div style="font-size:11px;color:#888">${escapeHtml(f['Column Key'] || '')}</div></td>
        <td>${escapeHtml(sheetName === 'Followups' ? 'Follow-ups' : sheetName)}</td>
        <td>${escapeHtml(stageLabel)}</td>
        <td>${escapeHtml(f['Field Type'] || 'Text')}</td>
        <td>${window._sheetTruthy(f['Is Required'], false) ? 'Yes' : 'No'}</td>
        <td>${escapeHtml([f['Validation Min'] ? 'Min ' + f['Validation Min'] : '', f['Validation Max'] ? 'Max ' + f['Validation Max'] : '', f['Validation Regex'] ? 'Regex' : ''].filter(Boolean).join(', ') || '-')}</td>
        <td>${window._sheetTruthy(f['Is Visible'], true) ? 'Yes' : 'No'}</td>
        <td>${f['Skip Visibility'] === 'skip_only' ? '<span class="badge" style="background:#F3E5F5;color:#6A1B9A">Skip Only</span>' : 'Normal'}</td>
        <td><button class="btn btn-sm btn-outlined" onclick="openFieldForm('${escapeHtml(String(f['Field ID'] || ''))}')">Edit</button></td>
      </tr>`;
    }).join('');
    el('field-config-list').innerHTML = `
      <div class="table-wrap"><table>
        <thead><tr><th>Field</th><th>Target</th><th>Stage</th><th>Type</th><th>Required</th><th>Validation</th><th>Visible</th><th>Skip</th><th></th></tr></thead>
        <tbody>${rows || '<tr><td colspan="9" style="color:#888;text-align:center;padding:18px">No custom fields yet.</td></tr>'}</tbody>
      </table></div>`;
    renderIcons(el('field-config-list'));
  };
  if (!window.openFieldForm) window.openFieldForm = function(data = {}) {
    if (typeof data === 'string') {
      const ctx = window._cfgFieldContext || { fields: [] };
      data = (ctx.fields || []).find(f => f['Field ID'] === data) || {};
    }
    const ctx = window._cfgFieldContext || { stages: App.config.stages || [], configs: [] };
    const isEdit = !!data['Field ID'];
    const targetSheet = data['Sheet Name'] || el('field-sheet-filter')?.value || 'Leads';
    const fieldTypes = ['Text','Textarea','Number','Date','Date Time','Time','Select','Multi Select','Checkbox','Email','Phone','URL','File','Formula'];
    const configTypes = [...new Set((ctx.configs || []).map(c => c['Config Type']).filter(Boolean))].sort();
    const overlay = showModal(`
      <div class="modal-header"><h2>${isEdit ? 'Edit' : 'Add'} Custom Field</h2><button class="modal-close" onclick="this.closest('.modal-overlay').remove()">&#x2715;</button></div>
      <form id="field-form">
        <div class="form-row">
          <div class="form-group"><label>Field Name *</label><input class="form-control" name="Field Name" value="${escapeHtml(data['Field Name'] || '')}" required></div>
          <div class="form-group"><label>Column Key</label><input class="form-control" name="Column Key" value="${escapeHtml(data['Column Key'] || '')}" placeholder="Auto if blank" ${isEdit ? 'readonly' : ''}></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Target *</label><select class="form-control" name="Sheet Name" required ${isEdit ? 'disabled' : ''}>
            <option value="Leads" ${targetSheet === 'Leads' ? 'selected' : ''}>Leads</option>
            <option value="Followups" ${targetSheet === 'Followups' ? 'selected' : ''}>Follow-ups</option>
          </select></div>
          <div class="form-group"><label>Field Type *</label><select class="form-control" name="Field Type" required>
            ${fieldTypes.map(t => `<option ${data['Field Type'] === t ? 'selected' : ''}>${t}</option>`).join('')}
          </select></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Lead Stage</label><select class="form-control" name="Stage ID">
            <option value="">All stages</option>
            ${(ctx.stages || []).map(s => `<option value="${escapeHtml(s['Stage ID'])}" ${data['Stage ID'] === s['Stage ID'] ? 'selected' : ''}>${escapeHtml(s['Stage Name'])}</option>`).join('')}
          </select></div>
          <div class="form-group"><label>Dropdown Source</label><input class="form-control" name="Dropdown Source" list="field-config-types" value="${escapeHtml(data['Dropdown Source'] || '')}"><datalist id="field-config-types">${configTypes.map(t => `<option value="${escapeHtml(t)}"></option>`).join('')}</datalist></div>
        </div>
        <div class="form-group"><label>Display Order</label><input class="form-control" name="Display Order" type="number" value="${escapeHtml(data['Display Order'] || 100)}"></div>
        <div class="form-row">
          <div class="form-group"><label>Validation Min</label><input class="form-control" name="Validation Min" value="${escapeHtml(data['Validation Min'] || '')}"></div>
          <div class="form-group"><label>Validation Max</label><input class="form-control" name="Validation Max" value="${escapeHtml(data['Validation Max'] || '')}"></div>
        </div>
        <div class="form-group"><label>Validation Regex</label><input class="form-control" name="Validation Regex" value="${escapeHtml(data['Validation Regex'] || '')}"></div>
        <div class="form-group"><label>Validation Message</label><input class="form-control" name="Validation Message" value="${escapeHtml(data['Validation Message'] || '')}"></div>
        <div class="form-row">
          <div class="form-group"><label><input type="checkbox" name="Is Required" ${window._sheetTruthy(data['Is Required'], false) ? 'checked' : ''}> Required</label></div>
          <div class="form-group"><label><input type="checkbox" name="Is Visible" ${window._sheetTruthy(data['Is Visible'], true) ? 'checked' : ''}> Visible</label></div>
          <div class="form-group"><label><input type="checkbox" name="Per Stage" ${window._sheetTruthy(data['Per Stage'], false) ? 'checked' : ''}> Per Stage</label></div>
        </div>
        <div class="form-group"><label>Skip Visibility</label><select class="form-control" name="Skip Visibility"><option value="normal" ${(data['Skip Visibility'] || 'normal') === 'normal' ? 'selected' : ''}>Normal</option><option value="skip_only" ${data['Skip Visibility'] === 'skip_only' ? 'selected' : ''}>Skip Only</option></select></div>
        <div class="modal-footer"><button type="button" class="btn btn-outlined" onclick="this.closest('.modal-overlay').remove()">Cancel</button><button type="submit" class="btn btn-primary">Save</button></div>
      </form>`);
    overlay.querySelector('#field-form').addEventListener('submit', e => {
      e.preventDefault();
      const fd = new FormData(e.target);
      const payload = Object.fromEntries(fd.entries());
      payload['Sheet Name'] = data['Sheet Name'] || fd.get('Sheet Name') || 'Leads';
      if (payload['Sheet Name'] === 'Followups') payload['Stage ID'] = '';
      payload['Is Required'] = fd.has('Is Required');
      payload['Is Visible'] = fd.has('Is Visible');
      payload['Per Stage'] = fd.has('Per Stage');
      payload['Skip Visibility'] = fd.get('Skip Visibility') || 'normal';
      if (isEdit) payload['Field ID'] = data['Field ID'];
      overlay.remove();
      QueueManager.enqueue({
        module: 'fields', actionType: 'saveFieldConfig', payload,
        onDone: () => { toast('Custom field saved!'); _refreshAppConfig().catch(() => {}); if (App.currentPage === 'config') window.loadFieldConfig(); },
        onFail: j => toast('Save failed: ' + (j.error || 'Error'), 'error')
      });
      toast('Saving field...', 'info');
    });
  };
  window.switchConfigTab = window.switchConfigTab || function(btn, tabId) {
    btn.closest('#content').querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    ['cfg-settings','cfg-stages','cfg-dropdowns','cfg-fields','cfg-users'].forEach(id => {
      const div = el(id);
      if (div) div.style.display = id === tabId ? '' : 'none';
    });
    if (tabId === 'cfg-settings') window.loadPortalSettings?.();
    if (tabId === 'cfg-stages') window.loadStagesConfig?.();
    if (tabId === 'cfg-dropdowns') window.loadDropdownsConfig?.();
    if (tabId === 'cfg-fields') window.loadFieldConfig?.();
    if (tabId === 'cfg-users') window.loadUsersConfig?.();
  };
  window.loadConfig = async function() {
    el('page-title').textContent = 'Configuration';
    const canEditConfig = !!App.user?.canEditConfig;
    const canManageUsers = !!App.user?.canManageUsers;
    const tabs = [];
    if (canEditConfig) {
      tabs.push(['cfg-settings', 'Settings']);
      tabs.push(['cfg-stages', 'Pipeline Stages']);
      tabs.push(['cfg-dropdowns', 'Dropdowns']);
      tabs.push(['cfg-fields', 'Custom Fields']);
    }
    if (canManageUsers) tabs.push(['cfg-users', 'Users']);
    if (!tabs.length) {
      el('content').innerHTML = `<div class="card" style="padding:24px;color:#666">You do not have permission to manage configuration.</div>`;
      return;
    }
    el('content').innerHTML = `
      <div class="tabs">
        ${tabs.map(([id, label], i) => `<button class="tab-btn ${i === 0 ? 'active' : ''}" onclick="switchConfigTab(this,'${id}')">${label}</button>`).join('')}
      </div>
      ${tabs.map(([id], i) => `<div id="${id}" style="${i === 0 ? '' : 'display:none'}">${i === 0 ? skeletonPage(id === 'cfg-stages' ? 'cards' : 'table') : ''}</div>`).join('')}`;
    renderIcons();
    window.switchConfigTab(el('content').querySelector('.tab-btn'), tabs[0][0]);
  };
}
window._installConfigRouteFallback = _installConfigRouteFallback;
_installConfigRouteFallback();

// ─── Page meta ────────────────────────────────────────────────────────────────
const _PAGE_META = {
  dashboard: { title: 'Dashboard',        crumb: 'Dashboard' },
  today:     { title: "Today's Activity", crumb: "Today's Activity" },
  leads:     { title: 'Lead Master',      crumb: 'Lead Master' },
  pipeline:  { title: 'Pipeline',         crumb: 'Pipeline' },
  followups: { title: 'Follow Up',        crumb: 'Follow Up' },
  leadform:  { title: 'Lead Form',        crumb: 'Lead Form' },
  bulkview:  { title: 'Bulk Entry',       crumb: 'Bulk Entry' },
  config:    { title: 'Config',           crumb: 'Config' },
  queue:     { title: 'Queue',            crumb: 'Queue' },
};

async function _runPageLoader(page, loaderName, args = []) {
  const deadline = Date.now() + 2500;
  while (Date.now() < deadline) {
    let fn = window[loaderName];
    if (typeof fn !== 'function') {
      try { fn = (0, eval)(loaderName); } catch (e) { fn = null; }
    }
    if (typeof fn === 'function') return fn(...args);
    await new Promise(resolve => setTimeout(resolve, 50));
  }
  const scriptCount = document.scripts ? document.scripts.length : 0;
  throw new Error(`${loaderName} is not available after waiting. Loaded scripts: ${scriptCount}. Please redeploy the latest portal files and hard-refresh.`);
}
window._runPageLoader = _runPageLoader;

async function navigate(page) {
  if (!canNavigate(page)) {
    el('page-title').textContent = 'Access Denied';
    el('content').innerHTML = `<div class="card" style="padding:24px;color:#666">You do not have permission to open this module.</div>`;
    return;
  }
  Store.dispatch('SET_PAGE', page);
  el('content').setAttribute('data-page', page);
  document.querySelectorAll('#sidebar nav a').forEach(a => a.classList.remove('active'));
  const link = document.querySelector(`#sidebar nav a[data-page="${page}"]`);
  if (link) link.classList.add('active');
  const meta = _PAGE_META[page] || { title: page.charAt(0).toUpperCase() + page.slice(1), crumb: page };
  el('page-title').textContent = meta.title;
  const crumbEl = el('tb-breadcrumb-page');
  if (crumbEl) crumbEl.textContent = meta.crumb;
  setContentLoading(pageSkeletonType(page));
  try {
    if      (page === 'dashboard')         await _runPageLoader(page, 'loadDashboard');
    else if (page === 'today')             await _runPageLoader(page, 'loadToday');
    else if (page === 'leads')             await _runPageLoader(page, 'loadLeads');
    else if (page === 'pipeline')          await _runPageLoader(page, 'loadPipeline');
    else if (page === 'followups')         await _runPageLoader(page, 'loadFollowups', ['all']);
    else if (page === 'followups-today')   await _runPageLoader(page, 'loadFollowups', ['today']);
    else if (page === 'followups-overdue') await _runPageLoader(page, 'loadFollowups', ['overdue']);
    else if (page === 'followups-custom')  await _runPageLoader(page, 'loadFollowups', ['custom']);
    else if (page === 'followups-new')     { await _runPageLoader(page, 'loadFollowups', ['all']); await _runPageLoader(page, 'openFollowupForm'); }
    else if (page === 'config')            await _runPageLoader(page, 'loadConfig');
    else if (page === 'leadform')          await _runPageLoader(page, 'loadLeadForm');
    else if (page === 'bulkview')          await _runPageLoader(page, 'loadBulkView');
    else if (page === 'queue')             await _runPageLoader(page, 'loadQueuePage');
    else el('content').innerHTML = '<p>Page not found.</p>';
  } catch(err) {
    el('content').innerHTML = `<p style="color:#D32F2F;padding:20px">Failed to load page: ${escapeHtml(err.message)}</p>`;
  }
}

// ─── Sidebar ──────────────────────────────────────────────────────────────────
function renderInitialLoading() {
  const nav = qs('#sidebar nav');
  if (nav) {
    nav.innerHTML = Array.from({ length: 5 }, () => `
      <div class="nav-skeleton-item">
        <span class="skeleton-nav-icon"></span>
        <span class="skeleton-nav-line"></span>
      </div>`).join('');
  }
  setContentLoading('dashboard');
}

function renderSidebar() {
  const u   = App.user;
  const nav = qs('#sidebar nav');
  const isAdmin = u.role === 'ADMIN';
  const show = mod => isAdmin || hasModule(mod);

  const fuCount    = AppCache.getRows('followups').filter(r => String(r['Status']||'Open').toLowerCase() !== 'closed').length;
  const pipeCount  = AppCache.getRows('leads').filter(r => String(r['Lead Status']||'Open').toLowerCase() === 'open').length;
  const queueCount = typeof QueueManager !== 'undefined' ? QueueManager.pendingCount() : 0;
  const isLqPortal = String(typeof APP_TITLE !== 'undefined' ? APP_TITLE : '').toLowerCase().includes('lq');
  const badge = n => n > 0 ? `<span class="nav-badge">${n > 99 ? '99+' : n}</span>` : '';

  const navItem = (page, lucideIcon, label, extraBadge = '') =>
    `<a href="#" data-page="${page}" data-tooltip="${label}" onclick="navigate('${page}');return false;">
      ${icon(lucideIcon, 18)}
      <span class="nav-item-label">${label}</span>
      ${extraBadge}
    </a>`;

  let html = '';

  const mainItems = [
    show('Dashboard') ? navItem('dashboard', 'layout-dashboard', 'Dashboard') : '',
    show('Dashboard') ? navItem('today',     'activity',         "Today's Activity") : '',
    show('Followups') ? navItem('followups', 'phone-call',       'Follow Up', badge(fuCount))   : '',
    show('Pipeline')  ? navItem('pipeline',  'kanban',           'Pipeline',  badge(pipeCount)) : '',
  ].filter(Boolean).join('');
  if (mainItems) html += `<div class="nav-section">Main</div>${mainItems}`;

  const leadItems = [
    show('Leads')     ? navItem('leads',    'list-todo',  'Lead Master') : '',
    show('LeadForm')  ? navItem('leadform', 'file-plus',  'Lead Form')   : '',
    isLqPortal && show('BulkEntry') ? navItem('bulkview', 'table-2',    'Bulk Entry')  : '',
  ].filter(Boolean).join('');
  if (leadItems) html += `<div class="nav-section">Leads</div>${leadItems}`;

  // Queue — visible to all authenticated users
  html += `<div class="nav-section">System</div>`;
  html += navItem('queue', 'list-checks', 'Queue', badge(queueCount));
  if (u.canEditConfig || u.canManageUsers) {
    html += navItem('config', 'settings-2', 'Config');
  }

  nav.innerHTML = html;

  const displayName = u.title || u.name || u.email || '';
  const role        = { ADMIN: 'Administrator', MANAGER: 'Manager', SALES: 'Sales', USER: 'User' }[u.role] || u.role || '';
  const initials    = displayName.trim().split(/\s+/).map(w => w[0]||'').join('').slice(0,2).toUpperCase() || '?';

  qs('#user-name').textContent = displayName;

  const avatarEl = el('sb-user-avatar');
  const nameEl   = el('sb-user-name-footer');
  const roleEl   = el('sb-user-role-footer');
  if (avatarEl) avatarEl.textContent = initials;
  if (nameEl)   nameEl.textContent   = displayName;
  if (roleEl)   roleEl.textContent   = role;

  const tbAvatar = el('tb-user-avatar-top');
  const tbName   = el('tb-user-name-top');
  const tbRole   = el('tb-user-role-top');
  if (tbAvatar) tbAvatar.textContent = initials;
  if (tbName)   tbName.textContent   = displayName;
  if (tbRole)   tbRole.textContent   = role;

  const logoutBtn = el('logout-btn');
  if (logoutBtn) logoutBtn.classList.add('visible');

  renderIcons(nav);
}

function toggleNavGroup(id) {
  const grp = el(id);
  if (grp) grp.classList.toggle('open');
}

function hasModule(name) {
  const target = String(name || '').toLowerCase().replace(/[^a-z0-9]/g, '');
  return (App.user.modules || []).some(m => String(m || '').toLowerCase().replace(/[^a-z0-9]/g, '') === target);
}

function canNavigate(page) {
  if (!App.user) return false;
  const moduleMap = {
    dashboard: 'Dashboard', leads: 'Leads', pipeline: 'Pipeline',
    followups: 'Followups', 'followups-today': 'Followups',
    'followups-overdue': 'Followups', 'followups-custom': 'Followups', 'followups-new': 'Followups'
  };
  if (page === 'config')    return !!(App.user.canEditConfig || App.user.canManageUsers);
  if (page === 'leadform')  return hasModule('LeadForm');
  if (page === 'bulkview')  return String(typeof APP_TITLE !== 'undefined' ? APP_TITLE : '').toLowerCase().includes('lq') && (hasModule('BulkEntry') || App.user.role === 'ADMIN');
  if (page === 'queue')     return !!App.user;
  if (page === 'today')     return !!App.user;
  return hasModule(moduleMap[page] || page);
}

function defaultPageForUser() {
  const ordered = [
    ['dashboard', 'Dashboard'], ['leads', 'Leads'], ['pipeline', 'Pipeline'],
    ['followups', 'Followups'], ['leadform', 'LeadForm']
  ];
  const match = ordered.find(([page]) => canNavigate(page));
  if (match) return match[0];
  if (App.user?.canEditConfig || App.user?.canManageUsers) return 'config';
  return 'dashboard';
}

function toggleSidebar() {
  const sidebar = el('sidebar');
  if (!sidebar) return;
  if (window.matchMedia('(max-width: 768px)').matches) {
    sidebar.classList.toggle('mobile-open');
  } else {
    sidebar.classList.toggle('collapsed');
    const btn = el('sb-toggle-btn');
    if (btn) {
      const collapsed = sidebar.classList.contains('collapsed');
      btn.title = collapsed ? 'Expand sidebar' : 'Collapse sidebar';
      btn.innerHTML = collapsed ? `<i data-lucide="panel-left-open"></i>` : `<i data-lucide="panel-left-close"></i>`;
      renderIcons(btn);
    }
  }
}

// ─── Global Search ────────────────────────────────────────────────────────────
let _searchFocusedIdx = -1;
let _searchDebounce   = null;

function _topbarSearchInput(input) {
  clearTimeout(_searchDebounce);
  const q = (input.value || '').trim();
  const drop = el('tb-search-drop');
  if (!drop) return;
  if (!q) { _closeSearchDrop(); return; }
  _searchDebounce = setTimeout(() => _runGlobalSearch(q), 200);
}

function _gsBadgeCls(s) {
  const sl = String(s || '').toLowerCase();
  if (sl === 'won')  return 'tb-sd-badge-won';
  if (sl === 'lost') return 'tb-sd-badge-lost';
  if (sl === 'hold') return 'tb-sd-badge-hold';
  return 'tb-sd-badge-open';
}

function _runGlobalSearch(q) {
  const drop = el('tb-search-drop');
  if (!drop) return;
  const ql = q.toLowerCase();

  const leads     = AppCache.getRows('leads');
  const followups = AppCache.getRows('followups');
  const leadMap   = leads.reduce((m, l) => { m[l['Lead ID']] = l; return m; }, {});

  // Leads — match by Company, Description, City
  const matchedLeads = leads.filter(l =>
    String(l['Company Name']        || '').toLowerCase().includes(ql) ||
    String(l['Client Description']  || '').toLowerCase().includes(ql) ||
    String(l['City']                || '').toLowerCase().includes(ql)
  );

  // Contacts — match by Contact Person or Phone (skip leads already in Leads section)
  const leadSection = new Set(matchedLeads.map(l => l['Lead ID']));
  const matchedContacts = leads.filter(l =>
    !leadSection.has(l['Lead ID']) && (
      String(l['Contact Person'] || '').toLowerCase().includes(ql) ||
      String(l['Phone']          || '').toLowerCase().includes(ql)
    )
  );

  // Follow-ups — match by Discussion or Remark
  const matchedFU = followups.filter(f =>
    String(f['Discussion'] || '').toLowerCase().includes(ql) ||
    String(f['Remark']     || '').toLowerCase().includes(ql)
  );

  const total = matchedLeads.length + matchedContacts.length + matchedFU.length;

  if (!total) {
    drop.innerHTML = `<div style="padding:18px 14px;text-align:center;color:#9CA3AF;font-size:13px">No results for "${escapeHtml(q)}"</div>`;
    drop.style.display = 'block';
    _searchFocusedIdx = -1;
    return;
  }

  // Track all items for keyboard nav
  const navItems = [];
  let html = '';

  const section = (label, items, renderRow) => {
    if (!items.length) return '';
    const shown = items.slice(0, 4);
    let out = `<div class="tb-sd-section-head">${escapeHtml(label)}<span class="tb-sd-section-count">${items.length}</span></div>`;
    shown.forEach(item => {
      const idx = navItems.length;
      navItems.push(item);
      out += renderRow(item, idx);
    });
    return out;
  };

  // ── Leads section ──
  html += section('Leads', matchedLeads, (l, idx) => {
    const name    = escapeHtml(l['Company Name'] || '—');
    const contact = escapeHtml(l['Contact Person'] || '');
    const status  = l['Lead Status'] || 'Open';
    const stage   = escapeHtml(AppLookup.stageName(l['Stage ID']) || '');
    const leadId  = escapeHtml(String(l['Lead ID'] || ''));
    return `<div class="tb-sd-item" data-idx="${idx}" data-gs-type="lead" data-gs-id="${leadId}" onmousedown="_gsOpenLead('${leadId}')">
      <div class="tb-sd-icon">${icon('building-2', 15)}</div>
      <div style="flex:1;min-width:0">
        <div class="tb-sd-name">${name}</div>
        <div class="tb-sd-sub">${contact ? contact + ' · ' : ''}${stage}</div>
      </div>
      <span class="tb-sd-badge ${_gsBadgeCls(status)}">${escapeHtml(status)}</span>
    </div>`;
  });

  // ── Contacts section ──
  html += section('Contacts', matchedContacts, (l, idx) => {
    const contact = escapeHtml(l['Contact Person'] || '—');
    const company = escapeHtml(l['Company Name'] || '');
    const phone   = escapeHtml(l['Phone'] || '');
    const leadId  = escapeHtml(String(l['Lead ID'] || ''));
    return `<div class="tb-sd-item" data-idx="${idx}" data-gs-type="lead" data-gs-id="${leadId}" onmousedown="_gsOpenLead('${leadId}')">
      <div class="tb-sd-icon tb-sd-icon-contacts">${icon('user', 15)}</div>
      <div style="flex:1;min-width:0">
        <div class="tb-sd-name">${contact}</div>
        <div class="tb-sd-sub">${company}${phone ? ' · ' + phone : ''}</div>
      </div>
    </div>`;
  });

  // ── Follow-ups section ──
  html += section('Follow-ups', matchedFU, (f, idx) => {
    const lead    = leadMap[f['Lead ID']] || {};
    const company = escapeHtml(lead['Company Name'] || '—');
    const disc    = escapeHtml(f['Discussion'] || f['Remark'] || '');
    const date    = f['Follow-up Date'] || f['Planned Date'] || '';
    const leadId  = escapeHtml(String(f['Lead ID'] || ''));
    return `<div class="tb-sd-item" data-idx="${idx}" data-gs-type="followup" data-gs-id="${leadId}" onmousedown="_gsOpenFollowup('${leadId}')">
      <div class="tb-sd-icon tb-sd-icon-followup">${icon('phone-call', 15)}</div>
      <div style="flex:1;min-width:0">
        <div class="tb-sd-name">${company}</div>
        <div class="tb-sd-sub" style="max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${disc}">${disc}</div>
      </div>
      ${date ? `<span style="font-size:11px;color:#9ca3af;white-space:nowrap;flex-shrink:0">${formatDate(date)}</span>` : ''}
    </div>`;
  });

  const shownCount = Math.min(matchedLeads.length, 4) + Math.min(matchedContacts.length, 4) + Math.min(matchedFU.length, 4);
  if (total > shownCount) {
    html += `<div class="tb-sd-footer" onmousedown="_gsViewAll(${JSON.stringify(q)})">View all ${total} results for "${escapeHtml(q)}" →</div>`;
  }

  drop.innerHTML = html;
  drop._navItems = navItems;
  drop.style.display = 'block';
  _searchFocusedIdx = -1;
  renderIcons(drop);
}

async function _gsOpenLead(leadId) {
  _closeSearchDrop();
  if (!canNavigate('leads')) { toast('No access to Lead Master.', 'error'); return; }
  await navigate('leads');
  if (typeof openLeadDetail === 'function') openLeadDetail(leadId);
}

async function _gsOpenFollowup(leadId) {
  _closeSearchDrop();
  if (leadId && canNavigate('leads')) {
    await navigate('leads');
    if (typeof openLeadDetail === 'function') openLeadDetail(leadId);
  } else if (canNavigate('followups')) {
    await navigate('followups');
  }
}

async function _gsViewAll(query) {
  const q = String(query || '').trim();
  _closeSearchDrop();
  if (!canNavigate('leads')) { toast('No access to Lead Master.', 'error'); return; }
  await navigate('leads');
  const s = qs('#lead-search') || qs('input[placeholder*="Search"]');
  if (s) { s.value = q; s.dispatchEvent(new Event('input')); }
}

function _topbarSearchKey(event) {
  const drop = el('tb-search-drop');
  if (!drop || drop.style.display === 'none') return;
  const items = Array.from(drop.querySelectorAll('.tb-sd-item'));
  if (!items.length) return;
  if (event.key === 'ArrowDown') {
    event.preventDefault();
    _searchFocusedIdx = Math.min(_searchFocusedIdx + 1, items.length - 1);
    items.forEach((it, i) => it.classList.toggle('focused', i === _searchFocusedIdx));
  } else if (event.key === 'ArrowUp') {
    event.preventDefault();
    _searchFocusedIdx = Math.max(_searchFocusedIdx - 1, 0);
    items.forEach((it, i) => it.classList.toggle('focused', i === _searchFocusedIdx));
  } else if (event.key === 'Enter') {
    event.preventDefault();
    const focused = items[_searchFocusedIdx];
    if (focused) {
      const type = focused.dataset.gsType;
      const id   = focused.dataset.gsId || '';
      if (type === 'followup') _gsOpenFollowup(id);
      else _gsOpenLead(id);
    } else {
      const inp = el('tb-search-input');
      if (inp && inp.value.trim()) _gsViewAll(inp.value.trim());
    }
  } else if (event.key === 'Escape') {
    _closeSearchDrop();
  }
}

function _closeSearchDrop() {
  const drop = el('tb-search-drop');
  if (drop) { drop.style.display = 'none'; drop.innerHTML = ''; }
  const inp = el('tb-search-input');
  if (inp) inp.value = '';
  _searchFocusedIdx = -1;
}

function _topbarSearch(query) {
  const q = String(query || '').trim();
  if (!q) return;
  _closeSearchDrop();
  if (!canNavigate('leads')) { toast('No access to Lead Master.', 'error'); return; }
  navigate('leads');
  setTimeout(() => {
    const s = qs('#lead-search') || qs('input[placeholder*="Search"]');
    if (s) { s.value = q; s.dispatchEvent(new Event('input')); }
  }, 400);
}

function _topbarRefresh(btn) {
  if (btn) btn.classList.add('spinning');
  AppCache.invalidateAll();
  const page = Store.getState().currentPage || 'dashboard';
  navigate(page);
  setTimeout(() => { if (btn) btn.classList.remove('spinning'); }, 1500);
}

function _topbarHelp() {
  toast('For help, contact your system administrator.', 'info');
}
</script>

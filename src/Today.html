<script>
// ─── Today's Activity Page ────────────────────────────────────────────────────

let _todayCharts = {};
let _todayFiltersOpen = false;
let _todayCardFilter = '';
let _todayDensity = (typeof localStorage !== 'undefined' && localStorage.getItem('_todayDensity')) || 'compact';

function _todayCardClick(key) {
  _todayCardFilter = (_todayCardFilter === key) ? '' : key;
  _todayApply();
  const scroll = document.querySelector('#today-page .fu-table-scroll') || document.querySelector('#today-page');
  if (scroll && _todayCardFilter) {
    const wl = el('td-worklist');
    if (wl) wl.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
}
window._todayCardClick = _todayCardClick;

async function loadToday() {
  el('content').innerHTML = `<div id="today-wrap">${skeletonPage('table')}</div>`;

  try {
    const snapshot = await api.getTodayActivitySnapshot();
    AppCache.setRows('leads', snapshot.leads || []);
    AppCache.setRows('followups', snapshot.followups || []);
    AppCache.setRows('followupHistory', snapshot.followupHistory || []);
    AppCache.setRows('activityLogs', snapshot.activityLogs || []);
    if (App.currentPage !== 'today') return;
    _renderToday();
    return;
  } catch (e) {
    console.warn('[Today] Sheets API snapshot failed; falling back to standard cache loads.', e);
  }

  const loads = [];
  if (!AppCache.isLoaded('followupHistory')) loads.push(_ensureCached('followupHistory', () => api.getFollowupHistory({})));
  if (!AppCache.isLoaded('activityLogs'))   loads.push(_ensureCached('activityLogs',   () => api.getLeadActivityLogs({})));
  if (!AppCache.isLoaded('leads'))          loads.push(_ensureCached('leads',           () => api.getLeads()));
  if (!AppCache.isLoaded('followups'))      loads.push(_ensureCached('followups',       () => api.getFollowups({})));
  if (loads.length) await Promise.all(loads);

  if (App.currentPage !== 'today') return;
  _renderToday();
}

function _renderToday() {
  const wrap = el('today-wrap');
  // Bail silently if the user already navigated away (DOM was replaced
  // by another page mid-flight). Prevents "Cannot set innerHTML on null".
  if (!wrap) return;
  const isAdminOrManager = ['ADMIN', 'MANAGER'].includes(App.user.role);
  const users = App.config.users || [];

  wrap.innerHTML = `
    <div class="fu-page td-page fu-density-${_todayDensity}" id="today-page">
      <div class="fu-topbar">
        <div class="fu-topbar-left">
          <div class="fu-hero-icon" style="background:linear-gradient(135deg,#EEF2FF,#C7D2FE);color:#4338CA">${icon('activity', 16)}</div>
          <div class="fu-topbar-titles">
            <div class="fu-hero-title">Today's Activity</div>
            <div class="fu-hero-sub">Live view of follow-ups done, stage moves, and new leads added.</div>
          </div>
        </div>
        <div class="fu-topbar-right">
          <button class="btn btn-outlined btn-sm fu-topbar-btn" onclick="loadToday()" title="Refresh">${icon('refresh-cw', 13)}<span class="fu-btn-text"> Refresh</span></button>
        </div>
      </div>

      <div id="td-cards" class="fu-kpis"></div>

      <div class="fu-tabs" id="td-tabs">
        <div class="fu-tabs-left" id="td-range-tabs"></div>
        <div class="fu-tabs-right">
          <div class="td-rate-pills" id="td-rate-pills"></div>
          <button class="fu-filter-toggle ${_todayFiltersOpen ? 'open' : ''}" id="td-filter-toggle" onclick="_todayToggleFilters()">
            ${icon('sliders-horizontal', 14)} <span>Filters</span>
            ${icon(_todayFiltersOpen ? 'chevron-up' : 'chevron-down', 13)}
          </button>
        </div>
      </div>

      <div class="fu-filter-bar" id="td-filter-bar" style="display:${_todayFiltersOpen ? 'block' : 'none'}">
        <div class="fu-filter-card-grid">
          <label class="fu-filter"><span>From</span><input type="date" id="td-from" onchange="_todayApply()"></label>
          <label class="fu-filter"><span>To</span><input type="date" id="td-to" onchange="_todayApply()"></label>
          ${isAdminOrManager ? `<label class="fu-filter"><span>User</span><select id="td-user" onchange="_todayApply()">
            <option value="">All Users</option>
            ${users.map(u => `<option value="${escapeHtml(u.id)}">${escapeHtml(u.name)}</option>`).join('')}
          </select></label>` : ''}
          <label class="fu-filter"><span>Type</span><select id="td-type" onchange="_todayApply()">
            <option value="">All Types</option>
            <option>Call</option><option>WhatsApp</option><option>Visit</option>
            <option>Email</option><option>Payment</option>
          </select></label>
          <button class="btn btn-outlined btn-sm fu-filter-clear-all" onclick="_todayClearFilters()">${icon('x', 13)} Clear</button>
        </div>
      </div>

      <div id="fu-body">
        <div class="td-charts">
          <div class="td-chart-box">
            <div class="td-chart-title">${icon('bar-chart-3', 13)} By Type</div>
            <div class="td-chart-canvas-wrap"><canvas id="td-chart-type"></canvas></div>
          </div>
          <div class="td-chart-box">
            <div class="td-chart-title">${icon('trending-up', 13)} Daily Trend (7 days)</div>
            <div class="td-chart-canvas-wrap"><canvas id="td-chart-trend"></canvas></div>
          </div>
          <div class="td-chart-box">
            <div class="td-chart-title">${icon('pie-chart', 13)} Contact Modes</div>
            <div class="td-chart-canvas-wrap"><canvas id="td-chart-outcome"></canvas></div>
          </div>
        </div>

        <div class="fu-worklist-card fu-density-${_todayDensity}" id="td-worklist">
          <div class="fu-worklist-head">
            <div class="fu-worklist-head-left">
              <div class="fu-worklist-title">Activity Feed <span class="fu-worklist-count" id="td-row-count">0</span></div>
              <div id="td-card-filter-chip"></div>
            </div>
            <div class="fu-worklist-tools">
              <div class="fu-density-toggle" role="group" aria-label="Row density">
                <button class="${_todayDensity === 'comfortable' ? 'active' : ''}" title="Comfortable" onclick="_todaySetDensity('comfortable')">${icon('rows-3', 12)}</button>
                <button class="${_todayDensity === 'compact' ? 'active' : ''}" title="Compact" onclick="_todaySetDensity('compact')">${icon('list', 12)}</button>
                <button class="${_todayDensity === 'ultra' ? 'active' : ''}" title="Ultra Compact" onclick="_todaySetDensity('ultra')">${icon('menu', 12)}</button>
              </div>
            </div>
          </div>
          <div class="fu-table-scroll">
            <table class="fu-table">
              <thead><tr>
                <th>Done At</th><th>Agent</th><th>Company</th><th>Planned</th>
                <th>Contact Mode</th><th>Remark</th><th>Next Planned</th>
              </tr></thead>
              <tbody id="td-tbody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>`;

  renderIcons();
  _todayRenderRangeTabs('today');
  _todayApply();
}

function _todayRenderRangeTabs(active) {
  const tabs = [
    ['today', 'Today', 'calendar-days'],
    ['yesterday', 'Yesterday', 'calendar-minus'],
    ['7d', 'Last 7 Days', 'calendar-range'],
    ['30d', 'This Month', 'calendar'],
    ['custom', 'Custom', 'sliders-horizontal']
  ];
  const wrap = el('td-range-tabs');
  if (!wrap) return;
  wrap.innerHTML = tabs.map(([id, label, ic]) => `
    <button class="fu-tab ${active === id ? 'active' : ''}" data-range="${id}" onclick="_todaySetRange('${id}')">
      ${icon(ic, 14)} <span>${label}</span>
    </button>`).join('');
  renderIcons(wrap);
}

function _todaySetRange(range) {
  window._todayRange = range;
  _todayCardFilter = '';
  _todayRenderRangeTabs(range);
  // open the filter card automatically when custom is chosen
  if (range === 'custom' && !_todayFiltersOpen) _todayToggleFilters();
  _todayApply();
}

function _todayToggleFilters() {
  _todayFiltersOpen = !_todayFiltersOpen;
  const bar = el('td-filter-bar');
  const toggle = el('td-filter-toggle');
  if (bar) bar.style.display = _todayFiltersOpen ? 'block' : 'none';
  if (toggle) { toggle.classList.toggle('open', _todayFiltersOpen); renderIcons(toggle); }
}

function _todayClearFilters() {
  const u = el('td-user'); if (u) u.value = '';
  const t = el('td-type'); if (t) t.value = '';
  const f = el('td-from'); if (f) f.value = '';
  const to = el('td-to'); if (to) to.value = '';
  _todayApply();
}

function _todaySetDensity(value) {
  _todayDensity = ['comfortable','compact','ultra'].includes(value) ? value : 'compact';
  try { localStorage.setItem('_todayDensity', _todayDensity); } catch (e) {}
  const page = el('today-page');
  const worklist = el('td-worklist');
  [page, worklist].forEach(node => {
    if (!node) return;
    node.classList.remove('fu-density-comfortable','fu-density-compact','fu-density-ultra');
    node.classList.add('fu-density-' + _todayDensity);
  });
  _todayApply();
}

function _todayConfigValue(item) {
  if (item === null || item === undefined) return '';
  if (typeof item !== 'object') return String(item || '').trim();
  return String(item['Value'] || item['Status'] || item['Lead Status'] || item['Name'] || item['Config Value'] || '').trim();
}

function _todayStatusValue(row) {
  return _todayNormalizeStatus(row?.['New Value'] || row?.['Status After'] || row?.['New Status'] || row?.['Lead Status'] || row?.['Status'] || '');
}

function _todayNormalizeStatus(value) {
  const raw = String(value || '').trim();
  if (!raw) return '';
  const stageStatus = _todayLeadStatusForStage(raw);
  if (stageStatus) return stageStatus;
  const lower = raw.toLowerCase();
  if (lower.includes('disqualif')) return 'Disqualified';
  if (lower.includes('lost')) return 'Lost';
  if (lower.includes('won') || lower.includes('qualified')) return 'Won';
  if (lower === 'open') return 'Open';
  if (lower === 'hold') return 'Hold';
  return raw;
}

function _todayLeadStatusForStage(stageIdOrName) {
  const value = String(stageIdOrName || '').trim();
  if (!value) return '';
  const stageList = [...(App.config.stages || []), ...(App.config.allStages || [])];
  const stage = stageList.find(s =>
    String(s['Stage ID'] || '') === value || String(s['Stage Name'] || '').trim().toLowerCase() === value.toLowerCase()
  );
  if (!stage) return '';
  const outcome = String(stage['Stage Outcome'] || '').trim().toLowerCase();
  const name = String(stage['Stage Name'] || '').trim().toLowerCase();
  if (outcome.includes('disqualif') || name.includes('disqualif')) return 'Disqualified';
  if (outcome === 'lost' || name.includes('lost')) return 'Lost';
  if (outcome === 'won' || name.includes('qualified') || name.includes('won')) return 'Won';
  const isFinal = stage['Is Final Stage'] === true || stage['Is Final Stage'] === 'TRUE';
  return isFinal ? 'Won' : '';
}

function _todayLeadStatusFromLead(lead) {
  const stageStatus = _todayLeadStatusForStage(
    lead?.['Stage ID'] || lead?.['Stage Name'] || lead?.['Current Stage'] || lead?.['Stage']
  );
  return stageStatus || _todayNormalizeStatus(lead?.['Lead Status']) || 'Open';
}

function _todayStatusMeta(status) {
  const key = String(status || '').trim().toLowerCase();
  if (key === 'won') return { icon: 'trophy', cls: 'success' };
  if (key === 'lost') return { icon: 'x-circle', cls: 'danger' };
  if (key === 'hold') return { icon: 'pause-circle', cls: 'warning' };
  if (key.includes('disqualif')) return { icon: 'ban', cls: 'neutral' };
  return { icon: 'circle-dot', cls: 'blue' };
}

function _todayEscapeAttr(value) {
  return escapeHtml(String(value || '')).replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function _todayDateRange() {
  const range = window._todayRange || 'today';
  const todayStr = localDateInputValue();
  let from, to;
  if (range === 'today') {
    from = to = todayStr;
  } else if (range === 'yesterday') {
    const d = new Date(); d.setDate(d.getDate() - 1);
    from = to = _fmtDate(d.toISOString());
  } else if (range === '7d') {
    const d = new Date(); d.setDate(d.getDate() - 6);
    from = _fmtDate(d.toISOString()); to = todayStr;
  } else if (range === '30d') {
    const d = new Date(); d.setDate(1);
    from = _fmtDate(d.toISOString()); to = todayStr;
  } else {
    from = el('td-from')?.value || todayStr;
    to   = el('td-to')?.value   || todayStr;
  }
  return { from, to };
}

function _todayApply() {
  // Bail early if the Today page is no longer in the DOM (user navigated away
  // while async work was still in flight) — prevents null.innerHTML crashes.
  if (!el('today-page')) return;
  const { from, to } = _todayDateRange();
  const userFilter = el('td-user')?.value || '';
  const typeFilter = el('td-type')?.value || '';

  const userMap = {};
  (App.config.users || []).forEach(u => {
    if (u.id)    userMap[u.id]    = u.name;
    if (u.email) userMap[u.email] = u.name;
  });
  const leadMap  = AppCache.getRows('leads').reduce((m, l) => { m[l['Lead ID']] = l; return m; }, {});

  let history = AppCache.getRows('followupHistory').filter(r => {
    const d = _fmtDate(r['Created At'] || r['Done Date'] || '');
    return d >= from && d <= to;
  });
  if (userFilter) history = history.filter(r => r['Done By'] === userFilter || r['Created By'] === userFilter || leadMap[r['Lead ID']]?.['Assigned To'] === userFilter);
  if (typeFilter) history = history.filter(r => r['Follow-up Type'] === typeFilter);

  let actLogs = AppCache.getRows('activityLogs').filter(r => {
    const d = _fmtDate(r['Created At'] || '');
    return d >= from && d <= to;
  });
  if (userFilter) actLogs = actLogs.filter(r => r['Created By'] === userFilter);

  let newLeads = AppCache.getRows('leads').filter(r => {
    const d = _fmtDate(r['Created At'] || '');
    return d >= from && d <= to;
  });
  if (userFilter) newLeads = newLeads.filter(r => r['Assigned To'] === userFilter || r['Created By'] === userFilter);

  const MISSED_MODES = new Set(['Not Picked']);
  const missedHistory  = history.filter(r => MISSED_MODES.has(r['Contact Mode'] || ''));
  const activeHistory  = history.filter(r => !MISSED_MODES.has(r['Contact Mode'] || ''));

  const callsDone  = activeHistory.filter(r => r['Contact Mode'] === 'Call Connected' || r['Follow-up Type'] === 'Call').length;
  const visitsDone = activeHistory.filter(r => r['Follow-up Type'] === 'Visit').length;
  const waDone     = activeHistory.filter(r => r['Contact Mode'] === 'WhatsApp Chat' || r['Follow-up Type'] === 'WhatsApp').length;
  const stageMovs  = actLogs.filter(r => String(r['Action Type'] || '').toLowerCase().includes('stage')).length;
  const statusChangeRows = actLogs.filter(r => {
    const action = String(r['Action Type'] || '').toLowerCase();
    const field = String(r['Field Name'] || r['Field'] || '').toLowerCase();
    return action.includes('stage') || action.includes('status') || field.includes('status');
  });
  const statusCounts = statusChangeRows.reduce((m, r) => {
    const status = _todayStatusValue(r);
    if (!status) return m;
    m[status] = (m[status] || 0) + 1;
    return m;
  }, {});
  const statusLeadCounts = AppCache.getRows('leads').reduce((m, l) => {
    const status = _todayLeadStatusFromLead(l);
    m[status] = (m[status] || 0) + 1;
    return m;
  }, {});
  const currentLeadStatuses = Object.keys(statusLeadCounts);
  const configuredStatuses = (App.config.statuses || []).map(_todayConfigValue).map(_todayNormalizeStatus).filter(Boolean);
  const statusLabels = Array.from(new Set([...configuredStatuses, 'Open', 'Won', 'Lost', 'Hold', 'Disqualified', ...currentLeadStatuses, ...Object.keys(statusCounts)]));
  const uniqueLeads = new Set(
    [...history.map(r => r['Lead ID']), ...actLogs.map(r => r['Lead ID'])].filter(Boolean)
  ).size;

  // ── Pending Follow-ups: overdue + today open follow-ups + leads with no follow-up ──
  const _todayStr = localDateInputValue();
  const _toDateStr = (v) => {
    if (!v) return '';
    if (typeof _fmtDate === 'function') return _fmtDate(v);
    if (v instanceof Date) return v.toISOString().slice(0, 10);
    return String(v).slice(0, 10);
  };
  const _isClosedFu = r => String(r['Status'] || '').toLowerCase() === 'closed' || !!r['Done Date'] || !!r['Outcome'];
  const _planned = r => _toDateStr(r['Next Follow-up Date'] || r['Next Planned Date']);
  const allFollowups = AppCache.getRows('followups') || [];
  const openFu = allFollowups.filter(r =>
    !_isClosedFu(r) && String(r['Follow-up Type'] || '').toLowerCase() !== 'stage change' && !!_planned(r)
  );
  const pendingFu = openFu.filter(r => { const d = _planned(r); return d && d <= _todayStr; });
  if (userFilter) {
    // Scope pending follow-ups to selected user when set
    var pendingFuFiltered = pendingFu.filter(r =>
      r['Created By'] === userFilter || r['Done By'] === userFilter ||
      leadMap[r['Lead ID']]?.['Assigned To'] === userFilter
    );
  } else { var pendingFuFiltered = pendingFu; }
  const _fuLeadIds = new Set(
    allFollowups.map(r => r['Lead ID'])
      .concat((AppCache.getRows('followupHistory') || []).map(r => r['Lead ID']))
      .filter(Boolean)
  );
  const leadsNoFu = AppCache.getRows('leads').filter(l =>
    String(l['Lead Status'] || 'Open').toLowerCase() === 'open' &&
    !(l['NBD Lead ID'] || l['Pushed To NBD At']) &&
    !_fuLeadIds.has(l['Lead ID']) &&
    (!userFilter || l['Assigned To'] === userFilter || l['Created By'] === userFilter)
  );
  const pendingCount = pendingFuFiltered.length + leadsNoFu.length;

  const coreCards = [
    { key: 'pending',   label: 'Pending Follow-up', value: pendingCount,       sub: 'overdue + today + new', icon: 'alert-circle', cls: 'warning' },
    { key: 'unique',    label: 'Unique Leads',    value: uniqueLeads,          sub: 'leads touched', icon: 'users',        cls: 'blue' },
    { key: 'connected', label: 'Follow-ups Done', value: activeHistory.length, sub: 'connected',     icon: 'check-circle-2', cls: 'success' },
    { key: 'notpicked', label: 'Not Picked',      value: missedHistory.length, sub: 'no answer',     icon: 'phone-missed', cls: 'danger' },
  ];
  const statusCards = statusLabels.map(status => {
    const meta = _todayStatusMeta(status);
    return {
      key: 'status:' + encodeURIComponent(status),
      label: status,
      value: statusLeadCounts[status] || 0,
      sub: `${statusCounts[status] || 0} today updates`,
      icon: meta.icon,
      cls: meta.cls
    };
  });
  const _todayRates = (typeof computeCallRates === 'function') ? computeCallRates(history) : { connectionRate: 0, conversionRate: 0, connects: 0, conversions: 0 };
  const ratePillsEl = el('td-rate-pills');
  if (ratePillsEl) {
    ratePillsEl.innerHTML = `
      <span class="td-rate-pill td-rate-pill-blue" title="${escapeHtml(_todayRates.connects || 0)} connected calls in selected range">
        ${icon('activity', 12)} Connection ${escapeHtml(_todayRates.connectionRate || 0)}%
      </span>
      <span class="td-rate-pill td-rate-pill-green" title="${escapeHtml(_todayRates.conversions || 0)} conversions in selected range">
        ${icon('trending-up', 12)} Conversion ${escapeHtml(_todayRates.conversionRate || 0)}%
      </span>`;
    renderIcons(ratePillsEl);
  }
  const activityCards = [
    { key: 'newleads',  label: 'Leads Added',     value: newLeads.length,      sub: 'new leads',     icon: 'user-plus',    cls: 'neutral' },
    { key: 'stage',     label: 'Stage Moves',     value: stageMovs,            sub: 'from logs',     icon: 'arrow-right-circle', cls: 'warning' },
    { key: 'calls',     label: 'Calls Made',      value: callsDone,            sub: 'connected',     icon: 'phone-call',   cls: 'purple' },
    { key: 'wa',        label: 'WhatsApp',        value: waDone,               sub: 'chats',         icon: 'message-circle', cls: 'success' },
    { key: 'connrate',  label: 'Connection Call Rate', value: `${_todayRates.connectionRate}%`, sub: `${_todayRates.connects} connects`, icon: 'activity', cls: 'blue' },
    { key: 'convrate',  label: 'Conversion Rate', value: `${_todayRates.conversionRate}%`, sub: `${_todayRates.conversions} converted`, icon: 'trending-up', cls: 'success' }
  ];
  const cardHTML = k => `
    <button type="button" class="fu-kpi fu-kpi-${k.cls} ${_todayCardFilter === k.key ? 'active' : ''}" onclick="_todayCardClick('${_todayEscapeAttr(k.key)}')">
      <span class="fu-kpi-icon">${icon(k.icon, 17)}</span>
      <span class="fu-kpi-value">${escapeHtml(k.value)}</span>
      <span class="fu-kpi-label">${escapeHtml(k.label)}</span>
      <span class="fu-kpi-sub">${escapeHtml(k.sub)}</span>
    </button>`;
  const _cardsEl = el('td-cards');
  if (!_cardsEl) return;  // page was replaced while async work was in flight
  _cardsEl.innerHTML = [
    ...coreCards.map(cardHTML),
    statusCards.length ? '<div class="td-card-break"><span>Lead status changes</span></div>' : '',
    ...statusCards.map(cardHTML),
    activityCards.length ? '<div class="td-card-break"><span>Other activity</span></div>' : '',
    ...activityCards.map(cardHTML)
  ].join('');
  renderIcons(_cardsEl);

  _todayDestroyCharts();
  _todayChartType(history);
  _todayChartTrend(from, to, userFilter, typeFilter, userMap, leadMap);
  _todayChartContactMode(history);

  const logRows = actLogs.map(r => {
    const oldStage = r['Old Value'] ? (AppLookup.stageName(r['Old Value']) || r['Old Value']) : '';
    const newStage = r['New Value'] ? (AppLookup.stageName(r['New Value']) || r['New Value']) : '';
    const remark = r['Remark'] || (oldStage && newStage ? `${oldStage} → ${newStage}` : newStage || '');
    return {
      _isLog: true,
      'Created At': r['Created At'] || '',
      'Lead ID':    r['Lead ID'] || '',
      'Created By': r['Created By'] || '',
      'Follow-up Type': r['Action Type'] || 'Log',
      '_rawAction': r['Action Type'] || '',
      '_rawField': r['Field Name'] || r['Field'] || '',
      'New Value': r['New Value'] || '',
      'Status After': r['Status After'] || r['New Status'] || '',
      'Lead Status': r['Lead Status'] || '',
      'Status': r['Status'] || '',
      'Remark': remark,
      'Outcome': '',
      'Next Follow-up Date': ''
    };
  });

  const tbody = el('td-tbody');
  let allRows;
  if (_todayCardFilter && _todayCardFilter.startsWith('status:')) {
    const selectedStatus = decodeURIComponent(_todayCardFilter.slice('status:'.length));
    allRows = [...logRows.filter(r => {
      const action = String(r['_rawAction'] || r['Follow-up Type'] || '').toLowerCase();
      const field = String(r['_rawField'] || '').toLowerCase();
      return (action.includes('stage') || action.includes('status') || field.includes('status')) && _todayStatusValue(r) === selectedStatus;
    })];
  } else switch (_todayCardFilter) {
    case 'connected': allRows = [...activeHistory]; break;
    case 'notpicked': allRows = [...missedHistory]; break;
    case 'calls':     allRows = activeHistory.filter(r => r['Contact Mode'] === 'Call Connected' || r['Follow-up Type'] === 'Call'); break;
    case 'wa':        allRows = activeHistory.filter(r => r['Contact Mode'] === 'WhatsApp Chat' || r['Follow-up Type'] === 'WhatsApp'); break;
    case 'stage':     allRows = [...logRows.filter(r => String(r['Follow-up Type'] || '').toLowerCase().includes('stage'))]; break;
    case 'newleads':
      allRows = newLeads.map(l => ({
        _isLog: true,
        'Created At': l['Created At'] || '',
        'Lead ID':    l['Lead ID'] || '',
        'Created By': l['Created By'] || l['Assigned To'] || '',
        'Follow-up Type': 'New Lead',
        'Remark': l['Client Description'] || `New lead created`,
        'Outcome': '', 'Next Follow-up Date': ''
      }));
      break;
    case 'pending':
      allRows = [
        ...pendingFuFiltered.map(r => {
          const planned = r['Next Follow-up Date'] || r['Next Planned Date'] || '';
          const pStr = _toDateStr(planned);
          const overdue = pStr && pStr < _todayStr;
          return {
            _isLog: true,
            'Created At': planned,
            'Lead ID': r['Lead ID'] || '',
            'Created By': leadMap[r['Lead ID']]?.['Assigned To'] || r['Created By'] || '',
            'Follow-up Type': overdue ? 'Overdue' : 'Due Today',
            'Remark': r['Discussion'] || r['Remark'] || 'Pending follow-up',
            'Follow-up Date': planned,
            'Planned Date': planned,
            'Outcome': '', 'Next Follow-up Date': ''
          };
        }),
        ...leadsNoFu.map(l => ({
          _isLog: true,
          'Created At': l['Created At'] || '',
          'Lead ID': l['Lead ID'] || '',
          'Created By': l['Assigned To'] || l['Created By'] || '',
          'Follow-up Type': 'No Follow-up Yet',
          'Remark': l['Client Description'] || 'New lead — needs first follow-up',
          'Outcome': '', 'Next Follow-up Date': ''
        }))
      ];
      break;
    case 'unique':
    default:
      allRows = [...history, ...logRows];
  }
  const _rcEl = el('td-row-count');
  if (_rcEl) _rcEl.textContent = allRows.length;

  const chipEl = el('td-card-filter-chip');
  if (chipEl) {
    if (_todayCardFilter) {
      const labelMap = { pending:'Pending Follow-up', connected:'Connected', notpicked:'Not Picked', calls:'Calls', wa:'WhatsApp', stage:'Stage Moves', status:'Lead Status Change', newleads:'New Leads', unique:'Unique Leads' };
      const label = _todayCardFilter.startsWith('status:')
        ? `Status: ${decodeURIComponent(_todayCardFilter.slice('status:'.length))}`
        : (labelMap[_todayCardFilter] || _todayCardFilter);
      chipEl.innerHTML = `<button class="fu-filter-chip" onclick="_todayCardClick('${_todayEscapeAttr(_todayCardFilter)}')">${escapeHtml(label)} ${icon('x', 11)}</button>`;
      renderIcons(chipEl);
    } else {
      chipEl.innerHTML = '';
    }
  }
  if (!tbody) return;
  if (!allRows.length) {
    tbody.innerHTML = `<tr><td colspan="7" class="empty-table-cell">No activity found for the selected period.</td></tr>`;
  } else {
    const sorted = [...allRows].sort((a, b) => new Date(b['Created At'] || 0) - new Date(a['Created At'] || 0));
    const contactModeStyle = {
      'Call Connected': { bg:'#dcfce7', color:'#166534' },
      'WhatsApp Chat':  { bg:'#dbeafe', color:'#1D4ED8' },
      'Not Picked':     { bg:'#fee2e2', color:'#B91C1C' },
      'Stage Change':   { bg:'#f1f5f9', color:'#475569' },
      'Log':            { bg:'#f1f5f9', color:'#475569' }
    };
    tbody.innerHTML = sorted.map(r => {
      const lead      = leadMap[r['Lead ID']] || {};
      const company   = escapeHtml(lead['Company Name'] || r['Lead ID'] || '—');
      const city      = lead['City'] ? escapeHtml(lead['City']) : '';
      const createdBy = r['Created By'] || r['Done By'] || '';
      const agentName = userMap[createdBy] || createdBy || '—';
      const initial   = String(agentName).trim().charAt(0).toUpperCase() || '?';
      const isLog     = !!r._isLog;
      const isMissed  = MISSED_MODES.has(r['Contact Mode'] || '');
      const cm        = isLog ? (r['Follow-up Type'] || 'Log') : (r['Contact Mode'] || '');
      const cms       = contactModeStyle[cm] || { bg:'#f3f4f6', color:'#6b7280' };
      const contactBadge = cm
        ? `<span class="td-mode-badge" style="background:${cms.bg};color:${cms.color}">${escapeHtml(cm)}</span>`
        : `<span class="muted-text">—</span>`;
      const remark    = escapeHtml(r['Remark'] || r['Discussion'] || '—');
      const remarkRaw = (r['Remark'] || r['Discussion'] || '');
      const nextDate  = r['Next Follow-up Date'] || r['Next Planned Date'] || r['Next Date'] || '';
      const next      = nextDate ? formatDate(nextDate) : `<span class="muted-text">—</span>`;
      const doneAt    = formatDate(r['Done Date'] || r['Created At'] || '');
      const planned   = r['Follow-up Date'] || r['Planned Date'] || '';
      const plannedFmt = planned ? formatDate(planned) : `<span class="muted-text">—</span>`;
      const leadId    = r['Lead ID'] || '';
      const rowCls    = isMissed ? 'fu-row-overdue' : (isLog ? 'fu-row-done' : '');
      return `<tr class="fu-row ${rowCls}" ${leadId ? `onclick="_todayOpenLead('${escapeHtml(leadId)}')" style="cursor:pointer"` : ''}>
        <td><div class="fu-date-sub" style="margin-top:0;font-weight:600;color:#1E293B">${doneAt}</div></td>
        <td><div class="fu-owner-cell"><span class="fu-owner-avatar">${escapeHtml(initial)}</span><span class="fu-owner-name">${escapeHtml(agentName)}</span></div></td>
        <td>
          <div class="fu-lead-title">${company}</div>
          ${city ? `<div class="fu-lead-sub">${icon('map-pin', 12)} ${city}</div>` : ''}
        </td>
        <td><div class="fu-date-sub">${plannedFmt}</div></td>
        <td>${contactBadge}</td>
        <td><div class="fu-discussion" title="${escapeHtml(remarkRaw)}">${remark}</div></td>
        <td><div class="fu-date-sub">${next}</div></td>
      </tr>`;
    }).join('');
    renderIcons(tbody);
  }
  _todayAttachScrollCollapse();
}

function _todayAttachScrollCollapse() {
  const scroll = document.querySelector('#today-page .fu-table-scroll');
  const page = el('today-page');
  if (!scroll || !page || scroll._tdBound) return;
  scroll._tdBound = true;
  let ticking = false;
  scroll.addEventListener('scroll', () => {
    if (ticking) return;
    ticking = true;
    requestAnimationFrame(() => {
      page.classList.toggle('fu-scrolled', scroll.scrollTop > 20);
      ticking = false;
    });
  }, { passive: true });
}

function _todayOpenLead(leadId) {
  if (!leadId || typeof openLeadDetail !== 'function') return;
  openLeadDetail(leadId);
}

function _todayDestroyCharts() {
  Object.values(_todayCharts).forEach(c => { try { c.destroy(); } catch(e) {} });
  _todayCharts = {};
  ['td-chart-type', 'td-chart-trend', 'td-chart-outcome'].forEach(id => {
    const c = el(id);
    if (c) { c.width = c.width; }
  });
}

function _todayChartType(history) {
  const ctx = el('td-chart-type');
  if (!ctx) return;
  const types  = ['Call', 'WhatsApp', 'Visit', 'Email', 'Payment'];
  const colors = ['#3b82f6', '#22c55e', '#8b5cf6', '#f59e0b', '#ef4444'];
  const counts = types.map(t => history.filter(r => r['Follow-up Type'] === t).length);
  _todayCharts.type = new Chart(ctx, {
    type: 'bar',
    data: { labels: types, datasets: [{ data: counts, backgroundColor: colors, borderRadius: 6, borderSkipped: false }] },
    options: {
      plugins: { legend: { display: false } },
      scales: { y: { beginAtZero: true, ticks: { precision: 0, font: { size: 11 } }, grid: { color: '#f3f4f6' } }, x: { ticks: { font: { size: 11 } }, grid: { display: false } } },
      responsive: true, maintainAspectRatio: false
    }
  });
}

function _todayChartTrend(from, to, userFilter, typeFilter, userMap, leadMap) {
  const ctx = el('td-chart-trend');
  if (!ctx) return;
  const days = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date(); d.setDate(d.getDate() - i);
    days.push(_fmtDate(d.toISOString()));
  }
  const allHistory = AppCache.getRows('followupHistory');
  const counts = days.map(day => {
    let rows = allHistory.filter(r => _fmtDate(r['Created At'] || r['Follow-up Date'] || '') === day);
    if (userFilter) rows = rows.filter(r => r['Created By'] === userFilter || leadMap[r['Lead ID']]?.['Assigned To'] === userFilter);
    if (typeFilter) rows = rows.filter(r => r['Follow-up Type'] === typeFilter);
    return rows.length;
  });
  const labels = days.map(d => { const dt = new Date(d + 'T00:00:00'); return dt.toLocaleDateString('en-IN', { day: 'numeric', month: 'short' }); });

  _todayCharts.trend = new Chart(ctx, {
    type: 'line',
    data: { labels, datasets: [{ data: counts, borderColor: '#6366f1', backgroundColor: 'rgba(99,102,241,.12)', tension: 0.4, fill: true, pointBackgroundColor: '#6366f1', pointRadius: 4 }] },
    options: {
      plugins: { legend: { display: false } },
      scales: { y: { beginAtZero: true, ticks: { precision: 0, font: { size: 11 } }, grid: { color: '#f3f4f6' } }, x: { ticks: { font: { size: 11 } }, grid: { display: false } } },
      responsive: true, maintainAspectRatio: false
    }
  });
}

function _todayChartContactMode(history) {
  const ctx = el('td-chart-outcome');
  if (!ctx) return;
  const modeMap = {};
  history.forEach(r => {
    const mode = r['Contact Mode'] || 'No Contact Mode';
    modeMap[mode] = (modeMap[mode] || 0) + 1;
  });
  const labels = Object.keys(modeMap);
  const data   = Object.values(modeMap);
  const palette = ['#16a34a','#2563eb','#dc2626','#8b5cf6','#f59e0b','#14b8a6','#ec4899','#64748b'];

  _todayCharts.contactMode = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: labels.length ? labels : ['No data'],
      datasets: [{
        data: data.length ? data : [1],
        backgroundColor: data.length ? palette.slice(0, labels.length) : ['#e5e7eb'],
        borderWidth: 2,
        borderColor: '#fff'
      }]
    },
    options: {
      plugins: { legend: { position: 'bottom', labels: { font: { size: 11 }, padding: 8, boxWidth: 12 } } },
      responsive: true, maintainAspectRatio: false,
      cutout: '60%'
    }
  });
}
</script>

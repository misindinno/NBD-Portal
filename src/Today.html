<script>
// ─── Today's Activity Page ────────────────────────────────────────────────────

let _todayCharts = {};

async function loadToday() {
  el('content').innerHTML = `<div id="today-wrap">${skeletonPage('table')}</div>`;

  // Ensure all needed caches are loaded
  const loads = [];
  if (!AppCache.isLoaded('followupHistory')) loads.push(_ensureCached('followupHistory', () => api.getFollowupHistory({})));
  if (!AppCache.isLoaded('activityLogs'))   loads.push(_ensureCached('activityLogs',   () => api.getLeadActivityLogs({})));
  if (!AppCache.isLoaded('leads'))          loads.push(_ensureCached('leads',           () => api.getLeads()));
  if (loads.length) await Promise.all(loads);

  _renderToday();
}

function _renderToday() {
  const isAdminOrManager = ['ADMIN', 'MANAGER'].includes(App.user.role);
  const users = App.config.users || [];

  el('today-wrap').innerHTML = `
    <style>
      .td-filter-bar { display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:18px }
      .td-filter-bar select, .td-filter-bar input { height:34px;font-size:12px;padding:0 10px;border-radius:7px;border:1px solid #e5e7eb;background:#fff;color:#374151 }
      .td-cards { display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:12px;margin-bottom:20px }
      .td-card { background:#fff;border-radius:10px;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,.08);border-left:4px solid #6366f1 }
      .td-card-label { font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:#9ca3af;margin-bottom:6px }
      .td-card-value { font-size:28px;font-weight:700;color:#111827;line-height:1 }
      .td-card-sub   { font-size:11px;color:#9ca3af;margin-top:4px }
      .td-charts { display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:20px }
      .td-chart-box { background:#fff;border-radius:10px;padding:16px;box-shadow:0 1px 4px rgba(0,0,0,.08) }
      .td-chart-title { font-size:12px;font-weight:700;color:#374151;margin-bottom:12px;text-transform:uppercase;letter-spacing:.4px }
      .td-table-wrap { background:#fff;border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,.08);overflow:hidden }
      .td-table { width:100%;border-collapse:collapse;font-size:13px }
      .td-table th { background:#f9fafb;padding:9px 12px;text-align:left;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#6b7280;border-bottom:2px solid #e5e7eb }
      .td-table td { padding:9px 12px;border-bottom:1px solid #f3f4f6;color:#374151;vertical-align:middle }
      .td-table tr:last-child td { border-bottom:none }
      .td-table tr:hover td { background:#f8f9ff;cursor:pointer }
      .td-empty { text-align:center;color:#9ca3af;padding:36px;font-size:13px }
      @media(max-width:900px){ .td-charts{grid-template-columns:1fr} }
    </style>

    <div class="td-filter-bar">
      <select id="td-range" onchange="_todayApply()">
        <option value="today">Today</option>
        <option value="yesterday">Yesterday</option>
        <option value="7d">Last 7 Days</option>
        <option value="30d">This Month</option>
        <option value="custom">Custom Range</option>
      </select>
      <input type="date" id="td-from" style="display:none" onchange="_todayApply()">
      <input type="date" id="td-to"   style="display:none" onchange="_todayApply()">
      ${isAdminOrManager ? `<select id="td-user" onchange="_todayApply()">
        <option value="">All Users</option>
        ${users.map(u => `<option value="${escapeHtml(u.id)}">${escapeHtml(u.name)}</option>`).join('')}
      </select>` : ''}
      <select id="td-type" onchange="_todayApply()">
        <option value="">All Types</option>
        <option>Call</option><option>WhatsApp</option><option>Visit</option>
        <option>Email</option><option>Payment</option>
      </select>
    </div>

    <div class="td-cards" id="td-cards"></div>

    <div class="td-charts">
      <div class="td-chart-box">
        <div class="td-chart-title">By Type</div>
        <canvas id="td-chart-type" height="180"></canvas>
      </div>
      <div class="td-chart-box">
        <div class="td-chart-title">Daily Trend (7 days)</div>
        <canvas id="td-chart-trend" height="180"></canvas>
      </div>
      <div class="td-chart-box">
        <div class="td-chart-title">Outcomes</div>
        <canvas id="td-chart-outcome" height="180"></canvas>
      </div>
    </div>

    <div class="td-table-wrap">
      <table class="td-table">
        <thead><tr>
          <th>Done At</th><th>Agent</th><th>Company</th><th>Type</th>
          <th>Remark</th><th>Outcome</th><th>Next Follow-up</th>
        </tr></thead>
        <tbody id="td-tbody"></tbody>
      </table>
    </div>`;

  _todayApply();
}

function _todayDateRange() {
  const range = el('td-range')?.value || 'today';
  const todayStr = localDateInputValue();
  let from, to;

  if (range === 'today') {
    from = to = todayStr;
  } else if (range === 'yesterday') {
    const d = new Date(); d.setDate(d.getDate() - 1);
    from = to = _fmtDate(d.toISOString());
  } else if (range === '7d') {
    const d = new Date(); d.setDate(d.getDate() - 6);
    from = _fmtDate(d.toISOString()); to = todayStr;
  } else if (range === '30d') {
    const d = new Date(); d.setDate(1);
    from = _fmtDate(d.toISOString()); to = todayStr;
  } else {
    from = el('td-from')?.value || todayStr;
    to   = el('td-to')?.value   || todayStr;
  }
  return { from, to };
}

function _todayApply() {
  const range = el('td-range')?.value || 'today';
  const fromEl = el('td-from'), toEl = el('td-to');
  if (fromEl) fromEl.style.display = range === 'custom' ? '' : 'none';
  if (toEl)   toEl.style.display   = range === 'custom' ? '' : 'none';

  const { from, to } = _todayDateRange();
  const userFilter = el('td-user')?.value || '';
  const typeFilter = el('td-type')?.value || '';

  const userMap  = (App.config.users || []).reduce((m, u) => { m[u.id] = u.name; return m; }, {});
  const leadMap  = AppCache.getRows('leads').reduce((m, l) => { m[l['Lead ID']] = l; return m; }, {});

  // ── History rows in range ──
  let history = AppCache.getRows('followupHistory').filter(r => {
    const d = _fmtDate(r['Created At'] || r['Follow-up Date'] || '');
    return d >= from && d <= to;
  });
  if (userFilter) history = history.filter(r => r['Created By'] === userFilter || leadMap[r['Lead ID']]?.['Assigned To'] === userFilter);
  if (typeFilter) history = history.filter(r => r['Follow-up Type'] === typeFilter);

  // ── Activity logs in range ──
  let actLogs = AppCache.getRows('activityLogs').filter(r => {
    const d = _fmtDate(r['Created At'] || '');
    return d >= from && d <= to;
  });
  if (userFilter) actLogs = actLogs.filter(r => r['Changed By'] === userFilter || r['Created By'] === userFilter);

  // ── New leads in range ──
  let newLeads = AppCache.getRows('leads').filter(r => {
    const d = _fmtDate(r['Created At'] || '');
    return d >= from && d <= to;
  });
  if (userFilter) newLeads = newLeads.filter(r => r['Assigned To'] === userFilter || r['Created By'] === userFilter);

  // ── Render cards ──
  const callsDone  = history.filter(r => r['Follow-up Type'] === 'Call').length;
  const visitsDone = history.filter(r => r['Follow-up Type'] === 'Visit').length;
  const waDone     = history.filter(r => r['Follow-up Type'] === 'WhatsApp').length;
  const stageMovs  = actLogs.filter(r => String(r['Follow-up Type'] || r['Action'] || '').toLowerCase().includes('stage')).length;

  const cards = [
    { label: 'Follow-ups Done', value: history.length,   sub: 'from history', color: '#6366f1' },
    { label: 'Leads Added',     value: newLeads.length,  sub: 'new leads',    color: '#10b981' },
    { label: 'Stage Moves',     value: stageMovs,        sub: 'from logs',    color: '#f59e0b' },
    { label: 'Calls Made',      value: callsDone,        sub: 'type = Call',  color: '#3b82f6' },
    { label: 'Visits Done',     value: visitsDone,       sub: 'type = Visit', color: '#8b5cf6' },
    { label: 'WhatsApp',        value: waDone,           sub: 'type = WA',    color: '#22c55e' },
  ];
  el('td-cards').innerHTML = cards.map(c => `
    <div class="td-card" style="border-left-color:${c.color}">
      <div class="td-card-label">${escapeHtml(c.label)}</div>
      <div class="td-card-value" style="color:${c.color}">${c.value}</div>
      <div class="td-card-sub">${escapeHtml(c.sub)}</div>
    </div>`).join('');

  // ── Charts ──
  _todayDestroyCharts();
  _todayChartType(history);
  _todayChartTrend(from, to, userFilter, typeFilter, userMap, leadMap);
  _todayChartOutcome(history);

  // ── Table ──
  const tbody = el('td-tbody');
  if (!history.length) {
    tbody.innerHTML = `<tr><td colspan="7" class="td-empty">No activity found for the selected period.</td></tr>`;
    return;
  }
  const sorted = [...history].sort((a, b) => new Date(b['Created At'] || 0) - new Date(a['Created At'] || 0));
  tbody.innerHTML = sorted.map(r => {
    const lead    = leadMap[r['Lead ID']] || {};
    const company = escapeHtml(lead['Company Name'] || r['Lead ID'] || '—');
    const agent   = escapeHtml(userMap[r['Created By']] || r['Created By'] || '—');
    const type    = r['Follow-up Type'] || '';
    const typeColors = { Call:'#1565C0', WhatsApp:'#2E7D32', Visit:'#6A1B9A', Email:'#E65100', Payment:'#B71C1C' };
    const tc = typeColors[type] || '#555';
    const remark  = escapeHtml(r['Remark'] || r['Discussion'] || '—');
    const outcome = escapeHtml(r['Outcome'] || '—');
    const next    = r['Next Follow-up Date'] ? formatDate(r['Next Follow-up Date']) : '—';
    const doneAt  = formatDate(r['Created At'] || r['Follow-up Date'] || '');
    const leadId  = r['Lead ID'] || '';
    return `<tr onclick="${leadId ? `_todayOpenLead('${escapeHtml(leadId)}')` : ''}">
      <td style="white-space:nowrap;font-size:12px;color:#6b7280">${doneAt}</td>
      <td style="font-size:12px">${agent}</td>
      <td><div style="font-weight:600;font-size:13px">${company}</div></td>
      <td><span style="background:${tc}20;color:${tc};font-size:11px;font-weight:700;padding:2px 8px;border-radius:999px">${escapeHtml(type)}</span></td>
      <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px" title="${remark}">${remark}</td>
      <td style="font-size:12px">${outcome}</td>
      <td style="font-size:12px;white-space:nowrap">${next}</td>
    </tr>`;
  }).join('');
}

function _todayOpenLead(leadId) {
  if (!leadId || typeof openLeadDetail !== 'function') return;
  openLeadDetail(leadId);
}

function _todayDestroyCharts() {
  Object.values(_todayCharts).forEach(c => { try { c.destroy(); } catch(e) {} });
  _todayCharts = {};
}

function _todayChartType(history) {
  const ctx = el('td-chart-type');
  if (!ctx) return;
  const types  = ['Call', 'WhatsApp', 'Visit', 'Email', 'Payment'];
  const colors = ['#3b82f6', '#22c55e', '#8b5cf6', '#f59e0b', '#ef4444'];
  const counts = types.map(t => history.filter(r => r['Follow-up Type'] === t).length);
  _todayCharts.type = new Chart(ctx, {
    type: 'bar',
    data: { labels: types, datasets: [{ data: counts, backgroundColor: colors, borderRadius: 6, borderSkipped: false }] },
    options: {
      plugins: { legend: { display: false } },
      scales: { y: { beginAtZero: true, ticks: { precision: 0, font: { size: 11 } }, grid: { color: '#f3f4f6' } }, x: { ticks: { font: { size: 11 } }, grid: { display: false } } },
      responsive: true, maintainAspectRatio: false
    }
  });
}

function _todayChartTrend(from, to, userFilter, typeFilter, userMap, leadMap) {
  const ctx = el('td-chart-trend');
  if (!ctx) return;

  // Always show last 7 days as trend context regardless of filter
  const days = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date(); d.setDate(d.getDate() - i);
    days.push(_fmtDate(d.toISOString()));
  }
  const allHistory = AppCache.getRows('followupHistory');
  const counts = days.map(day => {
    let rows = allHistory.filter(r => _fmtDate(r['Created At'] || r['Follow-up Date'] || '') === day);
    if (userFilter) rows = rows.filter(r => r['Created By'] === userFilter || leadMap[r['Lead ID']]?.['Assigned To'] === userFilter);
    if (typeFilter) rows = rows.filter(r => r['Follow-up Type'] === typeFilter);
    return rows.length;
  });
  const labels = days.map(d => { const dt = new Date(d + 'T00:00:00'); return dt.toLocaleDateString('en-IN', { day: 'numeric', month: 'short' }); });

  _todayCharts.trend = new Chart(ctx, {
    type: 'line',
    data: { labels, datasets: [{ data: counts, borderColor: '#6366f1', backgroundColor: 'rgba(99,102,241,.1)', tension: 0.4, fill: true, pointBackgroundColor: '#6366f1', pointRadius: 4 }] },
    options: {
      plugins: { legend: { display: false } },
      scales: { y: { beginAtZero: true, ticks: { precision: 0, font: { size: 11 } }, grid: { color: '#f3f4f6' } }, x: { ticks: { font: { size: 11 } }, grid: { display: false } } },
      responsive: true, maintainAspectRatio: false
    }
  });
}

function _todayChartOutcome(history) {
  const ctx = el('td-chart-outcome');
  if (!ctx) return;
  const outcomeMap = {};
  history.forEach(r => {
    const o = r['Outcome'] || 'No Outcome';
    outcomeMap[o] = (outcomeMap[o] || 0) + 1;
  });
  const labels = Object.keys(outcomeMap);
  const data   = Object.values(outcomeMap);
  const palette = ['#6366f1','#10b981','#f59e0b','#3b82f6','#ef4444','#8b5cf6','#ec4899','#14b8a6'];

  if (!labels.length) {
    ctx.parentElement.innerHTML = `<div class="td-chart-title">Outcomes</div><div style="text-align:center;color:#9ca3af;padding:40px;font-size:13px">No data</div>`;
    return;
  }
  _todayCharts.outcome = new Chart(ctx, {
    type: 'doughnut',
    data: { labels, datasets: [{ data, backgroundColor: palette.slice(0, labels.length), borderWidth: 2, borderColor: '#fff' }] },
    options: {
      plugins: { legend: { position: 'bottom', labels: { font: { size: 11 }, padding: 8, boxWidth: 12 } } },
      responsive: true, maintainAspectRatio: false,
      cutout: '60%'
    }
  });
}
</script>

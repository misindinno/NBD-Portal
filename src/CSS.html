<style>
  :root {
    --md-primary: #1565C0;
    --md-primary-light: #1976D2;
    --md-surface: #F5F7FA;
    --md-card: #FFFFFF;
    --md-text: #212121;
    --md-text-secondary: #757575;
    --md-border: #E0E0E0;
    --md-danger: #D32F2F;
    --md-success: #388E3C;
    --md-warning: #F57C00;
    --sidebar-w: 250px;
    --sb-collapsed: 64px;
    --sb-bg-from:   #1565C0;
    --sb-bg-to:     #1040A0;
    --sb-accent:    #fff;
    --sb-active-bg: rgba(255,255,255,0.18);
    --sb-hover-bg:  rgba(255,255,255,0.10);
    --sb-text:      rgba(255,255,255,0.85);
    --sb-text-dim:  rgba(255,255,255,0.45);
    --sb-border:    rgba(255,255,255,0.12);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Manrope', system-ui, sans-serif; background: var(--md-surface); color: var(--md-text); -webkit-font-smoothing: antialiased; }

  /* Layout */
  #app-shell { display: flex; height: 100vh; overflow: hidden; }
  /* â”€â”€ Premium Sidebar â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
  #sidebar {
    width: var(--sidebar-w);
    background: linear-gradient(180deg, var(--sb-bg-from) 0%, var(--sb-bg-to) 100%);
    border-right: 1px solid var(--sb-border);
    box-shadow: 4px 0 28px rgba(0,0,0,.22);
    color: var(--sb-text);
    display: flex; flex-direction: column; flex-shrink: 0;
    transition: width 0.22s cubic-bezier(.4,0,.2,1);
    overflow: hidden;
  }
  #sidebar.collapsed { width: var(--sb-collapsed); }

  /* Header */
  .sb-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 14px 14px; border-bottom: 1px solid var(--sb-border);
    flex-shrink: 0; gap: 8px; overflow: hidden; white-space: nowrap;
  }
  .sb-brand { display: flex; align-items: center; gap: 10px; min-width: 0; overflow: hidden; }
  .sb-logo-wrap {
    width: 34px; height: 34px; flex-shrink: 0; border-radius: 9px;
    background: rgba(255,255,255,0.15);
    box-shadow: inset 0 1px 0 rgba(255,255,255,.2);
    display: flex; align-items: center; justify-content: center;
  }
  .sb-logo-wrap .lucide { width: 18px; height: 18px; color: #fff; stroke-width: 2.2; }
  .sb-brand-text { display: flex; flex-direction: column; min-width: 0; overflow: hidden; }
  .sb-brand-name {
    font-size: 15px; font-weight: 700; color: #fff; letter-spacing: -0.02em;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .sb-brand-sub {
    font-size: 10px; color: var(--sb-text-dim); letter-spacing: 0.04em;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px;
    text-transform: uppercase;
  }
  .sb-toggle {
    width: 28px; height: 28px; flex-shrink: 0; border-radius: 7px; border: none;
    background: rgba(255,255,255,.07); border: 1px solid var(--sb-border);
    color: var(--sb-text-dim); cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .15s, color .15s;
  }
  .sb-toggle:hover { background: rgba(255,255,255,.12); color: #fff; }
  .sb-toggle .lucide { width: 15px; height: 15px; stroke-width: 1.8; }
  #sidebar.collapsed .sb-header {
    flex-direction: column; padding: 14px 0 12px; gap: 8px;
    justify-content: center; align-items: center;
  }
  #sidebar.collapsed .sb-brand-text { display: none; }
  #sidebar.collapsed .sb-brand { justify-content: center; }

  /* Nav */
  .sb-nav {
    flex: 1; overflow-y: auto; overflow-x: hidden;
    padding: 8px 10px 12px; display: flex; flex-direction: column;
  }
  .sb-nav::-webkit-scrollbar { width: 3px; }
  .sb-nav::-webkit-scrollbar-thumb { background: rgba(255,255,255,.1); border-radius: 3px; }
  .nav-section {
    padding: 18px 6px 5px; font-size: 9.5px; font-weight: 700; letter-spacing: .1em;
    text-transform: uppercase; color: var(--sb-text-dim); white-space: nowrap;
    overflow: hidden; user-select: none;
  }
  #sidebar.collapsed .nav-section { visibility: hidden; padding-top: 12px; }
  .sb-nav a {
    display: flex; align-items: center; gap: 10px; padding: 0 10px; height: 44px;
    border-radius: 8px; color: var(--sb-text); text-decoration: none;
    font-size: 13.5px; font-weight: 500; white-space: nowrap; overflow: hidden;
    transition: background .16s, color .16s; position: relative; cursor: pointer;
  }
  .sb-nav a:hover { background: var(--sb-hover-bg); color: rgba(255,255,255,.95); }
  .sb-nav a.active { background: var(--sb-active-bg); color: #fff; }
  .sb-nav a.active::before {
    content: ''; position: absolute; left: 0; top: 22%; bottom: 22%;
    width: 3px; border-radius: 0 3px 3px 0; background: var(--sb-accent);
  }
  .sb-nav a .lucide { width: 18px; height: 18px; flex-shrink: 0; stroke-width: 1.85; opacity: .7; transition: opacity .16s; }
  .sb-nav a:hover .lucide,
  .sb-nav a.active .lucide { opacity: 1; }
  .nav-item-label { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; }
  .nav-badge {
    flex-shrink: 0; min-width: 20px; height: 18px; padding: 0 6px;
    background: rgba(255,255,255,.18); color: #fff; border-radius: 20px;
    font-size: 10.5px; font-weight: 700;
    display: inline-flex; align-items: center; justify-content: center;
  }
  /* Collapsed nav */
  #sidebar.collapsed .sb-nav { padding: 8px 11px 12px; align-items: center; }
  #sidebar.collapsed .sb-nav a {
    width: 42px; height: 42px; padding: 0; justify-content: center; gap: 0;
  }
  #sidebar.collapsed .nav-item-label,
  #sidebar.collapsed .nav-badge { display: none; }
  #sidebar.collapsed .sb-nav a .lucide { opacity: .65; }
  #sidebar.collapsed .sb-nav a.active .lucide,
  #sidebar.collapsed .sb-nav a:hover .lucide { opacity: 1; }
  /* Collapsed tooltips */
  #sidebar.collapsed .sb-nav a[data-tooltip]::after {
    content: attr(data-tooltip);
    position: absolute; left: calc(100% + 10px); top: 50%;
    transform: translateY(-50%);
    background: #0D47A1; color: #fff; font-size: 12px; font-weight: 500;
    padding: 5px 10px; border-radius: 6px; white-space: nowrap;
    box-shadow: 0 4px 12px rgba(0,0,0,.28); pointer-events: none;
    opacity: 0; transition: opacity .15s; z-index: 999;
  }
  #sidebar.collapsed .sb-nav a[data-tooltip]:hover::after { opacity: 1; }

  /* Footer user card */
  .sb-footer { padding: 10px; border-top: 1px solid var(--sb-border); flex-shrink: 0; }
  .sb-user-card {
    display: flex; align-items: center; gap: 10px; padding: 8px 10px;
    border-radius: 8px; background: rgba(255,255,255,.04);
    border: 1px solid var(--sb-border); overflow: hidden; white-space: nowrap;
    transition: background .15s; cursor: default;
  }
  .sb-user-card:hover { background: rgba(255,255,255,.08); }
  .sb-user-avatar {
    width: 30px; height: 30px; border-radius: 8px; flex-shrink: 0;
    background: rgba(255,255,255,0.18);
    color: #fff; font-size: 12px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
  }
  .sb-user-info { display: flex; flex-direction: column; min-width: 0; overflow: hidden; }
  .sb-user-name { font-size: 12.5px; font-weight: 600; color: rgba(255,255,255,.9); overflow: hidden; text-overflow: ellipsis; }
  .sb-user-role { font-size: 10.5px; color: var(--sb-text-dim); overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }
  #sidebar.collapsed .sb-footer { padding: 10px 11px; }
  #sidebar.collapsed .sb-user-card { justify-content: center; padding: 8px; }
  #sidebar.collapsed .sb-user-info { display: none; }

  /* Skeleton nav */
  .nav-skeleton-item { display: flex; align-items: center; gap: 10px; padding: 0 10px; height: 44px; }
  .skeleton-nav-icon { width: 18px; height: 18px; border-radius: 5px; flex-shrink: 0; display: inline-block; background: rgba(255,255,255,.12); position: relative; overflow: hidden; }
  .skeleton-nav-line { width: 108px; height: 12px; border-radius: 4px; display: inline-block; background: rgba(255,255,255,.10); position: relative; overflow: hidden; }
  .skeleton-nav-icon::after, .skeleton-nav-line::after {
    content: ''; position: absolute; inset: 0; transform: translateX(-100%);
    background: linear-gradient(90deg, transparent, rgba(255,255,255,.2), transparent);
    animation: skeleton-shimmer 1.25s infinite;
  }
  #main { flex: 1; min-width: 0; display: flex; flex-direction: column; min-height: 0; }
  /* â”€â”€ Premium Topbar â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
  #topbar {
    height: 64px; background: #fff;
    border-bottom: 1px solid #EBEBEB;
    box-shadow: 0 1px 4px rgba(0,0,0,.05);
    display: flex; align-items: center;
    padding: 0 24px 0 20px; gap: 16px; flex-shrink: 0;
    position: relative; z-index: 10;
  }
  /* Left */
  .tb-left { display: flex; flex-direction: column; justify-content: center; min-width: 0; flex-shrink: 0; }
  .tb-breadcrumb {
    display: flex; align-items: center; gap: 3px; margin-bottom: 2px;
    color: #9CA3AF; line-height: 1;
  }
  .tb-breadcrumb .lucide { opacity: .5; flex-shrink: 0; }
  .tb-breadcrumb-app { font-size: 11px; font-weight: 500; white-space: nowrap; }
  .tb-breadcrumb-page { font-size: 11px; font-weight: 600; color: #6B7280; white-space: nowrap; }
  #page-title {
    font-size: 19px; font-weight: 700; color: #111827;
    letter-spacing: -0.025em; line-height: 1; white-space: nowrap;
  }
  /* Center search */
  .tb-center { flex: 1; display: flex; align-items: center; justify-content: center; }
  .tb-search-wrap { position: relative; width: 100%; max-width: 360px; }
  .tb-search {
    display: flex; align-items: center; gap: 8px;
    background: #F4F6F8; border: 1px solid #E5E7EB; border-radius: 10px;
    padding: 0 12px; height: 38px; width: 100%;
    transition: border-color .15s, box-shadow .15s, background .15s;
  }
  .tb-search:focus-within {
    border-color: var(--md-primary); background: #fff;
    box-shadow: 0 0 0 3px rgba(21,101,192,.08);
  }
  .tb-search .lucide { width: 15px; height: 15px; color: #9CA3AF; flex-shrink: 0; }
  #tb-search-input {
    border: none; background: none; outline: none;
    font-size: 13px; color: #374151; width: 100%; font-family: inherit;
  }
  #tb-search-input::placeholder { color: #ADADAD; }
  /* Search dropdown */
  .tb-search-drop {
    position: absolute; top: calc(100% + 6px); left: 0; right: 0; z-index: 500;
    background: #fff; border: 1px solid #E5E7EB; border-radius: 12px;
    box-shadow: 0 8px 28px rgba(0,0,0,.12); overflow: hidden;
    max-height: 520px; overflow-y: auto;
  }
  .tb-sd-header {
    padding: 8px 14px 5px; font-size: 10.5px; font-weight: 700;
    letter-spacing: .06em; text-transform: uppercase; color: #9CA3AF;
  }
  .tb-sd-section-head {
    display: flex; align-items: center; gap: 7px;
    padding: 10px 14px 5px; font-size: 10px; font-weight: 700;
    letter-spacing: .07em; text-transform: uppercase; color: #9CA3AF;
    border-top: 1px solid #F3F4F6;
  }
  .tb-sd-section-head:first-child { border-top: none; }
  .tb-sd-section-count {
    background: #F3F4F6; color: #6B7280; font-size: 10px; font-weight: 700;
    padding: 1px 6px; border-radius: 20px;
  }
  .tb-sd-icon-contacts { background: #FFF7ED; color: #EA580C; }
  .tb-sd-icon-followup { background: #F0FDF4; color: #16A34A; }
  .tb-sd-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 14px; cursor: pointer; transition: background .12s;
  }
  .tb-sd-item:hover, .tb-sd-item.focused { background: #F5F7FF; }
  .tb-sd-icon {
    width: 30px; height: 30px; border-radius: 8px; flex-shrink: 0;
    background: #EEF2FF; color: var(--md-primary);
    display: flex; align-items: center; justify-content: center;
  }
  .tb-sd-text { flex: 1; min-width: 0; overflow: hidden; }
  .tb-sd-name {
    display: block; font-size: 13px; font-weight: 600; color: #111827;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .tb-sd-sub {
    display: block; font-size: 11.5px; color: #6B7280;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px;
  }
  .tb-sd-badge {
    flex-shrink: 0; font-size: 10.5px; font-weight: 600; padding: 2px 7px;
    border-radius: 20px; white-space: nowrap;
  }
  .tb-sd-badge-open   { background: #E8F5E9; color: #2E7D32; }
  .tb-sd-badge-won    { background: #E8F5E9; color: #1B5E20; }
  .tb-sd-badge-lost   { background: #FFEBEE; color: #B71C1C; }
  .tb-sd-badge-hold   { background: #FFF8E1; color: #F57F17; }
  .tb-sd-empty { padding: 16px 14px; font-size: 13px; color: #9CA3AF; text-align: center; }
  .tb-sd-footer {
    padding: 7px 14px 8px; border-top: 1px solid #F0F0F0;
    font-size: 12px; color: var(--md-primary); cursor: pointer;
    display: flex; align-items: center; gap: 5px; font-weight: 500;
    transition: background .12s;
  }
  .tb-sd-footer:hover { background: #F5F7FF; }
  /* Right */
  .tb-right { display: flex; align-items: center; gap: 4px; flex-shrink: 0; margin-left: auto; }
  .tb-divider { width: 1px; height: 22px; background: #E5E7EB; margin: 0 4px; }
  .tb-icon-btn {
    width: 36px; height: 36px; border: none; border-radius: 8px;
    background: none; color: #6B7280; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background .15s, color .15s; flex-shrink: 0; position: relative;
  }
  .tb-icon-btn:hover { background: #F3F4F6; color: #111827; }
  .tb-icon-btn .lucide { width: 18px; height: 18px; }
  .tb-icon-btn.spinning .lucide { animation: spin .7s linear infinite; }
  /* User chip */
  .tb-user-chip {
    display: flex; align-items: center; gap: 8px;
    padding: 4px 10px 4px 5px; border-radius: 10px;
    border: 1px solid #E5E7EB; cursor: default;
    transition: background .15s, border-color .15s; margin-left: 2px;
  }
  .tb-user-chip:hover { background: #F9FAFB; border-color: #D1D5DB; }
  .tb-user-avatar {
    width: 30px; height: 30px; border-radius: 8px; flex-shrink: 0;
    background: var(--md-primary); color: #fff;
    font-size: 12px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
  }
  .tb-user-info-wrap { display: flex; flex-direction: column; line-height: 1.25; }
  .tb-user-name { font-size: 13px; font-weight: 600; color: #111827; white-space: nowrap; }
  .tb-user-role { font-size: 11px; color: #6B7280; white-space: nowrap; }
  /* Logout */
  .tb-logout-btn {
    display: none; align-items: center; gap: 6px;
    padding: 0 13px; height: 36px; border: 1px solid #E5E7EB; border-radius: 8px;
    background: none; color: #6B7280; font-size: 13px; font-weight: 500;
    cursor: pointer; font-family: inherit; white-space: nowrap; flex-shrink: 0;
    transition: background .15s, color .15s, border-color .15s;
  }
  .tb-logout-btn.visible { display: inline-flex; }
  .tb-logout-btn:hover { background: #FEF2F2; color: #DC2626; border-color: #FECACA; }
  .tb-logout-btn .lucide { width: 15px; height: 15px; }
  /* Responsive */
  @media (max-width: 900px) { .tb-center { display: none; } }
  @media (max-width: 600px) {
    .tb-user-info-wrap { display: none; }
    .tb-logout-btn span { display: none; }
    #topbar { padding: 0 14px; gap: 8px; }
  }
  #content { flex: 1; overflow-y: auto; padding: 20px; }
  #content[data-page="pipeline"] { padding: 0; overflow: hidden; display: flex; flex-direction: column; }
  #content[data-page^="followups"] { padding: 12px 16px; overflow: hidden; display: flex; flex-direction: column; }
  #content[data-page="today"],
  #content[data-page="leads"],
  #content[data-page="dashboard"] { padding: 12px 16px; }
  @media (max-height: 800px) { #content[data-page^="followups"], #content[data-page="today"], #content[data-page="leads"], #content[data-page="dashboard"] { padding: 10px 14px; } }
  @media (max-height: 700px) { #content[data-page^="followups"], #content[data-page="today"], #content[data-page="leads"], #content[data-page="dashboard"] { padding: 8px 12px; } }
  #content[data-page="config"]   { padding: 16px 20px; }
  #content[data-page="queue"]    { padding: 16px 20px; }
  /* Config tabs fill available height so background doesn't show gaps */
  #content[data-page="config"] .tabs { position: sticky; top: 0; z-index: 10; background: var(--md-bg); padding-bottom: 8px; margin-bottom: 0; }
  #cfg-settings, #cfg-stages, #cfg-dropdowns, #cfg-fields, #cfg-users { min-height: 0; }

  /* Cards */
  .card { background: var(--md-card); border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,.1); padding: 16px; }
  .card-title { font-size: 14px; color: var(--md-text-secondary); margin-bottom: 4px; }
  .card-value { font-size: 28px; font-weight: 700; }

  /* Stat grid */
  .stat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; margin-bottom: 20px; }

  /* Buttons */
  .btn {
    display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px;
    border: none; border-radius: 4px; font-size: 14px; font-weight: 500;
    cursor: pointer; transition: box-shadow .15s, opacity .15s;
  }
  .btn-primary { background: var(--md-primary); color: #fff; }
  .btn-primary:hover { box-shadow: 0 2px 8px rgba(21,101,192,.4); }
  .btn-outlined { background: transparent; border: 1px solid var(--md-primary); color: var(--md-primary); }
  .btn-danger { background: var(--md-danger); color: #fff; }
  .btn-sm { padding: 4px 10px; font-size: 12px; }
  .btn:disabled { opacity: .5; cursor: not-allowed; }
  .btn .lucide, .fu-card-meta .lucide, .fu-table .lucide { flex-shrink: 0; vertical-align: -2px; }

  /* Forms */
  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-size: 12px; color: var(--md-text-secondary); margin-bottom: 4px; font-weight: 500; }
  .form-control {
    width: 100%; padding: 9px 12px; border: 1px solid var(--md-border);
    border-radius: 4px; font-size: 14px; font-family: inherit;
    transition: border-color .15s;
  }
  .form-control:focus { outline: none; border-color: var(--md-primary); }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }

  /* Table */
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { background: #F5F5F5; padding: 10px 12px; text-align: left; font-weight: 600; border-bottom: 2px solid var(--md-border); }
  td { padding: 9px 12px; border-bottom: 1px solid var(--md-border); }
  tr:hover td { background: #FAFAFA; }

  /* Badges */
  .badge {
    display: inline-block; padding: 2px 8px; border-radius: 12px;
    font-size: 11px; font-weight: 600; text-transform: uppercase;
  }
  .badge-hot  { background: #FEE2E2; color: #991B1B; }
  .badge-warm { background: #FEF3C7; color: #92400E; }
  .badge-cold { background: #DBEAFE; color: #1E40AF; }
  .badge-open { background: #E8F5E9; color: #2E7D32; }
  .badge-won  { background: #E8F5E9; color: #1B5E20; }
  .badge-lost { background: #FFEBEE; color: #B71C1C; }
  .badge-hold { background: #FFF8E1; color: #F57F17; }

  /* â”€â”€ Custom multi-select component â”€â”€ */
  .cf-multiselect { position: relative; }
  .cf-ms-trigger {
    display: flex; align-items: center; flex-wrap: wrap; gap: 5px;
    min-height: 38px; padding: 5px 10px 5px 8px;
    background: #fff; border: 1px solid var(--md-border);
    border-radius: 4px; cursor: pointer; font-size: 14px;
    transition: border-color .15s, box-shadow .15s; user-select: none;
  }
  .cf-ms-trigger:hover { border-color: #aaa; }
  .cf-ms-trigger:focus-within,
  .cf-ms-trigger[aria-expanded="true"] { border-color: var(--md-primary); box-shadow: 0 0 0 2px rgba(21,101,192,.1); }
  .cf-ms-trigger.cf-ms-error { border-color: var(--md-danger); box-shadow: 0 0 0 2px rgba(211,47,47,.10); }
  .cf-ms-chips { display: flex; flex-wrap: wrap; gap: 4px; flex: 1; min-width: 0; }
  .cf-ms-chip {
    display: inline-flex; align-items: center; gap: 4px;
    background: var(--md-primary); color: #fff;
    border-radius: 3px; padding: 2px 7px 2px 8px;
    font-size: 12px; font-weight: 500; white-space: nowrap;
  }
  .cf-ms-chip-x {
    background: none; border: none; color: rgba(255,255,255,.75);
    cursor: pointer; padding: 0; line-height: 1; font-size: 13px;
    display: flex; align-items: center;
  }
  .cf-ms-chip-x:hover { color: #fff; }
  .cf-ms-placeholder { font-size: 14px; color: #bbb; flex: 1; padding: 1px 0; }
  .cf-ms-arrow { color: #999; flex-shrink: 0; margin-left: auto; display: flex; transition: transform .15s; }
  .cf-ms-trigger[aria-expanded="true"] .cf-ms-arrow { transform: rotate(180deg); }
  .cf-ms-drop {
    position: absolute; top: calc(100% + 3px); left: 0; right: 0; z-index: 200;
    background: #fff; border: 1px solid var(--md-border);
    border-radius: 6px; box-shadow: 0 4px 16px rgba(0,0,0,.13); overflow: hidden;
  }
  .cf-ms-search-wrap { padding: 8px 8px 6px; border-bottom: 1px solid #F0F0F0; }
  .cf-ms-search {
    width: 100%; padding: 6px 10px; border: 1px solid var(--md-border);
    border-radius: 4px; font-size: 13px; font-family: inherit; outline: none;
  }
  .cf-ms-search:focus { border-color: var(--md-primary); }
  .cf-ms-list { max-height: 200px; overflow-y: auto; padding: 4px 0; }
  .cf-ms-list::-webkit-scrollbar { width: 4px; }
  .cf-ms-list::-webkit-scrollbar-thumb { background: rgba(0,0,0,.15); border-radius: 2px; }
  .cf-ms-item {
    display: flex; align-items: center; gap: 9px;
    padding: 7px 12px; cursor: pointer; font-size: 13px; transition: background .1s;
  }
  .cf-ms-item:hover { background: #F5F7FA; }
  .cf-ms-item input[type=checkbox] { width: 14px; height: 14px; flex-shrink: 0; cursor: pointer; accent-color: var(--md-primary); }
  .cf-ms-empty { padding: 14px; text-align: center; font-size: 13px; color: #aaa; }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.5);
    display: flex; align-items: center; justify-content: center; z-index: 1000;
  }
  .modal {
    background: #fff; border-radius: 8px; width: 90%; max-width: 600px;
    max-height: 90vh; overflow-y: auto; padding: 24px;
    box-shadow: 0 8px 32px rgba(0,0,0,.2);
  }
  .modal.modal-wide { max-width: 1080px; }
  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .modal-header h2 { font-size: 18px; font-weight: 600; }
  .modal-footer { display: flex; justify-content: flex-end; gap: 8px; margin-top: 20px; }
  .modal-close { background: none; border: none; cursor: pointer; font-size: 20px; color: var(--md-text-secondary); }

  /* Filters bar */
  .filters-bar { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; align-items: center; }
  .filters-bar .form-control { width: auto; min-width: 140px; }

  /* Tabs */
  .tabs { display: flex; border-bottom: 2px solid var(--md-border); margin-bottom: 16px; }
  .tab-btn {
    padding: 10px 20px; border: none; background: none; cursor: pointer;
    font-size: 14px; font-weight: 500; color: var(--md-text-secondary);
    border-bottom: 2px solid transparent; margin-bottom: -2px;
  }
  .tab-btn.active { color: var(--md-primary); border-bottom-color: var(--md-primary); }

  /* Loading */
  .spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid #ccc; border-top-color: var(--md-primary); border-radius: 50%; animation: spin .6s linear infinite; }
  .spin-icon { animation: spin .8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-overlay { display: flex; justify-content: center; align-items: center; padding: 40px; }
  .skeleton-page { display: grid; gap: 16px; width: 100%; }
  .skeleton-toolbar { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .skeleton-stat-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
  .skeleton-chart-grid { display: grid; grid-template-columns: 1fr; gap: 16px; }
  .skeleton-kanban { display: flex; gap: 12px; overflow: hidden; min-height: 60vh; }
  .skeleton-col { width: 272px; flex-shrink: 0; background: #F0F3F7; border-radius: 10px; padding: 12px; }
  .skeleton-card-stack { display: grid; gap: 10px; margin-top: 14px; }
  .skeleton-block, .skeleton-line, .skeleton-pill, .skeleton-row {
    position: relative; overflow: hidden; background: #E8EDF4; border-radius: 6px;
  }
  .skeleton-block::after, .skeleton-line::after, .skeleton-pill::after, .skeleton-row::after {
    content: ''; position: absolute; inset: 0;
    transform: translateX(-100%);
    background: linear-gradient(90deg, transparent, rgba(255,255,255,.65), transparent);
    animation: skeleton-shimmer 1.25s infinite;
  }
  .skeleton-stat { height: 88px; }
  .skeleton-chart { height: 280px; }
  .skeleton-card-row { height: 74px; }
  .skeleton-col .skeleton-block { height: 88px; }
  .skeleton-line { height: 14px; }
  .skeleton-pill { width: 120px; height: 34px; border-radius: 4px; }
  .skeleton-table { background: #fff; border-radius: 8px; padding: 12px; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
  .skeleton-row { height: 38px; margin-bottom: 10px; }
  .w-40 { width: 40%; } .w-50 { width: 50%; } .w-70 { width: 70%; }
  @keyframes skeleton-shimmer { 100% { transform: translateX(100%); } }

  /* Legacy nav-group (unused, kept for safety) */
  #sidebar nav .nav-sub { display: none; }

  /* Form validation */
  .jv-is-invalid { border-color: #D32F2F !important; background: #FFF5F5 !important; }
  .form-error-msg { color: #D32F2F; font-size: 11px; margin-top: 3px; display: block; line-height: 1.3; }
  .input-capitalize { text-transform: capitalize; }
  .input-lowercase  { text-transform: lowercase; }
  .input-uppercase  { text-transform: uppercase; }

  /* Responsive */
  @media (max-width: 768px) {
    #sidebar { width: var(--sb-collapsed); }
    #sidebar.mobile-open { width: var(--sidebar-w); position: fixed; inset: 0 auto 0 0; z-index: 900; box-shadow: 4px 0 24px rgba(0,0,0,.4); }
    #sidebar .sb-brand-text, #sidebar .sb-toggle,
    #sidebar .nav-item-label, #sidebar .nav-badge, #sidebar .sb-user-info { display: none; }
    #sidebar .sb-nav { align-items: center; }
    #sidebar .sb-nav a { width: 42px; height: 42px; padding: 0; justify-content: center; gap: 0; }
    #sidebar .sb-user-card { justify-content: center; padding: 8px; }
    #sidebar .nav-section { visibility: hidden; padding-top: 12px; }
    #sidebar.mobile-open .sb-brand-text, #sidebar.mobile-open .sb-toggle,
    #sidebar.mobile-open .nav-item-label, #sidebar.mobile-open .sb-user-info { display: flex; }
    #sidebar.mobile-open .nav-badge { display: inline-flex; }
    #sidebar.mobile-open .sb-nav { align-items: stretch; }
    #sidebar.mobile-open .sb-nav a { width: auto; padding: 0 10px; justify-content: flex-start; gap: 10px; }
    #sidebar.mobile-open .sb-user-card { justify-content: flex-start; padding: 8px 10px; }
    #sidebar.mobile-open .nav-section { visibility: visible; }
    .form-row, .form-row-3 { grid-template-columns: 1fr; }
    .skeleton-chart-grid { grid-template-columns: 1fr; }
  }

  /* Generic spinning class for any button with a Lucide icon */
  .btn.spinning .lucide { animation: spin .7s linear infinite; }

  /* â”€â”€ App update banner â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */

  /* â”€â”€ Queue status badges â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
  .q-badge {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 10px; font-weight: 600; letter-spacing: .3px;
    padding: 2px 7px; border-radius: 10px; white-space: nowrap;
    vertical-align: middle;
  }
  .q-queued     { background: #EFF6FF; color: #1D4ED8; }
  .q-processing { background: #FEF3C7; color: #92400E; animation: q-pulse 1.4s ease-in-out infinite; }
  .q-done       { background: #DCFCE7; color: #166534; }
  .q-failed     { background: #FEF9C3; color: #713F12; }
  .q-dead       { background: #FEE2E2; color: #991B1B; }
  .q-processing::before {
    content: ''; display: inline-block;
    width: 7px; height: 7px; border-radius: 50%;
    border: 1.5px solid #92400E; border-top-color: transparent;
    animation: lo-spin 0.7s linear infinite;
  }
  @keyframes q-pulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.7; }
  }
  .q-queue-banner {
    display: flex; align-items: center; gap: 8px;
    background: #EFF6FF; border: 1px solid #BFDBFE;
    border-radius: 6px; padding: 8px 14px; margin-bottom: 12px;

  /* â”€â”€ Skip-field toggle â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€ */
  /* Queue operations page */

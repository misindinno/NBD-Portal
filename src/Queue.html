<script>
// Client-side async mutation manager.
// Kept as QueueManager for compatibility with existing pages, but it no longer
// writes to JOB_QUEUE or waits for a cron worker.
const QueueManager = (() => {
  const LS_KEY = 'nbd_mutations_v1';
  const LEGACY_LS_KEY = 'nbd_queue_v1';
  const MAX_AGE_MS = 24 * 60 * 60 * 1000;

  let _jobs = {};
  let _callbacks = {};

  function _save() {
    try { localStorage.setItem(LS_KEY, JSON.stringify(_jobs)); } catch (_) {}
  }

  function _load() {
    try { localStorage.removeItem(LEGACY_LS_KEY); } catch (_) {}
    try {
      const raw = localStorage.getItem(LS_KEY);
      if (!raw) return;
      const parsed = JSON.parse(raw);
      const cutoff = Date.now() - MAX_AGE_MS;
      _jobs = {};
      Object.values(parsed || {}).forEach(j => {
        if ((j.enqueuedAt || 0) > cutoff) _jobs[j.requestId] = j;
      });
    } catch (e) {
      console.warn('[Mutations] Could not load local mutation state', e);
      _jobs = {};
    }
  }

  function _notifyChanged() {
    if (typeof renderSidebar !== 'function') return;
    try { renderSidebar(); } catch (e) { console.warn('[Mutations] Sidebar refresh failed', e); }
  }

  function _updateBadge(requestId) {
    document.querySelectorAll(`[data-rid="${requestId}"]`).forEach(el => {
      el.outerHTML = badgeHtml(requestId);
    });
  }

  function badgeHtml(requestId) {
    const j = _jobs[requestId];
    if (!j) return '';
    const cls = {
      PROCESSING: 'q-processing',
      DONE: 'q-done',
      DEAD: 'q-dead'
    }[j.status] || 'q-processing';
    const label = {
      PROCESSING: 'Saving...',
      DONE: 'Saved',
      DEAD: 'Failed'
    }[j.status] || 'Saving...';
    return `<span class="q-badge ${cls}" data-rid="${escapeHtml(requestId)}">${label}</span>`;
  }

  function _queueDataId(actionType, payload) {
    const p = payload || {};
    switch (actionType) {
      case 'saveLead': return p['Lead ID'] || p.leadId || '';
      case 'deleteLead': return p.id || p.leadId || p['Lead ID'] || '';
      case 'updateLeadStage':
      case 'moveLeadStageWithFields':
      case 'pushLeadToNbd': return p.leadId || p['Lead ID'] || '';
      case 'saveFollowup': return p['Follow-up ID'] || p.followupId || p.id || '';
      case 'markFollowupDone':
      case 'deleteFollowup': return p.id || p.followupId || p['Follow-up ID'] || '';
      case 'updateConfigStatus':
      case 'addConfig': return p.id || p['Config ID'] || '';
      case 'saveStage': return p['Stage ID'] || p.stageId || '';
      case 'reorderStages': return Array.isArray(p.ids) ? p.ids.join(',') : '';
      case 'saveFieldConfig': return p['Field ID'] || p.fieldId || '';
      case 'saveUser': return p['ID'] || p['User ID'] || p.userId || p.id || '';
      default: return p.id || p.leadId || p.followupId || p['Lead ID'] || p['Follow-up ID'] || '';
    }
  }

  function _resultRecordId(actionType, result, fallback) {
    if (typeof result === 'string') return result;
    if (!result || typeof result !== 'object') return fallback || '';
    if (result.leadId) return result.leadId;
    if (result.nbdLeadId) return result.nbdLeadId;
    if (result.followupId) return result.followupId;
    if (result.id) return result.id;
    if (result.recordId) return result.recordId;
    return fallback || '';
  }

  function _findCreateJobForTempId(tempId) {
    return Object.values(_jobs)
      .filter(j => j.actionType === 'saveLead' && j.tempId === tempId)
      .sort((a, b) => (b.enqueuedAt || 0) - (a.enqueuedAt || 0))[0] || null;
  }

  async function _waitForFinalLeadId(tempId) {
    const createJob = _findCreateJobForTempId(tempId);
    if (!createJob) throw new Error('Lead is still saving. Please wait for the save to finish, then move it again.');
    if (createJob.finalRecordId && !String(createJob.finalRecordId).startsWith('temp-')) return createJob.finalRecordId;
    if (createJob.status === 'DEAD') throw new Error('Lead save failed first: ' + (createJob.error || 'Unknown error'));

    const deadline = Date.now() + 90000;
    while (Date.now() < deadline) {
      const fresh = _jobs[createJob.requestId];
      if (fresh?.finalRecordId && !String(fresh.finalRecordId).startsWith('temp-')) return fresh.finalRecordId;
      if (fresh?.status === 'DEAD') throw new Error('Lead save failed first: ' + (fresh.error || 'Unknown error'));
      await new Promise(resolve => setTimeout(resolve, 500));
    }
    throw new Error('Lead save is still running. Stage move will not be sent until the lead has a real ID.');
  }

  async function _resolvePayloadDependencies(actionType, payload) {
    const nextPayload = { ...(payload || {}) };
    if (['updateLeadStage', 'moveLeadStageWithFields', 'pushLeadToNbd'].includes(actionType)) {
      const leadId = String(nextPayload.leadId || nextPayload['Lead ID'] || '');
      if (leadId.startsWith('temp-')) {
        const realId = await _waitForFinalLeadId(leadId);
        nextPayload.leadId = realId;
        nextPayload['Lead ID'] = realId;
      }
    }
    return nextPayload;
  }

  async function _runMutation(job, opts) {
    try {
      const payload = await _resolvePayloadDependencies(job.actionType, job.payload);
      job.payload = payload;
      const dataId = _queueDataId(job.actionType, payload);
      if (dataId) job.finalRecordId = dataId;
      _save();

      const result = await api.mutate(job.module, job.actionType, payload, job.requestId);
      job.status = 'DONE';
      job.completedAt = Date.now();
      job.result = result || null;
      job.finalRecordId = _resultRecordId(job.actionType, result, job.finalRecordId);
      job.error = null;
      _save();
      _updateBadge(job.requestId);
      _notifyChanged();

      if (_callbacks[job.requestId]?.onDone) _callbacks[job.requestId].onDone(job);
      if (typeof _refreshAfterQueueJob === 'function') _refreshAfterQueueJob(job);
      delete _callbacks[job.requestId];
    } catch (err) {
      job.status = 'DEAD';
      job.completedAt = Date.now();
      job.error = err && err.message ? err.message : String(err || 'Save failed');
      _save();
      _updateBadge(job.requestId);
      _notifyChanged();

      if (_callbacks[job.requestId]?.onFail) _callbacks[job.requestId].onFail(job);
      else if (opts.onFail) opts.onFail(job);
      else if (typeof _recoverFailedQueueJob === 'function') _recoverFailedQueueJob(job);
      delete _callbacks[job.requestId];
    }
  }

  function _pendingLeadPatches() {
    const patches = {};
    Object.values(_jobs).forEach(job => {
      if (job.status !== 'PROCESSING') return;
      if (!['updateLeadStage', 'moveLeadStageWithFields'].includes(job.actionType)) return;
      const payload = job.payload || {};
      const leadId = String(payload.leadId || payload['Lead ID'] || '');
      const stageId = String(payload.stageId || '');
      if (!leadId || !stageId || leadId.startsWith('temp-')) return;
      patches[leadId] = {
        ...(payload.fields || {}),
        'Stage ID': stageId,
        'Stage Updated At': new Date(job.enqueuedAt || Date.now()).toISOString(),
        'Updated At': new Date(job.enqueuedAt || Date.now()).toISOString(),
        '_queuePendingStage': true
      };
    });
    return patches;
  }

  function _pendingFollowupOps() {
    const ops = [];
    Object.values(_jobs)
      .filter(job => job.status === 'PROCESSING')
      .filter(job => ['saveFollowup', 'markFollowupDone', 'deleteFollowup'].includes(job.actionType))
      .sort((a, b) => (a.enqueuedAt || 0) - (b.enqueuedAt || 0))
      .forEach(job => {
        const payload = job.payload || {};
        if (job.actionType === 'saveFollowup') {
          const followupId = String(job.tempId || payload['Follow-up ID'] || payload.followupId || job.requestId || '');
          if (!followupId) return;
          ops.push({ type: 'save', followupId, requestId: job.requestId, enqueuedAt: job.enqueuedAt || Date.now(), payload });
        } else if (job.actionType === 'markFollowupDone') {
          const followupId = String(payload.id || payload.followupId || payload['Follow-up ID'] || job.tempId || '');
          if (!followupId) return;
          ops.push({ type: 'done', followupId, requestId: job.requestId, enqueuedAt: job.enqueuedAt || Date.now(), data: payload.data || {} });
        } else if (job.actionType === 'deleteFollowup') {
          const followupId = String(payload.id || payload.followupId || payload['Follow-up ID'] || job.tempId || '');
          if (!followupId) return;
          ops.push({ type: 'delete', followupId, requestId: job.requestId, enqueuedAt: job.enqueuedAt || Date.now() });
        }
      });
    return ops;
  }

  return {
    init() { _load(); },

    async enqueue(opts) {
      const requestId = opts.requestId || ('mt-' + Date.now() + '-' + Math.random().toString(36).slice(2, 8));
      const tempId = opts.tempId || requestId;
      const payload = opts.payload || {};
      const payloadLen = JSON.stringify(payload).length;
      if (payloadLen > 200000) throw new Error('This save is too large. Remove large file attachments or reduce file size, then try again.');

      const job = {
        requestId,
        status: 'PROCESSING',
        module: opts.module,
        actionType: opts.actionType,
        tempId,
        enqueuedAt: Date.now(),
        finalRecordId: _queueDataId(opts.actionType, payload) || null,
        error: null,
        payload
      };
      _jobs[requestId] = job;
      if (opts.onDone || opts.onFail) _callbacks[requestId] = { onDone: opts.onDone, onFail: opts.onFail };
      _save();
      _notifyChanged();
      _runMutation(job, opts || {});
      return { requestId, tempId };
    },

    getStatus(requestId) { return _jobs[requestId] || null; },
    badgeHtml,
    onServerChange() {},
    pendingCount() { return Object.values(_jobs).filter(j => j.status === 'PROCESSING').length; },
    getPendingLeadPatches() { return _pendingLeadPatches(); },
    getPendingFollowupOps() { return _pendingFollowupOps(); },
    getAllJobs() { return Object.values(_jobs).sort((a, b) => (b.enqueuedAt || 0) - (a.enqueuedAt || 0)); },
    jobs() { return _jobs; },
    async pollNow(ids) {
      return (ids || []).reduce((m, id) => {
        const j = _jobs[id];
        if (j) m[id] = { status: j.status, finalRecordId: j.finalRecordId || '', error: j.error || '' };
        return m;
      }, {});
    }
  };
})();
</script>

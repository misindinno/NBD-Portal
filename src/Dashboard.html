<script>
// ─── Dashboard ────────────────────────────────────────────────────────────────

let _dbCharts = {};
let _dbFiltersOpen = false;

function _dbToggleFilters() {
  _dbFiltersOpen = !_dbFiltersOpen;
  const bar = el('db-filter-bar');
  const toggle = el('db-filter-toggle');
  if (bar) bar.style.display = _dbFiltersOpen ? 'block' : 'none';
  if (toggle) { toggle.classList.toggle('open', _dbFiltersOpen); renderIcons(toggle); }
}
window._dbToggleFilters = _dbToggleFilters;

async function loadDashboard() {
  el('page-title').textContent = 'Dashboard';

  if (!AppCache.isLoaded('leads') || !AppCache.isLoaded('followups')) {
    setContentLoading('dashboard');
    await Promise.all([
      _ensureCached('leads',     () => api.getLeads().catch(() => api.getFollowupLeads())),
      _ensureCached('followups', () => api.getFollowups({}))
    ]);
  }
  _ensureCached('activityLogs', () => api.getLeadActivityLogs({})).catch(() => {});

  try {
    Object.values(_dbCharts).forEach(c => { try { c.destroy(); } catch(e) {} });
    _dbCharts = {};
    el('content').innerHTML = _dbHtml();
    renderIcons();
    _dbInitFilters();
    _dbRenderAll();
  } catch (err) {
    el('content').innerHTML = `<div class="card" style="padding:24px;color:#D32F2F">${escapeHtml(String(err))}</div>`;
  }
}

// ─── Dashboard HTML skeleton ──────────────────────────────────────────────────
</script>

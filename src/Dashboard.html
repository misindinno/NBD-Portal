<script>
// ─── Dashboard ────────────────────────────────────────────────────────────────

let _dbCharts = {};

async function loadDashboard() {
  el('page-title').textContent = 'Dashboard';

  if (!AppCache.isLoaded('leads') || !AppCache.isLoaded('followups')) {
    setContentLoading('dashboard');
    await Promise.all([
      _ensureCached('leads',     () => api.getLeads().catch(() => api.getFollowupLeads())),
      _ensureCached('followups', () => api.getFollowups({}))
    ]);
  }
  _ensureCached('activityLogs', () => api.getLeadActivityLogs({})).catch(() => {});

  try {
    Object.values(_dbCharts).forEach(c => { try { c.destroy(); } catch(e) {} });
    _dbCharts = {};
    el('content').innerHTML = _dbHtml();
    renderIcons();
    _dbInitFilters();
    _dbRenderAll();
  } catch (err) {
    el('content').innerHTML = `<div class="card" style="padding:24px;color:#D32F2F">${escapeHtml(String(err))}</div>`;
  }
}

// ─── Dashboard HTML skeleton ──────────────────────────────────────────────────
function _dbHtml() {
  const cfg = App.config;
  const canAssign = ['ADMIN','MANAGER'].includes(App.user.role);
  const todayStr  = localDateInputValue();
  const monthAgo  = localDateInputValue(new Date(Date.now() - 30 * 86400000));

  return `
  <div id="db-wrap" style="padding-bottom:40px">

    <!-- Filter Bar -->
    <div class="card" style="padding:12px 18px;margin-bottom:16px">
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
        <span style="font-size:12px;font-weight:600;color:var(--md-primary);display:flex;align-items:center;gap:5px;white-space:nowrap">${icon('sliders-horizontal',14)} Filters</span>
        <div style="display:flex;align-items:center;gap:4px">
          <span style="font-size:11px;color:#888">From</span>
          <input type="date" id="db-f-from" class="form-control" value="${monthAgo}" style="width:136px;padding:4px 7px;font-size:12px">
        </div>
        <div style="display:flex;align-items:center;gap:4px">
          <span style="font-size:11px;color:#888">To</span>
          <input type="date" id="db-f-to" class="form-control" value="${todayStr}" style="width:136px;padding:4px 7px;font-size:12px">
        </div>
        ${canAssign ? `<select id="db-f-user" class="form-control" style="width:150px;padding:4px 7px;font-size:12px">
          <option value="">All Salespeople</option>
          ${(cfg.users||[]).map(u=>`<option value="${escapeHtml(u.id)}">${escapeHtml(u.name)}</option>`).join('')}
        </select>` : `<input type="hidden" id="db-f-user" value="">`}
        <select id="db-f-stage" class="form-control" style="width:145px;padding:4px 7px;font-size:12px">
          <option value="">All Stages</option>
          ${(cfg.stages||[]).map(s=>`<option value="${escapeHtml(s['Stage ID'])}">${escapeHtml(s['Stage Name'])}</option>`).join('')}
        </select>
        <select id="db-f-source" class="form-control" style="width:135px;padding:4px 7px;font-size:12px">
          <option value="">All Sources</option>
          ${(cfg.sources||[]).map(s=>`<option value="${escapeHtml(s)}">${escapeHtml(s)}</option>`).join('')}
        </select>
        <select id="db-f-priority" class="form-control" style="width:125px;padding:4px 7px;font-size:12px">
          <option value="">All Priorities</option>
          ${(cfg.priorities||[]).map(p=>`<option value="${escapeHtml(p)}">${escapeHtml(p)}</option>`).join('')}
        </select>
        <select id="db-f-status" class="form-control" style="width:120px;padding:4px 7px;font-size:12px">
          <option value="">All Status</option>
          <option value="Open">Open</option>
          <option value="Won">Won</option>
          <option value="Lost">Lost</option>
        </select>
        <button class="btn btn-outlined" onclick="_dbClearFilters()" style="padding:4px 10px;font-size:12px;white-space:nowrap">${icon('x',12)} Clear</button>
        <button class="btn btn-primary" onclick="_dbRenderAll()" style="padding:4px 10px;font-size:12px;white-space:nowrap;margin-left:auto">${icon('refresh-cw',12)} Refresh</button>
      </div>
    </div>

    <!-- KPI Row 1 -->
    <div id="db-kpi1" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:12px;margin-bottom:12px"></div>
    <!-- KPI Row 2 -->
    <div id="db-kpi2" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:12px;margin-bottom:16px"></div>

    <!-- Pipeline Funnel + Follow-up Donut -->
    <div style="display:grid;grid-template-columns:3fr 2fr;gap:16px;margin-bottom:16px;min-width:0">
      <div class="card" style="padding:22px">
        <div style="font-size:13px;font-weight:600;margin-bottom:14px;display:flex;align-items:center;gap:7px;color:#333">${icon('git-branch-plus',15)} Lead Pipeline Funnel</div>
        <div id="db-funnel"></div>
      </div>
      <div class="card" style="padding:22px">
        <div style="font-size:13px;font-weight:600;margin-bottom:14px;display:flex;align-items:center;gap:7px;color:#333">${icon('phone-call',15)} Follow-up Status</div>
        <div style="position:relative;max-width:220px;margin:0 auto">
          <canvas id="db-fu-donut"></canvas>
          <div id="db-fu-center" style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none"></div>
        </div>
        <div id="db-fu-legend" style="margin-top:14px;display:grid;grid-template-columns:1fr 1fr;gap:6px"></div>
      </div>
    </div>

    <!-- Source Chart + Team Chart -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;min-width:0">
      <div class="card" style="padding:22px">
        <div style="font-size:13px;font-weight:600;margin-bottom:14px;display:flex;align-items:center;gap:7px;color:#333">${icon('bar-chart-2',15)} Lead Source Analytics</div>
        <canvas id="db-source-chart"></canvas>
      </div>
      <div class="card" style="padding:22px">
        <div style="font-size:13px;font-weight:600;margin-bottom:14px;display:flex;align-items:center;gap:7px;color:#333">${icon('users',15)} Team Performance</div>
        <canvas id="db-team-chart"></canvas>
      </div>
    </div>

    <!-- Lead Health Score -->
    <div class="card" style="padding:22px;margin-bottom:16px">
      <div style="font-size:13px;font-weight:600;margin-bottom:14px;display:flex;align-items:center;gap:7px;color:#333">${icon('heart-pulse',15)} Lead Health Score</div>
      <div style="display:grid;grid-template-columns:auto 1fr;gap:20px;align-items:start">
        <div id="db-health-grid" style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;min-width:340px"></div>
        <div id="db-health-list" style="max-height:150px;overflow-y:auto;border-left:1px solid #f0f0f0;padding-left:18px"></div>
      </div>
    </div>

    <!-- Overdue Follow-ups + Leads Without Follow-up -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;min-width:0">
      <div class="card" style="padding:22px">
        <div style="font-size:13px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:7px;color:#C62828">${icon('triangle-alert',15)} Overdue Follow-ups</div>
        <div id="db-overdue-table" style="max-height:300px;overflow-y:auto;overflow-x:auto"></div>
      </div>
      <div class="card" style="padding:22px">
        <div style="font-size:13px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:7px;color:#E65100">${icon('flame',15)} Leads Without Follow-up</div>
        <div id="db-nofollowup-table" style="max-height:300px;overflow-y:auto;overflow-x:auto"></div>
      </div>
    </div>

    <!-- Source Conversion Table -->
    <div class="card" style="padding:22px;margin-bottom:16px">
      <div style="font-size:13px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:7px;color:#333">${icon('table-2',15)} Source-wise Conversion</div>
      <div id="db-source-table" style="overflow-x:auto"></div>
    </div>

    <!-- Team Leaderboard -->
    <div class="card" style="padding:22px;margin-bottom:16px">
      <div style="font-size:13px;font-weight:600;margin-bottom:12px;display:flex;align-items:center;gap:7px;color:#333">${icon('trophy',15)} Team Leaderboard</div>
      <div id="db-leaderboard" style="overflow-x:auto"></div>
    </div>

    <!-- Activity Timeline -->
    <div class="card" style="padding:22px">
      <div style="font-size:13px;font-weight:600;margin-bottom:16px;display:flex;align-items:center;gap:7px;color:#333">${icon('activity',15)} Recent Activity</div>
      <div id="db-activity"></div>
    </div>

  </div>`;
}

// ─── Filters ──────────────────────────────────────────────────────────────────
function _dbInitFilters() {
  ['db-f-from','db-f-to','db-f-user','db-f-stage','db-f-source','db-f-priority','db-f-status']
    .forEach(id => { const e = el(id); if (e) e.addEventListener('change', _dbRenderAll); });
}

function _dbGetFilters() {
  return {
    from:     el('db-f-from')?.value     || '',
    to:       el('db-f-to')?.value       || '',
    userId:   el('db-f-user')?.value     || '',
    stageId:  el('db-f-stage')?.value    || '',
    source:   el('db-f-source')?.value   || '',
    priority: el('db-f-priority')?.value || '',
    status:   el('db-f-status')?.value   || ''
  };
}

function _dbClearFilters() {
  if (el('db-f-from')) el('db-f-from').value = localDateInputValue(new Date(Date.now() - 30 * 86400000));
  if (el('db-f-to'))   el('db-f-to').value   = localDateInputValue();
  ['db-f-user','db-f-stage','db-f-source','db-f-priority','db-f-status']
    .forEach(id => { if (el(id)) el(id).value = ''; });
  _dbRenderAll();
}

// ─── Data helpers ─────────────────────────────────────────────────────────────
function _dbFilteredData() {
  const f = _dbGetFilters();
  const scopedRoles = ['SALES', 'USER'];
  const isScoped = scopedRoles.includes(App.user.role);
  const uid = App.user.id;

  let leads = AppCache.getRows('leads');
  let fus   = AppCache.getRows('followups');

  if (isScoped) {
    leads = leads.filter(l => l['Assigned To'] === uid);
  }

  if (f.from)     leads = leads.filter(l => (_fmtDate(l['Created At']) || '') >= f.from);
  if (f.to)       leads = leads.filter(l => (_fmtDate(l['Created At']) || '') <= f.to);
  if (f.userId)   leads = leads.filter(l => l['Assigned To'] === f.userId);
  if (f.stageId)  leads = leads.filter(l => l['Stage ID']    === f.stageId);
  if (f.source)   leads = leads.filter(l => l['Source']      === f.source);
  if (f.priority) leads = leads.filter(l => l['Priority']    === f.priority);
  if (f.status)   leads = leads.filter(l => l['Lead Status'] === f.status);

  const leadIds = new Set(leads.map(l => l['Lead ID']));
  fus = fus.filter(fu => leadIds.has(fu['Lead ID']));

  return { leads, fus };
}

function _dbStats(leads, fus) {
  const todayStr = localDateInputValue();
  const ystStr   = localDateInputValue(new Date(Date.now() - 86400000));

  const open = leads.filter(l => l['Lead Status'] === 'Open');
  const won  = leads.filter(l => l['Lead Status'] === 'Won');
  const lost = leads.filter(l => l['Lead Status'] === 'Lost');

  const todayLeads = leads.filter(l => _fmtDate(l['Created At']) === todayStr);
  const ystLeads   = leads.filter(l => _fmtDate(l['Created At']) === ystStr);

  const openFus     = fus.filter(f => _isOpenFollowupRow(f));
  const todayFus    = openFus.filter(f => _fmtDate(_fuPlannedDate(f)) === todayStr);
  const overdueFus  = openFus.filter(f => { const d = _fmtDate(_fuPlannedDate(f)); return d && d < todayStr; });
  const upcomingFus = openFus.filter(f => _fmtDate(_fuPlannedDate(f)) > todayStr);
  const doneFus     = fus.filter(f => !_isOpenFollowupRow(f));

  const totalClosed = won.length + lost.length;
  const convPct     = totalClosed > 0 ? Math.round(won.length / totalClosed * 100) : 0;

  return {
    total: leads.length, open: open.length, won: won.length, lost: lost.length,
    todayLeads: todayLeads.length, ystLeads: ystLeads.length,
    convPct,
    todayFus: todayFus.length, overdueFus: overdueFus.length,
    upcomingFus: upcomingFus.length, doneFus: doneFus.length,
    openFusCount: openFus.length,
    overdueFusList: overdueFus
  };
}

// ─── Master render ────────────────────────────────────────────────────────────
function _dbRenderAll() {
  Object.values(_dbCharts).forEach(c => { try { c.destroy(); } catch(e) {} });
  _dbCharts = {};
  _dbActivityPage.current = 0; // reset to first page on any filter/refresh

  const { leads, fus } = _dbFilteredData();
  const s = _dbStats(leads, fus);

  _dbRenderKPIs(s);
  _dbRenderFunnel(leads);
  _dbRenderFollowupDonut(s);
  _dbRenderSourceChart(leads);
  _dbRenderTeamChart(leads, fus);
  _dbRenderHealth(leads, fus);
  _dbRenderOverdueTable(s.overdueFusList, leads);
  _dbRenderNoFollowupTable(leads, fus);
  _dbRenderSourceTable(leads);
  _dbRenderLeaderboard(leads, fus);
  _dbRenderActivity(leads);
}

// ─── KPI Cards ────────────────────────────────────────────────────────────────
function _dbKpiCard(label, value, iconName, color, sub, subColor) {
  subColor = subColor || '#888';
  return `<div class="card" style="padding:14px 16px;border-left:4px solid ${color}">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:6px">
      <div style="min-width:0;flex:1">
        <div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:#999;margin-bottom:5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${label}</div>
        <div style="font-size:24px;font-weight:700;color:${color};line-height:1.1">${escapeHtml(String(value))}</div>
        ${sub ? `<div style="font-size:11px;color:${subColor};margin-top:4px">${sub}</div>` : ''}
      </div>
      <span style="color:${color};opacity:.65;flex-shrink:0">${icon(iconName, 24)}</span>
    </div>
  </div>`;
}

function _dbRenderKPIs(s) {
  const todayDelta = s.ystLeads > 0 ? Math.round((s.todayLeads - s.ystLeads) / s.ystLeads * 100) : null;
  const todaySub   = todayDelta !== null
    ? (todayDelta >= 0
        ? `<span style="color:#388E3C">▲ ${todayDelta}% vs yesterday</span>`
        : `<span style="color:#D32F2F">▼ ${Math.abs(todayDelta)}% vs yesterday</span>`)
    : 'vs yesterday';

  const openPct  = s.total > 0 ? Math.round(s.open  / s.total * 100) : 0;
  const lostPct  = s.total > 0 ? Math.round(s.lost  / s.total * 100) : 0;

  const kpi1 = [
    _dbKpiCard('Total Leads',      s.total,            'users',         '#1565C0'),
    _dbKpiCard('New Today',        s.todayLeads,        'user-plus',     '#0277BD', todaySub),
    _dbKpiCard('Active Leads',     s.open,              'list-todo',     '#2E7D32',  `${openPct}% of total`),
    _dbKpiCard('Converted (Won)',  s.won,               'circle-check',  '#388E3C',  `${s.convPct}% win rate`),
    _dbKpiCard('Lost',             s.lost,              'circle-x',      '#D32F2F',  `${lostPct}% of total`),
    _dbKpiCard('Conversion %',     s.convPct + '%',     'trending-up',   '#6A1B9A',  `${s.won} won / ${s.won + s.lost} closed`)
  ];

  const kpi2 = [
    _dbKpiCard('Follow-ups Today',   s.todayFus,    'calendar-days',  '#388E3C',
      s.todayFus > 0 ? 'Due today!' : 'None today',
      s.todayFus > 0 ? '#E65100' : '#388E3C'),
    _dbKpiCard('Overdue Follow-ups', s.overdueFus,  'triangle-alert', s.overdueFus > 0 ? '#D32F2F' : '#757575',
      s.overdueFus > 0 ? 'Needs immediate action' : 'All clear!',
      s.overdueFus > 0 ? '#D32F2F' : '#388E3C'),
    _dbKpiCard('Pending Follow-ups', s.openFusCount, 'phone-missed',  '#E65100',
      `${s.upcomingFus} upcoming · ${s.overdueFus} overdue`,
      s.overdueFus > 0 ? '#D32F2F' : '#666'),
    _dbKpiCard('Completed Follow-ups', s.doneFus,   'check-circle-2', '#0277BD', 'Total closed'),
  ];

  const k1 = el('db-kpi1'); if (k1) { k1.innerHTML = kpi1.join(''); renderIcons(k1); }
  const k2 = el('db-kpi2'); if (k2) { k2.innerHTML = kpi2.join(''); renderIcons(k2); }
}

// ─── Pipeline Funnel ─────────────────────────────────────────────────────────
function _dbRenderFunnel(leads) {
  const funnelEl = el('db-funnel');
  if (!funnelEl) return;

  const stages = App.config.stages || [];

  const stageData = stages.map((s, i) => {
    const count = leads.filter(l => l['Stage ID'] === s['Stage ID'] && l['Lead Status'] === 'Open').length;
    return { name: s['Stage Name'], color: safeColor(s['Color'], '#1565C0'), count };
  });

  const maxCount = Math.max(...stageData.map(s => s.count), 1);

  const headerHtml = `
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#bbb">
      <div style="width:120px;text-align:right;flex-shrink:0">Stage</div>
      <div style="flex:1">Leads</div>
      <div style="width:55px;text-align:right;flex-shrink:0">Drop</div>
    </div>`;

  const rowsHtml = stageData.map((s, i) => {
    const barW = Math.max(Math.round(s.count / maxCount * 100), s.count > 0 ? 8 : 0);
    const prev = i > 0 ? stageData[i - 1].count : s.count;
    const drop = prev > 0 && i > 0 ? Math.round((1 - s.count / prev) * 100) : null;
    return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:7px">
      <div style="width:120px;font-size:11px;font-weight:500;color:#444;text-align:right;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${escapeHtml(s.name)}">${escapeHtml(s.name)}</div>
      <div style="flex:1">
        <div style="height:26px;background:${s.color}18;border-radius:4px;overflow:hidden">
          <div style="height:100%;width:${barW}%;min-width:${s.count > 0 ? '32px' : '0'};background:${s.color};border-radius:4px;display:flex;align-items:center;padding:0 7px;box-sizing:border-box;transition:width .3s">
            <span style="font-size:12px;font-weight:700;color:#fff;white-space:nowrap">${s.count}</span>
          </div>
        </div>
      </div>
      <div style="width:55px;text-align:right;font-size:10px;flex-shrink:0">${drop !== null && drop > 0 ? `<span style="color:#D32F2F">-${drop}%</span>` : ''}</div>
    </div>`;
  }).join('');

  funnelEl.innerHTML = headerHtml + rowsHtml;
}

// ─── Follow-up Donut ─────────────────────────────────────────────────────────
function _dbRenderFollowupDonut(s) {
  const ctx = el('db-fu-donut');
  if (!ctx) return;

  const segments = [
    { label: 'Overdue',     value: s.overdueFus,   color: '#D32F2F' },
    { label: 'Due Today',   value: s.todayFus,     color: '#F57C00' },
    { label: 'Upcoming',    value: s.upcomingFus,  color: '#1976D2' },
    { label: 'Completed',   value: s.doneFus,      color: '#388E3C' }
  ].filter(d => d.value > 0);

  const total = segments.reduce((s, d) => s + d.value, 0);

  const cenEl = el('db-fu-center');
  if (cenEl) cenEl.innerHTML = `<div style="font-size:20px;font-weight:700;color:#333">${total}</div><div style="font-size:10px;color:#aaa">total</div>`;

  const legendEl = el('db-fu-legend');

  if (!segments.length) {
    ctx.style.display = 'none';
    if (cenEl) cenEl.style.display = 'none';
    if (legendEl) legendEl.innerHTML = '<div style="text-align:center;color:#aaa;font-size:13px;padding:20px;grid-column:1/-1">No follow-up data</div>';
    return;
  }

  _dbCharts['fu-donut'] = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: segments.map(d => d.label),
      datasets: [{ data: segments.map(d => d.value), backgroundColor: segments.map(d => d.color), borderWidth: 3, borderColor: '#fff' }]
    },
    options: { plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ` ${ctx.label}: ${ctx.raw}` } } }, cutout: '68%', responsive: true }
  });

  if (legendEl) {
    legendEl.innerHTML = segments.map(d => `
      <div style="display:flex;align-items:center;gap:6px;font-size:11px;padding:3px 0">
        <span style="width:9px;height:9px;border-radius:50%;background:${d.color};flex-shrink:0"></span>
        <span style="color:#555;flex:1">${d.label}</span>
        <span style="font-weight:700;color:#333">${d.value}</span>
      </div>`).join('');
  }
}

// ─── Source Bar Chart ────────────────────────────────────────────────────────
function _dbRenderSourceChart(leads) {
  const ctx = el('db-source-chart');
  if (!ctx) return;

  const map = {};
  leads.forEach(l => {
    const src = l['Source'] || 'Unknown';
    if (!map[src]) map[src] = { total: 0, won: 0 };
    map[src].total++;
    if (l['Lead Status'] === 'Won') map[src].won++;
  });

  const sorted = Object.entries(map).sort((a, b) => b[1].total - a[1].total).slice(0, 8);

  _dbCharts['source'] = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: sorted.map(([s]) => s),
      datasets: [
        { label: 'Total',     data: sorted.map(([,v]) => v.total), backgroundColor: '#1565C022', borderColor: '#1565C0', borderWidth: 2, borderRadius: 4 },
        { label: 'Converted', data: sorted.map(([,v]) => v.won),   backgroundColor: '#388E3C',   borderWidth: 0,         borderRadius: 4 }
      ]
    },
    options: {
      responsive: true,
      plugins: { legend: { position: 'top', labels: { font: { size: 11 }, boxWidth: 12 } } },
      scales: { y: { beginAtZero: true, ticks: { stepSize: 1, font: { size: 11 } } }, x: { ticks: { font: { size: 11 } } } }
    }
  });
}

// ─── Team Performance Chart ───────────────────────────────────────────────────
function _dbRenderTeamChart(leads, fus) {
  const ctx = el('db-team-chart');
  if (!ctx) return;

  const team = {};
  leads.forEach(l => {
    const uid = l['Assigned To'];
    if (!uid) return;
    if (!team[uid]) team[uid] = { name: AppLookup.userName(uid).split(' ')[0], leads: 0, won: 0 };
    team[uid].leads++;
    if (l['Lead Status'] === 'Won') team[uid].won++;
  });

  const sorted = Object.values(team).sort((a, b) => b.leads - a.leads).slice(0, 8);

  _dbCharts['team'] = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: sorted.map(t => t.name),
      datasets: [
        { label: 'Assigned',  data: sorted.map(t => t.leads), backgroundColor: '#1565C0', borderWidth: 0, borderRadius: 4 },
        { label: 'Converted', data: sorted.map(t => t.won),   backgroundColor: '#388E3C', borderWidth: 0, borderRadius: 4 }
      ]
    },
    options: {
      responsive: true,
      plugins: { legend: { position: 'top', labels: { font: { size: 11 }, boxWidth: 12 } } },
      scales: { y: { beginAtZero: true, ticks: { stepSize: 1, font: { size: 11 } } }, x: { ticks: { font: { size: 11 } } } }
    }
  });
}

// ─── Lead Health Score ────────────────────────────────────────────────────────
function _dbRenderHealth(leads, fus) {
  const todayStr = localDateInputValue();
  const fusByLead = {};
  fus.forEach(f => {
    const lid = f['Lead ID'];
    if (!fusByLead[lid]) fusByLead[lid] = [];
    fusByLead[lid].push(f);
  });

  const scored = leads.filter(l => l['Lead Status'] === 'Open').map(l => {
    let score = 10;
    const lFus = fusByLead[l['Lead ID']] || [];

    // Priority weight — most significant input
    const prio = String(l['Priority'] || '').toUpperCase();
    if      (prio === 'HOT')  score += 40;
    else if (prio === 'WARM') score += 20;

    if (lFus.length > 0) score += 20;
    const done  = lFus.filter(f => !_isOpenFollowupRow(f)).length;
    score += done * 10;

    const overdue = lFus.filter(f => {
      const d = _fmtDate(_fuPlannedDate(f));
      return _isOpenFollowupRow(f) && d && d < todayStr;
    }).length;
    score -= overdue * 30;

    const lastAct = _fmtDate(l['Updated At'] || l['Created At']);
    if (lastAct) {
      const days = Math.floor((new Date(todayStr) - new Date(lastAct)) / 86400000);
      if (days >= 7)      score -= 50;
      else if (days >= 3) score -= 20;
    }

    let heat, badge, bc;
    if      (score >= 60) { heat = 'Hot';  badge = 'Hot';  bc = '#E64A19'; }
    else if (score >= 30) { heat = 'Warm'; badge = 'Warm'; bc = '#F9A825'; }
    else if (score >= 0)  { heat = 'Cold'; badge = 'Cold'; bc = '#1976D2'; }
    else                  { heat = 'Dead'; badge = 'Dead'; bc = '#9E9E9E'; }

    return { ...l, _score: score, _heat: heat, _badge: badge, _bc: bc };
  });

  const counts = { Hot: 0, Warm: 0, Cold: 0, Dead: 0 };
  scored.forEach(l => { if (counts[l._heat] !== undefined) counts[l._heat]++; });

  const hEl = el('db-health-grid');
  if (hEl) {
    hEl.innerHTML = [
      ['Hot',  '#FF5722', '#FFF3E0', '🔥'],
      ['Warm', '#F9A825', '#FFFDE7', '☀️'],
      ['Cold', '#1976D2', '#E3F2FD', '❄️'],
      ['Dead', '#9E9E9E', '#F5F5F5', '💀']
    ].map(([h, c, bg, e]) =>
      `<div style="background:${bg};border-radius:8px;padding:10px;text-align:center;border:1px solid ${c}33">
        <div style="font-size:18px;margin-bottom:2px">${e}</div>
        <div style="font-size:22px;font-weight:700;color:${c};line-height:1">${counts[h]}</div>
        <div style="font-size:10px;color:#777;margin-top:2px;font-weight:600;text-transform:uppercase">${h}</div>
      </div>`
    ).join('');
  }

  const listEl = el('db-health-list');
  if (listEl) {
    const top = scored.filter(l => l._heat !== 'Dead').sort((a, b) => b._score - a._score).slice(0, 10);
    listEl.innerHTML = top.length
      ? top.map(l => `
        <div style="display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid #f5f5f5">
          <span style="font-size:10px;font-weight:700;color:${l._bc};background:${l._bc}18;padding:2px 6px;border-radius:8px;white-space:nowrap">${l._badge}</span>
          <span style="font-size:12px;color:#333;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${escapeHtml(l['Company Name'])}">${escapeHtml(l['Company Name'] || l['Remark'] || '')}</span>
          <span style="font-size:11px;color:#aaa;white-space:nowrap">${l._score}pt</span>
        </div>`).join('')
      : '<p style="text-align:center;color:#ccc;font-size:12px;padding:16px 0">No active leads</p>';
  }
}

// ─── Overdue Follow-ups Table ─────────────────────────────────────────────────
function _dbRenderOverdueTable(overdueFus, leads) {
  const wrap = el('db-overdue-table');
  if (!wrap) return;

  if (!overdueFus.length) {
    wrap.innerHTML = `<div style="text-align:center;padding:28px;color:#388E3C;font-size:13px;display:flex;align-items:center;justify-content:center;gap:6px">${icon('check-circle',18)} No overdue follow-ups</div>`;
    renderIcons(wrap);
    return;
  }

  const todayStr = localDateInputValue();
  const leadMap  = _mapRowsBy(leads, 'Lead ID');

  const rows = overdueFus.slice(0, 25).map(f => {
    const lead     = leadMap[f['Lead ID']] || {};
    const planned  = _fmtDate(_fuPlannedDate(f));
    const daysOver = planned ? Math.floor((new Date(todayStr) - new Date(planned)) / 86400000) : 0;
    const prio     = lead['Priority'] || '';
    const prioCol  = prio === 'High' ? '#D32F2F' : prio === 'Medium' ? '#F57C00' : '#9E9E9E';
    const urgBg    = daysOver >= 7 ? '#FFEBEE' : daysOver >= 3 ? '#FFF8E1' : '#fff';
    return `<tr style="background:${urgBg}">
      <td style="padding:7px 10px;font-size:12px;font-weight:500;white-space:nowrap">${escapeHtml(lead['Company Name'] || f['Lead ID'] || '')}</td>
      <td style="padding:7px 10px;font-size:12px;color:#555;white-space:nowrap">${escapeHtml(AppLookup.userName(lead['Assigned To']))}</td>
      <td style="padding:7px 10px;font-size:12px;color:#555;white-space:nowrap">${planned ? formatDate(planned) : '—'}</td>
      <td style="padding:7px 10px;font-size:12px;text-align:center"><span style="color:#D32F2F;font-weight:700">${daysOver}d</span></td>
      <td style="padding:7px 10px;font-size:12px"><span style="color:${prioCol};font-weight:600">${escapeHtml(prio || '—')}</span></td>
    </tr>`;
  }).join('');

  wrap.innerHTML = `<table style="width:100%;border-collapse:collapse;font-size:12px">
    <thead>
      <tr style="background:#FFF5F5;position:sticky;top:0">
        <th style="padding:7px 10px;font-size:10px;font-weight:700;text-align:left;color:#C62828;border-bottom:2px solid #FFCDD2;text-transform:uppercase;letter-spacing:.4px">Company</th>
        <th style="padding:7px 10px;font-size:10px;font-weight:700;text-align:left;color:#C62828;border-bottom:2px solid #FFCDD2;text-transform:uppercase;letter-spacing:.4px">Assigned To</th>
        <th style="padding:7px 10px;font-size:10px;font-weight:700;text-align:left;color:#C62828;border-bottom:2px solid #FFCDD2;text-transform:uppercase;letter-spacing:.4px">Due Date</th>
        <th style="padding:7px 10px;font-size:10px;font-weight:700;text-align:center;color:#C62828;border-bottom:2px solid #FFCDD2;text-transform:uppercase;letter-spacing:.4px">Overdue</th>
        <th style="padding:7px 10px;font-size:10px;font-weight:700;text-align:left;color:#C62828;border-bottom:2px solid #FFCDD2;text-transform:uppercase;letter-spacing:.4px">Priority</th>
      </tr>
    </thead>
    <tbody>${rows}</tbody>
  </table>`;
}

// ─── Leads Without Follow-up ──────────────────────────────────────────────────
function _dbRenderNoFollowupTable(leads, fus) {
  const wrap = el('db-nofollowup-table');
  if (!wrap) return;

  const todayStr = localDateInputValue();
  const withFuUpcoming = new Set(
    fus.filter(f => _isOpenFollowupRow(f) && (_fmtDate(_fuPlannedDate(f)) || '') >= todayStr)
       .map(f => f['Lead ID'])
  );

  const atRisk = leads
    .filter(l => l['Lead Status'] === 'Open' && !withFuUpcoming.has(l['Lead ID']))
    .sort((a, b) => (_fmtDate(a['Created At']) || '').localeCompare(_fmtDate(b['Created At']) || ''))
    .slice(0, 25);

  if (!atRisk.length) {
    wrap.innerHTML = `<div style="text-align:center;padding:28px;color:#388E3C;font-size:13px;display:flex;align-items:center;justify-content:center;gap:6px">${icon('check-circle',18)} All leads have upcoming follow-ups</div>`;
    renderIcons(wrap);
    return;
  }

  const rows = atRisk.map(l => {
    const d   = _fmtDate(l['Created At']) || '';
    const age = d ? Math.floor((new Date(todayStr) - new Date(d)) / 86400000) : 0;
    const col = age >= 7 ? '#D32F2F' : age >= 3 ? '#F57C00' : '#388E3C';
    return `<tr style="border-bottom:1px solid #fafafa">
      <td style="padding:7px 10px;font-size:12px;font-weight:500;white-space:nowrap">${escapeHtml(l['Company Name'] || '')}</td>
      <td style="padding:7px 10px;font-size:12px;color:#555;white-space:nowrap">${escapeHtml(AppLookup.stageName(l['Stage ID']))}</td>
      <td style="padding:7px 10px;font-size:12px;color:#555;white-space:nowrap">${escapeHtml(AppLookup.userName(l['Assigned To']))}</td>
      <td style="padding:7px 10px;font-size:12px;text-align:center"><span style="color:${col};font-weight:700">${age}d</span></td>
    </tr>`;
  }).join('');

  wrap.innerHTML = `<table style="width:100%;border-collapse:collapse;font-size:12px">
    <thead>
      <tr style="background:#FFF8F0;position:sticky;top:0">
        <th style="padding:7px 10px;font-size:10px;font-weight:700;text-align:left;color:#E65100;border-bottom:2px solid #FFE0B2;text-transform:uppercase;letter-spacing:.4px">Company</th>
        <th style="padding:7px 10px;font-size:10px;font-weight:700;text-align:left;color:#E65100;border-bottom:2px solid #FFE0B2;text-transform:uppercase;letter-spacing:.4px">Stage</th>
        <th style="padding:7px 10px;font-size:10px;font-weight:700;text-align:left;color:#E65100;border-bottom:2px solid #FFE0B2;text-transform:uppercase;letter-spacing:.4px">Assigned To</th>
        <th style="padding:7px 10px;font-size:10px;font-weight:700;text-align:center;color:#E65100;border-bottom:2px solid #FFE0B2;text-transform:uppercase;letter-spacing:.4px">No FU Since</th>
      </tr>
    </thead>
    <tbody>${rows}</tbody>
  </table>`;
}

// ─── Source Conversion Table ──────────────────────────────────────────────────
function _dbRenderSourceTable(leads) {
  const wrap = el('db-source-table');
  if (!wrap) return;

  const map = {};
  leads.forEach(l => {
    const src = l['Source'] || 'Unknown';
    if (!map[src]) map[src] = { total: 0, won: 0, lost: 0 };
    map[src].total++;
    if (l['Lead Status'] === 'Won')  map[src].won++;
    if (l['Lead Status'] === 'Lost') map[src].lost++;
  });

  const sorted = Object.entries(map).sort((a, b) => b[1].total - a[1].total);

  if (!sorted.length) {
    wrap.innerHTML = '<p style="text-align:center;color:#ccc;padding:20px;font-size:13px">No data</p>';
    return;
  }

  const rows = sorted.map(([src, d]) => {
    const closed = d.won + d.lost;
    const conv   = closed > 0 ? Math.round(d.won / closed * 100) : 0;
    const cCol   = conv >= 50 ? '#388E3C' : conv >= 25 ? '#F57C00' : '#D32F2F';
    return `<tr style="border-bottom:1px solid #f5f5f5">
      <td style="padding:8px 12px;font-size:12px;font-weight:500">${escapeHtml(src)}</td>
      <td style="padding:8px 12px;font-size:12px;text-align:center;font-weight:600">${d.total}</td>
      <td style="padding:8px 12px;font-size:12px;text-align:center;color:#388E3C;font-weight:600">${d.won}</td>
      <td style="padding:8px 12px;font-size:12px;text-align:center;color:#D32F2F">${d.lost}</td>
      <td style="padding:8px 12px;font-size:12px;text-align:center"><span style="color:${cCol};font-weight:700">${conv}%</span></td>
    </tr>`;
  }).join('');

  wrap.innerHTML = `<table style="width:100%;border-collapse:collapse;font-size:12px">
    <thead>
      <tr style="background:#F8F8F8">
        ${['Source','Total Leads','Converted','Lost','Conv %']
          .map(h => `<th style="padding:8px 12px;font-size:10px;font-weight:700;border-bottom:2px solid #E0E0E0;color:#555;text-transform:uppercase;letter-spacing:.4px;text-align:${h==='Source'?'left':'center'}">${h}</th>`).join('')}
      </tr>
    </thead>
    <tbody>${rows}</tbody>
  </table>`;
}

// ─── Team Leaderboard ─────────────────────────────────────────────────────────
function _dbRenderLeaderboard(leads, fus) {
  const wrap = el('db-leaderboard');
  if (!wrap) return;

  const todayStr = localDateInputValue();
  const team = {};

  leads.forEach(l => {
    const uid = l['Assigned To'];
    if (!uid) return;
    if (!team[uid]) team[uid] = { name: AppLookup.userName(uid), leads: 0, won: 0, fuDone: 0, fuMissed: 0 };
    team[uid].leads++;
    if (l['Lead Status'] === 'Won') team[uid].won++;
  });

  const leadMap = _mapRowsBy(leads, 'Lead ID');
  fus.forEach(f => {
    const lead = f['Lead ID'] ? leadMap[f['Lead ID']] : null;
    // Skip followups whose lead is not in the current filter scope (deleted or not visible)
    if (f['Lead ID'] && !lead) return;
    const uid  = lead?.['Assigned To'] || f['Created By'];
    if (!uid || !team[uid]) return;
    if (!_isOpenFollowupRow(f)) {
      team[uid].fuDone++;
    } else {
      const d = _fmtDate(_fuPlannedDate(f));
      if (d && d < todayStr) team[uid].fuMissed++;
    }
  });

  const ranked = Object.values(team).map(t => {
    const fuTotal = t.fuDone + t.fuMissed;
    const fuPct   = fuTotal > 0 ? Math.round(t.fuDone / fuTotal * 100) : 0;
    const convPct = t.leads > 0 ? Math.round(t.won / t.leads * 100) : 0;
    const score   = t.won * 50 + t.fuDone * 10 - t.fuMissed * 15 + convPct;
    return { ...t, fuPct, convPct, score };
  }).sort((a, b) => b.score - a.score);

  if (!ranked.length) {
    wrap.innerHTML = '<p style="text-align:center;color:#ccc;padding:20px;font-size:13px">No team data</p>';
    return;
  }

  const medals = ['🥇','🥈','🥉'];
  const rows = ranked.map((t, i) => {
    const fpCol = t.fuPct >= 80 ? '#388E3C' : t.fuPct >= 50 ? '#F57C00' : '#D32F2F';
    return `<tr style="border-bottom:1px solid #f5f5f5${i < 3 ? ';background:#FFFEF5' : ''}">
      <td style="padding:10px 12px;font-size:15px;text-align:center">${medals[i] || `<span style="color:#aaa;font-size:12px">#${i + 1}</span>`}</td>
      <td style="padding:10px 12px;font-size:13px;font-weight:600">${escapeHtml(t.name)}</td>
      <td style="padding:10px 12px;font-size:13px;text-align:center">${t.leads}</td>
      <td style="padding:10px 12px;font-size:13px;text-align:center;color:#388E3C;font-weight:700">${t.won}</td>
      <td style="padding:10px 12px;font-size:13px;text-align:center">${t.convPct}%</td>
      <td style="padding:10px 12px;font-size:13px;text-align:center;color:#0277BD;font-weight:600">${t.fuDone}</td>
      <td style="padding:10px 12px;font-size:13px;text-align:center"><span style="color:${fpCol};font-weight:700">${t.fuPct}%</span></td>
      <td style="padding:10px 12px;font-size:13px;text-align:center;font-weight:700;color:#6A1B9A">${t.score}</td>
    </tr>`;
  }).join('');

  wrap.innerHTML = `<table style="width:100%;border-collapse:collapse;font-size:12px">
    <thead>
      <tr style="background:#F8F8F8">
        ${['Rank','Name','Leads','Won','Conv %','FU Done','FU Done %','Score']
          .map(h => `<th style="padding:9px 12px;font-size:10px;font-weight:700;border-bottom:2px solid #E0E0E0;color:#555;text-transform:uppercase;letter-spacing:.4px;text-align:${h==='Name'?'left':'center'}">${h}</th>`).join('')}
      </tr>
    </thead>
    <tbody>${rows}</tbody>
  </table>`;
}

// ─── Activity Timeline ────────────────────────────────────────────────────────
const _dbActivityPage = { current: 0 };
const _DB_ACT_PAGE_SIZE = 50;

function _dbRenderActivity(leads, page) {
  const wrap = el('db-activity');
  if (!wrap) return;

  if (!AppCache.isLoaded('activityLogs')) {
    wrap.innerHTML = '<p style="text-align:center;color:#ccc;font-size:13px;padding:16px">Activity data loading…</p>';
    return;
  }

  if (page !== undefined) _dbActivityPage.current = page;
  const pg = _dbActivityPage.current;

  const sorted = AppCache.getRows('activityLogs')
    .slice()
    .sort((a, b) => String(b['Created At'] || '').localeCompare(String(a['Created At'] || '')));

  const total     = sorted.length;
  const totalPages = Math.max(1, Math.ceil(total / _DB_ACT_PAGE_SIZE));
  const pageLogs  = sorted.slice(pg * _DB_ACT_PAGE_SIZE, (pg + 1) * _DB_ACT_PAGE_SIZE);

  if (!pageLogs.length) {
    wrap.innerHTML = '<p style="text-align:center;color:#ccc;font-size:13px;padding:16px">No activity recorded.</p>';
    return;
  }

  const leadMap = _mapRowsBy(AppCache.getRows('leads'), 'Lead ID');

  const actIcon = {
    'Stage Changed':  { i: 'git-branch',     c: '#6A1B9A' },
    'Lead Created':   { i: 'user-plus',       c: '#1565C0' },
    'Followup Added': { i: 'phone',           c: '#388E3C' },
    'Lead Won':       { i: 'trophy',          c: '#F9A825' },
    'Lead Lost':      { i: 'x-circle',        c: '#D32F2F' },
    'Lead Updated':   { i: 'pencil',          c: '#0277BD' },
    'Remark Updated': { i: 'message-square',  c: '#00838F' },
    'Assigned':       { i: 'user-check',      c: '#558B2F' }
  };

  const _resolve = v => {
    if (!v) return '';
    const s = String(v);
    const stage = AppLookup.stageObj(s);
    if (stage) return stage.name;
    const uname = AppLookup.userName(s);
    return uname !== '—' ? uname : s;
  };

  const itemsHtml = pageLogs.map(log => {
    const type    = log['Action Type'] || log['Activity Type'] || 'Lead Updated';
    const info    = actIcon[type] || { i: 'activity', c: '#9E9E9E' };
    const user    = AppLookup.userName(log['Created By']);
    const lead    = leadMap[log['Lead ID']] || {};
    const company = lead['Company Name'] || log['Company Name'] || '';
    const ts      = log['Created At'] || '';
    const oldVal  = _resolve(log['Old Value']);
    const newVal  = _resolve(log['New Value']);
    return `
      <div style="position:relative;margin-bottom:14px;padding-left:14px">
        <div style="position:absolute;left:-20px;top:3px;width:16px;height:16px;background:${info.c};border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0">
          <i data-lucide="${info.i}" style="width:8px;height:8px;color:#fff;stroke-width:3"></i>
        </div>
        <div style="font-size:12px;font-weight:600;color:#2d2d2d;line-height:1.4">
          ${escapeHtml(type)}${company ? ` <span style="font-weight:400;color:#666">— ${escapeHtml(company)}</span>` : ''}
        </div>
        ${(oldVal || newVal) ? `
          <div style="font-size:11px;color:#888;margin-top:2px">
            ${oldVal ? `<span style="color:#D32F2F;text-decoration:line-through">${escapeHtml(oldVal)}</span> → ` : ''}
            ${newVal ? `<span style="color:#388E3C;font-weight:500">${escapeHtml(newVal)}</span>` : ''}
          </div>` : ''}
        ${log['Remark'] ? `<div style="font-size:11px;color:#888;margin-top:2px;font-style:italic">"${escapeHtml(String(log['Remark']).slice(0, 80))}"</div>` : ''}
        <div style="font-size:10px;color:#bbb;margin-top:3px">${escapeHtml(user)}${ts ? ' · ' + formatDate(ts) : ''}</div>
      </div>`;
  }).join('');

  const start = pg * _DB_ACT_PAGE_SIZE + 1;
  const end   = Math.min((pg + 1) * _DB_ACT_PAGE_SIZE, total);

  wrap.innerHTML = `
    <div style="position:relative;padding-left:30px">
      <div style="position:absolute;left:10px;top:4px;bottom:4px;width:2px;background:#EEEEEE;border-radius:1px"></div>
      ${itemsHtml}
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-top:16px;padding-top:14px;border-top:1px solid #f0f0f0;flex-wrap:wrap;gap:8px">
      <span style="font-size:12px;color:#aaa">Showing ${start}–${end} of ${total} activities</span>
      <div style="display:flex;gap:8px;align-items:center">
        ${pg > 0
          ? `<button class="btn btn-outlined" onclick="_dbRenderActivity(undefined,${pg - 1})" style="padding:5px 14px;font-size:12px;display:flex;align-items:center;gap:5px">${icon('chevron-left',13)} Newer</button>`
          : `<button class="btn btn-outlined" disabled style="padding:5px 14px;font-size:12px;opacity:.35;display:flex;align-items:center;gap:5px">${icon('chevron-left',13)} Newer</button>`}
        <span style="font-size:12px;color:#888;font-weight:600">Page ${pg + 1} / ${totalPages}</span>
        ${pg < totalPages - 1
          ? `<button class="btn btn-outlined" onclick="_dbRenderActivity(undefined,${pg + 1})" style="padding:5px 14px;font-size:12px;display:flex;align-items:center;gap:5px">Older ${icon('chevron-right',13)}</button>`
          : `<button class="btn btn-outlined" disabled style="padding:5px 14px;font-size:12px;opacity:.35;display:flex;align-items:center;gap:5px">Older ${icon('chevron-right',13)}</button>`}
      </div>
    </div>`;
  renderIcons(wrap);
}
</script>

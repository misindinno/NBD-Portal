<script>
// ─── AppCache — single in-memory store for all data collections ───────────────
// Each collection entry: { rows: [], loadedAt, serverSyncedAt }.
//   loadedAt       — bumped on every read AND every optimistic local write, so
//                    isLoaded stays true and _ensureCached won't refetch.
//   serverSyncedAt — bumped ONLY by setRows() (a real server fetch). The
//                    revalidation poll compares server stamps against THIS, so an
//                    optimistic write never suppresses the corrective refetch that
//                    pulls authoritative server-computed fields back into cache.

const AppCache = (() => {
  const _c = {};

  function _e(col) {
    if (!_c[col]) _c[col] = { rows: [], loadedAt: 0, serverSyncedAt: 0 };
    return _c[col];
  }

  // Replace entire collection. Called after a successful API fetch.
  function setRows(col, rows) {
    const now = Date.now();
    _c[col] = { rows: Array.isArray(rows) ? rows : [], loadedAt: now, serverSyncedAt: now };
  }

  // Read rows for a collection.
  function getRows(col) { return _c[col]?.rows || []; }

  // Unix ms timestamp of when this collection was last fetched or locally written.
  function getLoadedAt(col) { return _c[col]?.loadedAt || 0; }

  // Unix ms timestamp of the last real server fetch (setRows). Stamp-based
  // revalidation compares against this so our own optimistic writes don't mask a
  // needed refetch of server-computed fields.
  function getServerSyncedAt(col) { return _c[col]?.serverSyncedAt || 0; }

  // True once the collection has been fetched at least once.
  function isLoaded(col) { return !!(_c[col]?.loadedAt); }

  function touch(col) {
    const e = _e(col);
    e.loadedAt = Date.now();
  }

  // Merge patch into one row identified by keyField === id.
  function patchRow(col, keyField, id, patch) {
    const e = _e(col);
    const idx = e.rows.findIndex(r => r[keyField] === id);
    if (idx !== -1) e.rows[idx] = { ...e.rows[idx], ...patch };
    e.loadedAt = Date.now(); // keep isLoaded true; serverSyncedAt stays stale so the poll still heals
  }

  // Prepend a new row (most-recent-first order).
  function addRow(col, row) {
    const e = _e(col);
    e.rows = [row, ...e.rows];
    e.loadedAt = Date.now();
  }

  // Remove the row matching keyField === id.
  function removeRow(col, keyField, id) {
    const e = _e(col);
    e.rows = e.rows.filter(r => r[keyField] !== id);
    e.loadedAt = Date.now();
  }

  // Reset a single collection so the next _ensureCached call re-fetches it.
  function invalidate(col) { if (_c[col]) { _c[col].loadedAt = 0; _c[col].serverSyncedAt = 0; } }

  // Reset all collections at once (used by topbar refresh).
  function invalidateAll() { Object.keys(_c).forEach(col => invalidate(col)); }

  // Acknowledge a write WE made and already applied in place: mark the collection as in
  // sync with the server as of `ts` (the fresh server stamp) so the revalidation poll
  // doesn't treat our own stamp bump as a foreign change and refetch + repaint the page.
  function ackSyncedAt(col, ts) {
    const e = _e(col);
    e.serverSyncedAt = Math.max(e.serverSyncedAt || 0, Number(ts) || Date.now());
  }

  return { setRows, getRows, getLoadedAt, getServerSyncedAt, isLoaded, touch, patchRow, addRow, removeRow, invalidate, invalidateAll, ackSyncedAt };
})();
</script>

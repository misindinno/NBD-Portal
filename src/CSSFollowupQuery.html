<style>
  /* Follow-up query builder */
  .query-builder { background: #F8F9FA; border: 1px solid var(--md-border); border-radius: 6px; padding: 14px; margin-bottom: 16px; }
  .query-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; flex-wrap: wrap; }
  .query-row .form-control { width: auto; flex: 1; min-width: 120px; }
  .query-add-btn { background: none; border: 1px dashed var(--md-primary); color: var(--md-primary); border-radius: 4px; padding: 4px 12px; cursor: pointer; font-size: 13px; }
  .fu-card {
    background: #fff; border-radius: 6px; padding: 12px 14px; margin-bottom: 8px;
    border-left: 3px solid var(--md-primary); box-shadow: 0 1px 3px rgba(0,0,0,.07);
    font-size: 13px;
  }
  .activity-log-card { background: #FAFBFC; }
  .fu-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .fu-card-title { font-weight: 600; }
  .fu-card-meta { color: var(--md-text-secondary); font-size: 12px; display: flex; gap: 12px; flex-wrap: wrap; }
  .fu-card-meta span { display: inline-flex; align-items: center; gap: 4px; }
  .fu-table-summary {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 10px;
  }
  .fu-summary-pill {
    display: inline-flex;
    align-items: center;
    min-height: 26px;
    padding: 4px 10px;
    border-radius: 4px;
    background: #F5F5F5;
    color: var(--md-text-secondary);
    font-size: 12px;
    font-weight: 600;
  }
  .fu-summary-pill.danger { background: #FFEBEE; color: #B71C1C; }
  .fu-summary-pill.success { background: #E8F5E9; color: #1B5E20; }
  .fu-table-wrap {
    background: #fff;
    border: 1px solid var(--md-border);
    border-radius: 8px;
    box-shadow: 0 1px 4px rgba(0,0,0,.06);
  }
  .fu-table { min-width: 980px; }
  .fu-table th {
    background: #FAFAFA;
    color: var(--md-text-secondary);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0;
  }
  .fu-table td {
    vertical-align: top;
    padding-top: 12px;
    padding-bottom: 12px;
  }
  .fu-row:hover td { background: #FCFCFC; }
  .fu-due-cell {
    width: 130px;
    border-left: 4px solid transparent;
    white-space: nowrap;
  }
  .fu-due-overdue {
    background: #FFEBEE;
    border-left-color: #D32F2F;
    color: #B71C1C;
  }
  .fu-due-today {
    background: #E8F5E9;
    border-left-color: #388E3C;
    color: #1B5E20;
  }
  .fu-due-future {
    background: #fff;
    color: var(--md-text);
  }
  .fu-row-overdue td {
    background: #FFEBEE;
  }
  .fu-row-overdue:hover td {
    background: #FFE1E5;
  }
  .fu-row-today td {
    background: #E8F5E9;
  }
  .fu-row-today:hover td {
    background: #DFF0E2;
  }
  .fu-due-label { font-weight: 700; margin-bottom: 3px; }
  .fu-due-date { font-size: 12px; color: inherit; opacity: .8; }
  .fu-lead-title {
    max-width: 260px;
    font-weight: 700;
    color: var(--md-text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .fu-lead-sub, .fu-date-sub {
    margin-top: 3px;
    font-size: 12px;
    color: var(--md-text-secondary);
    max-width: 300px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .fu-stage-note {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    margin-top: 6px;
    font-size: 12px;
    color: #455A64;
    background: #ECEFF1;
    border-radius: 4px;
    padding: 3px 6px;
  }
  .fu-type-line {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 6px;
  }
  .fu-discussion, .fu-next-action {
    max-width: 360px;
    line-height: 1.4;
    overflow-wrap: anywhere;
  }
  .fu-table-meta {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 8px;
    font-size: 12px;
    color: var(--md-text-secondary);
  }
  .fu-table-meta span {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: #F5F7FA;
    border-radius: 4px;
    padding: 3px 6px;
  }
  .fu-action-btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    white-space: nowrap;
  }
  .fu-action-stack {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 6px;
  }
  .done-followup-summary {
    background: #F8FAFC;
    border: 1px solid var(--md-border);
    border-radius: 6px;
    padding: 12px;
    margin-bottom: 16px;
  }
  .history-table { min-width: 760px; }
  .muted-text { color: var(--md-text-secondary); font-size: 12px; }
  .empty-table-cell { color: #999; text-align: center; padding: 24px; }

  /* ── Modern follow-up workspace (compact SaaS layout) ───────────────────── */
  .fu-page {
    display: flex; flex-direction: column; gap: 10px; color: #111827;
    height: 100%; min-height: 0;
  }
  .fu-page #fu-body {
    flex: 1 1 auto; min-height: 0; display: flex; flex-direction: column;
  }
  /* Scroll-aware collapse: hide heading + KPIs when user scrolls the table */
  .fu-page.fu-scrolled .fu-topbar,
  .fu-page.fu-scrolled .fu-kpis { display: none; }
  /* Compact topbar (48–56px) */
  .fu-topbar {
    display: flex; align-items: center; justify-content: space-between;
    gap: 10px; flex-wrap: nowrap; min-height: 44px;
  }
  .fu-topbar-left { display: flex; align-items: center; gap: 10px; min-width: 0; }
  .fu-topbar-titles { min-width: 0; }
  .fu-topbar-right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
  .fu-topbar-btn { height: 32px; padding: 0 10px; font-size: 12px; white-space: nowrap; }
  .fu-hero-icon {
    width: 34px; height: 34px; border-radius: 9px;
    display: inline-flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, #ECFDF5, #6EE7B7); color: #047857; flex-shrink: 0;
    box-shadow: 0 2px 6px rgba(4,120,87,.18), 0 0 0 1px rgba(4,120,87,.08);
  }
  .fu-hero-title {
    font-size: 16px; font-weight: 800; line-height: 1.15;
    background: linear-gradient(90deg, #0F172A, #334155);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .fu-hero-sub { font-size: 11.5px; color: #6B7280; margin-top: 1px; }

  /* KPI horizontal strip (56–68px) */
  .fu-kpis {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 8px; flex-shrink: 0;
  }
  .fu-kpi {
    min-height: 62px; border: 1px solid #E5E7EB; border-radius: 10px;
    background: linear-gradient(180deg, #ffffff 0%, #FAFBFF 100%); padding: 9px 11px;
    text-align: left; cursor: pointer; position: relative; overflow: hidden;
    display: grid; grid-template-columns: auto 1fr; column-gap: 9px; row-gap: 1px;
    align-items: center; box-shadow: 0 1px 2px rgba(15,23,42,.04), 0 1px 0 rgba(255,255,255,.6) inset;
    transition: transform .15s, border-color .15s, box-shadow .15s;
  }
  .fu-kpi::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
    background: currentColor; opacity: .65;
  }
  .fu-kpi-danger::before  { background: linear-gradient(180deg, #EF4444, #B91C1C); }
  .fu-kpi-success::before { background: linear-gradient(180deg, #22C55E, #15803D); }
  .fu-kpi-blue::before    { background: linear-gradient(180deg, #3B82F6, #1D4ED8); }
  .fu-kpi-neutral::before { background: linear-gradient(180deg, #94A3B8, #475569); }
  .fu-kpi-warning::before { background: linear-gradient(180deg, #F59E0B, #B45309); }
  .fu-kpi-purple::before  { background: linear-gradient(180deg, #A78BFA, #6D28D9); }
  .fu-kpi:hover { transform: translateY(-1px); border-color: #C7D2FE; box-shadow: 0 6px 16px rgba(15,23,42,.10); }
  .fu-kpi.active { border-color: #818CF8; box-shadow: 0 0 0 2px #C7D2FE inset, 0 4px 12px rgba(99,102,241,.18); }
  .fu-kpi-icon {
    width: 28px; height: 28px; border-radius: 7px;
    display: inline-flex; align-items: center; justify-content: center; grid-row: span 3;
  }
  .fu-kpi-value { font-size: 19px; font-weight: 850; line-height: 1; color: #111827; }
  .fu-kpi-label { font-size: 11px; color: #374151; font-weight: 750; line-height: 1.1; }
  .fu-kpi-sub { font-size: 10px; color: #6B7280; line-height: 1.1; }
  .fu-kpi-icon { box-shadow: 0 2px 6px rgba(15,23,42,.08); }
  .fu-kpi-danger .fu-kpi-icon  { background: linear-gradient(135deg, #FEE2E2, #FCA5A5); color: #B91C1C; }
  .fu-kpi-success .fu-kpi-icon { background: linear-gradient(135deg, #DCFCE7, #86EFAC); color: #166534; }
  .fu-kpi-blue .fu-kpi-icon    { background: linear-gradient(135deg, #DBEAFE, #93C5FD); color: #1D4ED8; }
  .fu-kpi-neutral .fu-kpi-icon { background: linear-gradient(135deg, #F3F4F6, #D1D5DB); color: #374151; }
  .fu-kpi-warning .fu-kpi-icon { background: linear-gradient(135deg, #FEF3C7, #FCD34D); color: #92400E; }
  .fu-kpi-purple .fu-kpi-icon  { background: linear-gradient(135deg, #EDE9FE, #C4B5FD); color: #6D28D9; }
  .fu-kpi-skeleton { height: 60px; border-radius: 8px; }

  /* Segmented control tabs (36px) with inline filter toggle */
  .fu-tabs {
    display: flex; align-items: center; gap: 8px;
    border-bottom: 1px solid #E5E7EB; padding-bottom: 4px;
    flex-shrink: 0;
  }
  .fu-tabs-left {
    display: flex; align-items: center; gap: 4px;
    flex: 1 1 auto; min-width: 0; overflow-x: auto; scrollbar-width: thin;
  }
  .fu-tabs-left::-webkit-scrollbar { height: 4px; }
  .fu-tabs-left::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 2px; }
  .fu-tabs-right {
    display: flex; align-items: center; gap: 6px; flex-shrink: 0;
    padding-left: 6px; border-left: 1px solid #E5E7EB;
  }
  .fu-tabs-right .fu-filter-chips { max-width: 300px; overflow: hidden; flex-wrap: nowrap; }
  .fu-tab {
    height: 30px; border: 1px solid #E5E7EB; background: #fff; color: #475569;
    border-radius: 999px; padding: 0 12px; display: inline-flex; align-items: center;
    gap: 6px; cursor: pointer; font-size: 12px; font-weight: 700; white-space: nowrap;
    transition: all .15s; box-shadow: 0 1px 2px rgba(15,23,42,.04);
  }
  .fu-tab:hover { background: #F8FAFC; color: #1E293B; border-color: #CBD5E1; transform: translateY(-1px); }
  .fu-tab.active {
    background: linear-gradient(135deg, #6366F1, #4F46E5); color: #fff; border-color: #4338CA;
    box-shadow: 0 3px 8px rgba(99,102,241,.30);
  }
  .fu-tab.active svg { color: #fff; }
  .fu-tab-count {
    min-width: 16px; height: 16px; padding: 0 4px; border-radius: 999px;
    display: inline-flex; align-items: center; justify-content: center;
    background: #F1F5F9; color: #475569; font-size: 10px; font-weight: 800;
  }
  .fu-tab.active .fu-tab-count { background: rgba(255,255,255,.25); color: #fff; }

  /* Filter dropdown card — only visible when toggled */
  .fu-filter-bar {
    background: #fff; border: 1px solid #C7D2FE; border-radius: 10px;
    box-shadow: 0 8px 24px rgba(15,23,42,.10), 0 2px 6px rgba(15,23,42,.05);
    flex-shrink: 0; padding: 12px;
    animation: fuFilterSlide .18s ease-out;
  }
  @keyframes fuFilterSlide {
    from { opacity: 0; transform: translateY(-6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .fu-filter-card-grid {
    display: grid; gap: 8px;
    grid-template-columns: minmax(220px, 2fr) repeat(auto-fit, minmax(140px, 1fr));
    align-items: end;
  }
  .fu-filter-card-grid .fu-filter-clear-all { grid-column: -2 / -1; height: 32px; }
  .fu-search {
    height: 32px; display: flex; align-items: center; gap: 6px; padding: 0 10px;
    border: 1px solid #D1D5DB; border-radius: 7px; background: #fff;
  }
  .fu-search:focus-within { border-color: #818CF8; box-shadow: 0 0 0 3px rgba(129,140,248,.15); }
  .fu-search svg { color: #6B7280; flex-shrink: 0; }
  .fu-search input { border: none; outline: none; width: 100%; font-size: 12.5px; color: #111827; background: transparent; }
  .fu-filter-toggle {
    height: 30px; padding: 0 10px; border: 1px solid #D1D5DB; border-radius: 999px;
    background: #fff; color: #334155; display: inline-flex; align-items: center;
    gap: 5px; cursor: pointer; font-size: 12px; font-weight: 700; white-space: nowrap;
    box-shadow: 0 1px 2px rgba(15,23,42,.04); transition: all .15s;
  }
  .fu-filter-toggle:hover { background: #F8FAFC; border-color: #94A3B8; transform: translateY(-1px); }
  .fu-filter-toggle.open {
    background: linear-gradient(135deg, #6366F1, #4F46E5); color: #fff; border-color: #4338CA;
    box-shadow: 0 3px 8px rgba(99,102,241,.30);
  }
  .fu-filter-toggle.open svg { color: #fff; }
  .fu-filter-active-count {
    min-width: 18px; height: 18px; padding: 0 5px; border-radius: 999px;
    background: #EF4444; color: #fff; font-size: 10px; font-weight: 800;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .fu-filter-toggle.open .fu-filter-active-count { background: rgba(255,255,255,.25); }
  .fu-filter-clear-inline {
    height: 30px; padding: 0 10px; border: 1px solid transparent; border-radius: 999px;
    background: #FEF2F2; color: #B91C1C; cursor: pointer; font-size: 12px; font-weight: 700;
    display: inline-flex; align-items: center; gap: 4px;
  }
  .fu-filter-clear-inline:hover { background: #FEE2E2; }
  .fu-filter { display: flex; flex-direction: column; gap: 4px; color: #64748B; font-size: 10.5px; font-weight: 800; text-transform: uppercase; letter-spacing: .03em; }
  .fu-filter select, .fu-filter input {
    height: 32px; border: 1px solid #D1D5DB; border-radius: 7px;
    background: #fff; color: #111827; padding: 0 8px; font-size: 12px; font-weight: 500;
    text-transform: none; letter-spacing: 0;
  }
  .fu-filter-chips { display: inline-flex; align-items: center; gap: 5px; flex-wrap: nowrap; }
  .fu-filter-chip {
    border: none; background: #EEF2FF; color: #3730A3; border-radius: 999px;
    padding: 3px 8px; display: inline-flex; align-items: center; gap: 4px;
    font-size: 11px; font-weight: 700; cursor: pointer; white-space: nowrap;
    max-width: 140px; overflow: hidden; text-overflow: ellipsis;
  }
  .fu-filter-chip:hover { background: #E0E7FF; }

  /* Worklist card with sticky header + internal scrolling table */
  .fu-worklist-card {
    background: #fff; border: 1px solid #E5E7EB; border-radius: 10px;
    box-shadow: 0 2px 8px rgba(15,23,42,.05), 0 1px 3px rgba(15,23,42,.03);
    display: flex; flex-direction: column; flex: 1 1 auto; min-height: 0; overflow: hidden;
  }
  .fu-worklist-head {
    display: flex; align-items: center; justify-content: space-between; gap: 10px; flex-wrap: wrap;
    padding: 9px 14px; border-bottom: 1px solid #E5E7EB;
    background: linear-gradient(180deg, #FAFBFF 0%, #F4F6FB 100%);
    flex-shrink: 0; min-height: 46px;
  }
  .fu-worklist-head-left { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .fu-worklist-title { font-size: 13px; font-weight: 800; color: #111827; display: inline-flex; align-items: center; gap: 6px; }
  .fu-worklist-count {
    min-width: 22px; height: 18px; padding: 0 6px; border-radius: 999px;
    background: #F1F5F9; color: #334155; font-size: 11px; font-weight: 800;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .fu-worklist-sub { font-size: 11px; color: #64748B; margin-top: 1px; }
  .fu-worklist-tools { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .fu-summary-pill {
    display: inline-flex; align-items: center; gap: 4px; min-height: 22px;
    padding: 2px 8px; border-radius: 999px; background: #F1F5F9;
    color: var(--md-text-secondary); font-size: 11px; font-weight: 700;
  }
  .fu-summary-pill.danger { background: #FEE2E2; color: #B91C1C; }
  .fu-summary-pill.success { background: #DCFCE7; color: #166534; }
  .fu-page-size { display: inline-flex; align-items: center; gap: 5px; color: #64748B; font-size: 11px; font-weight: 800; }
  .fu-page-size select { height: 28px; border: 1px solid #D1D5DB; border-radius: 7px; background: #fff; color: #111827; padding: 0 6px; font-size: 12px; }
  .fu-density-toggle { display: inline-flex; gap: 0; border: 1px solid #E5E7EB; border-radius: 7px; overflow: hidden; }
  .fu-density-toggle button {
    width: 28px; height: 28px; border: none; border-right: 1px solid #E5E7EB;
    background: #fff; color: #475569; display: inline-flex; align-items: center; justify-content: center; cursor: pointer;
  }
  .fu-density-toggle button:last-child { border-right: none; }
  .fu-density-toggle button.active { background: #EEF2FF; color: #3730A3; }
  .fu-density-toggle button:hover:not(.active) { background: #F8FAFC; color: #111827; }

  /* Table internal scroll — fills remaining height */
  .fu-table-scroll {
    flex: 1 1 auto; min-height: 0; overflow: auto;
    scrollbar-width: thin;
  }
  .fu-table-scroll::-webkit-scrollbar { width: 8px; height: 8px; }
  .fu-table-scroll::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 4px; }
  .fu-worklist-card .fu-table-wrap, .fu-worklist-card.table-wrap { box-shadow: none; border: none; border-radius: 0; }
  .fu-table { width: 100%; min-width: 1040px; border-collapse: separate; border-spacing: 0; font-size: 12px; }
  .fu-table th {
    position: sticky; top: 0; z-index: 2;
    background: linear-gradient(180deg, #F8FAFC, #EEF2F7);
    color: #475569; font-size: 10px; font-weight: 850; text-transform: uppercase;
    letter-spacing: .04em; padding: 9px 12px; border-bottom: 1px solid #E2E8F0;
    text-align: left;
    box-shadow: 0 1px 0 #E2E8F0;
  }
  .fu-table td { padding: 10px 12px; border-bottom: 1px solid #F1F5F9; vertical-align: middle; }

  /* Row density variants */
  .fu-density-comfortable .fu-table td { padding-top: 12px; padding-bottom: 12px; }
  .fu-density-compact .fu-table td { padding-top: 8px; padding-bottom: 8px; }
  .fu-density-ultra .fu-table { font-size: 11.5px; }
  .fu-density-ultra .fu-table th { padding: 6px 8px; font-size: 9.5px; }
  .fu-density-ultra .fu-table td { padding: 5px 8px; }
  .fu-density-ultra .fu-lead-sub, .fu-density-ultra .fu-date-sub { margin-top: 1px; font-size: 10.5px; }
  .fu-density-ultra .fu-due-date { font-size: 10px; }
  .fu-density-ultra .fu-discussion { -webkit-line-clamp: 1; max-width: 320px; padding: 2px 6px; }
  .fu-density-ultra .fu-icon-action { width: 26px; height: 26px; }
  .fu-density-ultra .fu-owner-avatar { width: 20px; height: 20px; font-size: 10px; }
  .fu-density-ultra .fu-stage-chip { padding: 2px 7px; font-size: 10.5px; }
  .fu-density-ultra .fu-due-cell { width: 110px; }

  .fu-row { transition: background .12s; }
  .fu-row:hover td { background: #F5F7FB; box-shadow: inset 0 0 0 9999px rgba(99,102,241,.03); }
  .fu-row-overdue td { background: #FFF7F7; }
  .fu-row-overdue:hover td { background: #FEECEC; }
  .fu-row-today td { background: #F0FDF4; }
  .fu-row-today:hover td { background: #DCFCE7; }
  .fu-due-cell { width: 122px; border-left: 4px solid transparent; white-space: nowrap; }
  .fu-due-overdue { background: linear-gradient(90deg, rgba(220,38,38,.08), transparent 90%); border-left-color: #DC2626; color: #B91C1C; }
  .fu-due-today   { background: linear-gradient(90deg, rgba(22,163,74,.10), transparent 90%); border-left-color: #16A34A; color: #166534; }
  .fu-due-future  { background: linear-gradient(90deg, rgba(37,99,235,.07), transparent 90%); border-left-color: #2563EB; color: #1D4ED8; }
  .fu-due-done    { background: linear-gradient(90deg, rgba(100,116,139,.08), transparent 90%); border-left-color: #64748B; color: #475569; }
  .fu-due-none    { background: transparent; border-left-color: #CBD5E1; color: #64748B; }
  .fu-row-done td   { background: #F8FAFC; }
  .fu-row-done:hover td { background: #F1F5F9; }
  .fu-row-none td   { background: #FAFBFC; }
  .fu-due-label { font-weight: 850; margin-bottom: 1px; font-size: 12px; letter-spacing: .02em; }
  .fu-due-date { font-size: 10.5px; opacity: .82; }
  .fu-date-done { display: inline-flex; align-items: center; gap: 5px; color: #166534; font-weight: 600; }
  .fu-date-tag {
    display: inline-flex; align-items: center; padding: 1px 6px; border-radius: 4px;

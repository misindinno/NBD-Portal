<style>
  /* Follow-up query builder */
  .query-builder { background: #F8F9FA; border: 1px solid var(--md-border); border-radius: 6px; padding: 14px; margin-bottom: 16px; }
  .query-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; flex-wrap: wrap; }
  .query-row .form-control { width: auto; flex: 1; min-width: 120px; }
  .query-add-btn { background: none; border: 1px dashed var(--md-primary); color: var(--md-primary); border-radius: 4px; padding: 4px 12px; cursor: pointer; font-size: 13px; }
  .fu-card {
    background: #fff; border-radius: 6px; padding: 16px 18px; margin-bottom: 10px;
    border-left: 3px solid var(--md-primary); box-shadow: 0 1px 3px rgba(0,0,0,.07);
    font-size: 13px; min-height: 124px;
  }
  .activity-log-card { background: #FAFBFC; }
  .fu-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .fu-card-title { font-weight: 600; }
  .fu-card-meta { color: var(--md-text-secondary); font-size: 12px; display: flex; gap: 12px; flex-wrap: wrap; }
  .fu-card-meta span { display: inline-flex; align-items: center; gap: 4px; }
  .fu-table-summary {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 10px;
  }
  .fu-summary-pill {
    display: inline-flex;
    align-items: center;
    min-height: 26px;
    padding: 4px 10px;
    border-radius: 4px;
    background: #F5F5F5;
    color: var(--md-text-secondary);
    font-size: 12px;
    font-weight: 600;
  }
  .fu-summary-pill.danger { background: #FFEBEE; color: #B71C1C; }
  .fu-summary-pill.success { background: #E8F5E9; color: #1B5E20; }
  .fu-table-wrap {
    background: #fff;
    border: 1px solid var(--md-border);
    border-radius: 8px;
    box-shadow: 0 1px 4px rgba(0,0,0,.06);
  }
  .fu-table { min-width: 980px; }
  .fu-table th {
    background: #FAFAFA;
    color: var(--md-text-secondary);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0;
  }
  .fu-table td {
    vertical-align: top;
    padding-top: 12px;
    padding-bottom: 12px;
  }
  .fu-row:hover td { background: #FCFCFC; }
  .fu-due-cell {
    width: 130px;
    border-left: 4px solid transparent;
    white-space: nowrap;
  }
  .fu-due-overdue {
    background: #FFEBEE;
    border-left-color: #D32F2F;
    color: #B71C1C;
  }
  .fu-due-today {
    background: #E8F5E9;
    border-left-color: #388E3C;
    color: #1B5E20;
  }
  .fu-due-future {
    background: #fff;
    color: var(--md-text);
  }
  .fu-row-overdue td {
    background: #FFEBEE;
  }
  .fu-row-overdue:hover td {
    background: #FFE1E5;
  }
  .fu-row-today td {
    background: #E8F5E9;
  }
  .fu-row-today:hover td {
    background: #DFF0E2;
  }
  .fu-due-label { font-weight: 700; margin-bottom: 3px; }
  .fu-due-date { font-size: 12px; color: inherit; opacity: .8; }
  .fu-lead-title {
    max-width: 260px;
    font-weight: 700;
    color: var(--md-text);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .fu-lead-sub, .fu-date-sub {
    margin-top: 3px;
    font-size: 12px;
    color: var(--md-text-secondary);
    max-width: 300px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .fu-stage-note {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    margin-top: 6px;
    font-size: 12px;
    color: #455A64;
    background: #ECEFF1;
    border-radius: 4px;
    padding: 3px 6px;
  }
  .fu-type-line {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 6px;
  }
  .fu-discussion, .fu-next-action {
    max-width: 360px;
    line-height: 1.4;
    overflow-wrap: anywhere;
  }
  .fu-table-meta {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 8px;
    font-size: 12px;
    color: var(--md-text-secondary);
  }
  .fu-table-meta span {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: #F5F7FA;
    border-radius: 4px;
    padding: 3px 6px;
  }
  .fu-action-btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    white-space: nowrap;
  }
  .fu-action-stack {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 6px;
  }
  .done-followup-summary {
    background: #F8FAFC;
    border: 1px solid var(--md-border);
    border-radius: 6px;
    padding: 12px;
    margin-bottom: 16px;
  }
  .history-table { min-width: 760px; }
  .muted-text { color: var(--md-text-secondary); font-size: 12px; }
  .empty-table-cell { color: #999; text-align: center; padding: 24px; }

  /* ── Modern follow-up workspace (compact SaaS layout) ───────────────────── */
  .fu-page {
    display: flex; flex-direction: column; gap: 10px; color: #111827;
    height: 100%; min-height: 0;
  }
  .fu-page #fu-body {
    flex: 1 1 auto; min-height: 0; display: flex; flex-direction: column;
  }
  /* Scroll-aware collapse: hide heading + KPIs when user scrolls the table */
  .fu-page.fu-scrolled .fu-topbar,
  .fu-page.fu-scrolled .fu-kpis { display: none; }
  /* Compact topbar (48–56px) */
  .fu-topbar {
    display: flex; align-items: center; justify-content: space-between;
    gap: 10px; flex-wrap: nowrap; min-height: 44px;
  }
  .fu-topbar-left { display: flex; align-items: center; gap: 10px; min-width: 0; }
  .fu-topbar-titles { min-width: 0; }
  .fu-topbar-right { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
  .fu-topbar-btn { height: 32px; padding: 0 10px; font-size: 12px; white-space: nowrap; }
  .fu-hero-icon {
    width: 34px; height: 34px; border-radius: 9px;
    display: inline-flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, #ECFDF5, #6EE7B7); color: #047857; flex-shrink: 0;
    box-shadow: 0 2px 6px rgba(4,120,87,.18), 0 0 0 1px rgba(4,120,87,.08);
  }
  .fu-hero-title {
    font-size: 16px; font-weight: 800; line-height: 1.15;
    background: linear-gradient(90deg, #0F172A, #334155);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .fu-hero-sub { font-size: 11.5px; color: #6B7280; margin-top: 1px; }

  /* KPI horizontal strip (56–68px) */
  .fu-kpis {
    display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 8px; flex-shrink: 0;
  }
  .fu-kpi {
    min-height: 62px; border: 1px solid #E5E7EB; border-radius: 10px;
    background: linear-gradient(180deg, #ffffff 0%, #FAFBFF 100%); padding: 9px 11px;
    text-align: left; cursor: pointer; position: relative; overflow: hidden;
    display: grid; grid-template-columns: auto 1fr; column-gap: 9px; row-gap: 1px;
    align-items: center; box-shadow: 0 1px 2px rgba(15,23,42,.04), 0 1px 0 rgba(255,255,255,.6) inset;
    transition: transform .15s, border-color .15s, box-shadow .15s;
  }
  .fu-kpi::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
    background: currentColor; opacity: .65;
  }
  .fu-kpi-danger::before  { background: linear-gradient(180deg, #EF4444, #B91C1C); }
  .fu-kpi-success::before { background: linear-gradient(180deg, #22C55E, #15803D); }
  .fu-kpi-blue::before    { background: linear-gradient(180deg, #3B82F6, #1D4ED8); }
  .fu-kpi-neutral::before { background: linear-gradient(180deg, #94A3B8, #475569); }
  .fu-kpi-warning::before { background: linear-gradient(180deg, #F59E0B, #B45309); }
  .fu-kpi-purple::before  { background: linear-gradient(180deg, #A78BFA, #6D28D9); }
  .fu-kpi:hover { transform: translateY(-1px); border-color: #C7D2FE; box-shadow: 0 6px 16px rgba(15,23,42,.10); }
  .fu-kpi.active { border-color: #818CF8; box-shadow: 0 0 0 2px #C7D2FE inset, 0 4px 12px rgba(99,102,241,.18); }
  .fu-kpi-icon {
    width: 28px; height: 28px; border-radius: 7px;
    display: inline-flex; align-items: center; justify-content: center; grid-row: span 3;
  }
  .fu-kpi-value { font-size: 19px; font-weight: 850; line-height: 1; color: #111827; }
  .fu-kpi-label { font-size: 11px; color: #374151; font-weight: 750; line-height: 1.1; }
  .fu-kpi-sub { font-size: 10px; color: #6B7280; line-height: 1.1; }
  .fu-kpi-icon { box-shadow: 0 2px 6px rgba(15,23,42,.08); }
  .fu-kpi-danger .fu-kpi-icon  { background: linear-gradient(135deg, #FEE2E2, #FCA5A5); color: #B91C1C; }
  .fu-kpi-success .fu-kpi-icon { background: linear-gradient(135deg, #DCFCE7, #86EFAC); color: #166534; }
  .fu-kpi-blue .fu-kpi-icon    { background: linear-gradient(135deg, #DBEAFE, #93C5FD); color: #1D4ED8; }
  .fu-kpi-neutral .fu-kpi-icon { background: linear-gradient(135deg, #F3F4F6, #D1D5DB); color: #374151; }
  .fu-kpi-warning .fu-kpi-icon { background: linear-gradient(135deg, #FEF3C7, #FCD34D); color: #92400E; }
  .fu-kpi-purple .fu-kpi-icon  { background: linear-gradient(135deg, #EDE9FE, #C4B5FD); color: #6D28D9; }
  .fu-kpi-skeleton { height: 60px; border-radius: 8px; }
  .td-page #td-cards {
    grid-template-columns: repeat(auto-fill, minmax(168px, 178px));
    justify-content: start;
    align-items: stretch;
    gap: 9px;
  }
  .td-page #td-cards .fu-kpi {
    min-height: 58px;
    border-radius: 8px;
    padding: 8px 10px;
    background: #fff;
  }
  .td-page #td-cards .fu-kpi-icon {
    width: 27px;
    height: 27px;
    border-radius: 7px;
  }
  .td-page #td-cards .fu-kpi-value {
    font-size: 18px;
  }
  .td-page #td-cards .fu-kpi-label {
    font-size: 11px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .td-card-break {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    gap: 10px;
    color: #475569;
    font-size: 10px;
    font-weight: 850;
    text-transform: uppercase;
    letter-spacing: .06em;
    padding: 5px 2px 0;
  }
  .td-card-break::after {
    content: '';
    height: 1px;
    flex: 1;
    background: linear-gradient(90deg, #CBD5E1, transparent);
  }
  .td-card-break span {
    white-space: nowrap;
  }

  /* Segmented control tabs (36px) with inline filter toggle */
  .fu-tabs {
    display: flex; align-items: center; gap: 8px;
    border-bottom: 1px solid #E5E7EB; padding-bottom: 4px;
    flex-shrink: 0;
  }
  .fu-tabs-left {
    display: flex; align-items: center; gap: 4px;
    flex: 1 1 auto; min-width: 0; overflow-x: auto; scrollbar-width: thin;
  }
  .fu-tabs-left::-webkit-scrollbar { height: 4px; }
  .fu-tabs-left::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 2px; }
  .fu-tabs-right {
    display: flex; align-items: center; gap: 6px; flex-shrink: 0;
    padding-left: 6px; border-left: 1px solid #E5E7EB;
  }
  .fu-tabs-right .fu-filter-chips { max-width: 300px; overflow: hidden; flex-wrap: nowrap; }
  .fu-tab {
    height: 30px; border: 1px solid #E5E7EB; background: #fff; color: #475569;
    border-radius: 999px; padding: 0 12px; display: inline-flex; align-items: center;
    gap: 6px; cursor: pointer; font-size: 12px; font-weight: 700; white-space: nowrap;
    transition: all .15s; box-shadow: 0 1px 2px rgba(15,23,42,.04);
  }
  .fu-tab:hover { background: #F8FAFC; color: #1E293B; border-color: #CBD5E1; transform: translateY(-1px); }
  .fu-tab.active {
    background: linear-gradient(135deg, #6366F1, #4F46E5); color: #fff; border-color: #4338CA;
    box-shadow: 0 3px 8px rgba(99,102,241,.30);
  }
  .fu-tab.active svg { color: #fff; }
  .fu-tab-count {
    min-width: 16px; height: 16px; padding: 0 4px; border-radius: 999px;
    display: inline-flex; align-items: center; justify-content: center;
    background: #F1F5F9; color: #475569; font-size: 10px; font-weight: 800;
  }
  .fu-tab.active .fu-tab-count { background: rgba(255,255,255,.25); color: #fff; }

  /* Filter dropdown card — only visible when toggled */
  .fu-filter-bar {
    background: #fff; border: 1px solid #C7D2FE; border-radius: 10px;
    box-shadow: 0 8px 24px rgba(15,23,42,.10), 0 2px 6px rgba(15,23,42,.05);
    flex-shrink: 0; padding: 12px;
    animation: fuFilterSlide .18s ease-out;
  }
  @keyframes fuFilterSlide {
    from { opacity: 0; transform: translateY(-6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .fu-filter-card-grid {
    display: grid; gap: 8px;
    grid-template-columns: minmax(220px, 2fr) repeat(auto-fit, minmax(140px, 1fr));
    align-items: end;
  }
  .fu-filter-card-grid .fu-filter-clear-all { grid-column: -2 / -1; height: 32px; }
  .fu-search {
    height: 32px; display: flex; align-items: center; gap: 6px; padding: 0 10px;
    border: 1px solid #D1D5DB; border-radius: 7px; background: #fff;
  }
  .fu-search:focus-within { border-color: #818CF8; box-shadow: 0 0 0 3px rgba(129,140,248,.15); }
  .fu-search svg { color: #6B7280; flex-shrink: 0; }
  .fu-search input { border: none; outline: none; width: 100%; font-size: 12.5px; color: #111827; background: transparent; }
  .fu-filter-toggle {
    height: 30px; padding: 0 10px; border: 1px solid #D1D5DB; border-radius: 999px;
    background: #fff; color: #334155; display: inline-flex; align-items: center;
    gap: 5px; cursor: pointer; font-size: 12px; font-weight: 700; white-space: nowrap;
    box-shadow: 0 1px 2px rgba(15,23,42,.04); transition: all .15s;
  }
  .fu-filter-toggle:hover { background: #F8FAFC; border-color: #94A3B8; transform: translateY(-1px); }
  .fu-filter-toggle.open {
    background: linear-gradient(135deg, #6366F1, #4F46E5); color: #fff; border-color: #4338CA;
    box-shadow: 0 3px 8px rgba(99,102,241,.30);
  }
  .fu-filter-toggle.open svg { color: #fff; }
  .fu-filter-active-count {
    min-width: 18px; height: 18px; padding: 0 5px; border-radius: 999px;
    background: #EF4444; color: #fff; font-size: 10px; font-weight: 800;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .fu-filter-toggle.open .fu-filter-active-count { background: rgba(255,255,255,.25); }
  .fu-filter-clear-inline {
    height: 30px; padding: 0 10px; border: 1px solid transparent; border-radius: 999px;
    background: #FEF2F2; color: #B91C1C; cursor: pointer; font-size: 12px; font-weight: 700;
    display: inline-flex; align-items: center; gap: 4px;
  }
  .fu-filter-clear-inline:hover { background: #FEE2E2; }
  .fu-filter { display: flex; flex-direction: column; gap: 4px; color: #64748B; font-size: 10.5px; font-weight: 800; text-transform: uppercase; letter-spacing: .03em; }
  .fu-filter select, .fu-filter input {
    height: 32px; border: 1px solid #D1D5DB; border-radius: 7px;
    background: #fff; color: #111827; padding: 0 8px; font-size: 12px; font-weight: 500;
    text-transform: none; letter-spacing: 0;
  }
  .fu-filter-chips { display: inline-flex; align-items: center; gap: 5px; flex-wrap: nowrap; }
  .fu-filter-chip {
    border: none; background: #EEF2FF; color: #3730A3; border-radius: 999px;
    padding: 3px 8px; display: inline-flex; align-items: center; gap: 4px;
    font-size: 11px; font-weight: 700; cursor: pointer; white-space: nowrap;
    max-width: 140px; overflow: hidden; text-overflow: ellipsis;
  }
  .fu-filter-chip:hover { background: #E0E7FF; }

  /* Worklist card with sticky header + internal scrolling table */
  .fu-worklist-card {
    background: #fff; border: 1px solid #E5E7EB; border-radius: 10px;
    box-shadow: 0 2px 8px rgba(15,23,42,.05), 0 1px 3px rgba(15,23,42,.03);
    display: flex; flex-direction: column; flex: 1 1 auto; min-height: 0; overflow: hidden;
  }
  .fu-worklist-head {
    display: flex; align-items: center; justify-content: space-between; gap: 10px; flex-wrap: wrap;
    padding: 9px 14px; border-bottom: 1px solid #E5E7EB;
    background: linear-gradient(180deg, #FAFBFF 0%, #F4F6FB 100%);
    flex-shrink: 0; min-height: 46px;
  }
  .fu-worklist-head-left { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .fu-worklist-title { font-size: 13px; font-weight: 800; color: #111827; display: inline-flex; align-items: center; gap: 6px; }
  .fu-worklist-count {
    min-width: 22px; height: 18px; padding: 0 6px; border-radius: 999px;
    background: #F1F5F9; color: #334155; font-size: 11px; font-weight: 800;
    display: inline-flex; align-items: center; justify-content: center;
  }
  .fu-worklist-sub { font-size: 11px; color: #64748B; margin-top: 1px; }
  .fu-worklist-tools { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .fu-summary-pill {
    display: inline-flex; align-items: center; gap: 4px; min-height: 22px;
    padding: 2px 8px; border-radius: 999px; background: #F1F5F9;
    color: var(--md-text-secondary); font-size: 11px; font-weight: 700;
  }
  .fu-summary-pill.danger { background: #FEE2E2; color: #B91C1C; }
  .fu-summary-pill.success { background: #DCFCE7; color: #166534; }
  .fu-page-size { display: inline-flex; align-items: center; gap: 5px; color: #64748B; font-size: 11px; font-weight: 800; }
  .fu-page-size select { height: 28px; border: 1px solid #D1D5DB; border-radius: 7px; background: #fff; color: #111827; padding: 0 6px; font-size: 12px; }
  .fu-density-toggle { display: inline-flex; gap: 0; border: 1px solid #E5E7EB; border-radius: 7px; overflow: hidden; }
  .fu-density-toggle button {
    width: 28px; height: 28px; border: none; border-right: 1px solid #E5E7EB;
    background: #fff; color: #475569; display: inline-flex; align-items: center; justify-content: center; cursor: pointer;
  }
  .fu-density-toggle button:last-child { border-right: none; }
  .fu-density-toggle button.active { background: #EEF2FF; color: #3730A3; }
  .fu-density-toggle button:hover:not(.active) { background: #F8FAFC; color: #111827; }

  /* Table internal scroll — fills remaining height */
  .fu-table-scroll {
    flex: 1 1 auto; min-height: 0; overflow: auto;
    scrollbar-width: thin;
  }
  .fu-table-scroll::-webkit-scrollbar { width: 8px; height: 8px; }
  .fu-table-scroll::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 4px; }
  .fu-worklist-card .fu-table-wrap, .fu-worklist-card.table-wrap { box-shadow: none; border: none; border-radius: 0; }
  .fu-table { width: 100%; min-width: 1040px; border-collapse: separate; border-spacing: 0; font-size: 12px; }
  .fu-table th {
    position: sticky; top: 0; z-index: 2;
    background: linear-gradient(180deg, #F8FAFC, #EEF2F7);
    color: #475569; font-size: 10px; font-weight: 850; text-transform: uppercase;
    letter-spacing: .04em; padding: 9px 12px; border-bottom: 1px solid #E2E8F0;
    text-align: left;
    box-shadow: 0 1px 0 #E2E8F0;
  }
  .fu-table td { padding: 10px 12px; border-bottom: 1px solid #F1F5F9; vertical-align: middle; }

  /* Row density variants */
  .fu-density-comfortable .fu-table td { padding-top: 12px; padding-bottom: 12px; }
  .fu-density-compact .fu-table td { padding-top: 8px; padding-bottom: 8px; }
  .fu-density-ultra .fu-table { font-size: 11.5px; }
  .fu-density-ultra .fu-table th { padding: 6px 8px; font-size: 9.5px; }
  .fu-density-ultra .fu-table td { padding: 5px 8px; }
  .fu-density-ultra .fu-lead-sub, .fu-density-ultra .fu-date-sub { margin-top: 1px; font-size: 10.5px; }
  .fu-density-ultra .fu-due-date { font-size: 10px; }
  .fu-density-ultra .fu-discussion { -webkit-line-clamp: 1; max-width: 320px; padding: 2px 6px; }
  .fu-density-ultra .fu-icon-action { width: 26px; height: 26px; }
  .fu-density-ultra .fu-owner-avatar { width: 20px; height: 20px; font-size: 10px; }
  .fu-density-ultra .fu-stage-chip { padding: 2px 7px; font-size: 10.5px; }
  .fu-density-ultra .fu-due-cell { width: 110px; }

  .fu-row { transition: background .12s; }
  .fu-row:hover td { background: #F5F7FB; box-shadow: inset 0 0 0 9999px rgba(99,102,241,.03); }
  .fu-row-overdue td { background: #FFF7F7; }
  .fu-row-overdue:hover td { background: #FEECEC; }
  .fu-row-today td { background: #F0FDF4; }
  .fu-row-today:hover td { background: #DCFCE7; }
  .fu-due-cell { width: 122px; border-left: 4px solid transparent; white-space: nowrap; }
  .fu-due-overdue { background: linear-gradient(90deg, rgba(220,38,38,.08), transparent 90%); border-left-color: #DC2626; color: #B91C1C; }

  .fu-due-label { font-weight: 850; margin-bottom: 1px; font-size: 12px; letter-spacing: .02em; }
  .fu-due-date { font-size: 10.5px; opacity: .82; }
  .fu-date-done { display: inline-flex; align-items: center; gap: 5px; color: #166534; font-weight: 600; }

  .fu-stage-chip {

    white-space: nowrap; max-width: 160px; overflow: hidden; text-overflow: ellipsis;
  }
  .fu-source-chip {
    display: inline-flex; align-items: center; padding: 2px 9px; border-radius: 999px;
    background: linear-gradient(135deg, #FDF4FF, #F5D0FE); color: #86198F;
    font-size: 11px; font-weight: 700; border: 1px solid rgba(134,25,143,.12);
    white-space: nowrap; max-width: 140px; overflow: hidden; text-overflow: ellipsis;

  .fu-source-chip svg { flex-shrink: 0; }

    background: linear-gradient(135deg, #F8FAFC, #E2E8F0); color: #475569;

  .fu-source-cell {
    display: flex; flex-direction: column; align-items: flex-start; gap: 5px; min-width: 130px;

  .fu-source-portal {
    display: inline-flex; align-items: center; gap: 4px; max-width: 150px;
    color: #64748B; font-size: 10.5px; font-weight: 650;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .fu-source-portal svg { flex-shrink: 0; opacity: .72; }
  .fu-owner-cell { display: inline-flex; align-items: center; gap: 7px; min-width: 0; }
  .fu-owner-avatar {
    width: 24px; height: 24px; border-radius: 50%; flex-shrink: 0;

  .fu-owner-name { font-weight: 600; color: #1E293B; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 130px; }
  .fu-action-row { display: inline-flex; align-items: center; gap: 5px; white-space: nowrap; }
  .fu-icon-action {
    width: 28px; height: 28px; border: 1px solid #E5E7EB; border-radius: 7px;
    background: #fff; color: #475569; display: inline-flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all .12s; box-shadow: 0 1px 2px rgba(15,23,42,.04);
  }
  .fu-icon-action:hover { background: #F8FAFC; border-color: #CBD5E1; color: #111827; transform: translateY(-1px); box-shadow: 0 3px 6px rgba(15,23,42,.08); }
  .fu-icon-action.primary { background: linear-gradient(135deg, #3B82F6, #2563EB); border-color: #1D4ED8; color: #fff; box-shadow: 0 2px 4px rgba(37,99,235,.30); }
  .fu-icon-action.primary:hover { background: linear-gradient(135deg, #2563EB, #1D4ED8); color: #fff; box-shadow: 0 4px 10px rgba(37,99,235,.40); }
  .fu-icon-action.danger { color: #DC2626; }
  .fu-icon-action.danger:hover { background: #FEF2F2; border-color: #FECACA; color: #B91C1C; }
  .fu-pagination {
    display: flex; align-items: center; justify-content: space-between; gap: 10px; flex-wrap: wrap;

    min-width: 28px; height: 28px; border: 1px solid #E5E7EB; border-radius: 6px;

  .fu-page-ellipsis { min-width: 22px; text-align: center; color: #94A3B8; font-size: 12px; font-weight: 800; }

  /* ── Height-based responsive tuning ─────────────────────────────────────── */
  @media (max-height: 800px) {
    .fu-page { gap: 8px; }
    .fu-topbar { min-height: 40px; }
    .fu-hero-icon { width: 28px; height: 28px; border-radius: 7px; }
    .fu-hero-title { font-size: 15px; }
    .fu-hero-sub { font-size: 11px; }
    .fu-kpi { min-height: 56px; padding: 7px 9px; }
    .fu-kpi-skeleton { height: 56px; }
    .fu-kpi-icon { width: 26px; height: 26px; }
    .fu-kpi-value { font-size: 17px; }
    .fu-tab { height: 28px; font-size: 11.5px; padding: 0 9px; }
    .fu-filter-row { min-height: 44px; padding: 6px 10px; }
    .fu-worklist-head { min-height: 40px; padding: 6px 12px; }
  }
  @media (max-height: 700px) {
    .fu-page { gap: 6px; }
    .fu-hero-sub { display: none; }
    .fu-kpi { min-height: 50px; padding: 6px 8px; }
    .fu-kpi-skeleton { height: 50px; }
    .fu-kpi-icon { width: 24px; height: 24px; }
    .fu-kpi-value { font-size: 16px; }
    .fu-kpi-sub { display: none; }
    .fu-kpi-label { font-size: 10.5px; }
    .fu-tabs { padding-bottom: 3px; }
    .fu-tab { height: 26px; font-size: 11px; padding: 0 8px; }
    .fu-filter-row { padding: 5px 8px; min-height: 40px; }
    .fu-search, .fu-filter-toggle, .fu-filter-clear-inline { height: 28px; }
    .fu-worklist-head { min-height: 36px; padding: 5px 10px; }
    .fu-summary-pill { font-size: 10.5px; padding: 2px 7px; }
    .fu-table th { padding: 6px 9px; }
    .fu-table td { padding: 7px 9px; }
  }
  @media (max-width: 720px) {
    .fu-btn-text { display: none; }
    .fu-topbar-btn { padding: 0 8px; }
    .fu-hero-sub { display: none; }
    .fu-filter-chips { width: 100%; }
  }

  /* ── Today's Activity overrides — natural page flow (not fixed-height) ─── */
  .fu-page.td-page { height: auto; min-height: 0; }
  .fu-page.td-page #fu-body { display: block; flex: none; min-height: 0; }
  .fu-page.td-page .fu-worklist-card { display: flex; flex: none; min-height: 0; }
  .fu-page.td-page .fu-table-scroll { overflow-x: auto; max-height: none; }

  /* ── Lead Master — modern table cells ───────────────────────────────────── */
  .lead-co-name {
    font-weight: 700; color: #0F172A; font-size: 13px; line-height: 1.3;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 260px;
  }
  .lead-co-contact {
    font-size: 11.5px; color: #64748B; margin-top: 1px; font-weight: 500;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 260px;
  }
  .lead-desc {
    font-size: 12px; color: #4B5563; line-height: 1.4; max-width: 320px;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    cursor: help;
  }
  .lead-phone { font-size: 12.5px; color: #1E293B; font-weight: 600; letter-spacing: .01em; }
  .lead-city  { font-size: 12.5px; color: #1E293B; font-weight: 600; }
  .lead-state { font-size: 11px; color: #94A3B8; margin-top: 1px; font-weight: 500; }
  .lead-stage-chip {
    display: inline-flex; align-items: center; gap: 6px; padding: 3px 10px; border-radius: 999px;
    font-size: 11.5px; font-weight: 600; border: 1px solid transparent;
    max-width: 150px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .lead-stage-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .lead-stage-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .lead-pri-pill {
    display: inline-flex; align-items: center; gap: 4px; padding: 2px 9px; border-radius: 999px;
    font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em;
    border: 1px solid transparent;
  }
  .lead-pri-pill svg { width: 11px; height: 11px; }
  .lead-pri-hot  { background: #FEE2E2; color: #B91C1C; border-color: rgba(185,28,28,.15); }
  .lead-pri-warm { background: #FEF3C7; color: #92400E; border-color: rgba(146,64,14,.15); }
  .lead-pri-cold { background: #DBEAFE; color: #1D4ED8; border-color: rgba(29,78,216,.15); }
  .lead-pri-other{ background: #F3F4F6; color: #475569; }
  .lead-row-nbd .tabulator-cell { background: linear-gradient(90deg, rgba(167,139,250,.08), transparent 70%) !important; }
  .lead-row-final .tabulator-cell { background: linear-gradient(90deg, rgba(100,116,139,.06), transparent 70%) !important; }

  /* ── Lead Master — Tabulator inside worklist card ───────────────────────── */
  #leads-worklist #lead-table { border: none; background: transparent; font-size: 12.5px; }
  #leads-worklist .tabulator { border: none; background: transparent; }
  #leads-worklist .tabulator-header {
    background: linear-gradient(180deg, #F8FAFC, #EEF2F7) !important;
    border-bottom: 1px solid #E2E8F0;
    box-shadow: 0 1px 0 #E2E8F0;
  }
  #leads-worklist .tabulator-col {
    background: transparent !important; border-right: none !important;
    padding: 8px 12px;
  }
  #leads-worklist .tabulator-col-title {
    font-size: 10px !important; font-weight: 850 !important;
    color: #475569 !important; text-transform: uppercase; letter-spacing: .04em;
  }
  /* Hide bulky sort arrows by default; reveal only on hover or active sort */
  #leads-worklist .tabulator-col .tabulator-col-sorter { opacity: 0; transition: opacity .15s; }
  #leads-worklist .tabulator-col:hover .tabulator-col-sorter,
  #leads-worklist .tabulator-col.tabulator-sortable[aria-sort="ascending"] .tabulator-col-sorter,
  #leads-worklist .tabulator-col.tabulator-sortable[aria-sort="descending"] .tabulator-col-sorter { opacity: .8; }
  #leads-worklist .tabulator-col.tabulator-sortable:hover { background: rgba(99,102,241,.04) !important; cursor: pointer; }
  #leads-worklist .tabulator-row {
    cursor: pointer; border-bottom: 1px solid #F1F5F9; background: #fff;
    transition: background .12s;
  }
  #leads-worklist .tabulator-row.tabulator-row-even { background: #FAFBFD; }
  #leads-worklist .tabulator-cell {
    border-right: none !important; padding: 10px 12px !important;
    vertical-align: middle; font-size: 12.5px; color: #1E293B;
  }
  #leads-worklist .tabulator-row:hover .tabulator-cell { background: #EEF2FF !important; }
  #leads-worklist .tabulator-row .tabulator-cell:first-child { box-shadow: inset 3px 0 0 transparent; transition: box-shadow .12s; }
  #leads-worklist .tabulator-row:hover .tabulator-cell:first-child { box-shadow: inset 3px 0 0 #6366F1; }
  #leads-worklist .tabulator-footer {
    background: #FAFBFC; border-top: 1px solid #E5E7EB; padding: 6px 12px;
  }
  #leads-worklist .tabulator-paginator { display: flex; align-items: center; gap: 4px; font-size: 12px; color: #64748B; }
  #leads-worklist .tabulator-page {
    min-width: 28px; height: 28px; font-size: 11.5px; font-weight: 800; padding: 0 8px;
    border: 1px solid #E5E7EB; border-radius: 6px; background: #fff; color: #334155;
    margin: 0 2px; cursor: pointer;
  }
  #leads-worklist .tabulator-page:hover:not(:disabled) { background: #EEF2FF; color: #3730A3; border-color: #C7D2FE; }
  #leads-worklist .tabulator-page.active {

  #leads-worklist .tabulator-page-size {

    font-size: 12px; padding: 0 6px; color: #334155;

  .fu-density-ultra #leads-worklist .tabulator-cell { padding: 4px 10px !important; font-size: 11.5px; }
  .fu-density-comfortable #leads-worklist .tabulator-cell { padding: 10px 12px !important; }

  /* ── Today's Activity — chart cards ─────────────────────────────────────── */
  .td-charts {
    display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px;
    margin-bottom: 10px; flex-shrink: 0;
  }
  .td-chart-box {
    background: linear-gradient(180deg, #ffffff 0%, #FAFBFF 100%);
    border: 1px solid #E5E7EB; border-radius: 10px; padding: 10px 12px;
    box-shadow: 0 1px 3px rgba(15,23,42,.05);

  .td-chart-title {
    font-size: 11px; font-weight: 800; color: #475569; margin-bottom: 8px;
    text-transform: uppercase; letter-spacing: .04em;

  }

  .td-chart-canvas-wrap { position: relative; height: 160px; }
  .td-mode-badge {
    display: inline-flex; align-items: center; padding: 3px 9px; border-radius: 999px;
    font-size: 11px; font-weight: 700; border: 1px solid rgba(15,23,42,.08); white-space: nowrap;
  }
  .td-rate-pills {
    display: inline-flex; align-items: center; gap: 6px; flex-wrap: wrap;
  }
  .td-rate-pill {
    height: 30px; display: inline-flex; align-items: center; gap: 5px;
    padding: 0 10px; border-radius: 999px; border: 1px solid transparent;
    font-size: 11.5px; font-weight: 800; white-space: nowrap;
    box-shadow: 0 1px 2px rgba(15,23,42,.04);
  }
  .td-rate-pill-blue { background: #DBEAFE; color: #1D4ED8; border-color: #BFDBFE; }
  .td-rate-pill-green { background: #DCFCE7; color: #166534; border-color: #BBF7D0; }
  .td-rate-pill svg { width: 12px; height: 12px; flex-shrink: 0; }
  @media (max-width: 1100px) { .td-charts { grid-template-columns: 1fr 1fr; } }
  @media (max-width: 760px)  { .td-charts { grid-template-columns: 1fr; } }
  @media (max-height: 800px) {
    .td-chart-canvas-wrap { height: 140px; }
    .td-chart-box { padding: 8px 10px; }
  }
  @media (max-height: 700px) {
    .td-chart-canvas-wrap { height: 120px; }
    .td-charts { gap: 8px; margin-bottom: 8px; }

  /* ════════ Vela skin for the Follow-ups page ════════
     Scoped under .fu-page so it overrides the base theme above without touching
     the Today page (.td-page) or history/lead drawers that reuse these class names. */
  .fu-page {
    font-family: 'Manrope', system-ui, sans-serif;
    background: radial-gradient(1200px 600px at 80% -10%, #efeafe 0%, transparent 55%), #f5f6fb;
    gap: 16px;
  }
  .fu-page .fu-hero-icon {
    width: 44px; height: 44px; border-radius: 13px;
    background: linear-gradient(135deg, var(--brand), var(--brand-3)); color: #fff;
    box-shadow: 0 10px 24px -8px color-mix(in srgb,var(--brand) 60%,transparent);
  }
  .fu-page .fu-hero-icon svg { width: 21px; height: 21px; }
  .fu-page .fu-hero-title {
    font-family: 'Space Grotesk', sans-serif; font-size: 22px; font-weight: 700;
    color: #161427; -webkit-text-fill-color: #161427; background: none; letter-spacing: -.6px;
  }
  .fu-page .fu-hero-sub { font-size: 13px; color: #6f6c84; }

  /* Topbar buttons */
  .fu-page .fu-topbar-btn { height: 40px; border-radius: 11px; font-size: 13.5px; font-weight: 700; }
  .fu-page .fu-topbar-btn.btn-outlined { border: 1px solid #e3e2ee; background: #fff; color: #2a2840; }
  .fu-page .fu-topbar-btn.btn-outlined:hover { border-color: #c7c5db; background: #faf9fe; transform: translateY(-1px); }
  .fu-page .fu-topbar-btn.btn-primary {
    border: none; color: #fff; background: linear-gradient(120deg, var(--brand), var(--brand-2) 55%, var(--brand-3));
    box-shadow: 0 10px 24px -8px color-mix(in srgb,var(--brand) 60%,transparent);
  }
  .fu-page .fu-topbar-btn.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 16px 30px -8px color-mix(in srgb,var(--brand) 70%,transparent); }

  /* KPI cards — big value top-left, colored icon square top-right, colored left border */
  .fu-page .fu-kpis { display: flex; flex-wrap: nowrap; overflow-x: auto; gap: 14px; padding-bottom: 4px; }
  .fu-page .fu-kpis::-webkit-scrollbar { height: 7px; }
  .fu-page .fu-kpis::-webkit-scrollbar-thumb { background: #d9d8e6; border-radius: 7px; }
  /* Today / Activity keeps the original wrapping grid (not the one-line strip) */
  .fu-page.td-page .fu-kpis { display: grid; grid-template-columns: repeat(auto-fit, minmax(165px, 1fr)); overflow-x: visible; gap: 14px; padding-bottom: 0; }
  .fu-page.td-page .fu-kpi { flex: initial; }
  .fu-page .fu-kpi {
    flex: 1 0 165px; display: block; position: relative; min-height: 0;
    background: #fff; border: 1px solid #ecebf4; border-left-width: 3px;
    border-radius: 15px; padding: 15px 16px; text-align: left;
    box-shadow: 0 4px 14px -10px rgba(40,30,80,.5);
  }
  .fu-page .fu-kpi::before { display: none; }
  .fu-page .fu-kpi:hover { transform: translateY(-2px); border-color: #ecebf4; box-shadow: 0 12px 26px -12px rgba(40,30,80,.45); }
  .fu-page .fu-kpi.active { border-color: #ecebf4; box-shadow: 0 0 0 2px color-mix(in srgb,var(--brand) 35%,transparent) inset, 0 8px 20px -10px color-mix(in srgb,var(--brand) 40%,transparent); }
  .fu-page .fu-kpi-danger  { border-left-color: #ef4444; }
  .fu-page .fu-kpi-success { border-left-color: #16a34a; }
  .fu-page .fu-kpi-blue    { border-left-color: #2563eb; }
  .fu-page .fu-kpi-neutral { border-left-color: #64748b; }
  .fu-page .fu-kpi-warning { border-left-color: #d97706; }
  .fu-page .fu-kpi-purple  { border-left-color: #7c3aed; }
  .fu-page .fu-kpi-value {
    display: block; font-family: 'Space Grotesk', sans-serif; font-size: 25px;
    font-weight: 700; color: #161427; letter-spacing: -.8px; line-height: 1; padding-right: 42px;
  }
  .fu-page .fu-kpi-label { display: block; margin-top: 11px; font-size: 13px; font-weight: 700; color: #2c2a40; }
  .fu-page .fu-kpi-sub { display: block; margin-top: 2px; font-size: 11.5px; color: #918fa5; }
  .fu-page .fu-kpi-icon { position: absolute; top: 14px; right: 14px; width: 32px; height: 32px; border-radius: 9px; box-shadow: none; }
  .fu-page .fu-kpi-danger  .fu-kpi-icon { background: #fdeaea; color: #ef4444; }
  .fu-page .fu-kpi-success .fu-kpi-icon { background: #e8f7ee; color: #16a34a; }
  .fu-page .fu-kpi-blue    .fu-kpi-icon { background: #e8f0fe; color: #2563eb; }
  .fu-page .fu-kpi-neutral .fu-kpi-icon { background: #eef1f5; color: #64748b; }
  .fu-page .fu-kpi-warning .fu-kpi-icon { background: #fdf2e3; color: #d97706; }
  .fu-page .fu-kpi-purple  .fu-kpi-icon { background: #f1eafe; color: #7c3aed; }

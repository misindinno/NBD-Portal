<script>
function _ensureConfigUserHelpers() {
  if (!window.USER_MODULES) {
    const isLq = String(typeof APP_TITLE !== 'undefined' ? APP_TITLE : '').toLowerCase().includes('lq');
    window.USER_MODULES = ['Dashboard','Leads','Pipeline','Followups','Reports','Config','Users','LeadForm'].concat(isLq ? ['BulkEntry'] : []);
  }
  if (!window.USER_ROLE_MODULES) {
    const lqExtra = window.USER_MODULES.includes('BulkEntry') ? ['BulkEntry'] : [];
    window.USER_ROLE_MODULES = {
      ADMIN:   ['Dashboard','Leads','Pipeline','Followups','Reports','Config','Users'].concat(lqExtra),
      MANAGER: ['Dashboard','Leads','Pipeline','Followups','Reports'],
      SALES:   ['Dashboard','Leads','Pipeline','Followups'],
      USER:    ['Dashboard','Followups'],
      VIEWER:  ['Dashboard','Leads','Pipeline','Followups','Reports']
    };
  }
  if (!window._parseDepartmentList) window._parseDepartmentList = value => {
    const list = Array.isArray(value) ? value : String(value || '').split(',');
    return list.map(v => String(v || '').trim()).filter(Boolean).filter((v, i, arr) => arr.indexOf(v) === i);
  };
  if (!window._sheetTruthy) window._sheetTruthy = (value, defaultValue = false) => {
    if (value === undefined || value === null || value === '') return defaultValue;
    if (value === true) return true;
    return ['TRUE','YES','1'].includes(String(value).trim().toUpperCase());
  };
  if (!window._userPermission) window._userPermission = user => {
    const text = String((user || {})['Permission'] || (user || {})['Role'] || 'USER').trim().toUpperCase();
    if (window.USER_ROLE_MODULES[text]) return text;
    if (text.includes('ADMIN')) return 'ADMIN';
    if (text.includes('MANAGER')) return 'MANAGER';
    if (text.includes('SALES')) return 'SALES';
    if (text.includes('VIEWER')) return 'VIEWER';
    return 'USER';
  };
  if (!window._canonicalUserModule) window._canonicalUserModule = value => {
    const target = String(value || '').toLowerCase().replace(/[^a-z0-9]/g, '');
    return window.USER_MODULES.find(m => m.toLowerCase().replace(/[^a-z0-9]/g, '') === target) || '';
  };
  if (!window._parseUserModules) window._parseUserModules = value =>
    String(value || '').split(',').map(v => window._canonicalUserModule(v)).filter(Boolean).filter((m, i, arr) => arr.indexOf(m) === i);
  if (!window._effectiveUserModules) window._effectiveUserModules = user => {
    const role = window._userPermission(user || {});
    if (String((user || {})['Allowed Modules'] || '').trim().toUpperCase() === 'NONE') return [];
    const modules = window._parseUserModules((user || {})['Allowed Modules']);
    return modules.length ? modules : (window.USER_ROLE_MODULES[role] || window.USER_ROLE_MODULES.USER).slice();
  };
  if (!window._moduleLabel) window._moduleLabel = moduleName => {
    if (moduleName === 'Followups') return 'Follow-ups';
    if (moduleName === 'LeadForm') return 'Lead Form';
    if (moduleName === 'BulkEntry') return 'Bulk Entry';
    return moduleName;
  };
  if (!window._userModuleBadges) window._userModuleBadges = user => `<div style="display:flex;flex-wrap:wrap;gap:4px">
    ${window._effectiveUserModules(user).map(m => `<span class="badge" style="background:#F5F5F5;color:#555">${escapeHtml(window._moduleLabel(m))}</span>`).join('')}
  </div>`;
  if (!window._userCanEditConfig) window._userCanEditConfig = user => {
    const role = window._userPermission(user || {});
    return role === 'ADMIN' || window._sheetTruthy((user || {})['Can Edit Config'], false) || window._effectiveUserModules(user || {}).includes('Config');
  };
  if (!window._userCanManageUsers) window._userCanManageUsers = user => {
    const role = window._userPermission(user || {});
    return role === 'ADMIN' || window._effectiveUserModules(user || {}).includes('Users');
  };
  if (!window._syncConfigPermission) window._syncConfigPermission = (form, sourceIsConfigCheckbox = false) => {
    if (!form) return;
    const configModule = Array.from(form.querySelectorAll('[name="Allowed Modules"]')).find(input => input.value === 'Config');
    const configPermission = form.querySelector('[name="Can Edit Config"]');
    if (!configModule || !configPermission) return;
    if (sourceIsConfigCheckbox) configModule.checked = configPermission.checked;
    if (configModule.checked) configPermission.checked = true;
  };
  if (!window._applyRoleModuleDefaults) window._applyRoleModuleDefaults = form => {
    const role = form?.querySelector('[name="Permission"]')?.value || 'USER';
    const defaults = window.USER_ROLE_MODULES[role] || window.USER_ROLE_MODULES.USER;
    form?.querySelectorAll('[name="Allowed Modules"]').forEach(input => { input.checked = defaults.includes(input.value); });
    const config = form?.querySelector('[name="Can Edit Config"]');
    if (config) config.checked = defaults.includes('Config') || role === 'ADMIN';
    window._syncConfigPermission(form);
  };
  if (!window._setAllUserModules) window._setAllUserModules = (form, checked) => {
    form?.querySelectorAll('[name="Allowed Modules"]').forEach(input => { input.checked = checked; });
    const config = form?.querySelector('[name="Can Edit Config"]');
    if (config) config.checked = checked;
    window._syncConfigPermission(form);
  };
  if (!window._togglePwVisibility) window._togglePwVisibility = btn => {
    const input = btn.parentElement.querySelector('input');
    if (!input) return;
    const show = input.type === 'password';
    input.type = show ? 'text' : 'password';
    btn.querySelector('.pw-eye-on').style.display = show ? 'none' : '';
    btn.querySelector('.pw-eye-off').style.display = show ? '' : 'none';
  };
  if (!window._togglePasswordSection) window._togglePasswordSection = btn => {
    const section = btn.closest('.card').querySelector('#pw-section');
    if (!section) return;
    const visible = section.style.display !== 'none';
    section.style.display = visible ? 'none' : '';
    btn.textContent = visible ? 'Set New Password' : 'Cancel';
  };
}

async function loadUsersConfig() {
  _ensureConfigUserHelpers();
  if (!el('cfg-users')) return;
  el('cfg-users').innerHTML = skeletonPage('table');
  const allUsers = await api.getUsers();
  const selectedDepartments = window._parseDepartmentList(App.config.settings?.visibleDepartments || []);
  const selectedMap = selectedDepartments.reduce((m, d) => {
    m[String(d || '').trim().toLowerCase()] = true;
    return m;
  }, {});
  const users = selectedDepartments.length
    ? allUsers.filter(u => selectedMap[String(u['Department'] || '').trim().toLowerCase()])
    : allUsers;
  el('cfg-users').innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <p style="color:#666;font-size:13px">Manage user roles and modules for this portal${App.user?.portalKey ? ' (' + escapeHtml(App.user.portalKey) + ')' : ''}. Identity details stay shared.</p>
      <button class="btn btn-primary btn-sm" onclick="openUserForm()">${icon('plus', 14)} Add User</button>
    </div>
    <div class="table-wrap"><table>
      <thead><tr><th>Name</th><th>Email</th><th>Permission</th><th>Modules</th><th>Config</th><th>Users</th><th>Active</th><th></th></tr></thead>
      <tbody>${users.map(u => `<tr>
        <td><b>${escapeHtml(u['Name']||'')}</b><div style="font-size:11px;color:#888">${escapeHtml(u['Job Title']||u['Department']||'')}</div></td>
        <td>${escapeHtml(u['Email Address']||'')}</td>
        <td><span class="badge" style="background:#E3F2FD;color:#1565C0">${escapeHtml(window._userPermission(u))}</span></td>
        <td>${window._userModuleBadges(u)}</td>
        <td>${window._userCanEditConfig(u) ? 'Yes' : 'No'}</td>
        <td>${window._userCanManageUsers(u) ? 'Yes' : 'No'}</td>
        <td>${window._sheetTruthy(u['Is Active'], true) ? 'Yes' : 'No'}</td>
        <td><button class="btn btn-sm btn-outlined" onclick="openUserForm(${JSON.stringify(u).replace(/"/g,'&quot;')})">Edit</button></td>
      </tr>`).join('')}</tbody>
    </table></div>`;
  renderIcons(el('cfg-users'));
}

function openUserForm(data = {}) {
  _ensureConfigUserHelpers();
  const isEdit = !!(data['ID'] || data['User ID'] || data['Email Address']);
  const permission = window._userPermission(data);
  const selectedModules = window._effectiveUserModules(data);
  const canEditConfig = window._userCanEditConfig(data);
  const overlay = showModal(`
    <div class="modal-header">
      <h2>${isEdit ? 'Edit' : 'Add'} User</h2>
      <button class="modal-close" onclick="this.closest('.modal-overlay').remove()">✕</button>
    </div>
    <form id="user-form">
      <div class="form-row">
        <div class="form-group"><label>Name *</label>
          <input class="form-control" name="Name" value="${escapeHtml(data['Name']||'')}" required></div>
        <div class="form-group"><label>Email *</label>
          <input class="form-control" name="Email Address" type="email" value="${escapeHtml(data['Email Address']||'')}" required></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Job Title</label>
          <input class="form-control" name="Job Title" value="${escapeHtml(data['Job Title']||'')}"></div>
        <div class="form-group"><label>Department</label>
          <input class="form-control" name="Department" value="${escapeHtml(data['Department']||'')}"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Company Phone</label>
          <input class="form-control" name="Company Phone" value="${escapeHtml(data['Company Phone']||'')}"></div>
        <div class="form-group"><label>Permission *</label>
          <select class="form-control" name="Permission" required onchange="_applyRoleModuleDefaults(this.closest('form'))">
            ${Object.keys(window.USER_ROLE_MODULES || {}).map(r => `<option ${permission===r?'selected':''}>${r}</option>`).join('')}
          </select></div>
      </div>
      <div class="form-group"><label>Title (Display Name)</label>
        <input class="form-control" name="Title" value="${escapeHtml(data['Title']||'')}"></div>
      <div class="card" style="margin:12px 0;padding:14px;background:#F8F9FA;border:1px solid #E0E0E0">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:${isEdit?'0':'10px'}">
          <div style="font-weight:600;font-size:13px">${isEdit ? 'Change Password' : 'Set Password'}</div>
          ${isEdit ? `<button type="button" class="btn btn-sm btn-outlined" onclick="_togglePasswordSection(this)">Set New Password</button>` : ''}
        </div>
        <div id="pw-section" style="${isEdit ? 'display:none' : ''}">
          <div style="${isEdit ? 'margin-top:10px' : ''}">
            <div class="form-row">
              <div class="form-group">
                <label>${isEdit ? 'New Password' : 'Password'}</label>
                <div style="position:relative">
                  <input class="form-control" name="Password" type="password" autocomplete="new-password" placeholder="${isEdit ? 'Leave blank to keep current' : 'Min 6 characters'}" style="padding-right:36px">
                  <button type="button" onclick="_togglePwVisibility(this)" tabindex="-1" style="position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;padding:0;color:#888;display:flex;align-items:center">
                    <svg class="pw-eye-on" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
                    <svg class="pw-eye-off" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" y1="2" x2="22" y2="22"/></svg>
                  </button>
                </div>
              </div>
              <div class="form-group">
                <label>Confirm Password</label>
                <div style="position:relative">
                  <input class="form-control" name="Password Confirm" type="password" autocomplete="new-password" placeholder="Re-enter password" style="padding-right:36px">
                  <button type="button" onclick="_togglePwVisibility(this)" tabindex="-1" style="position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;padding:0;color:#888;display:flex;align-items:center">
                    <svg class="pw-eye-on" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
                    <svg class="pw-eye-off" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" y1="2" x2="22" y2="22"/></svg>
                  </button>
                </div>
              </div>
            </div>
            <div id="pw-match-err" style="display:none;color:#D32F2F;font-size:12px;margin-top:-8px;margin-bottom:8px">Passwords do not match.</div>
            ${isEdit ? '' : '<div style="font-size:11px;color:#888">Leave blank to allow login via Google SSO only.</div>'}
          </div>
        </div>
      </div>
      <div class="card" style="margin:12px 0;padding:14px">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;gap:12px;flex-wrap:wrap">
          <div style="font-weight:600;font-size:13px">Module Access</div>
          <div style="display:flex;gap:6px;flex-wrap:wrap">
            <button type="button" class="btn btn-sm btn-outlined" onclick="_applyRoleModuleDefaults(this.closest('form'))">Permission Defaults</button>
            <button type="button" class="btn btn-sm btn-outlined" onclick="_setAllUserModules(this.closest('form'), true)">All</button>
            <button type="button" class="btn btn-sm btn-outlined" onclick="_setAllUserModules(this.closest('form'), false)">None</button>
          </div>
        </div>
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(145px,1fr));gap:8px">
          ${(window.USER_MODULES || []).map(m => `<label style="display:flex;align-items:center;gap:8px;font-size:13px">
            <input type="checkbox" name="Allowed Modules" value="${escapeHtml(m)}" ${selectedModules.includes(m)?'checked':''} onchange="_syncConfigPermission(this.closest('form'))">
            ${escapeHtml(window._moduleLabel(m))}
          </label>`).join('')}
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label><input type="checkbox" name="Can Edit Config" ${canEditConfig?'checked':''} onchange="_syncConfigPermission(this.closest('form'), true)"> Can Edit Config</label>
          <div style="font-size:11px;color:#777;margin-top:3px">Allows stages, dropdowns, and custom-field setup.</div>
        </div>
        <div class="form-group">
          <label><input type="checkbox" name="Is Active" ${window._sheetTruthy(data['Is Active'], true)?'checked':''}> Is Active</label>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-outlined" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
        <button type="submit" class="btn btn-primary">Save</button>
      </div>
    </form>`);
  window._syncConfigPermission(overlay.querySelector('#user-form'), true);
  overlay.querySelector('#user-form').addEventListener('submit', async e => {
    e.preventDefault();
    const fd = new FormData(e.target);
    const modules = fd.getAll('Allowed Modules');
    const payload = {
      'Name': fd.get('Name'),
      'Email Address': fd.get('Email Address'),
      'Job Title': fd.get('Job Title'),
      'Department': fd.get('Department'),
      'Company Phone': fd.get('Company Phone'),
      'Permission': fd.get('Permission'),
      'Title': fd.get('Title'),
      'Allowed Modules': modules.length ? modules.join(',') : 'NONE',
      'Can Edit Config': fd.has('Can Edit Config'),
      'Is Active': fd.has('Is Active')
    };
    if (isEdit) {
      payload['ID'] = data['ID'] || data['User ID'] || '';
      payload['_Original Email Address'] = data['Email Address'] || '';
    }
    const btn = e.target.querySelector('[type=submit]');
    setButtonLoading(btn);
    const pw = fd.get('Password') || '';
    const pwConfirm = fd.get('Password Confirm') || '';
    if (pw && pw !== pwConfirm) {
      const errEl = e.target.querySelector('#pw-match-err');
      if (errEl) errEl.style.display = 'block';
      resetButtonLoading(btn);
      return;
    }
    if (pw) payload['Password'] = pw;
    try {
      await api.saveUser(payload);
      await _refreshAppConfig().catch(() => {});
      overlay.remove();
      toast('User saved!');
      renderSidebar();
      if (App.currentPage === 'config' && canNavigate('config')) await loadConfig();
    } catch (err) {
      resetButtonLoading(btn);
      toast('Save failed: ' + (err.message || err), 'error');
    }
    return;
    toast('Saving user…', 'info');
  });
}

window.loadUsersConfig = loadUsersConfig;
window.openUserForm = openUserForm;
</script>

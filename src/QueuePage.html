<script>
// Queue operations page

let _queuePageRefreshTimer = null;
let _qpAdminFilter = '';
let _qpAllUserEmails = [];
let _qpJobs = [];
let _qpAdminJobs = [];
let _qpHealth = null;
let _qpBulkQueue = null;
let _qpLastRefreshAt = null;
let _qpAutoRefresh = true;
let _qpFilters = { status: '', module: '', query: '' };
let _qpPage = 1;
let _qpPageSize = 25;

async function loadQueuePage() {
  _stopQueuePageRefresh();
  _qpAdminFilter = '';
  _qpAllUserEmails = [];
  _qpJobs = [];
  _qpAdminJobs = [];
  _qpHealth = null;
  _qpBulkQueue = null;
  _qpLastRefreshAt = null;
  _qpAutoRefresh = true;
  _qpFilters = { status: '', module: '', query: '' };
  _qpPage = 1;
  _qpPageSize = 25;
  el('content').innerHTML = _queuePageShell();
  renderIcons(el('content'));
  await _refreshQueuePage();
}

function _qpIsAdmin() {
  return App.user && App.user.role === 'ADMIN';
}

function _queuePageShell() {
  const isAdmin = _qpIsAdmin();
  return `
  <div class="qp-page">
    <div class="qp-header">
      <div>
        <div class="qp-title-row">
          <span class="qp-title-icon">${icon('list-checks', 18)}</span>
          <div>
            <div class="qp-title">Write Queue</div>
            <div class="qp-subtitle">${isAdmin ? 'Background save operations across users' : 'Your background save operations'}</div>
          </div>
        </div>
      </div>
      <div class="qp-header-actions">
        ${isAdmin ? `<button class="btn btn-outlined btn-sm" onclick="_qpProcessNow()" id="qp-process-btn">${icon('zap', 14)} Process now</button>` : ''}
        <button class="btn btn-outlined btn-sm" onclick="_qpToggleAutoRefresh()" id="qp-auto-btn">${icon('pause-circle', 14)} Live on</button>
        <button class="btn btn-primary btn-sm" onclick="_refreshQueuePage(true)" id="qp-refresh-btn">${icon('refresh-cw', 14)} Refresh</button>
      </div>
    </div>

    <div id="qp-health">${_queueHealthSkeleton()}</div>
    <div id="qp-stats" class="qp-stats">${_queueStatsSkeleton()}</div>
    <div id="qp-filters">${_queueFilterSkeleton()}</div>
    <div id="qp-bulk">${_bulkQueuePageSkeleton()}</div>
    <div id="qp-body">${_queuePageSkeleton()}</div>
  </div>`;
}

function _queueHealthSkeleton() {
  return `<div class="qp-health-card qp-skeleton-card">
    <div class="skeleton-line w-40"></div>
    <div class="qp-health-grid">
      ${Array.from({ length: 4 }, () => '<div class="skeleton-block" style="height:58px"></div>').join('')}
    </div>
  </div>`;
}

function _queueStatsSkeleton() {
  return Array.from({ length: 5 }, () => '<div class="skeleton-block qp-stat-skeleton"></div>').join('');
}

function _queueFilterSkeleton() {
  return `<div class="qp-filterbar">
    <div class="skeleton-line w-40"></div>
    <div class="skeleton-pill"></div>
    <div class="skeleton-pill"></div>
  </div>`;
}

function _queuePageSkeleton() {
  return `<div class="qp-table-card skeleton-table">
    <div class="skeleton-row"></div>
    ${Array.from({ length: 8 }, () => '<div class="skeleton-row"></div>').join('')}
  </div>`;
}

function _bulkQueuePageSkeleton() {
  return `<div class="qp-table-card skeleton-table">
    <div class="skeleton-row"></div>
    ${Array.from({ length: 3 }, () => '<div class="skeleton-row"></div>').join('')}
  </div>`;
}

function _qpToggleAutoRefresh() {
  _qpAutoRefresh = !_qpAutoRefresh;
  const btn = el('qp-auto-btn');
  if (btn) btn.innerHTML = _qpAutoRefresh
    ? `${icon('pause-circle', 14)} Live on`
    : `${icon('play-circle', 14)} Live off`;
  renderIcons(btn);
  if (_qpAutoRefresh) _scheduleQueuePageRefresh();
  else _stopQueuePageRefresh();
}

function _qpOnUserFilterChange(email) {
  _qpAdminFilter = email || '';
  _qpPage = 1;
  if (_qpIsAdmin() && _qpAdminJobs.length) {
    _qpJobs = _qpApplyUserFilter(_qpAdminJobs);
    _renderQueueStats(_qpJobs);
    _renderQueueFilters(_qpJobs, true);
    _renderBulkQueuePage(_qpBulkQueue);
    _renderQueuePage(_qpJobs, true);
    _qpRefreshHealthOnly();
    return;
  }
  _refreshQueuePage();
}

function _qpOnFilterChange(key, value) {
  _qpFilters[key] = value || '';
  _qpPage = 1;
  _renderQueuePage(_qpJobs, _qpIsAdmin());
}

function _qpOnPageSizeChange(value) {
  _qpPageSize = Math.max(10, Number(value) || 25);
  _qpPage = 1;
  _renderQueuePage(_qpJobs, _qpIsAdmin());
}

function _qpSetPage(page) {
  _qpPage = Math.max(1, Number(page) || 1);
  _renderQueuePage(_qpJobs, _qpIsAdmin());
}

async function _refreshQueuePage(showSpinner = false) {
  const refreshBtn = el('qp-refresh-btn');
  if (showSpinner && refreshBtn) refreshBtn.classList.add('spinning');
  _stopQueuePageRefresh();

  try {
    let serverJobs = [];
    let displayJobs = [];
    const isAdmin = _qpIsAdmin();

    if (isAdmin) {
      try { serverJobs = await api.getAllQueueHistory('', 500); } catch (e) { console.warn('[QueuePage] Admin history load failed', e); }
      try { _qpHealth = await api.getQueueHealth(_qpAdminFilter); } catch (e) { console.warn('[QueuePage] Health load failed', e); _qpHealth = null; }
      try { _qpBulkQueue = await api.getBulkQueueSummary(100); } catch (e) { console.warn('[QueuePage] Bulk queue load failed', e); _qpBulkQueue = null; }
      _qpAdminJobs = serverJobs;
      _qpAllUserEmails = [...new Set(serverJobs.map(j => j.userEmail).filter(Boolean))].sort();
      displayJobs = _qpApplyUserFilter(serverJobs);
    } else {
      const localJobs = QueueManager.getAllJobs();
      try { serverJobs = await api.getQueueHistory(150); } catch (e) { console.warn('[QueuePage] History load failed', e); }
      try { _qpHealth = await api.getQueueHealth(); } catch (e) { console.warn('[QueuePage] Health load failed', e); _qpHealth = null; }
      try { _qpBulkQueue = await api.getBulkQueueSummary(100); } catch (e) { _qpBulkQueue = null; }
      displayJobs = _mergeQueueJobs(localJobs, serverJobs);
    }

    _qpJobs = displayJobs;
    _qpLastRefreshAt = new Date();
    _renderQueueHealth(_qpHealth);
    _renderQueueStats(displayJobs);
    _renderQueueFilters(displayJobs, isAdmin);
    _renderBulkQueuePage(_qpBulkQueue);
    _renderQueuePage(displayJobs, isAdmin);

    const hasPending = displayJobs.some(j => _qpIsLiveStatus(j.status));
    if (_qpAutoRefresh && hasPending) _scheduleQueuePageRefresh();
  } catch (err) {
    const body = el('qp-body');
    if (body) body.innerHTML = `<div class="qp-error-card">${escapeHtml(String(err.message || err))}</div>`;
  } finally {
    if (refreshBtn) refreshBtn.classList.remove('spinning');
  }
}

async function _qpRefreshHealthOnly() {
  try {
    _qpHealth = await api.getQueueHealth(_qpAdminFilter);
    _renderQueueHealth(_qpHealth);
  } catch (e) {
    console.warn('[QueuePage] Health refresh failed', e);
  }
}

async function _qpProcessNow() {
  const btn = el('qp-process-btn');
  if (btn) btn.disabled = true;
  try {
    await api.processQueueNow();
    toast('Queue processing started.', 'success');
    await _refreshQueuePage(true);
  } catch (e) {
    toast(e.message || String(e), 'error');
  } finally {
    if (btn) btn.disabled = false;
  }
}

async function _qpRetryJob(requestId) {
  if (!requestId) return;
  try {
    await api.retryQueueJob(requestId);
    toast('Job queued for retry.', 'success');
    await _refreshQueuePage(true);
  } catch (e) {
    toast(e.message || String(e), 'error');
  }
}

function _renderQueueHealth(health) {
  const box = el('qp-health');
  if (!box) return;
  if (!health) {
    box.innerHTML = `<div class="qp-health-card qp-health-error">
      <div class="qp-health-main">
        <span class="q-badge q-dead">Health unavailable</span>
        <span>Check deployment, API permissions, or queue trigger access.</span>
      </div>
    </div>`;
    return;
  }

  const s = health.stats || {};
  const triggerOk = !!health.triggerActive;
  const pendingAge = s.oldestPendingMinutes === null || s.oldestPendingMinutes === undefined
    ? 'None'
    : `${s.oldestPendingMinutes} min`;
  const scopeLabel = s.scope === 'admin' ? 'All users' : s.scope === 'filtered' ? 'Filtered user' : 'My queue';
  const lastWorker = health.lastFinishedAt || health.lastStartedAt || 'Never';
  const lastRunMeta = `${health.lastStatus || 'Unknown'} / claimed ${health.lastClaimed || 0}, processed ${health.lastProcessed || 0}`;

  box.innerHTML = `
    <div class="qp-health-card">
      <div class="qp-health-top">
        <div class="qp-health-main">
          <span class="q-badge ${triggerOk ? 'q-done' : 'q-dead'}">${triggerOk ? 'Trigger active' : 'Trigger missing'}</span>
          <span class="qp-muted">${escapeHtml(health.triggerStatus || '')}</span>
        </div>
        <div class="qp-last-refresh">Last refresh: ${_qpLastRefreshAt ? escapeHtml(_qpFmtDate(_qpLastRefreshAt)) : 'Never'}</div>
      </div>
      <div class="qp-health-grid">
        ${_qpHealthMetric('Scope', scopeLabel, 'users')}
        ${_qpHealthMetric('Last worker', lastWorker, 'clock')}
        ${_qpHealthMetric('Worker result', lastRunMeta, 'activity')}
        ${_qpHealthMetric('Oldest pending', pendingAge, 'timer')}
      </div>
      ${health.lastError ? `<div class="qp-health-error-line">${escapeHtml(health.lastError)}</div>` : ''}
    </div>`;
  renderIcons(box);
}

function _qpHealthMetric(label, value, iconName) {
  return `<div class="qp-health-metric">
    <div class="qp-health-metric-icon">${icon(iconName, 15)}</div>
    <div>
      <div class="qp-health-label">${escapeHtml(label)}</div>
      <div class="qp-health-value">${escapeHtml(value)}</div>
    </div>
  </div>`;
}

function _renderQueueStats(jobs) {
  const statsEl = el('qp-stats');
  if (!statsEl) return;
  const stats = _queueStats(jobs);
  const cards = [
    { key: 'total', label: 'Total', value: stats.total, cls: 'neutral', icon: 'database' },
    { key: 'pending', label: 'Pending', value: stats.pending, cls: 'blue', icon: 'loader-circle' },
    { key: 'done', label: 'Saved', value: stats.done, cls: 'green', icon: 'check-circle-2' },
    { key: 'failed', label: 'Retrying', value: stats.failed, cls: 'amber', icon: 'rotate-ccw' },
    { key: 'dead', label: 'Failed', value: stats.dead, cls: 'red', icon: 'circle-alert' }
  ];
  statsEl.innerHTML = cards.map(c => `
    <button type="button" class="qp-stat-card qp-stat-${c.cls}" onclick="_qpQuickStatus('${c.key === 'total' ? '' : c.key}')">
      <span class="qp-stat-icon">${icon(c.icon, 17)}</span>
      <span class="qp-stat-value">${escapeHtml(c.value)}</span>
      <span class="qp-stat-label">${escapeHtml(c.label)}</span>
    </button>`).join('');
  renderIcons(statsEl);
}

function _qpQuickStatus(key) {
  const map = { pending: 'LIVE', done: 'DONE', failed: 'FAILED', dead: 'DEAD' };
  _qpFilters.status = map[key] || '';
  _qpPage = 1;
  const sel = el('qp-status-filter');
  if (sel) sel.value = _qpFilters.status;
  _renderQueuePage(_qpJobs, _qpIsAdmin());
}

function _renderQueueFilters(jobs, isAdmin) {
  const box = el('qp-filters');
  if (!box) return;
  const modules = [...new Set(jobs.map(j => String(j.moduleName || '').trim()).filter(Boolean))].sort();
  const adminFilter = isAdmin ? `
    <label class="qp-filter">
      <span>User</span>
      <select id="qp-user-select" onchange="_qpOnUserFilterChange(this.value)">
        <option value="">All users</option>
        ${_qpAllUserEmails.map(e => `<option value="${escapeHtml(e)}"${e === _qpAdminFilter ? ' selected' : ''}>${escapeHtml(e)}</option>`).join('')}
      </select>
    </label>` : '';

  box.innerHTML = `
    <div class="qp-filterbar">
      <label class="qp-search">
        ${icon('search', 15)}
        <input id="qp-query-filter" value="${escapeHtml(_qpFilters.query)}" placeholder="Search request, record, action, error..." oninput="_qpOnFilterChange('query', this.value)">
      </label>
      <label class="qp-filter">
        <span>Status</span>
        <select id="qp-status-filter" onchange="_qpOnFilterChange('status', this.value)">
          ${_qpOption('', 'All status', _qpFilters.status)}
          ${_qpOption('LIVE', 'Pending + processing', _qpFilters.status)}
          ${_qpOption('QUEUED', 'Queued', _qpFilters.status)}
          ${_qpOption('PROCESSING', 'Processing', _qpFilters.status)}
          ${_qpOption('FAILED', 'Retrying', _qpFilters.status)}
          ${_qpOption('DONE', 'Saved', _qpFilters.status)}
          ${_qpOption('DEAD', 'Failed', _qpFilters.status)}
        </select>
      </label>
      <label class="qp-filter">
        <span>Module</span>
        <select id="qp-module-filter" onchange="_qpOnFilterChange('module', this.value)">
          ${_qpOption('', 'All modules', _qpFilters.module)}
          ${modules.map(m => _qpOption(m, _qpModuleLabel(m), _qpFilters.module)).join('')}
        </select>
      </label>
      ${adminFilter}
    </div>`;
  renderIcons(box);
}

function _renderBulkQueuePage(data) {
  const box = el('qp-bulk');
  if (!box) return;
  if (!data || !Array.isArray(data.jobs)) {
    box.innerHTML = `<div class="qp-table-card qp-bulk-card">
      <div class="qp-table-meta">
        <div>
          <span class="qp-table-count">Bulk Queue</span>
          <span class="qp-muted">No bulk queue detail available for this user.</span>
        </div>
      </div>
    </div>`;
    return;
  }
  const jobs = _qpApplyBulkUserFilter(data.jobs || []);
  const stats = _qpBulkStats(jobs);
  box.innerHTML = `
    <div class="qp-table-card qp-bulk-card">
      <div class="qp-table-meta">
        <div>
          <span class="qp-table-count">Bulk Queue</span>
          <span class="qp-muted">Detailed chunk and row processing status</span>
        </div>
        <div class="qp-bulk-stats">
          ${_qpBulkStat('Chunks', stats.total || 0, 'neutral')}
          ${_qpBulkStat('Pending', stats.pending || 0, 'blue')}
          ${_qpBulkStat('Saved', stats.done || 0, 'green')}
          ${_qpBulkStat('Retrying', stats.failed || 0, 'amber')}
          ${_qpBulkStat('Failed', stats.dead || 0, 'red')}
        </div>
      </div>
      <div class="qp-table-scroll">
        <table class="qp-table qp-bulk-table">
          <thead>
            <tr>
              <th>Status</th>
              <th>Mode</th>
              <th>User</th>
              <th>Batch / Request</th>
              <th>Rows</th>
              <th>Saved</th>
              <th>Errors</th>
              <th>Needs Processing</th>
              <th>Queued</th>
              <th>Processed</th>
            </tr>
          </thead>
          <tbody>${jobs.length ? jobs.map(_qpBulkJobRows).join('') : '<tr><td colspan="10" style="text-align:center;color:#9ca3af;padding:24px">No bulk jobs found.</td></tr>'}</tbody>
        </table>
      </div>
    </div>`;
  renderIcons(box);
}

function _qpApplyBulkUserFilter(jobs) {
  const email = String(_qpAdminFilter || '').trim().toLowerCase();
  if (!_qpIsAdmin() || !email) return jobs;
  return jobs.filter(j => String(j.userEmail || '').trim().toLowerCase() === email);
}

function _qpBulkStats(jobs) {
  return (Array.isArray(jobs) ? jobs : []).reduce((s, job) => {
    s.total++;
    if (job.status === 'DONE') s.done++;
    else if (job.status === 'FAILED') s.failed++;
    else if (job.status === 'DEAD') s.dead++;
    else s.pending++;
    return s;
  }, { total: 0, pending: 0, done: 0, failed: 0, dead: 0 });
}

function _qpBulkStat(label, value, tone) {
  return `<span class="qp-bulk-stat qp-bulk-stat-${tone}"><strong>${escapeHtml(value)}</strong>${escapeHtml(label)}</span>`;
}

function _qpBulkJobRows(job) {
  const progress = job.progress || {};
  const rowStats = job.rowStats || {};
  const total = Number(progress.total || job.totalRows || 0);
  const saved = Number(rowStats.saved || progress.saved || 0);
  const errors = Number(rowStats.errors || progress.errors || 0);
  const pending = Number(rowStats.pending || Math.max(0, total - saved - errors));
  const mode = job.mode === 'update' ? 'Update' : 'Create';
  return `<tr class="${job.status === 'DEAD' ? 'qp-row-dead' : job.status === 'PROCESSING' ? 'qp-row-processing' : ''}">
      <td>${_qpStatusBadge(job.status)}</td>
      <td>${escapeHtml(mode)}</td>
      <td><div class="qp-user-cell" title="${escapeAttr(job.userEmail || '')}">${escapeHtml(job.userEmail || '-')}</div></td>
      <td>
        <div class="qp-module-line">${escapeHtml(job.batchId || '-')}</div>
        <button class="qp-request-id" title="${escapeAttr(job.requestId || '')}" onclick="_qpCopy('${escapeAttr(job.requestId || '')}')">${escapeHtml((job.requestId || '').slice(-12) || '-')}</button>
      </td>
      <td>${escapeHtml(total || 0)}</td>
      <td><span class="qp-bulk-num qp-bulk-ok">${escapeHtml(saved || 0)}</span></td>
      <td><span class="qp-bulk-num qp-bulk-bad">${escapeHtml(errors || 0)}</span></td>
      <td><span class="qp-bulk-num qp-bulk-wait">${escapeHtml(pending || 0)}</span></td>
      <td><span class="qp-time">${escapeHtml(_qpFmtTs(job.createdAt) || '-')}</span></td>
      <td><span class="qp-time">${escapeHtml(_qpFmtTs(job.processedAt) || '-')}</span></td>
    </tr>
    <tr>
      <td colspan="10">${_qpBulkDetail(job, { saved, errors, pending })}</td>
    </tr>`;
}

function _qpBulkDetail(job, counts) {
  const rows = Array.isArray(job.rows) ? job.rows : [];
  return `<details class="qp-bulk-details">
    <summary>Full row detail: saved ${escapeHtml(counts.saved || 0)}, errors ${escapeHtml(counts.errors || 0)}, needs processing ${escapeHtml(counts.pending || 0)}</summary>
    <div class="qp-bulk-row-wrap">
      <table class="qp-bulk-row-table">
        <thead><tr><th>Row</th><th>Status</th><th>Lead ID</th><th>Company</th><th>Contact</th><th>Phone</th><th>Email</th><th>Assigned To</th><th>Result / Error</th></tr></thead>
        <tbody>${rows.length ? rows.map(_qpBulkDetailRow).join('') : '<tr><td colspan="9" style="text-align:center;color:#9ca3af;padding:16px">No row payload detail available.</td></tr>'}</tbody>
      </table>
    </div>
  </details>`;
}

function _qpBulkDetailRow(row) {
  const statusClass = row.status === 'Saved' ? 'saved' : (row.status === 'Error' ? 'error' : 'pending');
  const result = row.errors || row.recordId || (row.status === 'Pending' ? 'Waiting for queue worker' : row.status);
  return `<tr>
    <td>${escapeHtml(row.rowNumber || '')}</td>
    <td><span class="qp-bulk-row-status ${statusClass}">${escapeHtml(row.status || '')}</span></td>
    <td title="${escapeAttr(row.leadId || '')}">${escapeHtml(row.leadId || '-')}</td>
    <td title="${escapeAttr(row.company || '')}">${escapeHtml(row.company || '-')}</td>
    <td title="${escapeAttr(row.contact || '')}">${escapeHtml(row.contact || '-')}</td>
    <td title="${escapeAttr(row.phone || '')}">${escapeHtml(row.phone || '-')}</td>
    <td title="${escapeAttr(row.email || '')}">${escapeHtml(row.email || '-')}</td>
    <td title="${escapeAttr(row.assignedTo || '')}">${escapeHtml(row.assignedTo || '-')}</td>
    <td title="${escapeAttr(result || '')}">${escapeHtml(result || '-')}</td>
  </tr>`;
}

function _qpOption(value, label, selected) {
  return `<option value="${escapeHtml(value)}"${String(value) === String(selected) ? ' selected' : ''}>${escapeHtml(label)}</option>`;
}

function _mergeQueueJobs(localJobs, serverJobs) {
  const map = {};
  serverJobs.forEach(j => { map[j.requestId] = { ...j, _source: 'server' }; });
  localJobs.forEach(lj => {
    const srv = map[lj.requestId];
    if (!srv) {
      map[lj.requestId] = {
        requestId: lj.requestId,
        status: lj.status,
        createdAt: lj.enqueuedAt ? new Date(lj.enqueuedAt).toISOString().replace('T',' ').slice(0,19) : '',
        updatedAt: '',
        moduleName: lj.module || '',
        actionType: lj.actionType || '',
        attemptCount: 0,
        maxAttempts: 5,
        nextRetryAt: '',
        lastError: lj.error || '',
        processedAt: '',
        finalRecordId: lj.finalRecordId || '',
        _source: 'local',
        _enqueuedAt: lj.enqueuedAt || 0
      };
    }
  });
  return Object.values(map).sort((a, b) => _qpJobTime(b) - _qpJobTime(a));
}

function _renderQueuePage(jobs, showUser = false) {
  const bodyEl = el('qp-body');
  if (!bodyEl) return;
  const filtered = _filterQueueJobs(jobs);
  const pageCount = Math.max(1, Math.ceil(filtered.length / _qpPageSize));
  _qpPage = Math.min(Math.max(1, _qpPage), pageCount);
  const start = (_qpPage - 1) * _qpPageSize;
  const paged = filtered.slice(start, start + _qpPageSize);

  if (!filtered.length) {
    bodyEl.innerHTML = `<div class="qp-empty">
      ${icon('inbox', 42)}
      <div class="qp-empty-title">No matching queue jobs</div>
      <div class="qp-empty-text">Try changing the status, module, user, or search filter.</div>
    </div>`;
    renderIcons(bodyEl);
    return;
  }

  const userColHeader = showUser ? `<th>User</th>` : '';
  bodyEl.innerHTML = `
  <div class="qp-table-card">
    <div class="qp-table-meta">
      <div>
        <span class="qp-table-count">${escapeHtml(filtered.length)}</span>
        <span class="qp-muted">job${filtered.length === 1 ? '' : 's'} found</span>
        ${_qpAdminFilter ? `<span class="qp-filter-chip">${icon('user', 12)} ${escapeHtml(_qpAdminFilter)}</span>` : ''}
      </div>
      <div class="qp-page-size">
        <span>Rows</span>
        <select onchange="_qpOnPageSizeChange(this.value)">
          ${[10, 25, 50, 100].map(n => `<option value="${n}"${n === _qpPageSize ? ' selected' : ''}>${n}</option>`).join('')}
        </select>
      </div>
    </div>
    <div class="qp-table-scroll">
      <table class="qp-table">
        <thead>
          <tr>
            <th>Status</th>
            ${userColHeader}
            <th>Module / Action</th>
            <th>Request</th>
            <th>Queued</th>
            <th>Processed</th>
            <th>Attempts</th>
            <th>Data ID / Result</th>
            <th class="qp-actions-th">Actions</th>
          </tr>
        </thead>
        <tbody>${paged.map(j => _queueJobRow(j, showUser)).join('')}</tbody>
      </table>
    </div>
    ${_qpPagination(filtered.length, start, paged.length, pageCount)}
  </div>`;
  renderIcons(bodyEl);
}

function _qpApplyUserFilter(jobs) {
  const email = String(_qpAdminFilter || '').trim().toLowerCase();
  if (!email) return jobs;
  return jobs.filter(j => String(j.userEmail || '').trim().toLowerCase() === email);
}

function _qpPagination(total, start, visibleCount, pageCount) {
  const from = total ? start + 1 : 0;
  const to = start + visibleCount;
  const pages = _qpPageButtons(pageCount);
  return `<div class="qp-pagination">
    <div class="qp-muted">Showing ${escapeHtml(from)}-${escapeHtml(to)} of ${escapeHtml(total)}</div>
    <div class="qp-page-buttons">
      <button class="qp-page-btn" ${_qpPage <= 1 ? 'disabled' : ''} onclick="_qpSetPage(${_qpPage - 1})">${icon('chevron-left', 14)}</button>
      ${pages.map(p => p === '...'
        ? `<span class="qp-page-ellipsis">...</span>`
        : `<button class="qp-page-btn ${p === _qpPage ? 'active' : ''}" onclick="_qpSetPage(${p})">${p}</button>`
      ).join('')}
      <button class="qp-page-btn" ${_qpPage >= pageCount ? 'disabled' : ''} onclick="_qpSetPage(${_qpPage + 1})">${icon('chevron-right', 14)}</button>
    </div>
  </div>`;
}

function _qpPageButtons(pageCount) {
  if (pageCount <= 7) return Array.from({ length: pageCount }, (_, i) => i + 1);
  const set = new Set([1, pageCount, _qpPage - 1, _qpPage, _qpPage + 1]);
  const nums = Array.from(set).filter(n => n >= 1 && n <= pageCount).sort((a, b) => a - b);
  const out = [];
  nums.forEach((n, i) => {
    if (i && n - nums[i - 1] > 1) out.push('...');
    out.push(n);
  });
  return out;
}

function _filterQueueJobs(jobs) {
  const status = _qpFilters.status;
  const module = String(_qpFilters.module || '').toLowerCase();
  const query = String(_qpFilters.query || '').trim().toLowerCase();
  return jobs.filter(j => {
    if (status === 'LIVE' && !_qpIsLiveStatus(j.status)) return false;
    if (status && status !== 'LIVE' && j.status !== status) return false;
    if (module && String(j.moduleName || '').toLowerCase() !== module) return false;
    if (query) {
      const haystack = [
        j.requestId, j.userEmail, j.moduleName, j.actionType, j.lastError,
        j.finalRecordId, _qpModuleLabel(j.moduleName), _qpActionLabel(j.actionType)
      ].join(' ').toLowerCase();
      if (!haystack.includes(query)) return false;
    }
    return true;
  });
}

function _queueJobRow(j, showUser = false) {
  const module = _qpModuleLabel(j.moduleName);
  const action = _qpActionLabel(j.actionType);
  const shortId = j.requestId ? j.requestId.slice(-12) : '-';
  const queuedAt = j.createdAt ? _qpFmtTs(j.createdAt) : '-';
  const processedAt = j.processedAt ? _qpFmtTs(j.processedAt) : '-';
  const attempts = _qpAttempts(j);
  const errOrId = j.lastError
    ? `<button class="qp-link-danger" onclick="_qpOpenDetails('${escapeAttr(j.requestId)}')">${escapeHtml(j.lastError.slice(0, 54))}${j.lastError.length > 54 ? '...' : ''}</button>`
    : j.finalRecordId
      ? `<span class="qp-record-id">ID: ${escapeHtml(String(j.finalRecordId).slice(0, 18))}</span>`
      : '<span class="qp-muted">-</span>';
  const retryHint = (j.status === 'FAILED' && j.nextRetryAt)
    ? `<div class="qp-retry-hint">Next retry ${_qpFmtTs(j.nextRetryAt)}</div>` : '';
  const sourcePill = j._source === 'local' ? '<span class="qp-source-pill">Local</span>' : '';
  const retryBtn = (_qpIsAdmin() && ['FAILED', 'DEAD'].includes(j.status))
    ? `<button class="qp-icon-btn" title="Retry job" onclick="_qpRetryJob('${escapeAttr(j.requestId)}')">${icon('rotate-ccw', 14)}</button>` : '';
  const userCell = showUser
    ? `<td><div class="qp-user-cell" title="${escapeAttr(j.userEmail || '')}">${escapeHtml(j.userEmail || '-')}</div></td>`
    : '';

  return `<tr class="${j.status === 'DEAD' ? 'qp-row-dead' : j.status === 'PROCESSING' ? 'qp-row-processing' : ''}">
    <td>${_qpStatusBadge(j.status)}${retryHint}</td>
    ${userCell}
    <td>
      <div class="qp-module-line">${module} ${sourcePill}</div>
      <div class="qp-action-line">${action}</div>
    </td>
    <td><button class="qp-request-id" title="${escapeAttr(j.requestId)}" onclick="_qpCopy('${escapeAttr(j.requestId)}')">${escapeHtml(shortId)}</button></td>
    <td><span class="qp-time">${queuedAt}</span></td>
    <td><span class="qp-time">${processedAt}</span></td>
    <td>${attempts}</td>
    <td>${errOrId}</td>
    <td class="qp-actions">
      <button class="qp-icon-btn" title="Details" onclick="_qpOpenDetails('${escapeAttr(j.requestId)}')">${icon('panel-right-open', 14)}</button>
      <button class="qp-icon-btn" title="Copy request ID" onclick="_qpCopy('${escapeAttr(j.requestId)}')">${icon('copy', 14)}</button>
      ${retryBtn}
    </td>
  </tr>`;
}

function _qpAttempts(j) {
  const max = Number(j.maxAttempts || 0);
  const count = max > 0 ? Math.min(Number(j.attemptCount || 0), max) : Number(j.attemptCount || 0);
  const pct = max > 0 ? Math.max(0, Math.min(100, (count / max) * 100)) : 0;
  return `<div class="qp-attempts">
    <div class="qp-attempts-text">${max > 0 ? `${count}/${max}` : count}</div>
    <div class="qp-attempts-bar"><span style="width:${pct}%"></span></div>
  </div>`;
}

function _qpStatusBadge(status) {
  const map = {
    QUEUED: ['q-queued', 'Queued'],
    PROCESSING: ['q-processing', 'Processing'],
    DONE: ['q-done', 'Saved'],
    FAILED: ['q-failed', 'Retrying'],
    DEAD: ['q-dead', 'Failed']
  };
  const [cls, label] = map[status] || ['q-queued', status || '?'];
  return `<span class="q-badge ${cls}">${label}</span>`;
}

function _qpOpenDetails(requestId) {
  const job = _qpJobs.find(j => String(j.requestId) === String(requestId));
  if (!job) return;
  const rows = [
    ['Status', _qpStatusBadge(job.status)],
    ['Request ID', `<code>${escapeHtml(job.requestId || '-')}</code>`],
    ['Source', escapeHtml(job._source || 'server')],
    ['User', escapeHtml(job.userEmail || '-')],
    ['Module', escapeHtml(_qpModuleLabel(job.moduleName))],
    ['Action', escapeHtml(_qpActionLabel(job.actionType))],
    ['Queued at', escapeHtml(job.createdAt || '-')],
    ['Updated at', escapeHtml(job.updatedAt || '-')],
    ['Processed at', escapeHtml(job.processedAt || '-')],
    ['Attempts', `${escapeHtml(job.attemptCount || 0)} / ${escapeHtml(job.maxAttempts || '-')}`],
    ['Next retry at', escapeHtml(job.nextRetryAt || '-')],
    ['Data ID', escapeHtml(job.finalRecordId || '-')],
    ['Last error', `<div class="qp-detail-error">${escapeHtml(job.lastError || '-')}</div>`]
  ];
  const retryBtn = (_qpIsAdmin() && ['FAILED', 'DEAD'].includes(job.status))
    ? `<button class="btn btn-primary" onclick="_qpRetryJob('${escapeAttr(job.requestId)}');this.closest('.modal-overlay').remove()">${icon('rotate-ccw', 14)} Retry</button>` : '';
  const overlay = showModal(`
    <div class="modal-header">
      <h2>Queue Job Details</h2>
      <button class="modal-close" onclick="this.closest('.modal-overlay').remove()">&#x2715;</button>
    </div>
    <div class="qp-detail-grid">
      ${rows.map(([label, value]) => `<div class="qp-detail-label">${escapeHtml(label)}</div><div class="qp-detail-value">${value}</div>`).join('')}
    </div>
    <div class="modal-footer">
      <button class="btn btn-outlined" onclick="_qpCopy('${escapeAttr(job.requestId)}')">${icon('copy', 14)} Copy ID</button>
      ${retryBtn}
      <button class="btn btn-outlined" onclick="this.closest('.modal-overlay').remove()">Close</button>
    </div>`);
  overlay.querySelector('.modal').classList.add('modal-wide');
  renderIcons(overlay);
}

function _qpCopy(text) {
  if (!text) return;
  const done = () => toast('Copied.', 'success');
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(done).catch(() => _qpFallbackCopy(text, done));
  } else {
    _qpFallbackCopy(text, done);
  }
}

function _qpFallbackCopy(text, done) {
  const input = document.createElement('textarea');
  input.value = text;
  input.style.position = 'fixed';
  input.style.opacity = '0';
  document.body.appendChild(input);
  input.select();
  try { document.execCommand('copy'); done(); } catch (_) {}
  input.remove();
}

function _qpModuleLabel(m) {
  const map = { leads: 'Leads', followups: 'Follow-ups', config: 'Config', stages: 'Stages', fields: 'Fields', bulk: 'Bulk' };
  return map[String(m || '').toLowerCase()] || (m || '-');
}

function _qpActionLabel(a) {
  const map = {
    saveLead: 'Save Lead',
    deleteLead: 'Delete Lead',
    updateLeadStage: 'Update Stage',
    moveLeadStageWithFields: 'Move Stage + Fields',
    pushLeadToNbd: 'Push to NBD',
    saveFollowup: 'Save Follow-up',
    markFollowupDone: 'Mark Follow-up Done',
    deleteFollowup: 'Delete Follow-up',
    addConfig: 'Add Config',
    updateConfigStatus: 'Update Config Status',
    saveStage: 'Save Stage',
    reorderStages: 'Reorder Stages',
    saveFieldConfig: 'Save Field',
    saveBulkRows: 'Save Bulk Rows',
    savePortalSettings: 'Save Portal Settings',
    saveUser: 'Save User'
  };
  return map[a] || (a || '-');
}

function escapeAttr(value) {
  return escapeHtml(String(value || '')).replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function _qpFmtTs(ts) {
  if (!ts) return '-';
  try {
    const d = new Date(String(ts).replace(' ', 'T'));
    if (isNaN(d)) return ts;
    return d.toLocaleDateString('en-IN', { day:'2-digit', month:'short' })
      + ' ' + d.toLocaleTimeString('en-IN', { hour:'2-digit', minute:'2-digit', hour12: true });
  } catch (_) { return ts; }
}

function _qpFmtDate(d) {
  return d.toLocaleTimeString('en-IN', { hour:'2-digit', minute:'2-digit', second:'2-digit', hour12: true });
}

function _queueStats(jobs) {
  const s = { total: jobs.length, pending: 0, done: 0, failed: 0, dead: 0 };
  jobs.forEach(j => {
    if (j.status === 'QUEUED' || j.status === 'PROCESSING') s.pending++;
    else if (j.status === 'DONE') s.done++;
    else if (j.status === 'FAILED') s.failed++;
    else if (j.status === 'DEAD') s.dead++;
  });
  return s;
}

function _qpIsLiveStatus(status) {
  return status === 'QUEUED' || status === 'PROCESSING' || status === 'FAILED';
}

function _qpJobTime(job) {
  return job.createdAt ? new Date(String(job.createdAt).replace(' ', 'T')).getTime() : (job._enqueuedAt || 0);
}

function _scheduleQueuePageRefresh() {
  _stopQueuePageRefresh();
  _queuePageRefreshTimer = setTimeout(() => {
    if (App.currentPage === 'queue') _refreshQueuePage();
  }, 5000);
}

function _stopQueuePageRefresh() {
  if (_queuePageRefreshTimer) {
    clearTimeout(_queuePageRefreshTimer);
    _queuePageRefreshTimer = null;
  }
}
</script>

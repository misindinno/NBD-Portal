<script>
// ─── Utilities ────────────────────────────────────────────────────────────────
function toast(msg, type = 'success') {
  const text = msg instanceof Error ? msg.message : String(msg || '');
  const bg = type === 'success' ? '#388E3C'
           : type === 'info'    ? '#1565C0'
           : '#D32F2F';
  Toastify({ text, duration: 3000, gravity: 'top', position: 'right', style: { background: bg } }).showToast();
}

function confirm(msg) {
  return Swal.fire({
    title: 'Confirm', text: msg, icon: 'warning',
    showCancelButton: true, confirmButtonText: 'Yes', cancelButtonText: 'No'
  }).then(r => r.isConfirmed);
}

function formatDate(d)    { return d ? new Date(d).toLocaleDateString('en-IN') : ''; }
function formatDateTime(d) {
  if (!d) return '';
  return new Date(String(d).replace(' ', 'T')).toLocaleString('en-IN', {
    day: '2-digit', month: 'short', year: 'numeric',
    hour: '2-digit', minute: '2-digit'
  });
}
function formatCurrency(v){ return new Intl.NumberFormat('en-IN',{style:'currency',currency:'INR'}).format(v||0); }
function localDateInputValue(date = new Date()) {
  const d = new Date(date);
  d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
  return d.toISOString().slice(0, 10);
}
function el(id)  { return document.getElementById(id); }
function qs(sel) { return document.querySelector(sel); }
function escapeHtml(value) {
  return String(value ?? '').replace(/[&<>"']/g, ch => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[ch]));
}
function remarkSearchText(row) {
  if (!row) return '';
  return Object.keys(row)
    .filter(k => /remark|discussion|note|comment/i.test(k))
    .map(k => row[k])
    .filter(v => v !== undefined && v !== null && v !== '')
    .map(String)
    .join(' ');
}
function safeColor(value, fallback = '#757575') {
  return /^#[0-9a-f]{6}$/i.test(String(value || '')) ? value : fallback;
}

// Read a config-driven CSS theme variable (from CLIENT_CONFIG.THEME) as a concrete
// color string. Use where var() can't reach: SVG presentation attributes, canvas,
// SweetAlert options, or JS-built inline styles.
function themeColor(name, fallback) {
  try {
    const v = getComputedStyle(document.documentElement).getPropertyValue(name).trim();
    return v || fallback;
  } catch (e) { return fallback; }
}
function brandPrimary()      { return themeColor('--md-primary', '#1565C0'); }
function brandPrimaryLight() { return themeColor('--md-primary-light', '#1976D2'); }

function icon(name, size = 18, extraClass = '') {
  return `<i data-lucide="${escapeHtml(name)}" class="${escapeHtml(extraClass)}" style="width:${size}px;height:${size}px;"></i>`;
}

function renderIcons(root = document) {
  if (!window.lucide) return;
  const target = root || document;
  if (target === document || !window.lucide.createElement || !window.lucide.icons) {
    window.lucide.createIcons({ attrs: { 'stroke-width': 2 } });
    return;
  }
  const nodes = [];
  if (target.matches?.('[data-lucide]')) nodes.push(target);
  if (target.querySelectorAll) nodes.push(...target.querySelectorAll('[data-lucide]'));
  nodes.forEach(node => {
    if (node.tagName?.toLowerCase() === 'svg') return;
    const name = node.getAttribute('data-lucide');
    const iconName = String(name || '').split('-').map(p => p.charAt(0).toUpperCase() + p.slice(1)).join('');
    const iconNode = window.lucide.icons[iconName];
    if (!iconNode) return;
    const attrs = { 'stroke-width': 2 };
    Array.from(node.attributes || []).forEach(attr => { if (attr.name !== 'data-lucide') attrs[attr.name] = attr.value; });
    attrs['data-lucide'] = name;
    node.replaceWith(window.lucide.createElement(iconNode, attrs));
  });
}

// Page-matched loading skeletons. Each type mirrors the real page's scaffold
// (topbar, KPI strip, tabs, filters, worklist/charts/kanban/form) so the loading
// state looks like the page that's about to appear, not a generic grey block.
function skeletonPage(type = 'table') {
  const sk = (w, h, extra = '') => `<div class="sk" style="${w ? `width:${w};` : ''}${h ? `height:${h};` : ''}${extra}"></div>`;
  const repeat = (n, fn) => Array.from({ length: n }, (_, i) => fn(i)).join('');

  const topbar = `<div class="sk-topbar">
      <div class="sk-row"><div class="sk sk-hero"></div>
        <div class="sk-stack">${sk('190px', '18px')}${sk('300px', '11px')}</div></div>
      <div class="sk-row"><div class="sk sk-btn"></div><div class="sk sk-btn" style="width:124px"></div></div>
    </div>`;
  const kpis = (n, grid) => `<div class="sk-kpis${grid ? ' grid' : ''}">${repeat(n, () =>
    `<div class="sk-kpi"><div class="sk sk-ic"></div>${sk('46px', '26px')}${sk('72%', '10px', 'margin-top:10px')}${sk('48%', '9px', 'margin-top:7px')}</div>`)}</div>`;
  const tabs = `<div class="sk-tabs">${repeat(5, () => '<div class="sk sk-tab"></div>')}</div>`;
  const filter = '<div class="sk sk-filter"></div>';
  const row = (av) => `<div class="sk-trow">${av ? '<div class="sk sk-av"></div>' : ''}${sk('22%', '12px')}${sk('15%', '12px')}${sk('19%', '12px')}${sk('13%', '12px')}<div style="flex:1"></div>${sk('62px', '20px', 'border-radius:20px')}</div>`;
  const worklist = (rows, av = true) => `<div class="sk-card">
      <div class="sk-card-head">${sk('170px', '15px')}<div class="sk-row">${sk('92px', '28px', 'border-radius:9px')}${sk('70px', '28px', 'border-radius:9px')}</div></div>
      <div class="sk-table">${repeat(rows, () => row(av))}</div></div>`;

  if (type === 'fu') {
    return `<div class="sk-page">${topbar}${kpis(6)}${tabs}${filter}${worklist(9)}</div>`;
  }
  if (type === 'today') {
    const chart = `<div class="sk-chart">${sk('120px', '13px')}${sk('100%', '150px', 'margin-top:14px;border-radius:10px')}</div>`;
    return `<div class="sk-page">${topbar}${kpis(8, true)}${tabs}
      <div class="sk-charts">${chart}${chart}${chart}</div>${worklist(6)}</div>`;
  }
  if (type === 'kanban') {
    const col = `<div class="sk-col">
        <div class="sk-row" style="justify-content:space-between">
          <div class="sk-row">${sk('10px', '10px', 'border-radius:50%')}${sk('92px', '12px')}</div>${sk('24px', '18px')}</div>
        ${repeat(3, () => '<div class="sk sk-pcard"></div>')}</div>`;
    return `<div class="sk-page">${topbar}<div class="sk-kan">${repeat(5, () => col)}</div></div>`;
  }
  if (type === 'form') {
    return `<div class="sk-page">${topbar}
      <div class="sk-card" style="padding:20px">
        <div class="sk-formgrid">${repeat(8, () => `<div class="sk-field">${sk('40%', '11px')}${sk('100%', '40px', 'border-radius:10px')}</div>`)}</div>
        <div class="sk-row" style="margin-top:22px;justify-content:flex-end">${sk('110px', '38px', 'border-radius:10px')}${sk('124px', '38px', 'border-radius:10px')}</div>
      </div></div>`;
  }
  if (type === 'cards') {
    return `<div class="sk-page">${repeat(6, () => `<div class="sk-card" style="padding:16px">
      <div class="sk-row" style="justify-content:space-between">${sk('230px', '14px')}${sk('80px', '28px', 'border-radius:8px')}</div>
      <div style="margin-top:12px">${sk('100%', '12px')}</div></div>`)}</div>`;
  }
  // default 'table' — a clean worklist card (no avatar), used for sub-section loads
  return `<div class="sk-page">${worklist(8, false)}</div>`;
}

function setContentLoading(type = 'table') {
  const c = el('content');
  if (!c) return;
  c.removeAttribute('style');
  c.innerHTML = skeletonPage(type);
  renderIcons();
}

// Shared call-rate computation used by every dashboard / followups / today / leads KPI grid.
//   connectionRate = connects / (connects + missed)
//   conversionRate = conversions / connects   (conversion = stage moved OR positive Won outcome)
function computeCallRates(historyRows) {
  const CONNECTED = { 'Call Connected': true, 'WhatsApp Chat': true };
  const MISSED    = { 'Not Picked': true };
  let connects = 0, missed = 0, conversions = 0;
  (historyRows || []).forEach(r => {
    const mode = String(r['Contact Mode'] || '').trim();
    if (CONNECTED[mode]) connects++;
    else if (MISSED[mode]) missed++;
    const movedStage = !!r['Updated Stage ID'];
    const wonOutcome = /won|order|payment/i.test(String(r['Outcome'] || r['Status After'] || ''));
    if (CONNECTED[mode] && (movedStage || wonOutcome)) conversions++;
  });
  const attempts = connects + missed;
  return {
    connects, missed, attempts, conversions,
    connectionRate: attempts ? Math.round(connects / attempts * 100) : 0,
    conversionRate: connects ? Math.round(conversions / connects * 100) : 0
  };
}
window.computeCallRates = computeCallRates;

function setButtonLoading(btn, label = 'Saving...') {
  if (!btn) return;
  btn.dataset.originalHtml = btn.dataset.originalHtml || btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = `${icon('loader-circle', 16, 'spin-icon')} ${escapeHtml(label)}`;
  renderIcons(btn);
}

function resetButtonLoading(btn) {
  if (!btn) return;
  btn.disabled = false;
  if (btn.dataset.originalHtml) btn.innerHTML = btn.dataset.originalHtml;
  renderIcons(btn);
}

function pageSkeletonType(page) {
  if (page === 'pipeline')  return 'kanban';
  if (page === 'today')     return 'today';
  if (page === 'leads')     return 'fu';
  if (page && page.startsWith('followups')) return 'fu';
  if (page === 'leadform')  return 'form';
  if (page === 'config')    return 'cards';
  return 'table';
}
</script>

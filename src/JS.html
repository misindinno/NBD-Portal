<script>
// ─── Global App (thin wrapper over Store) ───────────────────────────────────
const App = {
  get user()        { return Store.getState().user; },
  get config()      { return Store.getState().config; },
  get currentPage() { return Store.getState().currentPage; }
};

// ─── AppLookup — centralised ID → label resolver ─────────────────────────────
// Every ID-to-name resolution in the UI goes through here.
// Prevents raw UUIDs or emails from leaking into tables, charts, and timelines.
// Rule: call AppLookup.rebuild() every time App.config is set.
const AppLookup = (() => {
  let _u = {}; // user id / email  → display name
  let _s = {}; // Stage ID         → { name, color, order }

  return {
    rebuild() {
      const cfg = App.config || {};
      _u = cfg.userNameMap || {};
      // allStages includes deactivated stages so old stage IDs still resolve.
      _s = (cfg.allStages || cfg.stages || []).reduce((m, s) => {
        const id = s['Stage ID'];
        if (id) m[id] = {
          name:  s['Stage Name']  || id,
          color: s['Color']       || '#9E9E9E',
          order: Number(s['Stage Order']) || 0
        };
        return m;
      }, {});
    },

    // Returns the display name for a user id or email.
    // If the id is not in the map, returns the email (readable) or '—' for UUIDs.
    userName(id) {
      if (!id) return '—';
      const raw = String(id);
      const hit = _u[raw] || _u[raw.trim().toLowerCase()];
      if (hit) return hit;
      return raw.includes('@') ? raw : '—';
    },

    // Returns Stage Name. Uses allStages so deactivated stages still resolve.
    stageName(id) {
      if (!id) return '—';
      return _s[id]?.name || String(id);
    },

    // Returns validated hex color for the stage, or a neutral grey fallback.
    stageColor(id) {
      if (!id) return '#9E9E9E';
      return safeColor(_s[id]?.color, '#9E9E9E');
    },

    // Full stage descriptor { name, color, order } or null.
    stageObj(id) { return id ? (_s[id] || null) : null; }
  };
})();

// ─── Auth ─────────────────────────────────────────────────────────────────────
// Reads email via Session on server, looks up USERS sheet, returns user object.
// Simple google.script.run call — no webhook needed for reads.
async function fetchCurrentUser() {
  return new Promise((resolve, reject) => {
    google.script.run
      .withSuccessHandler(res => {
        console.log('Auth response:', res);
        if (!res) return reject(new Error('Server returned null. Push the latest code, redeploy the web app, and check Apps Script executions for the server error.'));
        if (res.success) resolve(res.data);
        else reject(new Error(res.error || 'ACCESS_DENIED'));
      })
      .withFailureHandler(err => {
        console.error('Auth failed:', err);
        reject(new Error(err.message || String(err)));
      })
      .apiGetCurrentUser();
  });
}

// ─── Write Webhook ────────────────────────────────────────────────────────────
// All write operations POST to Deployment 2 (execute as owner).
// Browser calls apiWrite through google.script.run; server-side UrlFetchApp calls Deployment 2.
async function writePost(fn, payload = {}) {
  const token = localStorage.getItem('nbd_token');
  if (!token) throw new Error('Not authenticated. Please sign in again.');
  return api._read('apiExecuteWrite', fn, payload, token);
}

async function refreshWriteSession() {
  const token = localStorage.getItem('nbd_token');
  if (!token) return;
  const boot = await api.bootstrapWithToken(token);
  Store.dispatch('SET_USER', boot.user);
  Store.dispatch('SET_CONFIG', boot.config);
  AppCache.touch('config');
  AppLookup.rebuild();
  renderSidebar();
}

// ─── API ──────────────────────────────────────────────────────────────────────
const api = {
  _read(fn, ...args) {
    return new Promise((resolve, reject) => {
      google.script.run
        .withSuccessHandler(res => {
          if (!res) return reject(new Error(`${fn} returned null. Push the latest code, redeploy the web app, and check Apps Script executions for the server error.`));
          if (res.success) resolve(res.data);
          else reject(new Error(`${fn}: ${res.error}`));
        })
        .withFailureHandler(err => reject(new Error(`${fn} failed: ${err.message || err}`)))
        [fn](...args);
    });
  },

  // Prepends the current auth token — all read endpoints expect token as first arg.
  _token()              { return localStorage.getItem('nbd_token') || ''; },
  _authedRead(fn, ...args) { return api._read(fn, api._token(), ...args); },

  // ── Session auth ──────────────────────────────────────────────────────────
  login:               (e, p)  => api._read('apiLogin', e, p),
  loginWithGoogle:     (t)     => api._read('apiLoginWithGoogle', t),
  bootstrapWithToken:  (t)     => api._read('apiBootstrapWithToken', t),
  logout:              (t)     => api._read('apiLogout', t),

  // ── Reads (token auto-prepended via _authedRead) ───────────────────────────
  bootstrap:           ()      => api._read('apiBootstrap'),
  getDataStamps:       ()      => api._authedRead('apiGetDataStamps'),
  getAppConfig:        ()      => api._authedRead('apiGetAppConfig'),
  getAllStages:         ()      => api._authedRead('apiGetAllStages'),
  getAllConfigs:        ()      => api._authedRead('apiGetAllConfigs'),
  getFieldConfig:      (s)     => api._authedRead('apiGetFieldConfig', s),
  getAllFieldConfigs:   (s)     => api._authedRead('apiGetAllFieldConfigs', s),
  getLeads:            ()      => api._authedRead('apiGetLeads'),
  getLead:             (id)    => api._authedRead('apiGetLead', id),
  getFollowups:        (f)     => api._authedRead('apiGetFollowups', f),
  getFollowupHistory:  (f)     => api._authedRead('apiGetFollowupHistory', f),
  getLeadActivityLogs: (f)     => api._authedRead('apiGetLeadActivityLogs', f),
  getFollowupLeads:    ()      => api._authedRead('apiGetFollowupLeads'),
  getFollowupFormData: ()      => api._authedRead('apiGetFollowupFormData'),
  getUsers:            ()      => api._authedRead('apiGetUsers'),

  // ── Writes (direct via apiExecuteWrite, no webhook needed) ────────────────
  saveLead:            (d)           => writePost('saveLead', d),
  deleteLead:          (id)          => writePost('deleteLead', { id }),
  updateLeadStage:     (leadId, stageId, note) => writePost('updateLeadStage', { leadId, stageId, note }),
  moveLeadStageWithFields: (leadId, stageId, fields, note) => writePost('moveLeadStageWithFields', { leadId, stageId, fields, note }),
  saveFollowup:        (d)           => writePost('saveFollowup', d),
  markFollowupDone:    (id, data)    => writePost('markFollowupDone', { id, data }),
  addConfig:           (type, value) => writePost('addConfig', { type, value }),
  updateConfigStatus:  (id, status)  => writePost('updateConfigStatus', { id, status }),
  saveStage:           (s)           => writePost('saveStage', s),
  reorderStages:       (ids)         => writePost('reorderStages', { ids }),
  saveFieldConfig:     (f)           => writePost('saveFieldConfig', f),
  savePortalSettings:  (s)           => writePost('savePortalSettings', s),
  saveUser:            (u)           => writePost('saveUser', u)
};

// ─── Cache helpers ────────────────────────────────────────────────────────────
// In-flight fetch deduplication: if two callers request the same collection
// at the same time, only one network request is made.
const _fetching = {};

function _ensureCached(col, fetchFn) {
  if (AppCache.isLoaded(col)) return Promise.resolve();
  if (_fetching[col]) return _fetching[col];
  _fetching[col] = fetchFn()
    .then(rows => AppCache.setRows(col, rows))
    .finally(() => delete _fetching[col]);
  return _fetching[col];
}

// ─── Shared date/time helpers ─────────────────────────────────────────────────
// Normalise a GAS-formatted date string ("yyyy-MM-dd HH:mm:ss") or ISO string
// to a yyyy-MM-dd string for client-side tab filtering.
function _fmtDate(d) {
  if (!d) return '';
  const s = String(d);
  if (/^\d{4}-\d{2}-\d{2}/.test(s)) return s.slice(0, 10);
  try { return localDateInputValue(new Date(s.replace(' ', 'T'))); } catch(e) { return ''; }
}

// Produce a GAS-compatible "yyyy-MM-dd HH:mm:ss" timestamp from now (used
// for optimistic cache entries so sorting/display is consistent with server).
function _nowStr() {
  const d = new Date();
  d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
  return d.toISOString().slice(0, 19).replace('T', ' ');
}

// ─── Cache revalidation ───────────────────────────────────────────────────────
async function _checkCacheStamps() {
  try {
    const stamps = await api.getDataStamps();
    // A stamp of "0" means the server's stamp system is uninitialised — skip that collection
    // to avoid never-refreshing (0 > any real loadedAt is always false) or spurious refreshes.
    const _stamp = key => { const n = Number(stamps[key]); return n > 0 ? n : null; };
    const _stale = (key, col) => { const s = _stamp(key); return s !== null && s > AppCache.getLoadedAt(col); };
    if (_stale('leads',          'leads'))         await _refreshLeadsCache();
    if (_stale('followups',      'followups'))     await _refreshFollowupsCache();
    if (_stale('followupHistory','followupHistory')) await _refreshFollowupHistoryCache();
    if (_stale('activityLogs',   'activityLogs'))  await _refreshActivityLogsCache();
    const configStamp = Math.max(_stamp('stages') || 0, _stamp('fields') || 0, _stamp('config') || 0);
    if (configStamp > 0 && configStamp > AppCache.getLoadedAt('config')) await _refreshAppConfig();
  } catch(e) { /* silent — revalidation is best-effort */ }
}

async function _refreshLeadsCache() {
  const rows = await api.getLeads().catch(() => api.getFollowupLeads());
  AppCache.setRows('leads', rows);
  const pg = App.currentPage;
  if (pg === 'leads') {
    if (window.leadTable) {
      window.leadTable.replaceData(AppCache.getRows('leads'));
      if (typeof applyLeadFilters === 'function') applyLeadFilters();
    } else {
      loadLeads();
    }
  } else if (pg === 'pipeline') {
    loadPipeline();
  } else if (pg === 'dashboard') {
    loadDashboard();
  }
}

async function _refreshFollowupsCache() {
  const rows = await api.getFollowups({});
  AppCache.setRows('followups', rows);
  const pg = App.currentPage;
  if (pg && pg.startsWith('followups')) {
    _renderFUTab(window.currentFollowupTab || 'all');
  } else if (pg === 'dashboard') {
    loadDashboard();
  }
}

async function _refreshFollowupHistoryCache() {
  const rows = await api.getFollowupHistory({});
  AppCache.setRows('followupHistory', rows);
  const pg = App.currentPage;
  if (pg && pg.startsWith('followups')) {
    _renderFUTab(window.currentFollowupTab || 'all');
  }
}

async function _refreshActivityLogsCache() {
  const rows = await api.getLeadActivityLogs({});
  AppCache.setRows('activityLogs', rows);
}

async function _refreshAppConfig() {
  const config = await api.getAppConfig();
  Store.dispatch('SET_CONFIG', config);
  AppCache.touch('config');
  AppLookup.rebuild();
  const pg = App.currentPage;
  if (pg === 'pipeline') loadPipeline();
  else if (pg === 'dashboard') loadDashboard();
  else if (pg === 'config') loadConfig();
}

function startCacheRevalidation() {
  window.addEventListener('focus', _checkCacheStamps);
  document.addEventListener('visibilitychange', () => { if (!document.hidden) _checkCacheStamps(); });
  setInterval(_checkCacheStamps, 15_000);
}

const _PAGE_META = {
  dashboard: { title: 'Dashboard',    crumb: 'Dashboard' },
  leads:     { title: 'Lead Master',  crumb: 'Lead Master' },
  pipeline:  { title: 'Pipeline',     crumb: 'Pipeline' },
  followups: { title: 'Follow Up',    crumb: 'Follow Up' },
  leadform:  { title: 'Lead Form',    crumb: 'Lead Form' },
  config:    { title: 'Config',       crumb: 'Config' },
};

function navigate(page) {
  if (!canNavigate(page)) {
    el('page-title').textContent = 'Access Denied';
    el('content').innerHTML = `<div class="card" style="padding:24px;color:#666">You do not have permission to open this module.</div>`;
    return;
  }
  Store.dispatch('SET_PAGE', page);
  document.querySelectorAll('#sidebar nav a').forEach(a => a.classList.remove('active'));
  const link = document.querySelector(`#sidebar nav a[data-page="${page}"]`);
  if (link) link.classList.add('active');
  const meta = _PAGE_META[page] || { title: page.charAt(0).toUpperCase() + page.slice(1), crumb: page };
  el('page-title').textContent = meta.title;
  const crumbEl = el('tb-breadcrumb-page');
  if (crumbEl) crumbEl.textContent = meta.crumb;
  setContentLoading(pageSkeletonType(page));
  // Fix #21: wrap page load calls in try/catch to prevent uncaught ReferenceError
  try {
    if      (page === 'dashboard')         loadDashboard();
    else if (page === 'leads')              loadLeads();
    else if (page === 'pipeline')           loadPipeline();
    else if (page === 'followups')          loadFollowups('all');
    else if (page === 'followups-today')    loadFollowups('today');
    else if (page === 'followups-overdue')  loadFollowups('overdue');
    else if (page === 'followups-custom')   loadFollowups('custom');
    else if (page === 'followups-new')      { loadFollowups('all'); openFollowupForm(); }
    else if (page === 'config')             loadConfig();
    else if (page === 'leadform')           loadLeadForm();
    else el('content').innerHTML = '<p>Page not found.</p>';
  } catch(err) {
    el('content').innerHTML = `<p style="color:#D32F2F;padding:20px">Failed to load page: ${escapeHtml(err.message)}</p>`;
  }
}

// ─── Utilities ────────────────────────────────────────────────────────────────
function toast(msg, type = 'success') {
  // Fix #20: handle Error objects — extract .message instead of [object Error]
  const text = msg instanceof Error ? msg.message : String(msg || '');
  Toastify({
    text, duration: 3000, gravity: 'top', position: 'right',
    style: { background: type === 'success' ? '#388E3C' : '#D32F2F' }
  }).showToast();
}

function confirm(msg) {
  return Swal.fire({
    title: 'Confirm', text: msg, icon: 'warning',
    showCancelButton: true, confirmButtonText: 'Yes', cancelButtonText: 'No'
  }).then(r => r.isConfirmed);
}

function formatDate(d)    { return d ? new Date(d).toLocaleDateString('en-IN') : ''; }
function formatCurrency(v){ return new Intl.NumberFormat('en-IN',{style:'currency',currency:'INR'}).format(v||0); }
function localDateInputValue(date = new Date()) {
  const d = new Date(date);
  d.setMinutes(d.getMinutes() - d.getTimezoneOffset());
  return d.toISOString().slice(0, 10);
}
function el(id)           { return document.getElementById(id); }
function qs(sel)          { return document.querySelector(sel); }
function escapeHtml(value) {
  return String(value ?? '').replace(/[&<>"']/g, ch => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[ch]));
}
function safeColor(value, fallback = '#757575') {
  return /^#[0-9a-f]{6}$/i.test(String(value || '')) ? value : fallback;
}

function icon(name, size = 18, extraClass = '') {
  return `<i data-lucide="${escapeHtml(name)}" class="${escapeHtml(extraClass)}" style="width:${size}px;height:${size}px;"></i>`;
}

function renderIcons(root = document) {
  if (!window.lucide) return;
  const target = root || document;
  if (target === document || !window.lucide.createElement || !window.lucide.icons) {
    window.lucide.createIcons({ attrs: { 'stroke-width': 2 } });
    return;
  }
  const nodes = [];
  if (target.matches?.('[data-lucide]')) nodes.push(target);
  if (target.querySelectorAll) nodes.push(...target.querySelectorAll('[data-lucide]'));
  nodes.forEach(node => {
    if (node.tagName?.toLowerCase() === 'svg') return;
    const name = node.getAttribute('data-lucide');
    const iconName = String(name || '').split('-').map(part => part.charAt(0).toUpperCase() + part.slice(1)).join('');
    const iconNode = window.lucide.icons[iconName];
    if (!iconNode) return;
    const attrs = { 'stroke-width': 2 };
    Array.from(node.attributes || []).forEach(attr => {
      if (attr.name !== 'data-lucide') attrs[attr.name] = attr.value;
    });
    attrs['data-lucide'] = name;
    node.replaceWith(window.lucide.createElement(iconNode, attrs));
  });
}

function skeletonPage(type = 'table') {
  if (type === 'dashboard') {
    const sk6 = Array.from({ length: 6 }, () => '<div class="skeleton-block skeleton-stat"></div>').join('');
    const g   = (cols, h) => `<div style="display:grid;grid-template-columns:${cols};gap:16px"><div class="skeleton-block" style="height:${h}px"></div><div class="skeleton-block" style="height:${h}px"></div></div>`;
    return `<div class="skeleton-page skeleton-dashboard">
      <div class="skeleton-block" style="height:48px;border-radius:8px"></div>
      <div class="skeleton-stat-grid">${sk6}</div>
      <div class="skeleton-stat-grid">${sk6}</div>
      ${g('3fr 2fr', 260)}
      ${g('1fr 1fr', 230)}
      <div class="skeleton-block" style="height:110px"></div>
      ${g('1fr 1fr', 300)}
      <div class="skeleton-block" style="height:180px"></div>
      <div class="skeleton-block" style="height:200px"></div>
      <div class="skeleton-block" style="height:240px"></div>
    </div>`;
  }
  if (type === 'kanban') {
    return `<div class="skeleton-page">
      <div class="skeleton-toolbar"><div class="skeleton-line w-40"></div><div class="skeleton-pill"></div></div>
      <div class="skeleton-kanban">${Array.from({ length: 4 }, () => `<div class="skeleton-col">
        <div class="skeleton-line w-70"></div>
        <div class="skeleton-card-stack"><div class="skeleton-block"></div><div class="skeleton-block"></div><div class="skeleton-block"></div></div>
      </div>`).join('')}</div>
    </div>`;
  }
  if (type === 'cards') {
    return `<div class="skeleton-page">
      ${Array.from({ length: 5 }, () => '<div class="skeleton-block skeleton-card-row"></div>').join('')}
    </div>`;
  }
  return `<div class="skeleton-page">
    <div class="skeleton-toolbar"><div class="skeleton-line w-50"></div><div class="skeleton-pill"></div></div>
    <div class="skeleton-table">${Array.from({ length: 8 }, () => '<div class="skeleton-row"></div>').join('')}</div>
  </div>`;
}

function setContentLoading(type = 'table') {
  const c = el('content');
  c.removeAttribute('style');
  c.innerHTML = skeletonPage(type);
  renderIcons();
}

function setButtonLoading(btn, label = 'Saving...') {
  if (!btn) return;
  btn.dataset.originalHtml = btn.dataset.originalHtml || btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = `${icon('loader-circle', 16, 'spin-icon')} ${escapeHtml(label)}`;
  renderIcons(btn);
}

function resetButtonLoading(btn) {
  if (!btn) return;
  btn.disabled = false;
  if (btn.dataset.originalHtml) btn.innerHTML = btn.dataset.originalHtml;
  renderIcons(btn);
}

function pageSkeletonType(page) {
  if (page === 'dashboard') return 'dashboard';
  if (page === 'pipeline') return 'kanban';
  if (page && page.startsWith('followups')) return 'table';
  return 'table';
}

// ─── Zero-dependency form validator ──────────────────────────────────────────
// Returns { addField(input, rules), onSuccess(cb) }.
// Intercepts the form's submit event; shows inline errors using the existing
// .jv-is-invalid / .form-error-msg CSS classes.
function _makeValidator(form) {
  const _rules = [];
  const _successCbs = [];

  function _clearError(input) {
    input.classList.remove('jv-is-invalid');
    const err = input.parentElement?.querySelector('.form-error-msg');
    if (err) err.remove();
  }

  function _showError(input, message) {
    input.classList.add('jv-is-invalid');
    if (!input.parentElement?.querySelector('.form-error-msg')) {
      const span = document.createElement('span');
      span.className = 'form-error-msg';
      span.textContent = message;
      input.parentElement.appendChild(span);
    }
  }

  const _api = {
    addField(input, rules) {
      if (!input) return _api;
      _rules.push({ input, rules });
      input.addEventListener('input',  () => _clearError(input));
      input.addEventListener('change', () => _clearError(input));
      return _api;
    },
    onSuccess(cb) { _successCbs.push(cb); }
  };

  form.addEventListener('submit', evt => {
    evt.preventDefault();
    let valid = true;
    _rules.forEach(({ input, rules }) => {
      _clearError(input);
      const val = input.value;
      for (const rule of rules) {
        let failed = false;
        if (rule.rule === 'required') failed = !val || !val.trim();
        else if (rule.rule === 'function') failed = !rule.validator(val);
        if (failed) { _showError(input, rule.errorMessage); valid = false; break; }
      }
    });
    if (valid) _successCbs.forEach(cb => cb());
  });

  return _api;
}

function showModal(html) {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `<div class="modal">${html}</div>`;
  document.body.appendChild(overlay);
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
  renderIcons(overlay);
  return overlay;
}

function showAccessDenied(email = '', debugMsg = '') {
  const safeEmail = escapeHtml(email);
  const safeDebugMsg = escapeHtml(debugMsg);
  document.body.innerHTML = `
    <div style="font-family:'Roboto',sans-serif;background:#F5F7FA;display:flex;align-items:center;justify-content:center;min-height:100vh">
      <div style="background:#fff;border-radius:12px;padding:48px 40px;text-align:center;max-width:480px;width:90%;box-shadow:0 4px 24px rgba(0,0,0,.12)">
        <i data-lucide="ban" style="width:64px;height:64px;color:#D32F2F;display:block;margin:0 auto 12px"></i>
        <h1 style="font-size:22px;font-weight:700;color:#212121;margin-bottom:8px">Access Revoked</h1>
        <p style="color:#757575;font-size:14px;line-height:1.6">Your account is not authorised to access the<br><strong>${APP_TITLE}</strong></p>
        ${safeEmail ? `<div style="background:#FFEBEE;color:#C62828;padding:6px 14px;border-radius:20px;font-size:13px;font-weight:500;display:inline-block;margin:12px 0">${safeEmail}</div>` : ''}
        <p style="color:#9E9E9E;font-size:12px;margin-top:16px;border-top:1px solid #EEE;padding-top:16px">Contact your administrator to request access.</p>
        ${safeDebugMsg ? `<div style="margin-top:16px;background:#F5F5F5;border-radius:6px;padding:12px;text-align:left;font-size:11px;font-family:monospace;color:#333;word-break:break-all;white-space:pre-wrap">${safeDebugMsg}</div>` : ''}
      </div>
    </div>`;
  renderIcons();
  Store._mountDebugButton();
}

// ─── Auth: session-token-based init ──────────────────────────────────────────
async function init() {
  renderIcons();
  renderInitialLoading();

  const token = localStorage.getItem('nbd_token');
  if (!token) { showLoginOverlay(); return; }

  try {
    await _continueAppInit(token);
  } catch (err) {
    const msg = String(err.message || err);
    localStorage.removeItem('nbd_token');
    if (/SESSION_EXPIRED|expired|invalid.*session/i.test(msg)) {
      showLoginOverlay('Your session expired. Please sign in again.');
    } else if (/ACCESS_DENIED|not authoris/i.test(msg)) {
      showLoginOverlay('Your account is not authorized to access this portal.');
    } else {
      showAccessDenied('', msg);
    }
  }
}

async function _continueAppInit(token) {
  Store.dispatch('SET_LOADING', { key: 'auth', value: true });
  const boot = await api.bootstrapWithToken(token);
  Store.dispatch('SET_USER', boot.user);
  Store.dispatch('SET_CONFIG', boot.config);
  AppCache.touch('config');
  AppLookup.rebuild();
  Store.dispatch('SET_LOADING', { key: 'auth', value: false });
  renderSidebar();
  // logout button shown via renderSidebar → .visible class

  const defaultPage = defaultPageForUser();
  _ensureCached('leads',          () => api.getLeads().catch(() => api.getFollowupLeads())).catch(() => {});
  _ensureCached('followups',      () => api.getFollowups({})).catch(() => {});
  _ensureCached('followupHistory',() => api.getFollowupHistory({})).catch(() => {});
  _ensureCached('activityLogs',   () => api.getLeadActivityLogs({})).catch(() => {});
  navigate(defaultPage);
  startCacheRevalidation();
}

function logout() {
  const token = localStorage.getItem('nbd_token');
  if (token) api.logout(token).catch(() => {});
  localStorage.removeItem('nbd_token');
  window.location.reload();
}

// ─── Google SSO helper ────────────────────────────────────────────────────────
function _initOverlayGoogleAuth(overlay) {
  const clientId  = typeof GOOGLE_CLIENT_ID !== 'undefined' ? GOOGLE_CLIENT_ID : '';
  const container = overlay.querySelector('#lo-google-container');
  const errEl     = overlay.querySelector('#lo-google-err');
  if (!container) return;

  // No client ID configured — show inline message instead of blank space
  if (!clientId) {
    if (errEl) { errEl.style.display = 'block'; errEl.textContent = 'Google sign-in not configured. Set GOOGLE_CLIENT_ID in Script Properties.'; }
    return;
  }

  // Loading spinner while GSI script resolves
  container.innerHTML = '<div style="height:44px;display:flex;align-items:center;justify-content:center"><span class="lo-spinner"></span></div>';

  function doInit() {
    container.innerHTML = '';
    window.google.accounts.id.initialize({
      client_id: clientId,
      callback: async function(response) {
        container.innerHTML = '<div style="padding:10px;text-align:center;font-size:13px;color:#666">Signing in…</div>';
        if (errEl) errEl.style.display = 'none';
        try {
          const result = await api.loginWithGoogle(response.credential);
          localStorage.setItem('nbd_token', result.token);
          overlay.remove();
          await _continueAppInit(result.token);
        } catch (err) {
          container.innerHTML = '';
          window.google.accounts.id.renderButton(container, { theme: 'outline', size: 'large', text: 'signin_with', shape: 'rectangular', width: 300 });
          if (errEl) { errEl.style.display = 'block'; errEl.textContent = String(err.message || err); }
        }
      }
    });
    window.google.accounts.id.renderButton(container, {
      theme: 'outline', size: 'large', text: 'signin_with', shape: 'rectangular', width: 300
    });
  }

  // Poll instead of relying on script onload — handles the race where the page's
  // own async/defer GSI tag is mid-fetch when the overlay is first shown.
  let tries = 0;
  const iv = setInterval(function() {
    if (window.google && window.google.accounts && window.google.accounts.id) {
      clearInterval(iv);
      doInit();
      return;
    }
    if (++tries > 80) { // 8 second timeout
      clearInterval(iv);
      container.innerHTML = '';
      if (errEl) { errEl.style.display = 'block'; errEl.textContent = 'Google sign-in failed to load. Check your network connection.'; }
    }
  }, 100);
}

function hasModule(name) {
  const target = String(name || '').toLowerCase().replace(/[^a-z0-9]/g, '');
  return (App.user.modules || []).some(m =>
    String(m || '').toLowerCase().replace(/[^a-z0-9]/g, '') === target
  );
}

function canNavigate(page) {
  if (!App.user) return false;
  const moduleMap = {
    dashboard: 'Dashboard',
    leads: 'Leads',
    pipeline: 'Pipeline',
    followups: 'Followups',
    'followups-today': 'Followups',
    'followups-overdue': 'Followups',
    'followups-custom': 'Followups',
    'followups-new': 'Followups'
  };
  if (page === 'config') return !!(App.user.canEditConfig || App.user.canManageUsers);
  if (page === 'leadform') return hasModule('LeadForm');
  return hasModule(moduleMap[page] || page);
}

function defaultPageForUser() {
  const ordered = [
    ['dashboard', 'Dashboard'],
    ['leads', 'Leads'],
    ['pipeline', 'Pipeline'],
    ['followups', 'Followups'],
    ['leadform', 'LeadForm']
  ];
  const match = ordered.find(([page]) => canNavigate(page));
  if (match) return match[0];
  if (App.user?.canEditConfig || App.user?.canManageUsers) return 'config';
  return 'dashboard';
}

  const sidebar = el('sidebar');

  if (window.matchMedia('(max-width: 768px)').matches) {
    sidebar.classList.toggle('mobile-open');

    sidebar.classList.toggle('collapsed');
    const btn = el('sb-toggle-btn');
    if (btn) {

      btn.title = collapsed ? 'Expand sidebar' : 'Collapse sidebar';
      btn.innerHTML = collapsed
        ? `<i data-lucide="panel-left-open"></i>`
        : `<i data-lucide="panel-left-close"></i>`;
      renderIcons(btn);
    }
  }
}

// ─── Topbar helpers ───────────────────────────────────────────────────────────
let _searchFocusedIdx = -1;

function _topbarSearchInput(input) {
  const q = (input.value || '').trim().toLowerCase();
  const drop = el('tb-search-drop');
  if (!drop) return;
  if (!q) { _closeSearchDrop(); return; }

  const leads = AppCache.getRows('leads');
  const matched = leads.filter(l =>
    String(l['Company Name']   || '').toLowerCase().includes(q) ||
    String(l['Contact Person'] || '').toLowerCase().includes(q) ||
    String(l['Remark']         || '').toLowerCase().includes(q)
  );
  const results = matched.slice(0, 6);

  if (!results.length) {
    drop.innerHTML = `<div style="padding:12px 14px;text-align:center;color:#9CA3AF;font-size:13px">No results found</div>`;
    drop.style.display = 'block';
    _searchFocusedIdx = -1;
    return;
  }

  const _badgeCls = s => {
    const sl = String(s || '').toLowerCase();
    if (sl === 'won')  return 'tb-sd-badge-won';
    if (sl === 'lost') return 'tb-sd-badge-lost';
    if (sl === 'hold') return 'tb-sd-badge-hold';
    return 'tb-sd-badge-open';
  };

  let html = results.map((l, i) => {
    const name    = escapeHtml(l['Company Name']   || '—');
    const contact = escapeHtml(l['Contact Person'] || '');
    const status  = l['Lead Status'] || 'Open';
    const stage   = escapeHtml(AppLookup.stageName(l['Stage ID']));
    const leadId  = String(l['Lead ID'] || '');
    const bcls    = _badgeCls(status);
    return `<div class="tb-sd-item" data-idx="${i}" data-lead-id="${escapeHtml(leadId)}" onclick="_topbarSelectLead(${JSON.stringify(leadId)})">
      <div class="tb-sd-icon">${icon('building-2', 15)}</div>
      <div style="flex:1;min-width:0">
        <div class="tb-sd-name">${name}</div>
        <div class="tb-sd-sub">${contact ? contact + ' · ' : ''}${stage}</div>
      </div>
      <span class="tb-sd-badge ${bcls}">${escapeHtml(status)}</span>
    </div>`;
  }).join('');

  if (matched.length > 6) {
    html += `<div class="tb-sd-footer" onclick="_topbarSearch(${JSON.stringify(input.value.trim())})">View all ${matched.length} results →</div>`;
  }

  drop.innerHTML = html;
  drop.style.display = 'block';
  _searchFocusedIdx = -1;
  renderIcons(drop);
}

function _topbarSearchKey(event) {
  const drop = el('tb-search-drop');
  if (!drop || drop.style.display === 'none') return;
  const items = Array.from(drop.querySelectorAll('.tb-sd-item[data-lead-id]'));
  if (!items.length) return;
  if (event.key === 'ArrowDown') {
    event.preventDefault();
    _searchFocusedIdx = Math.min(_searchFocusedIdx + 1, items.length - 1);
    items.forEach((it, i) => it.classList.toggle('focused', i === _searchFocusedIdx));
  } else if (event.key === 'ArrowUp') {
    event.preventDefault();
    _searchFocusedIdx = Math.max(_searchFocusedIdx - 1, 0);
    items.forEach((it, i) => it.classList.toggle('focused', i === _searchFocusedIdx));
  } else if (event.key === 'Enter') {
    event.preventDefault();
    if (_searchFocusedIdx >= 0 && items[_searchFocusedIdx]) {
      _topbarSelectLead(items[_searchFocusedIdx].dataset.leadId);
    } else {
      const inp = el('tb-search-input');
      if (inp && inp.value.trim()) _topbarSearch(inp.value.trim());
    }
  } else if (event.key === 'Escape') {
    _closeSearchDrop();
  }
}

function _topbarSelectLead(leadId) {
  _closeSearchDrop();
  if (!canNavigate('leads')) { toast('No access to Lead Master.', 'error'); return; }
  navigate('leads');
  setTimeout(() => { if (typeof openLeadDetail === 'function') openLeadDetail(leadId); }, 500);
}

function _closeSearchDrop() {
  const drop = el('tb-search-drop');
  if (drop) { drop.style.display = 'none'; drop.innerHTML = ''; }
  const inp = el('tb-search-input');
  if (inp) inp.value = '';
  _searchFocusedIdx = -1;
}

function _topbarSearch(query) {
  const q = String(query || '').trim();
  if (!q) return;
  _closeSearchDrop();
  if (!canNavigate('leads')) { toast('No access to Lead Master.', 'error'); return; }
  navigate('leads');
  setTimeout(() => {
    const s = qs('#lead-search') || qs('input[placeholder*="Search"]');
    if (s) { s.value = q; s.dispatchEvent(new Event('input')); }
  }, 400);
}

function _topbarRefresh(btn) {
  if (btn) btn.classList.add('spinning');
  AppCache.invalidateAll();
  const page = Store.getState().currentPage || 'dashboard';
  navigate(page);
  setTimeout(() => { if (btn) btn.classList.remove('spinning'); }, 1500);
}

function _topbarHelp() {
  toast('For help, contact your system administrator.', 'info');
}

// ─── Location name normaliser ─────────────────────────────────────────────────
// Strips Unicode diacritical marks (ī→i, ā→a, ń→n, etc.) that the
// countriesnow API returns for Indian city names, then applies Title Case.
// e.g. "SonīPat" → "Sonipat",  "Ahmedābād" → "Ahmedabad"
function _normalizeLocationName(str) {
  if (!str) return '';
  return String(str)
    .normalize('NFD')                    // decompose: ī → i + combining macron
    .replace(/[̀-ͯ]/g, '')
    .replace(/[^\x00-\x7F]/g, '')        // drop any remaining non-ASCII chars
    .toLowerCase()
    .replace(/\b\w/g, c => c.toUpperCase())  // Title Case each word
    .trim();
}

// ─── State → City cascade (countriesnow.space, no API key) ───────────────────
const _cityCache = {};

async function _fetchCitiesForState(stateName) {
  if (!stateName) return [];
  if (_cityCache[stateName] !== undefined) return _cityCache[stateName];
  try {
    const res = await fetch('https://countriesnow.space/api/v0.1/countries/state/cities', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ country: 'India', state: stateName })
    });
    const json = await res.json();
    // Normalise every city name as it comes in — removes diacritics and applies Title Case
    const raw = json.error ? [] : (json.data || []);
    const cleaned = [...new Set(raw.map(_normalizeLocationName).filter(Boolean))].sort();
    _cityCache[stateName] = cleaned;
  } catch (_) {
    _cityCache[stateName] = [];
  }
  return _cityCache[stateName];
}

async function _initStateCityDropdowns(root, initState, initCity) {
  const stateEl = root.querySelector('[name="State"]');
  const cityEl  = root.querySelector('[name="City"]');
  if (!stateEl || !cityEl || cityEl.tagName !== 'SELECT') return;

  async function refresh(stateName, selectedCity) {
    const cleanSelected = _normalizeLocationName(selectedCity);
    cityEl.innerHTML = '<option value="">Loading cities…</option>';
    cityEl.disabled = true;
    const cities = await _fetchCitiesForState(stateName);
    cityEl.disabled = false;
    cityEl.innerHTML = '<option value="">Select City</option>';
    cities.forEach(name => {
      const o = document.createElement('option');
      o.value = name; o.textContent = name;
      if (name === cleanSelected || name === selectedCity) o.selected = true;
      cityEl.appendChild(o);
    });
    if (cleanSelected && !Array.from(cityEl.options).some(o => o.value === cleanSelected)) {
      const o = document.createElement('option');
      o.value = cleanSelected; o.textContent = cleanSelected; o.selected = true;
      cityEl.insertBefore(o, cityEl.options[1] || null);
    }
  }

  stateEl.addEventListener('change', () => refresh(stateEl.value, ''));
  if (initState || stateEl.value) await refresh(initState || stateEl.value, initCity);
}

window.addEventListener('DOMContentLoaded', init);

<script>
  let leadTable;

  async function loadLeads(force = false) {
    el('page-title').textContent = 'Leads';
    if (force) {
      setContentLoading('table');
      const rows = await api.getLeads();
      AppCache.setRows('leads', rows);
    } else if (!AppCache.isLoaded('leads')) {
      setContentLoading('table');
      await _ensureCached('leads', () => api.getLeads());
    }
    _renderLeadsTable(AppCache.getRows('leads'));
  }

  function _renderLeadsTable(leads) {
    const stageMap = App.config.stages.reduce(function (m, s) { m[s['Stage ID']] = s; return m; }, {});
    const userMap = App.config.users.reduce(function (m, u) { m[u.id] = u.name; return m; }, {});
    const statusOpts = App.config.statuses.map(function (s) { return '<option>' + escapeHtml(s) + '</option>'; }).join('');
    const priorityOpts = App.config.priorities.map(function (p) { return '<option>' + escapeHtml(p) + '</option>'; }).join('');
    const stageOpts = App.config.stages.map(function (s) { return '<option value="' + escapeHtml(s['Stage ID']) + '">' + escapeHtml(s['Stage Name']) + '</option>'; }).join('');

    el('content').innerHTML = `
    <style>
      #lead-table .tabulator-header { background:#fafafa; border-bottom:2px solid #e5e7eb; }
      #lead-table .tabulator-col { background:#fafafa; border-right:none; }
      #lead-table .tabulator-col-title { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.5px; color:#6b7280; }
      #lead-table .tabulator-cell { border-right:none; padding:7px 12px; vertical-align:middle; font-size:13px; }
      #lead-table .tabulator-row { cursor:pointer; border-bottom:1px solid #f3f4f6; }
      #lead-table .tabulator-row:hover .tabulator-cell { background:#f8f9ff; }
      #lead-table .tabulator-footer { background:#fafafa; border-top:1px solid #e5e7eb; padding:6px 12px; }
      #lead-table .tabulator-page { font-size:12px; padding:3px 9px; border-radius:5px; border:1px solid #e5e7eb; margin:0 2px; cursor:pointer; }
      #lead-table .tabulator-page.active { background:#4f46e5; color:#fff; border-color:#4f46e5; }
      #lead-table .tabulator-page:disabled { opacity:.4; cursor:default; }
      #lead-table .tabulator-paginator { display:flex; align-items:center; gap:4px; font-size:12px; color:#6b7280; }
    </style>
    <div style="display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:12px">
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        <div style="position:relative;display:flex;align-items:center">
          <span style="position:absolute;left:8px;color:#9ca3af;pointer-events:none;line-height:0">${icon('search', 13)}</span>
          <input id="lead-search" class="form-control" placeholder="Search company or contact..." style="padding-left:28px;height:32px;font-size:12px;width:200px">
        </div>
        <select id="lead-status-f"   class="form-control" style="height:32px;font-size:12px;padding:0 8px;min-width:0;width:120px"><option value="">All Status</option>${statusOpts}</select>
        <select id="lead-priority-f" class="form-control" style="height:32px;font-size:12px;padding:0 8px;min-width:0;width:120px"><option value="">All Priority</option>${priorityOpts}</select>
        <select id="lead-stage-f"    class="form-control" style="height:32px;font-size:12px;padding:0 8px;min-width:0;width:140px"><option value="">All Stages</option>${stageOpts}</select>
      </div>
      <button class="btn btn-primary" style="height:32px;padding:0 14px;font-size:13px;white-space:nowrap;flex-shrink:0" onclick="openLeadForm()">
        ${icon('plus', 14)} Add Lead
      </button>
    </div>
    <div style="border:1px solid #e5e7eb;border-radius:10px;overflow:hidden;background:#fff"><div id="lead-table"></div></div>`;

    renderIcons();

    const priColors = { hot: 'background:#fee2e2;color:#dc2626', warm: 'background:#fff7ed;color:#ea580c', cold: 'background:#eff6ff;color:#2563eb' };

    if (leadTable) { try { leadTable.destroy(); } catch(e) {} leadTable = null; }
    leadTable = new Tabulator('#lead-table', {
      data: leads,
      layout: 'fitColumns',
      pagination: 'local',
      paginationSize: 25,
      rowHeight: 46,
      placeholder: '<div style="padding:48px;text-align:center;color:#9ca3af;font-size:13px">No leads found</div>',
      rowFormatter: function (row) { row.getElement().title = ''; },
      columns: [
        {
          title: 'Company / Contact', field: 'Company Name', sorter: 'string', minWidth: 180,
          formatter: function (cell) {
            const d = cell.getRow().getData();
            const co = '<div style="font-weight:600;color:#111827;font-size:13px;line-height:1.3">' + escapeHtml(d['Company Name'] || '—') + '</div>';
            const ct = d['Contact Person'] ? '<div style="font-size:11px;color:#6b7280;margin-top:1px">' + escapeHtml(d['Contact Person']) + '</div>' : '';
            return co + ct;
          }
        },
        {
          title: 'Client Description', field: 'Client Description', sorter: 'string', minWidth: 160,
          formatter: function (cell) {
            const v = cell.getValue() || '';
            return '<div style="font-size:12px;color:#374151;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:180px" title="' + escapeHtml(v) + '">' + escapeHtml(v) + '</div>';
          }
        },
        {
          title: 'Phone', field: 'Phone', minWidth: 115,
          formatter: function (cell) {
            return '<span style="font-size:12px;color:#374151">' + escapeHtml(cell.getValue() || '—') + '</span>';
          }
        },
        {
          title: 'Location', field: 'City', minWidth: 100,
          formatter: function (cell) {
            const d = cell.getRow().getData();
            const city = d['City'] ? '<div style="font-size:12px;color:#374151">' + escapeHtml(d['City']) + '</div>' : '';
            const state = d['State'] ? '<div style="font-size:11px;color:#9ca3af">' + escapeHtml(d['State']) + '</div>' : '';
            return city || state ? city + state : '<span style="color:#d1d5db">—</span>';
          }
        },
        {
          title: 'Stage', field: 'Stage ID', minWidth: 130,
          formatter: function (cell) {
            const s = stageMap[cell.getValue()];
            if (!s) return '<span style="color:#d1d5db">—</span>';
            const c = safeColor(s.Color) || '#6366f1';
            return '<span style="display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:500;color:#111827;max-width:120px" title="' + escapeHtml(s['Stage Name']) + '">'
              + '<span style="width:7px;height:7px;border-radius:50%;background:' + c + ';flex-shrink:0;display:inline-block"></span>'
              + '<span style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + escapeHtml(s['Stage Name']) + '</span>'
              + '</span>';
          }
        },
        {
          title: 'Priority', field: 'Priority', minWidth: 85, hozAlign: 'center',
          formatter: function (cell) {
            const p = (cell.getValue() || '').toLowerCase();
            const st = priColors[p] || 'background:#f3f4f6;color:#6b7280';
            return cell.getValue()
              ? '<span style="' + st + ';font-size:11px;font-weight:700;padding:2px 9px;border-radius:999px;letter-spacing:.3px;display:inline-block">' + escapeHtml(cell.getValue()) + '</span>'
              : '<span style="color:#d1d5db">—</span>';
          }
        },
        {
          title: 'Assigned', field: 'Assigned To', minWidth: 100,
          formatter: function (cell) {
            const name = userMap[cell.getValue()] || cell.getValue() || '';
            return name ? '<span style="font-size:12px;color:#374151">' + escapeHtml(name) + '</span>' : '<span style="color:#d1d5db">—</span>';
          }
        },
        // { title: '', width: 74, hozAlign: 'center', headerSort: false,
        //   formatter: function() {
        //     return '<button class="btn btn-sm btn-primary" style="font-size:11px;font-weight:600;padding:3px 12px;border-radius:6px" onclick="event.stopPropagation()">View</button>';
        //   },
        //   cellClick: function(e, cell) { openLeadDetail(_leadRowId(cell.getRow().getData())); }
        // }
        ...(String(App.user.department || '').trim().toUpperCase() === 'MIS' ? [{
          title: '', width: 80, hozAlign: 'center', headerSort: false,
          formatter: function() {
            return '<button class="btn btn-sm" style="color:#D32F2F;border-color:#D32F2F;padding:2px 10px;font-size:11px;font-weight:600">Delete</button>';
          },
          cellClick: function(e, cell) {
            e.stopPropagation();
            const leadId = _leadRowId(cell.getRow().getData());
            if (!leadId) return;
            if (!confirm('Delete this lead and all its follow-ups? This cannot be undone.')) return;
            AppCache.removeRow('leads', 'Lead ID', leadId);
            cell.getRow().delete();
            QueueManager.enqueue({
              module: 'leads', actionType: 'deleteLead',
              payload: { id: leadId },
              onDone: () => toast('Lead deleted!'),
              onFail: j => {
                toast('Delete failed: ' + (j.error || 'Error'), 'error');
                _refreshLeadsCache().catch(() => {});
              }
            });
            toast('Deleting…', 'info');
          }
        }] : [])
      ]
    });

    leadTable.on('rowClick', function (e, row) {
      if (e.target.closest('button')) return;
      openLeadDetail(_leadRowId(row.getData()));
    });

    window.leadTable = leadTable;
    el('lead-search').addEventListener('input', function () { applyLeadFilters(); });
    el('lead-status-f').addEventListener('change', function () { applyLeadFilters(); });
    el('lead-priority-f').addEventListener('change', function () { applyLeadFilters(); });
    el('lead-stage-f').addEventListener('change', function () { applyLeadFilters(); });
  }

  function applyLeadFilters() {
    const filters = [];
    const q = el('lead-search')?.value?.trim();
    const status = el('lead-status-f')?.value;
    const priority = el('lead-priority-f')?.value;
    const stage = el('lead-stage-f')?.value;
    if (q) filters.push([{ field: 'Company Name', type: 'like', value: q }, { field: 'Contact Person', type: 'like', value: q }, { field: 'Client Description', type: 'like', value: q }]);
    if (status) filters.push({ field: 'Lead Status', type: '=', value: status });
    if (priority) filters.push({ field: 'Priority', type: '=', value: priority });
    if (stage) filters.push({ field: 'Stage ID', type: '=', value: stage });
    filters.length ? leadTable.setFilter(filters) : leadTable.clearFilter();
  }
  window.applyLeadFilters = applyLeadFilters;

  async function openLeadDetail(leadId) {
    // Serve from cache; fall back to API if not loaded (e.g. direct deep link).
    let lead = AppCache.getRows('leads').find(l => l['Lead ID'] === leadId);
    if (lead && !AppCache.isLoaded('followups')) {
      await _ensureCached('followups', () => api.getFollowups({}));
    }
    if (lead && !AppCache.isLoaded('followupHistory')) {
      await _ensureCached('followupHistory', () => api.getFollowupHistory({})).catch(() => { });
    }
    if (lead && !AppCache.isLoaded('activityLogs')) {
      await _ensureCached('activityLogs', () => api.getLeadActivityLogs({})).catch(() => { });
    }
    let followups = AppCache.getRows('followups')
      .filter(f => f['Lead ID'] === leadId)
      .sort((a, b) => new Date(b['Created At']) - new Date(a['Created At']));
    let followupHistory = AppCache.getRows('followupHistory')
      .filter(f => f['Lead ID'] === leadId);
    let activityLogs = AppCache.getRows('activityLogs')
      .filter(f => f['Lead ID'] === leadId);
    if (!lead) {
      const data = await api.getLead(leadId);
      lead = data.lead;
      followups = data.followups || [];
      followupHistory = data.followupHistory || [];
      activityLogs = data.activityLogs || [];
    }
    const leadFields = App.config.leadFields || [];
    const configOptions = _configOptionsMap(App.config._allConfigs || []);
    const fuContext = _buildFollowupContext([lead]);
    const visibleFollowups = followups.filter(f => !_isActivityLog(f) && _isOpenFollowupRow(f));
    const stageMap = App.config.stages.reduce((m, s) => { m[s['Stage ID']] = s; return m; }, {});
    const stage = stageMap[lead['Stage ID']];
    const showNbdPush = _canPushLeadToNbd(lead);
    const _sc = safeColor(stage?.Color) || '#6366f1';
    const _stageVal = '<span style="display:inline-flex;align-items:center;gap:6px"><span style="width:8px;height:8px;border-radius:50%;background:' + _sc + ';flex-shrink:0;display:inline-block"></span>' + escapeHtml(stage?.['Stage Name'] || '—') + '</span>';
    const overlay = showModal(`
    <div class="modal-header">
      <h2 style="font-size:18px;font-weight:700;color:#111827">${escapeHtml(lead['Company Name'] || lead['Client Description'] || '—')}</h2>
      <button class="modal-close" onclick="this.closest('.modal-overlay').remove()">✕</button>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:0;border:1px solid #e5e7eb;border-radius:10px;overflow:hidden;margin-bottom:16px;font-size:13px">
      ${lead['Client Description'] ? `<div style="grid-column:1/-1;padding:9px 16px;border-bottom:1px solid #e5e7eb;background:#f9fafb">
        <div style="font-size:11px;color:#9ca3af;font-weight:500;margin-bottom:3px">Client Description</div>
        <div style="font-size:12.5px;color:#374151;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:default" title="${escapeHtml(lead['Client Description'])}">${escapeHtml(lead['Client Description'])}</div>
      </div>` : ''}
      <div style="padding:10px 16px;border-bottom:1px solid #e5e7eb">
        <div style="font-size:11px;color:#9ca3af;font-weight:500;margin-bottom:2px">Company</div>
        <div style="font-weight:600;color:#111827">${escapeHtml(lead['Company Name'] || '—')}</div>
      </div>
      <div style="padding:10px 16px;border-bottom:1px solid #e5e7eb;border-left:1px solid #e5e7eb">
        <div style="font-size:11px;color:#9ca3af;font-weight:500;margin-bottom:2px">Contact Person</div>
        <div style="font-weight:600;color:#111827">${escapeHtml(lead['Contact Person'] || '—')}</div>
      </div>
      <div style="padding:10px 16px;border-bottom:1px solid #e5e7eb">
        <div style="font-size:11px;color:#9ca3af;font-weight:500;margin-bottom:2px">Stage</div>
        <div style="font-weight:600;color:#111827">${_stageVal}</div>
      </div>
      <div style="padding:10px 16px;border-bottom:1px solid #e5e7eb;border-left:1px solid #e5e7eb">
        <div style="font-size:11px;color:#9ca3af;font-weight:500;margin-bottom:2px">Phone</div>
        <div style="font-weight:600;color:#111827">${escapeHtml(lead['Phone'] || '—')}</div>
      </div>
      <div style="padding:10px 16px;border-bottom:1px solid #e5e7eb">
        <div style="font-size:11px;color:#9ca3af;font-weight:500;margin-bottom:2px">Priority</div>
        <div style="font-weight:600;color:#111827">${escapeHtml(lead['Priority'] || '—')}</div>
      </div>
      <div style="padding:10px 16px;border-bottom:1px solid #e5e7eb;border-left:1px solid #e5e7eb">
        <div style="font-size:11px;color:#9ca3af;font-weight:500;margin-bottom:2px">City</div>
        <div style="font-weight:600;color:#111827">${escapeHtml(lead['City'] || '—')}</div>
      </div>
      <div style="padding:10px 16px">
        <div style="font-size:11px;color:#9ca3af;font-weight:500;margin-bottom:2px">Source</div>
        <div style="font-weight:600;color:#111827">${escapeHtml(lead['Source'] || '—')}</div>
      </div>
      <div style="padding:10px 16px;border-left:1px solid #e5e7eb">
        <div style="font-size:11px;color:#9ca3af;font-weight:500;margin-bottom:2px">State</div>
        <div style="font-weight:600;color:#111827">${escapeHtml(lead['State'] || '—')}</div>
      </div>
      ${lead['Next Follow-up Date'] ? '<div style="padding:10px 16px;border-top:1px solid #e5e7eb;grid-column:1/-1;background:#f9fafb"><div style="font-size:11px;color:#9ca3af;font-weight:500;margin-bottom:2px">Next Follow-up</div><div style="font-weight:700;color:#111827;font-size:14px">' + formatDate(lead['Next Follow-up Date']) + '</div></div>' : ''}
    </div>
    ${buildLeadCustomFieldSummary(lead, leadFields, configOptions)}
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">
      <div class="tabs" style="margin-bottom:0;border:none">
        <button class="tab-btn active" onclick="switchTab(this,'tab-history')">Follow-up History</button>
        <button class="tab-btn" onclick="switchTab(this,'tab-log')">Activity Logs</button>
        <button class="tab-btn" onclick="switchTab(this,'tab-edit')">Edit Lead</button>
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <button class="btn btn-primary btn-sm" onclick="openFollowupForm('${escapeHtml(String(lead['Lead ID'] || ''))}','${escapeHtml(String(lead['Client Description'] || '').replace(/'/g, '&#39;'))}')">
          ${icon('plus', 14)} Add Follow-up
        </button>
        ${showNbdPush ? `<button class="btn btn-outlined btn-sm" id="push-nbd-btn" onclick="pushLeadToNbdFromDetail('${escapeHtml(String(lead['Lead ID'] || ''))}')">
          ${icon('send', 14)} Push to NBD
        </button>` : ''}
      </div>
    </div>
    <div id="tab-log" class="tab-pane">
      ${_activityLogTable(activityLogs, 'No activity logs yet.', fuContext)}
    </div>
    <div id="tab-history" class="tab-pane" style="display:none">
      ${_followupHistoryTable(followupHistory, 'No follow-up history yet.', fuContext)}
    </div>
    <div id="tab-edit" class="tab-pane" style="display:none">
      ${buildLeadFormHTML(lead, leadFields, configOptions)}
    </div>`);
    overlay.querySelector('.modal')?.classList.add('modal-wide');

    const editForm = overlay.querySelector('#lead-form');
    if (editForm) {
      _initLeadValidator(editForm).onSuccess(async () => {
        if (!validateCfMultiselects(editForm)) return;
        const btn = editForm.querySelector('[type=submit]');
        setButtonLoading(btn);
        try {
          const payload = await collectLeadFormPayload(editForm);
          payload['Lead ID'] = lead['Lead ID'];
          AppCache.patchRow('leads', 'Lead ID', lead['Lead ID'], { ...payload, 'Updated At': _nowStr() });
          overlay.remove();
          _refreshLeadViewsAfterLocalChange();
          QueueManager.enqueue({
            module: 'leads', actionType: 'saveLead', payload,
            onDone: () => toast('Lead saved!'),
            onFail: j  => {
              _refreshLeadsCache().catch(() => {});
              toast('Save failed: ' + (j.error || 'Error'), 'error');
            }
          });
          toast('Saving…', 'info');
        } catch (err) {
          toast(err, 'error');
          resetButtonLoading(btn);
        }
      });
    }
    initLeadCustomFields(overlay);
    _initStateCityDropdowns(overlay, lead['State'] || '', lead['City'] || '');
  }

  function switchTab(btn, tabId) {
    btn.closest('.modal').querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    btn.closest('.modal').querySelectorAll('.tab-pane').forEach(pane => {
      pane.style.display = pane.id === tabId ? '' : 'none';
    });
  }

  function _canPushLeadToNbd(lead) {
    if (!lead) return false;
    if (lead['NBD Lead ID'] || lead['Pushed To NBD At']) return false;
    const appTitle = String(typeof APP_TITLE !== 'undefined' ? APP_TITLE : '').toLowerCase();
    return appTitle.includes('lq');
  }

  async function pushLeadToNbdFromDetail(leadId) {
    if (!leadId) return;
    const lead = AppCache.getRows('leads').find(l => l['Lead ID'] === leadId);
    const companyName = lead ? (lead['Company Name'] || leadId) : leadId;

    const confirm = await Swal.fire({
      title: 'Push to NBD?',
      html: `<div style="font-size:14px;color:#374151">Push <strong>${escapeHtml(companyName)}</strong> to the NBD portal?<br><span style="font-size:12px;color:#9ca3af;margin-top:6px;display:block">This creates a new lead in NBD. The action cannot be undone.</span></div>`,
      icon: 'question',
      showCancelButton: true,
      confirmButtonText: 'Yes, Push',
      cancelButtonText: 'Cancel',
      confirmButtonColor: '#6366f1',
    });
    if (!confirm.isConfirmed) return;

    const btn = el('push-nbd-btn');
    if (btn) setButtonLoading(btn, 'Pushing...');
    QueueManager.enqueue({
      module: 'leads',
      actionType: 'pushLeadToNbd',
      payload: { leadId },
      onDone: j => {
        const nbdLeadId = j.finalRecordId || '';
        AppCache.patchRow('leads', 'Lead ID', leadId, {
          'NBD Lead ID': nbdLeadId,
          'Pushed To NBD At': _nowStr(),
          'Updated At': _nowStr()
        });
        document.querySelector('.modal-overlay')?.remove();
        _refreshLeadViewsAfterLocalChange();
        toast('Lead pushed to NBD successfully!', 'success');
      },
      onFail: j => {
        if (btn) resetButtonLoading(btn);
        toast('Push to NBD failed: ' + (j.error || 'Unknown error'), 'error');
      }
    });
    toast('Queued: pushing lead to NBD...', 'info');
  }

  async function openLeadForm(data = {}) {
    const leadFields = App.config.leadFields || [];
    const configOptions = _configOptionsMap(App.config._allConfigs || []);
    const leadId = _leadRowId(data);
    const overlay = showModal(`
    <div class="modal-header">
      <h2>${leadId ? 'Edit' : 'Add'} Lead</h2>
      <button class="modal-close" onclick="this.closest('.modal-overlay').remove()">✕</button>
    </div>
    ${buildLeadFormHTML(data, leadFields, configOptions)}`);
    const form = overlay.querySelector('#lead-form');
    _initLeadValidator(form).onSuccess(async () => {
      if (!validateCfMultiselects(form)) return;
      const btn = form.querySelector('[type=submit]');
      setButtonLoading(btn);
      try {
        const payload = await collectLeadFormPayload(form);
        const updateId = _leadRowId(data) || _leadRowId(payload);
        const isUpdate = !!updateId;
        if (isUpdate) payload['Lead ID'] = updateId;
        const tempId = isUpdate ? updateId : ('temp-' + Date.now());
        if (isUpdate) {
          AppCache.patchRow('leads', 'Lead ID', updateId, { ...payload, 'Updated At': _nowStr() });
        } else {
          AppCache.addRow('leads', {
            ...payload, 'Lead ID': tempId, '_queueTemp': true,
            'Lead Status': payload['Lead Status'] || 'Open',
            'Created At': _nowStr(), 'Updated At': _nowStr()
          });
        }
        overlay.remove();
        _refreshLeadViewsAfterLocalChange();
        QueueManager.enqueue({
          module: 'leads', actionType: 'saveLead', payload, tempId,
          onDone: j => {
            if (!isUpdate && j.finalRecordId) {
              AppCache.patchRow('leads', 'Lead ID', tempId, { 'Lead ID': j.finalRecordId, '_queueTemp': false });
              if (AppCache.isLoaded('followups')) _refreshFollowupsCache().catch(() => {});
              _refreshLeadViewsAfterLocalChange();
            }
            toast('Lead saved!');
          },
          onFail: j => {
            if (!isUpdate) AppCache.removeRow('leads', 'Lead ID', tempId);
            _refreshLeadsCache().catch(() => {});
            toast('Save failed: ' + (j.error || 'Error'), 'error');
          }
        });
        toast(isUpdate ? 'Saving…' : 'Lead queued for saving…', 'info');
      } catch (err) {
        toast(err, 'error');
        resetButtonLoading(btn);
      }
    });
    initLeadCustomFields(overlay);
    _initStateCityDropdowns(overlay, data['State'] || '', data['City'] || '');
  }

  function _initLeadValidator(form) {
    const v = _makeValidator(form);
    const f = name => form.querySelector(`[name="${name}"]`);
    v.addField(f('Company Name'), [{ rule: 'required', errorMessage: 'Company name is required.' }]);

    const help = field['Help Text'] ? `<div style="font-size:11px;color:#777;margin-top:3px">${escapeHtml(field['Help Text'])}</div>` : '';
    const attrs = `name="${escapeHtml(key)}" data-custom-key="${escapeHtml(key)}" data-required="${required ? 'true' : 'false'}"`;
    let control = '';

    if (type === 'Textarea') {
      control = `<textarea class="form-control" ${attrs} rows="3">${escapeHtml(value)}</textarea>`;

    } else if (type === 'Select') {
      const selected = String(value || '').trim();
      const options = _customFieldOptions(field, configOptions);
      control = `<select class="form-control" ${attrs}>
      <option value="">Select…</option>
      ${options.map(o => `<option value="${escapeHtml(o)}" ${selected === o ? 'selected' : ''}>${escapeHtml(o)}</option>`).join('')}
    </select>`;

    } else if (type === 'Multi Select') {
      const selected = String(value || '').split(',').map(v => v.trim()).filter(Boolean);
      const options = _customFieldOptions(field, configOptions);
      const optHTML = options.map(o => `
      <label class="cf-ms-item">
        <input type="checkbox" value="${escapeHtml(o)}" ${selected.includes(o) ? 'checked' : ''}>
        <span>${escapeHtml(o)}</span>

      control = `<div class="cf-multiselect">
      <div class="cf-ms-trigger" tabindex="0" role="combobox" aria-haspopup="listbox" aria-expanded="false">

        <span class="cf-ms-arrow"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg></span>
      </div>
      <div class="cf-ms-drop" hidden>
        <div class="cf-ms-search-wrap"><input class="cf-ms-search" type="text" placeholder="Search…" autocomplete="off"></div>
        <div class="cf-ms-list">${optHTML}</div>
        <div class="cf-ms-empty">No options found</div>
      </div>
      <input type="hidden" name="${escapeHtml(key)}" data-custom-key="${escapeHtml(key)}" data-required="${required ? 'true' : 'false'}" data-cf-ms-value value="${escapeHtml(selected.join(','))}">
    </div>`;

    } else if (type === 'Checkbox') {
      const checked = value === true || value === 'TRUE' || value === 'on';
      control = `<label style="display:flex;align-items:center;gap:8px;color:var(--md-text)">
      <input type="checkbox" ${attrs} ${checked ? 'checked' : ''}> Yes

    } else if (type === 'File') {
      const accept = field['File Types'] ? `accept="${escapeHtml(field['File Types'])}"` : '';
      const existing = value ? `<a href="${escapeHtml(value)}" target="_blank" rel="noopener" style="font-size:12px;display:inline-flex;align-items:center;gap:4px;margin-bottom:6px">${icon('paperclip', 13)} View current file</a>` : '';
      control = `${existing}<input type="hidden" name="${escapeHtml(key)}" value="${escapeHtml(value)}" data-custom-key="${escapeHtml(key)}" data-required="${required ? 'true' : 'false'}">

      const max = field['Validation Max'] ? `max="${escapeHtml(field['Validation Max'])}"` : '';
      const pattern = field['Validation Regex'] ? `pattern="${escapeHtml(field['Validation Regex'])}"` : '';
      control = `<input class="form-control" type="${inputType}" ${attrs} value="${escapeHtml(_formatCustomFieldInputValue(value, type))}" ${min} ${max} ${pattern}>`;

  // ─── Initialise all custom-field widgets inside a root element ────────────────

  function initLeadCustomFields(root) {
    const stageSelect = root.querySelector('#lead-stage-select');
    const getStageId = () => {
      if (stageSelect) return stageSelect.value || '';
      const hidden = root.querySelector('input[type="hidden"][name="Stage ID"]');
      return hidden ? hidden.value : '';
    };

    const refresh = () => {
      const stageId = getStageId();
      let hasActive = false;
      root.querySelectorAll('.lead-custom-field').forEach(row => {
        const stageActive = !row.dataset.stageId || row.dataset.stageId === stageId;
        const section = row.closest('.custom-field-section');
        const isSkippable = section && section.dataset.skippable === 'true';
        const skipCb = section && section.querySelector('.cf-skip-checkbox');
        const skipped = isSkippable && skipCb && skipCb.checked;
        const skipVis = row.dataset.skipVis || 'normal';
        const active = stageActive && (isSkippable ? (skipped ? skipVis === 'skip_only' : skipVis === 'normal') : true);
        row.style.display = active ? 'block' : 'none';
        row.querySelectorAll('input,select,textarea').forEach(input => {
          input.disabled = !active;
          if (!(input.type === 'hidden' && input.hasAttribute('data-cf-ms-value'))) {
            input.required = active && input.dataset.required === 'true';
          }
        });
        const trigger = row.querySelector('.cf-ms-trigger');
        if (trigger) { trigger.style.opacity = active ? '' : '.45'; trigger.style.pointerEvents = active ? '' : 'none'; }
        if (active) hasActive = true;
      });
      const section = root.querySelector('.custom-field-section');
      if (section) section.style.display = hasActive || section.querySelector('.cf-skip-row') ? '' : 'none';
    };

    if (stageSelect) stageSelect.addEventListener('change', refresh);
    _initCfMultiselects(root);
    refresh();
    root._cfRefresh = refresh;
  }

  function _toggleSkipFields(checkbox) {
    const section = checkbox.closest('.custom-field-section');
    const skipInput = section && section.querySelector('[name="__stage_skipped"]');
    if (skipInput) skipInput.value = checkbox.checked ? 'true' : '';
    const root = section && section.closest('.modal, #lf-wrap, #tab-edit, #content, form');
    if (root && root._cfRefresh) root._cfRefresh();
    else if (section) {
      // fallback: walk up to find _cfRefresh
      let el = section.parentElement;
      while (el) { if (el._cfRefresh) { el._cfRefresh(); break; } el = el.parentElement; }
    }
  }

  function _initCfMultiselects(root) {
    root.querySelectorAll('.cf-multiselect').forEach(ms => {
      if (ms._cfInit) return; // already wired
      ms._cfInit = true;

      const trigger = ms.querySelector('.cf-ms-trigger');
      const drop = ms.querySelector('.cf-ms-drop');
      const searchEl = ms.querySelector('.cf-ms-search');
      const list = ms.querySelector('.cf-ms-list');
      const emptyEl = ms.querySelector('.cf-ms-empty');
      const hiddenEl = ms.querySelector('[data-cf-ms-value]');
      const chipsWrap = ms.querySelector('[data-cf-ms-chips]');
      const placeholder = ms.querySelector('.cf-ms-placeholder');

      function selectedValues() {
        return Array.from(list.querySelectorAll('input[type=checkbox]:checked')).map(cb => cb.value);
      }

      function renderChips() {
        const sel = selectedValues();
        chipsWrap.innerHTML = sel.map(v =>
          `<span class="cf-ms-chip">${escapeHtml(v)}<button type="button" class="cf-ms-chip-x" data-v="${escapeHtml(v)}">&#xd7;</button></span>`
        ).join('');
        placeholder.style.display = sel.length ? 'none' : '';
        if (hiddenEl) hiddenEl.value = sel.join(',');
        trigger.classList.remove('cf-ms-error');
      }

      function openDrop() {
        drop.hidden = false;
        trigger.setAttribute('aria-expanded', 'true');
        if (searchEl) { searchEl.value = ''; filterList(''); searchEl.focus(); }
      }

      function closeDrop() {
        drop.hidden = true;
        trigger.setAttribute('aria-expanded', 'false');
      }

      function filterList(q) {
        const term = q.toLowerCase().trim();
        let visible = 0;
        list.querySelectorAll('.cf-ms-item').forEach(item => {
          const text = (item.querySelector('span')?.textContent || '').toLowerCase();
          const show = !term || text.includes(term);
          item.style.display = show ? '' : 'none';
          if (show) visible++;
        });
        if (emptyEl) emptyEl.style.display = visible ? 'none' : '';
      }

      trigger.addEventListener('click', (e) => {
        if (e.target.closest('.cf-ms-chip-x')) return;
        drop.hidden ? openDrop() : closeDrop();
      });
      trigger.addEventListener('keydown', e => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); drop.hidden ? openDrop() : closeDrop(); }
        if (e.key === 'Escape') closeDrop();
      });
      if (searchEl) searchEl.addEventListener('input', e => filterList(e.target.value));

      // Chip × remove
      ms.addEventListener('click', e => {
        const xBtn = e.target.closest('.cf-ms-chip-x');
        if (!xBtn) return;
        e.stopPropagation();
        const val = xBtn.dataset.v;
        const cb = Array.from(list.querySelectorAll('input[type=checkbox]')).find(c => c.value === val);
        if (cb) { cb.checked = false; renderChips(); }
      });

      // Checkbox toggle
      list.addEventListener('change', () => renderChips());

      // Close on outside click
      const outsideClose = e => {
        if (!document.body.contains(ms)) {
          document.removeEventListener('click', outsideClose, true);
          return;
        }
        if (!ms.contains(e.target)) closeDrop();
      };
      document.addEventListener('click', outsideClose, true);

      renderChips(); // initial state
    });
  }

  // Returns false and marks invalid cf-multiselects when required ones are empty.
  function validateCfMultiselects(root) {
    let valid = true;
    root.querySelectorAll('.cf-multiselect').forEach(ms => {
      const row = ms.closest('.lead-custom-field');
      if (row && row.style.display === 'none') return; // inactive stage field — skip
      const hiddenEl = ms.querySelector('[data-cf-ms-value]');
      if (!hiddenEl || hiddenEl.dataset.required !== 'true') return;
      const trigger = ms.querySelector('.cf-ms-trigger');
      if (!hiddenEl.value.trim()) {
        if (trigger) { trigger.classList.add('cf-ms-error'); trigger.scrollIntoView({ behavior: 'smooth', block: 'center' }); }
        valid = false;
      } else {
        if (trigger) trigger.classList.remove('cf-ms-error');
      }
    });
    return valid;
  }

  async function collectLeadFormPayload(form) {
    const fd = new FormData(form);
    const payload = {};
    for (const [key, value] of fd.entries()) {
      if (key.endsWith('__file')) continue;
      if (payload[key] !== undefined) {
        payload[key] = Array.isArray(payload[key]) ? payload[key].concat(value) : [payload[key], value];
      } else {
        payload[key] = value;
      }
    }
    // Join any multi-value arrays (legacy <select multiple> or duplicate keys) to comma string
    Object.keys(payload).forEach(k => {
      if (Array.isArray(payload[k])) payload[k] = payload[k].join(',');
    });
    form.querySelectorAll('input[type="checkbox"][data-custom-key]').forEach(input => {
      if (!input.disabled && !input.checked) payload[input.name] = '';
    });
    for (const input of form.querySelectorAll('input[type="file"][data-file-key]')) {
      if (input.disabled || !input.files || !input.files.length) continue;
      const file = input.files[0];
      const maxMb = Number(input.dataset.maxMb || 10);
      if (file.size > maxMb * 1024 * 1024) throw new Error(`${file.name} must be ${maxMb} MB or less.`);
      payload[input.dataset.fileKey] = await _readFilePayload(file);
    }

    // Trim all string values
    Object.keys(payload).forEach(k => {
      if (typeof payload[k] === 'string') payload[k] = payload[k].trim();
    });
    const _toTitleCase = s => s.replace(/\b\w/g, c => c.toUpperCase());
    ['Company Name', 'Contact Person'].forEach(k => {
      if (payload[k]) payload[k] = _toTitleCase(payload[k]);
    });
    ['City', 'State'].forEach(k => {
      if (payload[k]) payload[k] = _normalizeLocationName(payload[k]);
    });
    if (payload['Email']) payload['Email'] = payload['Email'].toLowerCase();
    if (payload['GST No']) payload['GST No'] = payload['GST No'].toUpperCase();

    return payload;
  }

  function _readFilePayload(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve({ name: file.name, mimeType: file.type || 'application/octet-stream', data: reader.result });
      reader.onerror = () => reject(new Error(`Could not read ${file.name}.`));
      reader.readAsDataURL(file);
    });
  }

  function buildLeadCustomFieldSummary(lead, fields = [], configOptions = {}) {
    const stageMap = (App.config.allStages || App.config.stages || []).reduce((m, s) => { m[s['Stage ID']] = s['Stage Name']; return m; }, {});
    // Expand per-stage fields into one entry per stage that has data
    const active = [];
    (fields || []).forEach(f => {
      const isPerStage = (f['Per Stage'] === true || f['Per Stage'] === 'TRUE') && !f['Stage ID'];
      if (isPerStage) {
        Object.keys(lead).forEach(k => {
          if (k.startsWith(f['Column Key'] + '__') && lead[k] !== undefined && lead[k] !== '') {
            const sid = k.slice(f['Column Key'].length + 2);
            active.push({ ...f, _effectiveKey: k, _stageLabel: stageMap[sid] || sid });
          }
        });
      } else if (lead[f['Column Key']] !== undefined && lead[f['Column Key']] !== '') {
        active.push({ ...f, _effectiveKey: f['Column Key'], _stageLabel: null });
      }
    });
    if (!active.length) return '';
    return `<div class="card custom-field-summary" style="margin-bottom:16px">
    <h3 style="font-size:14px;font-weight:600;margin-bottom:10px;color:var(--md-primary)">Stage Fields</h3>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;font-size:13px">
      ${active.map(f => {
      const stageName = f._stageLabel || (f['Stage ID'] ? (stageMap[f['Stage ID']] || 'Unknown Stage') : 'All Stages');
      const isRequired = f['Is Required'] === true || f['Is Required'] === 'TRUE';
      return `<div style="border-left:3px solid #90CAF9;padding:6px 10px;border-radius:0 4px 4px 0;background:#FAFAFA">
          <div style="font-weight:600">${escapeHtml(f['Field Name'])}${isRequired ? ' <span style="color:#D32F2F;font-size:11px">Required</span>' : ''}</div>
          <div style="color:#888;font-size:11px;margin:2px 0">${escapeHtml(f['Field Type'] || 'Text')} &middot; ${escapeHtml(stageName)}</div>
          <div style="margin-top:3px">${_customFieldDisplayValue(lead[f._effectiveKey], f)}</div>
        </div>`;
    }).join('')}
    </div>
  </div>`;
  }

  function _activeLeadCustomFields(fields, stageId) {
    return (fields || []).filter(f => !f['Stage ID'] || f['Stage ID'] === stageId);
  }

  function _customFieldDisplayValue(value, field) {
    if (field['Field Type'] === 'File') {
      return `<a href="${escapeHtml(value)}" target="_blank" rel="noopener">View file</a>`;
    }
    if (field['Field Type'] === 'Checkbox') return value === true || value === 'TRUE' ? 'Yes' : 'No';
    if (field['Field Type'] === 'Multi Select' && value) {
      return String(value).split(',').map(v => v.trim()).filter(Boolean)
        .map(v => `<span style="display:inline-block;background:#E3F2FD;color:#1565C0;border-radius:3px;padding:1px 7px;font-size:11px;font-weight:500;margin:1px 2px">${escapeHtml(v)}</span>`)
        .join('');
    }
    return escapeHtml(value);
  }

  function _customFieldOptions(field, configOptions = {}) {
    const source = field['Dropdown Source'] || '';
    if (configOptions[source]) return configOptions[source];
    return source.split(',').map(v => v.trim()).filter(Boolean);
  }

  function _configOptionsMap(configs = []) {
    return configs.reduce((m, c) => {
      if (c['Status'] !== 'Active') return m;
      const type = c['Config Type'];
      if (!m[type]) m[type] = [];
      m[type].push(c['Value']);
      return m;
    }, {});
  }

  function _formatCustomFieldInputValue(value, type) {
    if (type === 'Date Time' && value) return String(value).replace(' ', 'T').slice(0, 16);
    if (type === 'Date' && value) return String(value).slice(0, 10);
    if (type === 'Time' && value) return String(value).slice(0, 5);
    return value || '';
  }
</script>

<script>
  let leadTable;
  let _leadKpiFilter = '';
  let _leadStatusTab = 'all';
  let _leadFiltersOpen = false;
  let _leadDensity = (typeof localStorage !== 'undefined' && localStorage.getItem('_leadDensity')) || 'compact';

  async function loadLeads(force = false) {
    el('page-title').textContent = 'Leads';
    if (force) {
      setContentLoading('table');
      const rows = await api.getLeads();
      AppCache.setRows('leads', rows);
    } else if (!AppCache.isLoaded('leads')) {
      setContentLoading('table');
      await _ensureCached('leads', () => api.getLeads());
    }
    _renderLeadsTable(AppCache.getRows('leads'));
  }

  function _leadKpiClick(key) {
    _leadKpiFilter = (_leadKpiFilter === key) ? '' : key;
    applyLeadFilters();
    _renderLeadKpis(AppCache.getRows('leads'));
  }
  window._leadKpiClick = _leadKpiClick;

  function _leadStatusTabSet(key) {
    _leadStatusTab = key;
    applyLeadFilters();
    const tabsEl = el('lead-status-tabs');
    if (tabsEl) { tabsEl.innerHTML = _leadStatusTabsHTML(); renderIcons(tabsEl); }
  }
  window._leadStatusTabSet = _leadStatusTabSet;

  function _leadStatusTabsHTML() {
    const tabs = [
      ['all',    'All',         'layers'],
      ['active', 'Active',      'flame'],
      ['closed', 'Closed/Won',  'check-circle-2'],
      ['nbd',    'NBD Pushed',  'send']
    ];
    return tabs.map(([id, label, ic]) => `
      <button class="fu-tab ${_leadStatusTab === id ? 'active' : ''}" onclick="_leadStatusTabSet('${id}')">
        ${icon(ic, 14)} <span>${label}</span>
      </button>`).join('');
  }

  function _leadToggleFilters() {
    _leadFiltersOpen = !_leadFiltersOpen;
    const bar = el('lead-filter-bar');
    const toggle = el('lead-filter-toggle');
    if (bar) bar.style.display = _leadFiltersOpen ? 'block' : 'none';
    if (toggle) { toggle.classList.toggle('open', _leadFiltersOpen); renderIcons(toggle); }
    if (_leadFiltersOpen) { const s = el('lead-search'); if (s) s.focus(); }
  }
  window._leadToggleFilters = _leadToggleFilters;

  function _leadClearFilters() {
    ['lead-search','lead-status-f','lead-priority-f','lead-stage-f'].forEach(id => { const e = el(id); if (e) e.value = ''; });
    _leadKpiFilter = '';
    _leadStatusTab = 'all';
    const tabsEl = el('lead-status-tabs');
    if (tabsEl) { tabsEl.innerHTML = _leadStatusTabsHTML(); renderIcons(tabsEl); }
    applyLeadFilters();
    _renderLeadKpis(AppCache.getRows('leads'));
  }
  window._leadClearFilters = _leadClearFilters;

  function _leadSetDensity(value) {
    _leadDensity = ['comfortable','compact','ultra'].includes(value) ? value : 'compact';
    try { localStorage.setItem('_leadDensity', _leadDensity); } catch (e) {}
    const page = el('leads-page');
    if (page) {
      page.classList.remove('fu-density-comfortable','fu-density-compact','fu-density-ultra');
      page.classList.add('fu-density-' + _leadDensity);
    }
    const wl = el('leads-worklist');
    if (wl) {
      wl.classList.remove('fu-density-comfortable','fu-density-compact','fu-density-ultra');
      wl.classList.add('fu-density-' + _leadDensity);
    }
    const heights = { comfortable: 52, compact: 42, ultra: 34 };
    if (leadTable) { try { leadTable.setHeight(); leadTable.redraw(true); } catch(e) {} }
    document.documentElement.style.setProperty('--lead-row-h', heights[_leadDensity] + 'px');
    const toggleWrap = el('lead-density-toggle');
    if (toggleWrap) toggleWrap.querySelectorAll('button').forEach(b => b.classList.toggle('active', b.dataset.density === _leadDensity));
  }
  window._leadSetDensity = _leadSetDensity;

  function _leadKpiCounts(leads) {
    const stageMap = (App.config.stages || []).reduce((m, s) => { m[s['Stage ID']] = s; return m; }, {});
    let total = 0, open = 0, hot = 0, warm = 0, cold = 0, closed = 0, nbd = 0;
    leads.forEach(l => {
      total++;
      const isNbd = !!(l['NBD Lead ID'] || l['Pushed To NBD At']);
      const stage = stageMap[l['Stage ID']] || {};
      const isFinal = stage['Is Final Stage'] === true || stage['Is Final Stage'] === 'TRUE';
      if (isNbd) nbd++;
      if (isFinal) closed++;
      else if (String(l['Lead Status'] || 'Open').toLowerCase() === 'open') open++;
      const p = String(l['Priority'] || '').toLowerCase();
      if (p === 'hot') hot++;
      else if (p === 'warm') warm++;
      else if (p === 'cold') cold++;
    });
    return { total, open, hot, warm, cold, closed, nbd };
  }

  function _renderLeadKpis(leads) {
    const wrap = el('lead-kpis');
    if (!wrap) return;
    const c = _leadKpiCounts(leads);
    const cards = [
      { key: '',     label: 'Total Leads', value: c.total,  sub: 'all leads',     icon: 'users',          cls: 'neutral' },
      { key: 'open', label: 'Open',        value: c.open,   sub: 'in progress',   icon: 'circle-dot',     cls: 'blue' },
      { key: 'hot',  label: 'Hot',         value: c.hot,    sub: 'high priority', icon: 'flame',          cls: 'danger' },
      { key: 'warm', label: 'Warm',        value: c.warm,   sub: 'mid priority',  icon: 'thermometer',    cls: 'warning' },
      { key: 'cold', label: 'Cold',        value: c.cold,   sub: 'low priority',  icon: 'snowflake',      cls: 'blue' },
      { key: 'closed', label: 'Closed',    value: c.closed, sub: 'final stage',   icon: 'check-circle-2', cls: 'success' },
      { key: 'nbd',  label: 'NBD Pushed',  value: c.nbd,    sub: 'sent to NBD',   icon: 'send',           cls: 'purple' }
    ];
    wrap.innerHTML = cards.map(k => `
      <button type="button" class="fu-kpi fu-kpi-${k.cls} ${_leadKpiFilter === k.key && k.key ? 'active' : ''}"
        ${k.key ? `onclick="_leadKpiClick('${k.key}')"` : ''}>
        <span class="fu-kpi-icon">${icon(k.icon, 17)}</span>
        <span class="fu-kpi-value">${escapeHtml(k.value)}</span>
        <span class="fu-kpi-label">${escapeHtml(k.label)}</span>
        <span class="fu-kpi-sub">${escapeHtml(k.sub)}</span>
      </button>`).join('');
    renderIcons(wrap);
  }

  function _leadSortKey(lead, stageMap) {
    const isNbd   = !!(lead['NBD Lead ID'] || lead['Pushed To NBD At']);
    const stage   = stageMap[lead['Stage ID']] || {};
    const isFinal = stage['Is Final Stage'] === true || stage['Is Final Stage'] === 'TRUE';
    // Bucket: 0 = active, 1 = final (won/lost), 2 = NBD-pushed
    const bucket  = isNbd ? 2 : isFinal ? 1 : 0;
    // Within active: priority rank (Hot=0, Warm=1, Cold=2, other=3)
    const priRank = { hot: 0, warm: 1, cold: 2 }[String(lead['Priority'] || '').toLowerCase()] ?? 3;
    // Within active: next follow-up date (overdue = earlier timestamp = sorts first)
    const due = lead['Next Follow-up Date'] ? new Date(lead['Next Follow-up Date']).getTime() : 9e15;
    // Encode as a sortable string: "bucket|priRank|due"
    return bucket + '|' + priRank + '|' + String(due).padStart(16, '0');
  }

  function _renderLeadsTable(leads) {
    const stageMap = App.config.stages.reduce(function (m, s) { m[s['Stage ID']] = s; return m; }, {});
    const userMap = App.config.users.reduce(function (m, u) { m[u.id] = u.name; return m; }, {});

    // Attach sort key and pre-sort so default table order is meaningful
    const sorted = leads
      .map(l => ({ ...l, _sortKey: _leadSortKey(l, stageMap) }))
      .sort((a, b) => a._sortKey < b._sortKey ? -1 : a._sortKey > b._sortKey ? 1 : 0);
    const statusOpts = App.config.statuses.map(function (s) { return '<option>' + escapeHtml(s) + '</option>'; }).join('');
    const priorityOpts = App.config.priorities.map(function (p) { return '<option>' + escapeHtml(p) + '</option>'; }).join('');
    const stageOpts = App.config.stages.map(function (s) { return '<option value="' + escapeHtml(s['Stage ID']) + '">' + escapeHtml(s['Stage Name']) + '</option>'; }).join('');

    el('content').innerHTML = `
    <div class="fu-page td-page fu-density-${_leadDensity}" id="leads-page">
      <div class="fu-topbar">
        <div class="fu-topbar-left">
          <div class="fu-hero-icon" style="background:linear-gradient(135deg,#FEF3C7,#FCD34D);color:#92400E">${icon('users', 16)}</div>
          <div class="fu-topbar-titles">
            <div class="fu-hero-title">Lead Master</div>
            <div class="fu-hero-sub">Single source of truth for every lead, priority, and stage.</div>
          </div>
        </div>
        <div class="fu-topbar-right">
          <button class="btn btn-outlined btn-sm fu-topbar-btn" onclick="loadLeads(true)" title="Refresh">${icon('refresh-cw', 13)}<span class="fu-btn-text"> Refresh</span></button>
          ${_isNBDPortal() ? _nbdEscalateBtn('sm') : `<button class="btn btn-primary btn-sm fu-topbar-btn" onclick="openLeadForm()">${icon('plus', 14)}<span class="fu-btn-text"> Add Lead</span></button>`}
        </div>
      </div>

      <div id="lead-kpis" class="fu-kpis"></div>

      <div class="fu-tabs">
        <div class="fu-tabs-left" id="lead-status-tabs">${_leadStatusTabsHTML()}</div>
        <div class="fu-tabs-right">
          <button class="fu-filter-toggle ${_leadFiltersOpen ? 'open' : ''}" id="lead-filter-toggle" onclick="_leadToggleFilters()">
            ${icon('sliders-horizontal', 14)} <span>Filters</span>
            ${icon(_leadFiltersOpen ? 'chevron-up' : 'chevron-down', 13)}
          </button>
        </div>
      </div>

      <div class="fu-filter-bar" id="lead-filter-bar" style="display:${_leadFiltersOpen ? 'block' : 'none'}">
        <div class="fu-filter-card-grid">
          <label class="fu-search">${icon('search', 14)}
            <input type="search" id="lead-search" placeholder="Search company, contact, description, remark... (Ctrl+K)" oninput="applyLeadFilters()">
          </label>
          <label class="fu-filter"><span>Status</span><select id="lead-status-f" onchange="applyLeadFilters()">
            <option value="">All Status</option>${statusOpts}
          </select></label>
          <label class="fu-filter"><span>Priority</span><select id="lead-priority-f" onchange="applyLeadFilters()">
            <option value="">All Priority</option>${priorityOpts}
          </select></label>
          <label class="fu-filter"><span>Stage</span><select id="lead-stage-f" onchange="applyLeadFilters()">
            <option value="">All Stages</option>${stageOpts}
          </select></label>
          <button class="btn btn-outlined btn-sm fu-filter-clear-all" onclick="_leadClearFilters()">${icon('x', 13)} Clear</button>
        </div>
      </div>

      <div id="fu-body">
        <div class="fu-worklist-card fu-density-${_leadDensity}" id="leads-worklist">
          <div class="fu-worklist-head">
            <div class="fu-worklist-head-left">
              <div class="fu-worklist-title">Leads <span class="fu-worklist-count" id="lead-row-count">${sorted.length}</span></div>
            </div>
            <div class="fu-worklist-tools">
              <div class="fu-density-toggle" id="lead-density-toggle" role="group" aria-label="Row density">
                <button data-density="comfortable" class="${_leadDensity === 'comfortable' ? 'active' : ''}" title="Comfortable" onclick="_leadSetDensity('comfortable')">${icon('rows-3', 12)}</button>
                <button data-density="compact" class="${_leadDensity === 'compact' ? 'active' : ''}" title="Compact" onclick="_leadSetDensity('compact')">${icon('list', 12)}</button>
                <button data-density="ultra" class="${_leadDensity === 'ultra' ? 'active' : ''}" title="Ultra Compact" onclick="_leadSetDensity('ultra')">${icon('menu', 12)}</button>
              </div>
            </div>
          </div>
          <div id="lead-table"></div>
        </div>
      </div>
    </div>`;

    renderIcons();
    _renderLeadKpis(leads);
    const rowHeights = { comfortable: 52, compact: 42, ultra: 34 };
    document.documentElement.style.setProperty('--lead-row-h', rowHeights[_leadDensity] + 'px');

    const priClass = { hot: 'lead-pri-hot', warm: 'lead-pri-warm', cold: 'lead-pri-cold' };
    const priIcon  = { hot: 'flame', warm: 'thermometer', cold: 'snowflake' };
    const iconSvg  = (name, size) => icon(name, size);

    const rowH = { comfortable: 52, compact: 42, ultra: 34 }[_leadDensity] || 42;
    if (leadTable) { try { leadTable.destroy(); } catch(e) {} leadTable = null; }
    leadTable = new Tabulator('#lead-table', {
      data: sorted,
      layout: 'fitColumns',
      pagination: 'local',
      paginationSize: 25,
      rowHeight: rowH,
      placeholder: '<div style="padding:48px;text-align:center;color:#9ca3af;font-size:13px">No leads found</div>',
      rowFormatter: function (row) {
        const d = row.getData();
        const el = row.getElement();
        el.title = '';
        const isNbd = !!(d['NBD Lead ID'] || d['Pushed To NBD At']);
        const stg = stageMap[d['Stage ID']] || {};
        const isFinal = stg['Is Final Stage'] === true || stg['Is Final Stage'] === 'TRUE';
        el.classList.toggle('lead-row-nbd', isNbd);
        el.classList.toggle('lead-row-final', isFinal && !isNbd);
      },
      columns: [
        {
          title: 'Company / Contact', field: 'Company Name', sorter: 'string', minWidth: 200,
          formatter: function (cell) {
            const d = cell.getRow().getData();
            const co = '<div class="lead-co-name" title="' + escapeHtml(d['Company Name'] || '') + '">' + escapeHtml(d['Company Name'] || '—') + '</div>';
            const ct = d['Contact Person'] ? '<div class="lead-co-contact">' + escapeHtml(d['Contact Person']) + '</div>' : '';
            return co + ct;
          }
        },
        {
          title: 'Description', field: 'Client Description', sorter: 'string', minWidth: 200,
          formatter: function (cell) {
            const v = cell.getValue() || '';
            if (!v) return '';
            return '<div class="lead-desc" title="' + escapeHtml(v) + '">' + escapeHtml(v) + '</div>';
          }
        },
        {
          title: 'Phone', field: 'Phone', minWidth: 120,
          formatter: function (cell) {
            const v = cell.getValue();
            return v ? '<span class="lead-phone">' + escapeHtml(v) + '</span>' : '';
          }
        },
        {
          title: 'Location', field: 'City', minWidth: 130,
          formatter: function (cell) {
            const d = cell.getRow().getData();
            if (!d['City'] && !d['State']) return '';
            const city = d['City'] ? '<div class="lead-city">' + escapeHtml(d['City']) + '</div>' : '';
            const state = d['State'] ? '<div class="lead-state">' + escapeHtml(d['State']) + '</div>' : '';
            return city + state;
          }
        },
        {
          title: 'Stage', field: 'Stage ID', minWidth: 150,
          formatter: function (cell) {
            const s = stageMap[cell.getValue()];
            if (!s) return '<span class="muted-text">—</span>';
            const c = safeColor(s.Color) || '#6366f1';
            return '<span class="lead-stage-chip" title="' + escapeHtml(s['Stage Name']) + '" style="background:' + c + '18;color:' + c + ';border-color:' + c + '30">'
              + '<span class="lead-stage-dot" style="background:' + c + '"></span>'
              + '<span class="lead-stage-name">' + escapeHtml(s['Stage Name']) + '</span>'
              + '</span>';
          }
        },
        {
          title: 'Priority', field: 'Priority', minWidth: 100, hozAlign: 'center',
          formatter: function (cell) {
            const raw = cell.getValue() || '';
            const p = raw.toLowerCase();
            if (!raw) return '<span class="muted-text">—</span>';
            const cls = priClass[p] || 'lead-pri-other';
            const ic = priIcon[p] || 'circle';
            return '<span class="lead-pri-pill ' + cls + '">' + iconSvg(ic, 11) + ' ' + escapeHtml(raw) + '</span>';
          }
        },
        {
          title: 'Assigned', field: 'Assigned To', minWidth: 140,
          formatter: function (cell) {
            const name = userMap[cell.getValue()] || cell.getValue() || '';
            if (!name) return '<span class="muted-text">—</span>';
            const initial = String(name).trim().charAt(0).toUpperCase() || '?';
            return '<div class="fu-owner-cell"><span class="fu-owner-avatar">' + escapeHtml(initial) + '</span><span class="fu-owner-name">' + escapeHtml(name) + '</span></div>';
          }
        },
        // { title: '', width: 74, hozAlign: 'center', headerSort: false,
        //   formatter: function() {
        //     return '<button class="btn btn-sm btn-primary" style="font-size:11px;font-weight:600;padding:3px 12px;border-radius:6px" onclick="event.stopPropagation()">View</button>';
        //   },
        //   cellClick: function(e, cell) { openLeadDetail(_leadRowId(cell.getRow().getData())); }
        // }
        ...(String(App.user.department || '').trim().toUpperCase() === 'MIS' || App.user.role === 'ADMIN' ? [{
          title: '', width: 64, hozAlign: 'center', headerSort: false,
          formatter: function() {
            return '<button class="fu-icon-action danger" title="Delete lead">' + iconSvg('trash-2', 14) + '</button>';
          },
          cellClick: function(e, cell) {
            e.stopPropagation();
            const leadId = _leadRowId(cell.getRow().getData());
            if (!leadId) return;
            if (!confirm('Delete this lead and all related follow-ups, history, activity logs, and custom field values? This cannot be undone.')) return;
            if (typeof _removeLeadRelatedRowsFromCache === 'function') _removeLeadRelatedRowsFromCache(leadId);
            else AppCache.removeRow('leads', 'Lead ID', leadId);
            cell.getRow().delete();
            QueueManager.enqueue({
              module: 'leads', actionType: 'deleteLead',
              payload: { id: leadId },
              onDone: () => toast('Lead deleted!'),
              onFail: j => {
                toast('Delete failed: ' + (j.error || 'Error'), 'error');
                _refreshLeadsCache().catch(() => {});
              }
            });
            toast('Deleting…', 'info');
          }
        }] : [])
      ]
    });

    leadTable.on('rowClick', function (e, row) {
      if (e.target.closest('button')) return;
      openLeadDetail(_leadRowId(row.getData()));
    });

    window.leadTable = leadTable;
    leadTable.on('dataFiltered', function (filters, rows) {
      const cnt = el('lead-row-count'); if (cnt) cnt.textContent = rows.length;
    });
    const refreshIcons = () => { const t = el('lead-table'); if (t) renderIcons(t); };
    leadTable.on('renderComplete', refreshIcons);
    leadTable.on('pageLoaded', refreshIcons);
    leadTable.on('dataSorted', refreshIcons);
  }

  function applyLeadFilters() {
    if (!leadTable) return;
    const q = String(el('lead-search')?.value || '').trim().toLowerCase();
    const status = el('lead-status-f')?.value || '';
    const priority = el('lead-priority-f')?.value || '';
    const stage = el('lead-stage-f')?.value || '';
    const stageMap = (App.config.stages || []).reduce((m, s) => { m[s['Stage ID']] = s; return m; }, {});

    const noFilters = !q && !status && !priority && !stage && !_leadKpiFilter && _leadStatusTab === 'all';
    if (noFilters) { leadTable.clearFilter(); return; }

    leadTable.setFilter(function (data) {
      if (q) {
        const hay = [data['Company Name'], data['Contact Person'], data['Client Description'], data['Phone'], data['City'], remarkSearchText(data)]
          .map(v => String(v || '').toLowerCase()).join(' ');
        if (!hay.includes(q)) return false;
      }
      if (status && data['Lead Status'] !== status) return false;
      if (priority && data['Priority'] !== priority) return false;
      if (stage && data['Stage ID'] !== stage) return false;

      const stg = stageMap[data['Stage ID']] || {};
      const isFinal = stg['Is Final Stage'] === true || stg['Is Final Stage'] === 'TRUE';
      const isNbd = !!(data['NBD Lead ID'] || data['Pushed To NBD At']);

      if (_leadStatusTab === 'closed' && !isFinal) return false;
      if (_leadStatusTab === 'nbd'    && !isNbd) return false;
      if (_leadStatusTab === 'active' && (isFinal || isNbd)) return false;

      if (_leadKpiFilter === 'open'  && String(data['Lead Status'] || 'Open').toLowerCase() !== 'open') return false;
      if (_leadKpiFilter === 'hot'   && String(data['Priority'] || '').toLowerCase() !== 'hot')  return false;
      if (_leadKpiFilter === 'warm'  && String(data['Priority'] || '').toLowerCase() !== 'warm') return false;
      if (_leadKpiFilter === 'cold'  && String(data['Priority'] || '').toLowerCase() !== 'cold') return false;
      if (_leadKpiFilter === 'closed' && !isFinal) return false;
      if (_leadKpiFilter === 'nbd'    && !isNbd)   return false;
      return true;
    });
  }
  window.applyLeadFilters = applyLeadFilters;

  async function openLeadForm(data = {}) {
    if (_isLeadPushedToNbd(data)) {
      toast('Lead is already moved to NBD and cannot be edited in LQ.', 'info');
      return;
    }
    const leadFields = App.config.leadFields || [];
    const configOptions = _configOptionsMap(App.config._allConfigs || []);
    const leadId = _leadRowId(data);
    const overlay = showModal(`
    <div class="modal-header">
      <h2>${leadId ? 'Edit' : 'Add'} Lead</h2>
      <button class="modal-close" onclick="this.closest('.modal-overlay').remove()">✕</button>
    </div>
    ${buildLeadFormHTML(data, leadFields, configOptions)}`);
    const form = overlay.querySelector('#lead-form');
    _initLeadValidator(form).onSuccess(async () => {
      if (!validateCfMultiselects(form)) return;
      const btn = form.querySelector('[type=submit]');
      setButtonLoading(btn);
      try {
        const payload = await collectLeadFormPayload(form);
        const updateId = _leadRowId(data) || _leadRowId(payload);
        const isUpdate = !!updateId;
        if (isUpdate) payload['Lead ID'] = updateId;

        const duplicates = await _checkLeadDuplicates(payload['Phone'], payload['Email'], isUpdate ? updateId : '');
        if (duplicates.length) {
          resetButtonLoading(btn);
          const proceed = await _showDuplicateWarning(duplicates);
          if (!proceed) return;
          setButtonLoading(btn);
        }

        const tempId = isUpdate ? updateId : ('temp-' + Date.now());
        if (isUpdate) {
          AppCache.patchRow('leads', 'Lead ID', updateId, { ...payload, 'Updated At': _nowStr() });
        } else {
          AppCache.addRow('leads', {
            ...payload, 'Lead ID': tempId, '_queueTemp': true,
            'Lead Status': payload['Lead Status'] || 'Open',
            'Created At': _nowStr(), 'Updated At': _nowStr()
          });
        }
        overlay.remove();
        _refreshLeadViewsAfterLocalChange();
        QueueManager.enqueue({
          module: 'leads', actionType: 'saveLead', payload, tempId,
          onDone: j => {
            if (!isUpdate && j.finalRecordId) {
              AppCache.patchRow('leads', 'Lead ID', tempId, { 'Lead ID': j.finalRecordId, '_queueTemp': false });
              if (AppCache.isLoaded('followups')) _refreshFollowupsCache().catch(() => {});
              _refreshLeadViewsAfterLocalChange();
            }
            toast('Lead saved!');
          },
          onFail: j => {
            if (!isUpdate) AppCache.removeRow('leads', 'Lead ID', tempId);
            _refreshLeadsCache().catch(() => {});
            toast('Save failed: ' + (j.error || 'Error'), 'error');
          }
        });
        toast(isUpdate ? 'Saving…' : 'Lead queued for saving…', 'info');
      } catch (err) {
        toast(err, 'error');
        resetButtonLoading(btn);
      }
    });
    initLeadCustomFields(overlay);
    _initStateCityDropdowns(overlay, data['State'] || '', data['City'] || '');
  }

  function _initLeadValidator(form) {
    const v = _makeValidator(form);
    const f = name => form.querySelector(`[name="${name}"]`);
    v.addField(f('Company Name'), [{ rule: 'required', errorMessage: 'Company name is required.' }]);
    v.addField(f('Client Description'), [{ rule: 'required', errorMessage: 'Client description is required.' }]);
    if (f('Contact Person'))
      v.addField(f('Contact Person'), [{ rule: 'required', errorMessage: 'Contact person is required.' }]);
    if (f('Category'))
      v.addField(f('Category'), [{ rule: 'required', errorMessage: 'Category is required.' }]);
    if (f('Source'))
      v.addField(f('Source'), [{ rule: 'required', errorMessage: 'Source is required.' }]);
    if (f('State'))
      v.addField(f('State'), [{ rule: 'required', errorMessage: 'State is required.' }]);
    if (f('City'))
      v.addField(f('City'), [{ rule: 'required', errorMessage: 'City is required.' }]);
    if (f('Phone'))
      v.addField(f('Phone'), [{
        rule: 'function', validator: val => !!val && /^[0-9+\-\s()]{7,20}$/.test(val),
        errorMessage: 'Phone number is required (7–20 digits).'
      }]);
    if (f('Alternate No'))
      v.addField(f('Alternate No'), [{
        rule: 'function', validator: val => !val || /^[0-9+\-\s()]{7,20}$/.test(val),
        errorMessage: 'Enter a valid WhatsApp number (7–20 digits).'
      }]);
    if (f('Email'))
      v.addField(f('Email'), [{
        rule: 'function', validator: val => !val || /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(val),
        errorMessage: 'Enter a valid email address.'
      }]);
    if (f('GST No'))
      v.addField(f('GST No'), [{
        rule: 'function', validator: val => !val || /^[0-9]{2}[A-Za-z]{5}[0-9]{4}[A-Za-z][1-9A-Za-z]Z[0-9A-Za-z]$/i.test(val),
        errorMessage: 'Enter a valid GST number (e.g. 22AAAAA0000A1Z5).'
      }]);
    return v;
  }

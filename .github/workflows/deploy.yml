# ─── deploy.yml ──────────────────────────────────────────────────────────────
# Automatically pushes code to all GAS clients when you push to main/master.
#
# ONE-TIME SETUP — add this GitHub secret before first run:
#   1. On your machine, run:  clasp login
#   2. Copy the file content: cat ~/.clasprc.json
#   3. In GitHub → repo → Settings → Secrets → Actions → New secret:
#        Name:  CLASPRC_JSON
#        Value: (paste the full JSON content)

name: Deploy to Google Apps Script

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install clasp
        run: |
          if command -v clasp >/dev/null 2>&1; then
            echo "clasp already installed: $(clasp --version)"
          else
            npm install -g @google/clasp
          fi

      - name: Authenticate clasp
        env:
          CLASPRC_JSON: ${{ secrets.CLASPRC_JSON }}
        run: |
          if [ -z "$CLASPRC_JSON" ]; then
            echo "ERROR: CLASPRC_JSON secret is not set."
            echo "Run 'clasp login' locally, copy ~/.clasprc.json, and add it as a GitHub secret named CLASPRC_JSON."
            exit 1
          fi
          node <<'NODE'
          const fs = require('fs');
          const os = require('os');
          const path = require('path');

          const raw = process.env.CLASPRC_JSON || '';
          const candidates = [
            raw,
            raw.trim(),
            raw.replace(/\\n/g, '\n').trim(),
          ];

          try {
            const decoded = Buffer.from(raw.trim(), 'base64').toString('utf8');
            if (decoded && decoded.includes('{')) candidates.push(decoded.trim());
          } catch (e) {}

          let parsed = null;
          const errors = [];
          for (const candidate of candidates) {
            try {
              parsed = JSON.parse(candidate);
              if (typeof parsed === 'string') parsed = JSON.parse(parsed);
              break;
            } catch (e) {
              errors.push(e.message);
            }
          }

          if (!parsed || typeof parsed !== 'object') {
            console.error('ERROR: CLASPRC_JSON could not be parsed as clasp credentials JSON.');
            if (errors.length) console.error(errors[0]);
            process.exit(1);
          }

          const hasLegacyToken = !!(parsed.token && parsed.token.refresh_token);
          const hasDefaultToken = !!(parsed.tokens && parsed.tokens.default && parsed.tokens.default.refresh_token);
          if (!hasLegacyToken && !hasDefaultToken) {
            console.error('ERROR: CLASPRC_JSON parsed, but refresh_token is missing.');
            console.error('Expected either token.refresh_token or tokens.default.refresh_token.');
            process.exit(1);
          }

          fs.writeFileSync(path.join(os.homedir(), '.clasprc.json'), JSON.stringify(parsed, null, 2));
          console.log('Credentials JSON: OK');
          NODE

      - name: Push code to all clients
        run: |
          for client_dir in clients/*/; do
            client_name=$(basename "$client_dir")
            echo "==> Pushing: $client_name"
            cp "${client_dir}ClientConfig.js" src/server/ClientConfig.js
            cp "${client_dir}.clasp.json"     .clasp.json
            clasp push --force
            echo "==> Done: $client_name"
          done
